<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Lens: Paleozoic Odyssey</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000205; font-family: 'Segoe UI', 'Meiryo', sans-serif; user-select: none; color: #fff; }
        canvas { display: block; }
        
        #era-menu {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0, 15, 30, 0.85); padding: 10px 15px;
            border-radius: 40px; border: 1px solid #00f2ff; z-index: 50; box-shadow: 0 0 15px rgba(0,255,255,0.2);
            backdrop-filter: blur(10px);
        }
        .era-btn {
            background: transparent; border: 1px solid rgba(0,255,255,0.2); color: #88dddd;
            padding: 8px 16px; border-radius: 30px; font-size: 11px; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .era-btn span { display: block; font-size: 14px; font-weight: bold; margin-top: 2px; }
        .era-btn.active { background: #00ffff; color: #000; box-shadow: 0 0 15px #0ff; border-color: #0ff; }
        .era-btn:hover:not(.active) { background: rgba(0,255,255,0.15); }

        #alert {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 50, 0.25); border: 2px solid #ff0055; color: #ff0055;
            padding: 8px 24px; border-radius: 8px; font-weight: bold; letter-spacing: 2px;
            display: none; z-index: 200; animation: blink 0.8s infinite alternate; text-shadow: 0 0 5px #f05;
        }
        @keyframes blink { 0% { opacity: 1; box-shadow: 0 0 20px #f05; } 100% { opacity: 0.2; box-shadow: 0 0 0px #f05; } }

        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 25, 45, 0.9); backdrop-filter: blur(15px);
            border: 2px solid #00ffff; box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
            padding: 25px; border-radius: 12px; pointer-events: auto; z-index: 100; display: none; width: 360px;
            opacity: 0; transition: all 0.3s ease;
        }
        #hologram-ui.active { display: block; opacity: 1; transform: translate(-50%, -50%); }
        #holo-title { margin: 0; font-size: 24px; color: #00ffff; text-shadow: 0 0 10px #0ff; }
        #holo-latin { font-size: 14px; color: #88dddd; font-style: italic; margin: 5px 0 10px 0; padding-bottom: 10px; border-bottom: 1px solid rgba(0,255,255,0.3); }
        #holo-desc { font-size: 14.5px; line-height: 1.7; color: #e0f8f8; margin-bottom: 20px; }
        #close-btn { background: rgba(0,255,255,0.15); border: 1px solid #0ff; color: #0ff; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; letter-spacing: 1px; transition: 0.2s; }
        #close-btn:hover { background: #00ffff; color: #000; }

        #hud { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; color: rgba(0, 255, 255, 0.6); font-size: 13px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="era-menu">
    <button id="btn-ediacaran" class="era-btn" onclick="switchEra('ediacaran')">EDIACARAN<span>エディアカラ紀</span></button>
    <button id="btn-cambrian" class="era-btn active" onclick="switchEra('cambrian')">CAMBRIAN<span>カンブリア紀</span></button>
    <button id="btn-ordovician" class="era-btn" onclick="switchEra('ordovician')">ORDOVICIAN<span>オルドビス紀</span></button>
    <button id="btn-devonian" class="era-btn" onclick="switchEra('devonian')">DEVONIAN<span>デボン紀</span></button>
</div>

<div id="alert">⚠️ RARE CREATURE DETECTED / 希少生物接近 ⚠️</div>

<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <div id="holo-latin"></div>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">CLOSE / 調査終了</button>
</div>
<div id="hud">Drag: 回転 | Scroll: ズーム(海底視点) | Click: エサやり(水流沈降) & 図鑑</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// ==========================================
// 1. システム・シーン構築
// ==========================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000205);
scene.fog = new THREE.FogExp2(0x000205, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

let camRadius = 100, targetCamRadius = 100, camAngleX = 0, camAngleY = 0.3;
const bottomY = -40;
const aquariumRadius = 150; 

let currentEra = '';
let entities = [];
let rareEntity = null;
const envGroup = new THREE.Group(); scene.add(envGroup);

const foodMesh = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
const foodLight = new THREE.PointLight(0xffff00, 1.5, 30);
foodMesh.add(foodLight);
foodMesh.visible = false;
scene.add(foodMesh);

scene.add(new THREE.AmbientLight(0x1a2a4a, 2.5));
const dirLight = new THREE.DirectionalLight(0x00ffcc, 1.2); dirLight.position.set(0, 50, 20); scene.add(dirLight);

const mat = (col, trans=0, rough=0.5, glow=0) => new THREE.MeshStandardMaterial({ 
    color: col, transparent: trans>0, opacity: 1-trans, roughness: rough, emissive: col, emissiveIntensity: glow 
});
const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});

// ==========================================
// 2. 生物造形モデリング
// ==========================================

// --- エディアカラ紀 ---
function buildDickinsonia() {
    const g = new THREE.Group();
    for(let i=0; i<15; i++) {
        const s = Math.sin((i/14)*Math.PI);
        const rib = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 4*s, 8), mat(0xaa88ff, 0.4, 0.2, 0.2));
        rib.rotation.z = Math.PI/2; rib.position.z = 2.5 - i*0.35; g.add(rib);
    }
    g.scale.set(1.2, 1, 1.2);
    return { mesh: g, segments: [], type: 'slide', offset: 0.1 };
}
function buildCharnia() {
    const g = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.1, 8), mat(0x66ffaa, 0.5, 0.3, 0.3));
    stem.position.y = 4; g.add(stem);
    for(let i=0; i<10; i++) {
        const s = 1 - (i/10);
        const leafL = new THREE.Mesh(new THREE.BoxGeometry(2*s, 0.5, 0.05), mat(0x66ffaa, 0.5, 0.3, 0.3));
        leafL.position.set(1*s, 2 + i*0.6, 0); leafL.rotation.z = 0.5; g.add(leafL);
        const leafR = new THREE.Mesh(new THREE.BoxGeometry(2*s, 0.5, 0.05), mat(0x66ffaa, 0.5, 0.3, 0.3));
        leafR.position.set(-1*s, 2.3 + i*0.6, 0); leafR.rotation.z = -0.5; g.add(leafR);
    }
    return { mesh: g, segments: [g], type: 'static', offset: 0 };
}
function buildKimberella() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), mat(0xddaa88, 0.3, 0.5, 0.1));
    body.scale.set(1, 0.6, 1.5); body.position.y = 0.3; g.add(body);
    const frill = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.1, 24), mat(0xffccaa, 0.4, 0.5, 0.1));
    frill.scale.set(1, 1, 1.8); frill.position.y = 0.05; g.add(frill);
    return { mesh: g, segments: [], type: 'slide', offset: 0.1 };
}
function buildTribrachidium() {
    const g = new THREE.Group();
    const disk = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 0.2, 32), mat(0x55ccff, 0.3, 0.5, 0.2)); g.add(disk);
    for(let i=0; i<3; i++) {
        const arm = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.15, 8, 16, Math.PI), mat(0x88eeff, 0.2, 0.5, 0.4));
        arm.rotation.x = Math.PI/2; arm.position.set(Math.cos(i*Math.PI*2/3)*0.5, 0.15, Math.sin(i*Math.PI*2/3)*0.5);
        arm.rotation.z = i*Math.PI*2/3; g.add(arm);
    }
    return { mesh: g, segments: [g], type: 'spin_static', offset: 0.1 };
}
function buildSpriggina() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const head = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.2, 16, 1, false, 0, Math.PI), mat(0xffcc88, 0.2, 0.5, 0.2));
    head.rotation.y = Math.PI/2; head.scale.set(1, 1, 1.5); g.add(head);
    for(let i=0; i<12; i++) {
        const s = 1 - (i/12)*0.8; const seg = new THREE.Group(); seg.position.z = -0.3;
        const b = new THREE.Mesh(new THREE.BoxGeometry(1.5*s, 0.15, 0.3), mat(0xffcc88, 0.2, 0.5, 0.1)); seg.add(b);
        parent.add(seg); segs.push(seg); parent = seg;
    }
    return { mesh: g, segments: segs, type: 'slide', offset: 0.1 };
}

// --- カンブリア紀 ---
function buildAnomalocaris() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const headGroup = new THREE.Group(); g.add(headGroup);
    const head = new THREE.Mesh(new THREE.SphereGeometry(1.4, 24, 16), mat(0x1a6655)); 
    head.scale.set(1.2, 0.5, 1.1); headGroup.add(head);

    const mouthGroup = new THREE.Group();
    mouthGroup.position.set(0, -0.6, 0.5);
    mouthGroup.rotation.x = Math.PI / 2;
    for(let i=0; i<4; i++) { 
        const tooth = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.1), mat(0x113322));
        tooth.position.set(Math.cos(i*Math.PI/2)*0.3, Math.sin(i*Math.PI/2)*0.3, 0);
        tooth.rotation.z = i*Math.PI/2;
        mouthGroup.add(tooth);
    }
    const mouthRing = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.1, 8, 16), mat(0x1a6655));
    mouthGroup.add(mouthRing);
    headGroup.add(mouthGroup);

    const armsBase = [];
    for(let side of [-1, 1]) {
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.0), mat(0x1a6655));
        stalk.position.set(1.2*side, 0.4, 0.6); stalk.rotation.z = side * -1.0; stalk.rotation.x = 0.5; headGroup.add(stalk);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.4), eyeMat); 
        eye.position.set(1.6*side, 0.7, 0.8); headGroup.add(eye);
        
        const armBase = new THREE.Group(); armBase.position.set(0.5*side, -0.2, 1.2); headGroup.add(armBase);
        let curr = armBase;
        const armJoints = [];
        for(let k=0; k<7; k++) {
            const joint = new THREE.Group(); joint.position.z = 0.3;
            joint.rotation.x = 0.5; // 初期状態で丸める
            const part = new THREE.Mesh(new THREE.CylinderGeometry(0.15 - k*0.015, 0.15 - k*0.015, 0.4, 8), mat(0x1a6655)); 
            part.rotation.x = Math.PI/2; part.position.z = 0.2;
            const spine = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.5), mat(0x224433)); 
            spine.position.set(0, -0.2, 0.2); spine.rotation.x = -0.2;
            joint.add(part, spine); curr.add(joint); curr = joint;
            armJoints.push(joint);
        }
        armsBase.push(armJoints);
    }
    g.userData.armsBase = armsBase;

    for(let i=0; i<12; i++) {
        const s = 1 - Math.pow((i-2)/10, 2); 
        const seg = new THREE.Group(); if(i>0) seg.position.z = -1.0 * s;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), mat(0x1a6655)); 
        body.scale.set(1.4*s, 0.5*s, 1.1*s); seg.add(body);
        
        if(i>0 && i<11) {
            const fL = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x22aa88, 0.2, 0.4)); 
            fL.scale.set(1.8*s, 0.05, 0.8*s); fL.position.x = 1.4*s + 0.8*s; seg.add(fL);
            const fR = fL.clone(); fR.position.x = -(1.4*s + 0.8*s); seg.add(fR); 
            seg.userData = { fL, fR };
        }
        if(i===11) {
            for(let j=0; j<3; j++) {
                const tailFin = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x22aa88, 0.2, 0.4));
                tailFin.scale.set(0.8, 0.05, 1.5); tailFin.position.set(0.5 + j*0.4, 0, -1.0); tailFin.rotation.y = -0.4 + j*0.2;
                seg.add(tailFin);
                const tailFinR = tailFin.clone(); tailFinR.position.x *= -1; tailFinR.rotation.y *= -1; seg.add(tailFinR);
            }
        }
        parent.add(seg); segs.push(seg); parent = seg;
    }
    return { mesh: g, segments: segs, type: 'swim_anomalocaris' };
}

function buildHurdia() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const headGroup = new THREE.Group(); g.add(headGroup);

    const carapace = new THREE.Mesh(new THREE.SphereGeometry(1.5, 24, 16, 0, Math.PI*2, 0, Math.PI/2), mat(0x664433, 0.1));
    carapace.rotation.x = Math.PI/2; carapace.position.set(0, 0.2, 1.5);
    carapace.scale.set(0.8, 1.5, 0.5); 
    headGroup.add(carapace);

    for(let side of [-1, 1]) {
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.0), mat(0x443322));
        stalk.position.set(0.8*side, 0.3, 0.5); stalk.rotation.z = side * -1.0; headGroup.add(stalk);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.25), eyeMat); 
        eye.position.set(1.2*side, 0.6, 0.5); headGroup.add(eye);
    }

    const armGroup = new THREE.Group(); armGroup.position.set(0, -0.4, 0.8); headGroup.add(armGroup);
    for(let side of [-1, 1]) {
        const arm = new THREE.Group(); arm.position.x = 0.3 * side;
        arm.rotation.y = side * -0.2; arm.rotation.x = 0.3;
        for(let j=0; j<5; j++) { 
            const blade = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.04, 8, 16, Math.PI/2), mat(0x443322));
            blade.position.set(0, -0.2 + j*0.1, j*0.2);
            blade.rotation.y = Math.PI/2; blade.rotation.x = -Math.PI/4;
            for(let s=0; s<4; s++) {
                const secSpine = new THREE.Mesh(new THREE.ConeGeometry(0.015, 0.15), mat(0x221100));
                secSpine.position.set(Math.cos(s*0.4)*0.5, Math.sin(s*0.4)*0.5, 0); 
                secSpine.rotation.z = s*0.4 + Math.PI/2;
                blade.add(secSpine);
            }
            arm.add(blade);
        }
        armGroup.add(arm);
    }

    for(let i=0; i<9; i++) {
        const s = 1 - (i/9)*0.8; 
        const seg = new THREE.Group(); seg.position.z = -1.0;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), mat(0x554433)); 
        body.scale.set(1.2*s, 0.5*s, 1.0*s); seg.add(body);
        
        const fL = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x665544, 0.2, 0.4)); 
        fL.scale.set(1.5*s, 0.05, 0.8*s); fL.position.x = 1.0*s + 0.6*s; seg.add(fL);
        const fR = fL.clone(); fR.position.x *= -1; seg.add(fR); 
        seg.userData = { fL, fR };

        parent.add(seg); segs.push(seg); parent = seg;
    }
    g.scale.set(0.7, 0.7, 0.7);
    return { mesh: g, segments: segs, type: 'elegant_swim' };
}

function buildOpabinia() {
    const g = new THREE.Group(); const segs = [];
    const headGroup = new THREE.Group(); g.add(headGroup);
    
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 24, 16), mat(0x884488)); 
    head.scale.set(0.9, 0.5, 1.2); headGroup.add(head);
    
    const eyePos = [{x: 0, z: 0.8}, {x: -0.4, z: 0.6}, {x: 0.4, z: 0.6}, {x: -0.6, z: 0.2}, {x: 0.6, z: 0.2}];
    eyePos.forEach(pos => {
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.3), mat(0x884488));
        stalk.position.set(pos.x, 0.4, pos.z); stalk.rotation.x = 0.2; headGroup.add(stalk);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12), eyeMat); 
        eye.position.set(pos.x, 0.6, pos.z + 0.1); headGroup.add(eye);
    });

    const trunk = new THREE.Group(); trunk.position.set(0, -0.2, 1.0); headGroup.add(trunk); 
    let curr = trunk; const tSegs = [];
    for(let i=0; i<15; i++) { 
        const p = new THREE.Group(); 
        const s = 1 - (i/15)*0.3;
        const m = new THREE.Mesh(new THREE.CylinderGeometry(0.1*s, 0.12*s, 0.3, 12), mat(0x884488)); 
        m.rotation.x = Math.PI/2; m.position.z = 0.15; p.add(m); 
        p.position.z = 0.3; curr.add(p); curr=p; tSegs.push(p); 
        if(i===14) { 
            const clawL = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.4), mat(0xddddcc));
            clawL.position.set(0.08, 0, 0.3); clawL.rotation.z = -0.4; clawL.rotation.x = Math.PI/2; p.add(clawL);
            const clawR = clawL.clone(); clawR.position.x = -0.08; clawR.rotation.z = 0.4; p.add(clawR);
        }
    }
    
    let parent = headGroup; 
    for(let i=0; i<14; i++) {
        const s = 1 - (i/14)*0.6; const seg = new THREE.Group(); seg.position.z = -0.6;
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), mat(0x884488)); 
        b.scale.set(1.1*s, 0.4*s, 0.8); seg.add(b);
        if (i < 13) {
            const fL = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x884488, 0.2, 0.4)); 
            fL.scale.set(1.2*s, 0.05, 0.6*s); fL.position.set(0.7*s + 0.6*s, -0.1, 0); seg.add(fL);
            const fR = fL.clone(); fR.position.x *= -1; seg.add(fR); 
            seg.userData = { fL, fR };
        }
        if (i >= 11) { 
            const tailFin = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x995599, 0.2, 0.4));
            tailFin.scale.set(0.6*s, 0.05, 1.2*s); tailFin.position.set(0.4*s, 0.2, -0.5);
            tailFin.rotation.z = 0.5; tailFin.rotation.y = -0.3; seg.add(tailFin);
            const tailFinR = tailFin.clone(); tailFinR.position.x *= -1; tailFinR.rotation.z *= -1; tailFinR.rotation.y *= -1; seg.add(tailFinR);
        }
        parent.add(seg); segs.push(seg); parent = seg;
    }
    g.userData.tSegs = tSegs;
    return { mesh: g, segments: segs, type: 'swim' };
}
function buildTrilobite() {
    const g = new THREE.Group(); const segs = []; let parent = g; const legGeo = new THREE.BoxGeometry(0.05, 0.3, 0.05); legGeo.translate(0, -0.15, 0);
    for(let i=0; i<9; i++) {
        const s = 1-(i/9)*0.5; const seg = new THREE.Group(); if(i>0) seg.position.z = -0.4*s;
        const shell = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 12, 0, Math.PI*2, 0, Math.PI/2), mat(0x443322)); shell.scale.set(1.5*s, 0.4*s, 1.2*s); seg.add(shell);
        const legs = []; for(let j of [-1, 1]) { const leg = new THREE.Mesh(legGeo, mat(0x443322)); leg.position.set(0.4*s*j, -0.1, 0); seg.add(leg); legs.push(leg); }
        seg.userData.legs = legs; parent.add(seg); segs.push(seg); parent = seg;
    }
    return { mesh: g, segments: segs, type: 'crawl', offset: 0.3 };
}
function buildWiwaxia() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 12, 0, Math.PI*2, 0, Math.PI/2), mat(0x554466));
    body.scale.set(1.2, 0.6, 1.5); body.position.y = 0.1; g.add(body);
    for(let i=0; i<8; i++) {
        for(let side of [-1, 1]) {
            const spine = new THREE.Mesh(new THREE.ConeGeometry(0.04, 1.5, 8), mat(0x887799));
            const z = 0.8 - i*0.25; const x = 0.4 * side;
            spine.position.set(x, 0.5, z); spine.rotation.x = -0.3; spine.rotation.z = side * -0.5;
            g.add(spine);
        }
    }
    return { mesh: g, segments: [], type: 'slide', offset: 0 };
}
function buildHallucigenia() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    for(let i=0; i<8; i++) {
        const seg = new THREE.Group(); seg.position.z = -0.6;
        const b = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.6, 8), mat(0xff6688)); b.rotation.x = Math.PI/2; seg.add(b);
        const spine = new THREE.Mesh(new THREE.ConeGeometry(0.05, 2.0, 8), mat(0xffffff)); spine.position.y = 1.0; seg.add(spine);
        const legs = []; for(let j of [-1, 1]) {
            const leg = new THREE.Group(); leg.position.set(0.2*j, -0.2, 0); 
            const lMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.5), mat(0xff6688)); lMesh.position.y = -0.75; leg.add(lMesh);
            leg.rotation.z = j*0.2; seg.add(leg); legs.push(leg);
        }
        seg.userData.legs = legs; parent.add(seg); segs.push(seg); parent = seg;
    }
    return { mesh: g, segments: segs, type: 'walk', offset: 1.7 };
}
function buildPikaia() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    for(let i=0; i<30; i++) {
        const s = Math.sin((i/29)*Math.PI); const seg = new THREE.Group(); if(i>0) seg.position.z = -0.25;
        const b = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.5*s+0.1, 0.3), mat(0xaaaaff, 0.2)); seg.add(b); parent.add(seg); segs.push(seg); parent = seg;
    }
    return { mesh: g, segments: segs, type: 'snake' };
}
function buildNectocaris() {
    const g = new THREE.Group(); const segs = [];
    const body = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0xffaa88, 0.2)); body.scale.set(1.5, 0.2, 2); g.add(body);
    const eL = new THREE.Mesh(new THREE.SphereGeometry(0.2), eyeMat); eL.position.set(0.5, 0.2, 1.8); body.add(eL);
    const eR = eL.clone(); eR.position.x = -0.5; body.add(eR);
    for(let side of [-1, 1]) {

            const tm = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.5), mat(0xffaa88)); tm.rotation.x = Math.PI/2; tm.position.z = 0.25;

    return { mesh: g, segments: segs, type: 'fast_swim' };
}
function buildSponge() {

}
function buildChoia() {
    const g = new THREE.Group();
    const center = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 8, 0, Math.PI*2, 0, Math.PI/2), mat(0x887755));
    center.scale.set(1, 0.3, 1); g.add(center);
    for(let i=0; i<16; i++) {
        const spine = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 2.0), mat(0xaa9977));
        spine.rotation.x = Math.PI/2; const angle = (i/16) * Math.PI * 2; spine.rotation.y = angle;
        spine.position.set(Math.sin(angle), 0, Math.cos(angle)); g.add(spine);
    }
    return g;
}
function buildCrinoid() {
    const g = new THREE.Group(); const h = 4 + Math.random()*4;
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, h), mat(0x556644)); stem.position.y = h/2; g.add(stem);

        arm.position.y = h; arm.rotation.z = 0.6; arm.rotation.y = (i/8)*Math.PI*2; g.add(arm);

}

function buildGraptolite() {
    const g = new THREE.Group();
    for(let side of [-1, 1]) {
        const stipe = new THREE.Group();
        stipe.rotation.z = side * 0.4;
        const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 3), mat(0xaaaacc, 0.2));
        branch.position.y = -1.5; stipe.add(branch);
        for(let i=0; i<15; i++) {
            const theca = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.2), mat(0xccccdd));
            theca.position.set(side * 0.05, -0.2 - i*0.18, 0); theca.rotation.z = side * -0.5;
            stipe.add(theca);
        }
        g.add(stipe);
    }
    g.scale.set(1.5, 1.5, 1.5);
    return { mesh: g, segments: [g], type: 'drift', offset: 0 };
}

// エギロカシス (巨大な櫛状ろ過網と楕円フラップ)
function buildAegirocassis() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const head = new THREE.Mesh(new THREE.SphereGeometry(2.0, 24, 16), mat(0x335577)); head.scale.set(1.2, 0.7, 1); g.add(head);
    
    const filterNet = new THREE.Group(); filterNet.position.set(0, -0.5, 1.5); head.add(filterNet);
    for(let side of [-1, 1]) {
        const arm = new THREE.Group(); arm.position.set(0.5 * side, 0, 0); arm.rotation.y = side * -0.2;
        let curr = arm;
        for(let j=0; j<7; j++) {
            const joint = new THREE.Group(); joint.position.z = 0.3; joint.rotation.x = 0.2; 
            const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.3), mat(0x335577)); shaft.rotation.x = Math.PI/2; shaft.position.z = 0.15; joint.add(shaft);
            const spine = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 1.2), mat(0x447799)); spine.position.set(0, -0.5, 0.15); joint.add(spine);
            curr.add(joint); curr = joint;
        }
        filterNet.add(arm);
    }

    for(let i=0; i<12; i++) {
        const s = 1 - (i/12)*0.6; const seg = new THREE.Group(); if(i>0) seg.position.z = -1.8 * s;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1.6, 24, 16), mat(0x335577)); body.scale.set(1.2*s, 0.5*s, 1*s); seg.add(body);
        
        const topFin = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x447799, 0.2, 0.4)); 
        topFin.scale.set(2*s, 0.05, 0.8*s); topFin.position.set(0, 0.5*s, 0); seg.add(topFin);
        
        const btmFin = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x447799, 0.2, 0.4)); 
        btmFin.scale.set(1.8*s, 0.05, 0.8*s); btmFin.position.set(0, -0.6*s, 0); seg.add(btmFin);
        
        seg.userData = { topFin, btmFin }; parent.add(seg); segs.push(seg); parent = seg;
    }
    g.scale.set(1.8, 1.8, 1.8);
    return { mesh: g, segments: segs, type: 'elegant_swim' };
}
function buildOrthoceras() {

        let curr = tentacle;

}
function buildAsaphus() {
    const g = new THREE.Group(); const segs = []; let parent = g; const headGroup = new THREE.Group();
    const headShell = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 8, 0, Math.PI*2, 0, Math.PI/2), mat(0x556644)); headShell.scale.set(1.5, 0.5, 1.0); headGroup.add(headShell);
    for(let side of [-1, 1]) {
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.5), mat(0x556644)); stalk.position.set(0.8*side, 0.75, 0.5); headGroup.add(stalk);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.2), eyeMat); eye.position.set(0.8*side, 1.6, 0.5); headGroup.add(eye);
    }
    g.add(headGroup); segs.push(headGroup); parent = headGroup;
    const legGeo = new THREE.BoxGeometry(0.05, 0.4, 0.05); legGeo.translate(0, -0.2, 0);
    for(let i=0; i<7; i++) {
        const s = 1 - (i/7)*0.5; const seg = new THREE.Group(); seg.position.z = -0.6 * s;
        const shell = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 8, 0, Math.PI*2, 0, Math.PI/2), mat(0x556644)); shell.scale.set(1.5*s, 0.4*s, 0.8*s); seg.add(shell);
        const legs = []; for(let j of [-1, 1]) { const leg = new THREE.Mesh(legGeo, mat(0x556644)); leg.position.set(0.6*s*j, -0.1, 0); seg.add(leg); legs.push(leg); }
        seg.userData.legs = legs; parent.add(seg); segs.push(seg); parent = seg;

}

function buildMegalograptus() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const head = new THREE.Group();
    
    const headShell = new THREE.Mesh(new THREE.SphereGeometry(1.5, 24, 24, 0, Math.PI*2, 0, Math.PI/2), mat(0x442211, 0, 0.3)); 
    headShell.scale.set(1.2, 0.6, 0.8); head.add(headShell);
    
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.25), eyeMat); 
    eyeL.position.set(0.8, 0.4, 0.5); head.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = -0.8; head.add(eyeR);
    g.add(head);

    for(let side of [-1, 1]) {
        const arm = new THREE.Group(); arm.position.set(1.0*side, -0.2, 0.5);
        const joint1 = new THREE.Group();
        const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 1.2, 8), mat(0x442211)); 
        p1.rotation.x = Math.PI/2; p1.position.z = 0.6; joint1.add(p1);
        joint1.rotation.y = side * -0.3; arm.add(joint1);

        const joint2 = new THREE.Group(); joint2.position.set(0, 0, 1.2);
        const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 1.5, 8), mat(0x553322)); 
        p2.rotation.x = Math.PI/2; p2.position.z = 0.75; joint2.add(p2);
        joint1.add(joint2);
        
        const joint3 = new THREE.Group(); joint3.position.set(0, 0, 1.5);
        const p3 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.05, 1.2, 8), mat(0x664433));
        p3.rotation.x = Math.PI/2; p3.position.z = 0.6; joint3.add(p3);
        for(let t=0; t<5; t++) {
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.6), mat(0x220000));
            spike.position.set(side * -0.1, 0, 0.2 + t*0.2); spike.rotation.z = side * -Math.PI/2; joint3.add(spike);
        }
        joint2.add(joint3);
        
        g.add(arm); segs.push(arm); arm.userData.isArm = true; arm.userData.j2 = joint2; arm.userData.j3 = joint3;
    }
    
    for(let i=0; i<9; i++) {
        const s = 1 - (i/9)*0.7; const seg = new THREE.Group(); seg.position.z = -0.8;
        const b = new THREE.Mesh(new THREE.SphereGeometry(1.6, 16, 16), mat(0x442211, 0, 0.4)); 
        b.scale.set(s, 0.25, 0.4); seg.add(b);
        if(i===1) {
            const padL = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.1, 16), mat(0x442211)); 
            padL.scale.set(2, 1, 0.6); padL.position.x = 2.5; seg.add(padL);
            const padR = padL.clone(); padR.position.x = -2.5; seg.add(padR); seg.userData = { padL, padR };
        }
        if(i===8) { 
            const tailSpike = new THREE.Mesh(new THREE.ConeGeometry(0.15, 3.0, 8), mat(0x331100));
            tailSpike.rotation.x = -Math.PI/2; tailSpike.position.z = -1.5; seg.add(tailSpike);
        }
        parent.add(seg); segs.push(seg); parent = seg;
    }
    g.scale.set(1.5, 1.5, 1.5);
    return { mesh: g, segments: segs, type: 'eurypterid', offset: 0.5 };
}

// シンダーハンネス（デボン紀に残存した最後のアノマロカリス類）
function buildSchinderhannes() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const headGroup = new THREE.Group(); g.add(headGroup);
    
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 12), mat(0x224455));
    head.scale.set(1.0, 0.6, 1.2); headGroup.add(head);

    for(let side of [-1, 1]) {
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.6), mat(0x224455));
        stalk.position.set(0.6*side, 0.2, 0.5); stalk.rotation.z = side * -1.0; headGroup.add(stalk);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.25), eyeMat); 
        eye.position.set(0.9*side, 0.4, 0.5); headGroup.add(eye);
        
        const armBase = new THREE.Group(); armBase.position.set(0.3*side, -0.2, 0.8); headGroup.add(armBase);
        let curr = armBase;
        const armJoints = [];
        for(let k=0; k<4; k++) {
            const joint = new THREE.Group(); joint.position.z = 0.2;
            joint.rotation.x = 0.6; // 普段は丸める
            const part = new THREE.Mesh(new THREE.CylinderGeometry(0.08 - k*0.01, 0.08 - k*0.01, 0.25, 8), mat(0x224455)); 
            part.rotation.x = Math.PI/2; part.position.z = 0.1;
            const spine = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.3), mat(0x112233)); 
            spine.position.set(0, -0.1, 0.1); spine.rotation.x = -0.2;
            joint.add(part, spine); curr.add(joint); curr = joint;
            armJoints.push(joint);
        }
        if(!g.userData.armsBase) g.userData.armsBase = [];
        g.userData.armsBase.push(armJoints);
    }

    for(let i=0; i<10; i++) {
        const s = 1 - (i/10)*0.7; 
        const seg = new THREE.Group(); seg.position.z = -0.6;
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), mat(0x224455)); 
        body.scale.set(1.2*s, 0.6*s, 1.0*s); seg.add(body);
        
        if (i === 0) {
            const fL = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 12), mat(0x336677, 0.2, 0.4)); 
            fL.scale.set(1.5, 0.05, 0.6); fL.position.set(1.5, 0, 0); fL.rotation.y = -0.2; seg.add(fL);
            const fR = fL.clone(); fR.position.x *= -1; fR.rotation.y *= -1; seg.add(fR); 
            seg.userData = { fL, fR };
        } else if (i > 0 && i < 9) {
            const fL = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 12), mat(0x336677, 0.2, 0.4)); 
            fL.scale.set(1.2*s, 0.05, 0.6*s); fL.position.x = 0.8*s + 0.4*s; seg.add(fL);
            const fR = fL.clone(); fR.position.x *= -1; seg.add(fR); 
            seg.userData.btmFin = fL; 
        }
        if (i === 9) {
            const tailSpike = new THREE.Mesh(new THREE.ConeGeometry(0.05, 1.5), mat(0x112233));
            tailSpike.rotation.x = Math.PI/2; tailSpike.position.z = -0.8; seg.add(tailSpike);
        }
        
        parent.add(seg); segs.push(seg); parent = seg;
    }
    g.scale.set(0.8, 0.8, 0.8);
    return { mesh: g, segments: segs, type: 'swim_anomalocaris' };
}

// 完全流線型のダンクルオステウス
function buildDunkleosteus() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const headGroup = new THREE.Group(); g.add(headGroup);
    
    // 頭部装甲（くさび形・流線形のアーマー群）
    const skull = new THREE.Mesh(new THREE.SphereGeometry(2.2, 24, 16), mat(0x444444, 0, 0.2)); 
    skull.scale.set(0.8, 1.0, 1.2); skull.position.set(0, 0.5, 1.0); headGroup.add(skull);
    
    const armorPlate = new THREE.Mesh(new THREE.CylinderGeometry(2.0, 2.5, 4.0, 8), mat(0x555555));
    armorPlate.rotation.x = Math.PI/2; armorPlate.position.set(0, 0.6, -0.5); headGroup.add(armorPlate);
    
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.2), eyeMat); 
    eyeL.position.set(1.5, 1.0, 1.8); headGroup.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = -1.5; headGroup.add(eyeR);

    // 上顎のプレート歯（四角錐に変更し凶悪に）
    const teethTop = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.8, 4), mat(0xddddcc));
    teethTop.rotation.x = Math.PI; teethTop.position.set(1.2, -0.8, 2.0); headGroup.add(teethTop);
    const teethTopR = teethTop.clone(); teethTopR.position.x = -1.2; headGroup.add(teethTopR);

    const jaw = new THREE.Group(); jaw.position.set(0, -0.5, 1.0); headGroup.add(jaw);
    const jawMesh = new THREE.Mesh(new THREE.SphereGeometry(1.8, 16, 16), mat(0x333333)); 
    jawMesh.scale.set(0.7, 0.5, 1.2); jawMesh.position.set(0, -0.2, 1.0); jaw.add(jawMesh);
    
    // 下顎の歯（四角錐）
    const teethBot = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.8, 4), mat(0xddddcc));
    teethBot.position.set(1.1, 0.5, 2.0); jaw.add(teethBot);
    const teethBotR = teethBot.clone(); teethBotR.position.x = -1.1; jaw.add(teethBotR);

    g.userData.jaw = jaw; 

    // 流線形の体
    const torso = new THREE.Mesh(new THREE.SphereGeometry(2.5, 24, 24), mat(0x555555, 0, 0.3));
    torso.scale.set(0.8, 1.0, 2.2); torso.position.z = -2.5; g.add(torso);

    const pFinL = new THREE.Mesh(new THREE.ConeGeometry(0.2, 4.0, 8), mat(0x444444));
    pFinL.rotation.z = -Math.PI/3; pFinL.rotation.y = -0.2; pFinL.position.set(2.0, -1.5, -1.5); g.add(pFinL);
    const pFinR = pFinL.clone(); pFinR.rotation.z = Math.PI/3; pFinR.rotation.y = 0.2; pFinR.position.x = -2.0; g.add(pFinR);

    const dFin = new THREE.Mesh(new THREE.ConeGeometry(0.2, 3.0, 8), mat(0x444444));
    dFin.position.set(0, 2.5, -3.0); dFin.rotation.x = -0.5; g.add(dFin);

    const tailGroup = new THREE.Group(); tailGroup.position.set(0, 0, -7.5); g.add(tailGroup);
    const tailStalk = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 0.4, 4.0, 16), mat(0x555555));
    tailStalk.rotation.x = Math.PI/2; tailStalk.position.z = -2.0; tailGroup.add(tailStalk);
    
    const tailTop = new THREE.Mesh(new THREE.ConeGeometry(0.1, 5, 8), mat(0x444444)); tailTop.position.set(0, 2.0, -4.0); tailTop.rotation.x = 0.5; tailGroup.add(tailTop);
    const tailBot = new THREE.Mesh(new THREE.ConeGeometry(0.1, 3, 8), mat(0x444444)); tailBot.position.set(0, -1.0, -3.5); tailBot.rotation.x = -0.5; tailGroup.add(tailBot);

    g.userData.body = torso;
    g.userData.tail = tailGroup;
    g.scale.set(1.2, 1.2, 1.2);
    return { mesh: g, segments: [], type: 'fish_dunk' };
}

function buildBothriolepis() {
    const g = new THREE.Group(); const segs = [];
    const carapace = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 12, 0, Math.PI*2, 0, Math.PI/2), mat(0x776655)); 
    carapace.scale.set(1.0, 0.6, 1.4); g.add(carapace);
    
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.15), eyeMat); eyeL.position.set(0.2, 0.8, 0.6); carapace.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = -0.2; carapace.add(eyeR);

    for(let side of [-1, 1]) {
        const armBase = new THREE.Group(); armBase.position.set(1.2*side, 0, 0.5);
        armBase.rotation.z = side * 1.5; armBase.rotation.y = side * 0.5;
        const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 1.5), mat(0x776655)); p1.position.y = -0.75; armBase.add(p1);
        const elbow = new THREE.Group(); elbow.position.y = -1.5; elbow.rotation.x = 0.5;
        const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.05, 1.2), mat(0x665544)); p2.position.y = -0.6; elbow.add(p2);
        armBase.add(elbow); g.add(armBase); segs.push(armBase);
    }
    const tail = new THREE.Mesh(new THREE.ConeGeometry(0.3, 3, 16), mat(0x665544)); tail.rotation.x = -Math.PI/2; tail.position.z = -1.5; tail.position.y = 0.2; g.add(tail);
    return { mesh: g, segments: segs, type: 'floor', offset: 0.2 };
}

// 多関節の流線型・眼を埋め込んだクリマティウス
function buildClimatius() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const headGroup = new THREE.Group(); g.add(headGroup);
    const head = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.6, 16), mat(0x88aabb));
    head.rotation.x = Math.PI/2; head.position.z = 0.3; headGroup.add(head);

    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08), eyeMat);
    eyeL.scale.set(0.5, 1, 1); eyeL.position.set(0.18, 0.1, 0.4); headGroup.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = -0.18; headGroup.add(eyeR);

    for(let i=0; i<6; i++) {
        const s = Math.sin(((6-i)/6) * Math.PI * 0.8 + 0.2);
        const seg = new THREE.Group(); seg.position.z = -0.4;
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), mat(0x88aabb));
        b.scale.set(s*0.8, s*1.0, 1.2); seg.add(b);

        if(i===1) { // 棘
            const spineL = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.6), mat(0xffffff));
            spineL.position.set(0.3, -0.2, 0); spineL.rotation.z = -1; seg.add(spineL);
            const spineR = spineL.clone(); spineR.position.x = -0.3; spineR.rotation.z = 1; seg.add(spineR);
        }
        if(i===3) { // 背棘
            const dSpine = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.6), mat(0xffffff));
            dSpine.position.set(0, 0.35*s + 0.2, 0); dSpine.rotation.x = -0.5; seg.add(dSpine);
        }
        if(i===5) { // サメ型の尾ビレ
            const tailTop = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.8, 8), mat(0x88aabb));
            tailTop.position.set(0, 0.3, -0.4); tailTop.rotation.x = 0.5; seg.add(tailTop);
            const tailBot = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.4, 8), mat(0x88aabb));
            tailBot.position.set(0, -0.2, -0.2); tailBot.rotation.x = -0.5; seg.add(tailBot);
        }
        parent.add(seg); segs.push(seg); parent = seg;
    }
    g.scale.set(1.5, 1.5, 1.5);
    return { mesh: g, segments: segs, type: 'swim' };
}

function buildTiktaalik() {

    mouth.position.set(0, -0.1, 1.0); headGroup.add(mouth);

// ==========================================
// 4. 生態系管理とAIロジック
// ==========================================
class CreatureObj {
    constructor(def, isRare = false) {
        this.def = def; this.isRare = isRare;
        const b = def.build();
        this.mesh = b.mesh; this.segments = b.segments; this.type = b.type;
        this.offset = b.offset || 0; this.speed = def.speed;
        this.target = null; this.state = 'wander'; this.phase = Math.random() * Math.PI * 2;
        this.jetPhase = 0;

        const spawnX = isRare ? -160 : (Math.random()-0.5)*aquariumRadius*1.5;
        this.mesh.position.set(spawnX, def.yRange[0] + Math.random()*(def.yRange[1]-def.yRange[0]), (Math.random()-0.5)*aquariumRadius*1.5);
        if(['crawl', 'walk', 'floor', 'slide'].includes(this.type)) this.mesh.position.y = bottomY + this.offset;
        this.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = this; });
    }

    update(time, dummyObj) {
        if(this.type === 'static' || this.type === 'spin_static') {
            if(this.type === 'spin_static') this.mesh.rotation.y = time * 0.5;
            else this.segments.forEach(s => s.rotation.z = Math.sin(time*0.5 + this.phase)*0.1); 
            return;
        }

        if(this.type === 'drift') {
            this.mesh.position.y += Math.sin(time + this.phase) * 0.02;
            this.mesh.rotation.y += 0.005;
            this.mesh.rotation.z = Math.sin(time * 0.5 + this.phase) * 0.1;
            return;
        }

        let repel = new THREE.Vector3();
        entities.forEach(other => {
            if (other === this || other.type === 'static' || other.type === 'drift') return;
            const dist = this.mesh.position.distanceTo(other.mesh.position);
            if (dist < 6) repel.add(this.mesh.position.clone().sub(other.mesh.position).normalize().multiplyScalar(0.05));
        });

        if(this.type === 'jet') {
            this.jetPhase += 0.01;
            if(this.jetPhase > 1.0 && Math.random() > 0.98) { this.jetPhase = 0; this.speed = -0.7; }
            this.speed += (this.def.speed - this.speed) * 0.05;
        }

        if(foodMesh.visible && this.state !== 'feeding' && !this.isRare) {
            this.state = 'feeding';
            this.target = foodMesh.position.clone();
            if(['crawl', 'walk', 'floor', 'slide'].includes(this.type)) this.target.y = bottomY + this.offset;
        }
        if (this.state === 'feeding' && foodMesh.visible) {
            this.target = foodMesh.position.clone();
            if(['crawl', 'walk', 'floor', 'slide'].includes(this.type)) this.target.y = bottomY + this.offset;
        }

        if(!this.target || this.mesh.position.distanceTo(this.target) < 5 || (this.state === 'feeding' && !foodMesh.visible)) {
            if(this.state === 'feeding') this.state = 'wander';
            const ty = ['crawl', 'walk', 'floor', 'slide'].includes(this.type) ? bottomY + this.offset : this.def.yRange[0] + Math.random() * (this.def.yRange[1] - this.def.yRange[0]);
            this.target = new THREE.Vector3((Math.random() - 0.5) * 120, ty, (Math.random() - 0.5) * 120);
            if(this.mesh.position.length() > aquariumRadius) this.target.set(0, this.mesh.position.y, 0); 
        }
        
        dummyObj.position.copy(this.mesh.position); dummyObj.lookAt(this.target);
        this.mesh.quaternion.slerp(dummyObj.quaternion, 0.02);
        
        const moveVec = new THREE.Vector3(0,0,this.speed).applyQuaternion(this.mesh.quaternion).add(repel);
        this.mesh.position.add(moveVec);
        if(['crawl', 'walk', 'floor', 'slide'].includes(this.type)) this.mesh.position.y = bottomY + this.offset;

        // --- アニメーション ---
        if(this.type === 'swim' || this.type === 'elegant_swim' || this.type === 'fast_swim' || this.type === 'swim_anomalocaris') {
            this.segments.forEach((seg, i) => {
                // 縦に巻き込む回転(x)を排除し、魚や節足動物らしく左右に振る(y)
                seg.rotation.y = Math.sin(time * 3 - i * 0.4 + this.phase) * (this.type==='elegant_swim'?0.05:0.1);
                
                if(seg.userData.fL) { const flap = Math.sin(time*5 - i*0.4 + this.phase)*0.5; seg.userData.fL.rotation.z = flap; seg.userData.fR.rotation.z = -flap; }
                if(seg.userData.topFin) { const wave = Math.sin(time*4 - i*0.5 + this.phase)*0.2; seg.userData.topFin.rotation.x = wave; seg.userData.btmFin.rotation.x = wave; }
                if(seg.userData.btmFin && this.type === 'swim_anomalocaris') {
                    const wave = Math.sin(time*5 - i*0.4 + this.phase)*0.3; 
                    if(seg.userData.btmFin.rotation) seg.userData.btmFin.rotation.z = wave;
                }
            });
            if(this.mesh.userData.tSegs) this.mesh.userData.tSegs.forEach((ps, i) => { ps.rotation.y = Math.sin(time*3 + i*0.2 + this.phase)*0.2; }); 
            
            // アノマロカリス/シンダーハンネスの前肢可動
            if(this.type === 'swim_anomalocaris' && this.mesh.userData.armsBase) {
                const isFeeding = this.state === 'feeding';
                const targetRotX = isFeeding ? 0.1 : 0.6; // 伸ばす : 丸める
                this.mesh.userData.armsBase.forEach(armJoints => {
                    armJoints.forEach((joint, i) => {
                        joint.rotation.x += (targetRotX - joint.rotation.x) * 0.1;
                        joint.rotation.x += Math.sin(time * 5 - i * 0.5 + this.phase) * 0.05 * (isFeeding ? 0.5 : 1);
                    });
                });
            }
        } else if(this.type === 'fish_dunk' || this.type === 'fish_shark') {
            const sway = Math.sin(time * 3 + this.phase);
            if (this.mesh.userData.body) {
                this.mesh.userData.body.rotation.y = sway * 0.1;
                this.mesh.userData.body.rotation.z = sway * 0.05; 
            }
            if (this.mesh.userData.tail) {
                this.mesh.userData.tail.rotation.y = -sway * 0.3; 
            }
            if (this.mesh.userData.jaw) {
                const jawOpen = Math.max(0, Math.sin(time * 1.5 + this.phase) - 0.7) * 1.0; 
                this.mesh.userData.jaw.rotation.x = jawOpen;
            }
        } else if(this.type === 'swim_tiktaalik') {
            this.segments.forEach((seg, i) => {
                if(seg.userData.isArm) {
                    seg.rotation.y = Math.sin(time * 2 + this.phase) * 0.4;
                } else {
                    seg.rotation.y = Math.sin(time * 2 - i * 0.5 + this.phase) * 0.15;
                }
            });
        } else if(this.type === 'eurypterid') {
            this.segments.forEach((seg, i) => {
                if(seg.userData.isArm) {
                    seg.rotation.y = Math.sin(time * 3 + this.phase) * 0.2;
                    if(seg.userData.j2) seg.userData.j2.rotation.x = 0.8 + Math.sin(time * 6 + this.phase) * 0.2;
                    if(seg.userData.j3) seg.userData.j3.rotation.x = 0.5 + Math.sin(time * 6 + this.phase + 1) * 0.3;
                }
                else if(seg.userData.padL) { const flap = Math.sin(time * 6 + this.phase) * 0.5; seg.userData.padL.rotation.z = flap; seg.userData.padR.rotation.z = -flap; }
                else seg.rotation.x = Math.sin(time * 4 - i*0.4 + this.phase) * 0.1;
            });
        } else if(this.type === 'clumsy_swim') {
            this.mesh.rotation.z = Math.sin(time * 5 + this.phase) * 0.2; this.mesh.rotation.y += Math.sin(time * 3 + this.phase) * 0.02;
            if(this.segments[0]) this.segments[0].rotation.y = Math.sin(time * 15 + this.phase) * 0.3;
        } else if(this.type === 'jet') {
            this.segments.forEach(s => { s.mesh.rotation.x = Math.sin(time*4 + s.angle + s.index*0.5) * 0.15; });
        } else if(this.type === 'walk') {
            this.segments.forEach((seg, i) => {
                const walkPhase = time * 8 - i * 1.2 + this.phase;
                if(seg.userData.legs) {
                    seg.userData.legs[0].rotation.z = 0.2 + Math.sin(walkPhase) * 0.4; seg.userData.legs[1].rotation.z = -0.2 + Math.sin(walkPhase + Math.PI) * 0.4;
                    seg.userData.legs[0].rotation.x = Math.max(0, -Math.cos(walkPhase)) * 0.5; seg.userData.legs[1].rotation.x = Math.max(0, -Math.cos(walkPhase + Math.PI)) * 0.5;
                }
                seg.rotation.x = Math.sin(walkPhase) * 0.05;
            });
        } else if (this.type === 'crawl') {
            this.segments.forEach((seg, i) => {
                const scuttle = time * 15 + i;
                if(seg.userData.legs) { seg.userData.legs[0].rotation.x = Math.sin(scuttle)*0.5; seg.userData.legs[1].rotation.x = Math.sin(scuttle+Math.PI)*0.5; }
                seg.rotation.y = Math.sin(time * 3 - i * 0.5 + this.phase) * 0.05;
            });
        } else if (this.type === 'floor') {
            this.segments.forEach(seg => { seg.rotation.z = Math.sin(time * 2 + this.phase) * 0.05; });
        } else if(this.type === 'snake') {
            this.segments.forEach((seg, i) => { seg.rotation.y = Math.sin(time*6 - i*0.3 + this.phase) * (i/this.segments.length)*0.4; });
        } else if(this.type === 'slide') {
            this.mesh.position.y = bottomY + this.offset + Math.sin(time * 2 + this.phase) * 0.05;
        }
    }
}

function switchEra(era) {
    currentEra = era;
    document.querySelectorAll('.era-btn').forEach(btn => btn.classList.remove('active'));
    const targetBtn = document.getElementById('btn-' + era);
    if(targetBtn) targetBtn.classList.add('active');
    
    closeHolo(); document.getElementById('alert').style.display = 'none';
    scene.background.setHex(DB[era].bg); scene.fog.color.setHex(DB[era].bg);
    
    entities.forEach(e => scene.remove(e.mesh)); entities = []; rareEntity = null;
    while(envGroup.children.length > 0) envGroup.remove(envGroup.children[0]);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), new THREE.MeshStandardMaterial({ color: DB[era].bg, roughness: 1.0 }));
    ground.rotation.x = -Math.PI/2; ground.position.y = bottomY; envGroup.add(ground);
    const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(200, 200, 300, 32, 1, true), new THREE.MeshBasicMaterial({ color: DB[era].bg, side: THREE.BackSide, transparent: true, opacity: 0.8 }));
    cylinder.position.y = 50; envGroup.add(cylinder);

    if(era === 'cambrian') {
        for(let i=0; i<20; i++) {
            const sp = buildSponge(); sp.position.set((Math.random()-0.5)*250, bottomY + sp.position.y, (Math.random()-0.5)*250);
            sp.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'カイメン', en:'Sponge', latin:'Porifera', desc:'海水を濾過して生きる原始的な動物。' } }; }); envGroup.add(sp);
            const cr = buildCrinoid(); cr.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            cr.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'ウミユリ', en:'Crinoid', latin:'Crinoidea', desc:'植物のような姿の棘皮動物。' } }; }); envGroup.add(cr);
            const ch = buildChoia(); ch.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            ch.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'チョイア', en:'Choia', latin:'Choia carteri', desc:'放射状の長い棘を持つカンブリア紀の海綿動物。' } }; }); envGroup.add(ch);
        }
    } else if(era === 'ordovician') {
        for(let i=0; i<15; i++) {
            const sa = buildSeaApple(); sa.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            sa.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'海林檎', en:'Sea Apple', latin:'Cystoidea', desc:'海底に固定された絶滅棘皮動物。' } }; }); envGroup.add(sa);
            const hc = buildHornCoral(); hc.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            hc.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'四放サンゴ', en:'Horn Coral', latin:'Rugosa', desc:'角のような形をした単体サンゴ。' } }; }); envGroup.add(hc);
        }
    } else if(era === 'devonian') {
         for(let i=0; i<10; i++) {
            const cr = buildCrinoid(); cr.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            cr.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'ウミユリ', en:'Crinoid', latin:'Crinoidea', desc:'植物のような姿の棘皮動物。' } }; }); envGroup.add(cr);
            const sp = buildSponge(); sp.position.set((Math.random()-0.5)*250, bottomY + sp.position.y, (Math.random()-0.5)*250);
            sp.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'カイメン', en:'Sponge', latin:'Porifera', desc:'海水を濾過して生きる原始的な動物。' } }; }); envGroup.add(sp);
            const hc = buildHornCoral(); hc.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            hc.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'四放サンゴ', en:'Horn Coral', latin:'Rugosa', desc:'角のような形をした単体サンゴ。' } }; }); envGroup.add(hc);
        }
    }

    DB[era].creatures.forEach(def => {
        for(let i=0; i<def.count; i++) { const c = new CreatureObj(def); scene.add(c.mesh); entities.push(c); }
    });
}

function checkRareSpawn() {
    if(!rareEntity && Math.random() < 0.001) {
        const def = DB[currentEra].rare;
        rareEntity = new CreatureObj(def, true);
        scene.add(rareEntity.mesh); entities.push(rareEntity);
        const alertBox = document.getElementById('alert');
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
    }
}

// ==========================================
// 5. インタラクション & カメラ
// ==========================================
const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
let isDragging = false, pointerDownTime = 0, previousMouse = { x: 0, y: 0 };

window.addEventListener('wheel', (e) => { targetCamRadius = Math.max(10, Math.min(180, targetCamRadius + e.deltaY * 0.05)); });
window.addEventListener('pointerdown', (e) => { 
    if(e.target.closest('button') || e.target.closest('#hologram-ui')) return; 
    isDragging = true; pointerDownTime = Date.now(); previousMouse = { x: e.clientX, y: e.clientY }; 
});
window.addEventListener('pointermove', (e) => {
    if(isDragging) { camAngleX -= (e.clientX - previousMouse.x) * 0.005; camAngleY -= (e.clientY - previousMouse.y) * 0.005; camAngleY = Math.max(-0.2, Math.min(Math.PI/2.1, camAngleY)); }
    previousMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('pointerup', (e) => {
    if(!isDragging) return; isDragging = false;
    if(Date.now() - pointerDownTime < 250) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera); const hits = raycaster.intersectObjects(scene.children, true);
        
        let hit = null; for(let i=0; i<hits.length; i++) { if(hits[i].object.userData.entityData) { hit = hits[i].object.userData.entityData; break; } }
        
        if (hit && !hit.isStatic) {
            document.getElementById('holo-title').innerText = `${hit.def.jp} / ${hit.def.en}`;
            document.getElementById('holo-latin').innerText = `学名: ${hit.def.latin || 'Unknown'}`;
            document.getElementById('holo-desc').innerText = hit.def.desc;
            document.getElementById('hologram-ui').classList.add('active');
        } else {
            closeHolo();
            const dropPos = new THREE.Vector3().copy(camera.position).add(raycaster.ray.direction.multiplyScalar(60));
            dropPos.y = Math.min(40, Math.max(bottomY + 1, dropPos.y));
            foodMesh.position.copy(dropPos); 
            foodMesh.visible = true;
            
            if(window.foodTimeout) clearTimeout(window.foodTimeout);
            window.foodTimeout = setTimeout(() => { foodMesh.visible = false; }, 8000);
        }
    }
});
function closeHolo() { document.getElementById('hologram-ui').classList.remove('active'); }
window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

// ==========================================
// 6. メインループ
// ==========================================
const dummyObj = new THREE.Object3D();
switchEra('cambrian');

function animate() {
    requestAnimationFrame(animate); const time = Date.now() * 0.002;
    checkRareSpawn();

    if(foodMesh.visible) {
        foodMesh.position.y -= 0.04;
        foodMesh.position.x += Math.sin(time * 5) * 0.02;
        foodMesh.position.z += Math.cos(time * 4) * 0.02;
        if(foodMesh.position.y < bottomY + 0.5) foodMesh.position.y = bottomY + 0.5;
    }

    camRadius += (targetCamRadius - camRadius) * 0.1;
    const zoomRatio = Math.max(0, Math.min(1, (camRadius - 20) / 80)); 
    const focusY = (bottomY + 8) + zoomRatio * Math.abs(bottomY + 8);
    camera.position.x = camRadius * Math.sin(camAngleX) * Math.cos(camAngleY);
    camera.position.y = focusY + Math.max(2, camRadius * Math.sin(camAngleY)); 
    camera.position.z = camRadius * Math.cos(camAngleX) * Math.cos(camAngleY);
    camera.lookAt(0, focusY, 0);

    entities.forEach(ent => ent.update(time, dummyObj));
    renderer.render(scene, camera);
}
animate();
</script>
