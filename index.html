<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Lens: Burgess Dive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000b1a; font-family: monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(0,20,40,0.9); padding: 15px; border: 1px solid #0f0; z-index: 100; }
        #info-panel { position: absolute; right: -320px; top: 50%; transform: translateY(-50%); width: 250px; background: rgba(0,20,40,1); border: 1px solid #0f0; padding: 20px; transition: 0.5s; z-index: 100; }
        #info-panel.active { right: 20px; }
        button { background: #0f0; border: none; color: #000; padding: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
    <h1 style="margin:0; font-size: 1.5em;">ANCIENT LENS v3.0</h1>
    <div id="era-label">ERA: CAMBRIAN</div>
    <p style="font-size: 10px; color: #8f8;">(Native Engine: No Library Mode)</p>
</div>

<div id="controls">
    <label>CHRONO-SLIDER</label><br>
    <input type="range" id="time-slider" min="0" max="100" value="0" style="width:100%;">
    <button id="hallucigenia-btn">FLIP HALLUCIGENIA</button>
    <p style="font-size: 10px; margin-top:10px; opacity: 0.7;">[CLICK CREATURE TO SCAN]</p>
</div>

<div id="info-panel">
    <h2 id="creature-name" style="margin-top:0;">---</h2>
    <p id="creature-desc"></p>
    <hr style="border:0; border-top:1px solid #0f0;">
    <p id="research-note" style="font-size: 0.8em; color: #8f8;"></p>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let time = 0;
    let eraVal = 0;
    let isModernView = true;

    const creatures = [
        { id: 'anomalocaris', x: 0, y: 0, size: 100, color: '#cc4444' },
        { id: 'hallucigenia', x: 250, y: 150, size: 60, color: '#bb88ff' }
    ];

    const creatureData = {
        'anomalocaris': { name: "アノマロカリス", desc: "最強の捕食者。", research: "このエンジンは外部ライブラリなしで動作しています。" },
        'hallucigenia': { name: "ハルキゲニア", desc: "トゲを持つ奇妙な生物。", research: "ボタンで上下を反転して観察してください。" }
    };

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    function drawAnomalocaris(x, y, scale, t) {
        ctx.save();
        ctx.translate(x, y + Math.sin(t) * 20);
        ctx.rotate(Math.sin(t * 0.5) * 0.1);

        // Body
        ctx.fillStyle = creatures[0].color;
        ctx.beginPath();
        ctx.ellipse(0, 0, 80 * scale, 30 * scale, 0, 0, Math.PI * 2);
        ctx.fill();

        // Arms
        ctx.strokeStyle = '#aa3333';
        ctx.lineWidth = 10 * scale;
        const armWave = Math.sin(t * 3) * 0.5;
        // Left Arm
        ctx.beginPath();
        ctx.moveTo(60 * scale, -10 * scale);
        ctx.quadraticCurveTo(120 * scale, (20 + armWave * 40) * scale, 100 * scale, (60 + armWave * 20) * scale);
        ctx.stroke();
        // Right Arm
        ctx.beginPath();
        ctx.moveTo(60 * scale, 10 * scale);
        ctx.quadraticCurveTo(120 * scale, (-20 - armWave * 40) * scale, 100 * scale, (-60 - armWave * 20) * scale);
        ctx.stroke();

        ctx.restore();
    }

    function drawHallucigenia(x, y, scale, t) {
        ctx.save();
        ctx.translate(x + Math.sin(t * 0.5) * 50, y);
        if (!isModernView) ctx.scale(1, -1);

        // Body
        ctx.fillStyle = creatures[1].color;
        ctx.beginPath();
        ctx.ellipse(0, 0, 60 * scale, 10 * scale, 0, 0, Math.PI * 2);
        ctx.fill();

        // Spines & Tentacles
        for (let i = 0; i < 7; i++) {
            const px = (i * 15 - 45) * scale;
            // Spines
            ctx.strokeStyle = '#eee';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(px, -5 * scale);
            ctx.lineTo(px, -40 * scale);
            ctx.stroke();
            // Tentacles
            ctx.strokeStyle = '#84a';
            ctx.beginPath();
            ctx.moveTo(px, 5 * scale);
            ctx.lineTo(px + Math.sin(t * 3 + i) * 10, 30 * scale);
            ctx.stroke();
        }
        ctx.restore();
    }

    function animate() {
        time += 0.05;
        // Background
        const bgB = Math.floor(26 + eraVal * 50);
        ctx.fillStyle = `rgb(0, 11, ${bgB})`;
        ctx.fillRect(0, 0, width, height);

        // Marine Snow
        ctx.fillStyle = 'rgba(136, 255, 136, 0.3)';
        for(let i=0; i<30; i++) {
            const px = (Math.sin(time * 0.1 + i) * 0.5 + 0.5) * width;
            const py = ((time * (1 + i % 3) * 20 + i * 100) % height);
            ctx.beginPath();
            ctx.arc(px, py, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        const centerX = width / 2;
        const centerY = height / 2;

        drawAnomalocaris(centerX - 100, centerY, 1 + eraVal * 0.5, time);
        drawHallucigenia(centerX + 200, centerY + 100, 1, time);

        requestAnimationFrame(animate);
    }

    // Interactions
    document.getElementById('hallucigenia-btn').onclick = () => {
        isModernView = !isModernView;
    };

    document.getElementById('time-slider').oninput = (e) => {
        eraVal = e.target.value / 100;
        document.getElementById('era-label').innerText = eraVal > 0.5 ? "ERA: ORDOVICIAN" : "ERA: CAMBRIAN";
        creatures[0].color = eraVal > 0.5 ? '#446688' : '#cc4444';
    };

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        
        // 簡易的なクリック判定
        const dist = Math.hypot(mx - (width/2 - 100), my - height/2);
        const type = dist < 150 ? 'anomalocaris' : 'hallucigenia';
        
        const data = creatureData[type];
        document.getElementById('creature-name').innerText = data.name;
        document.getElementById('creature-desc').innerText = data.desc;
        document.getElementById('research-note').innerText = data.research;
        document.getElementById('info-panel').classList.add('active');
        setTimeout(() => document.getElementById('info-panel').classList.remove('active'), 4000);
    });

    animate();
</script>
</body>
</html>
