<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian Abyss - Ultimate Observation Unit</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000408; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 25px; right: 25px; width: 300px; padding: 20px;
            background: rgba(0, 15, 25, 0.9); border: 1px solid #00f0ff; border-radius: 15px;
            color: #fff; display: none; pointer-events: none; z-index: 1000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        .hud { position: absolute; bottom: 20px; left: 20px; color: #00f0ff; font-size: 10px; opacity: 0.6; letter-spacing: 1.5px; line-height: 1.8; }
        #scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 255, 0.2); display: none; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="scan-line"></div>
    <div id="ui"><h2 id="name" style="margin:0;color:#00f0ff;font-size:1.4em;border-bottom:1px solid #00f0ff;padding-bottom:5px;"></h2><p id="desc" style="margin-top:12px;font-size:0.9em;line-height:1.6;"></p></div>
    
    <div class="hud">
        SYSTEM: DEEP SEA SCANNER V3.0<br>
        LEFT CLICK: FEED / RIGHT CLICK: CHANGE LIGHT COLOR<br>
        TARGET CLICK: LOCK-ON MODE / WHEEL: ZOOM
    </div>
    
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const scanLine = document.getElementById('scan-line');
        
        let w, h, creatures = [], foods = [], giants = [], zoom = 1.2;
        let mx = 0, my = 0, target = null, lightHue = 180; // Default Cyan

        const BIO = {
            anomalo: { name: "アノマロカリス", desc: "古生物の象徴。エサを見つけると中層からダイナミックに加速します。ライトで照らすとヒレの筋まで観察できます。" },
            opabinia: { name: "オパビニア", desc: "5つの複眼をフル活用し、ノズルでエサを正確にキャッチ。ライトを当てると特徴的な目が怪しく光ります。" },
            wiwaxia: { name: "ウィワクシア", desc: "底生生物。エサが海底に届くと、トゲを揺らしながらゆっくりと移動を開始します。" },
            halluci: { name: "ハルキゲニア", desc: "針のようなトゲを持つ。スキャンモードでは、これまで上下逆とされていた脚の細かな動きが確認できます。" },
            trilo: { name: "三葉虫", desc: "海底の掃除屋。エサの匂いに敏感で、複眼をサーチライトのように使って進みます。" },
            pikaia: { name: "ピカイア", desc: "脊索動物。高速で泳ぎ回り、他の生物よりも先にエサに到達しようとします。" }
        };

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        
        // 操作系
        window.addEventListener('mousedown', e => {
            if (e.button === 2) { // 右クリックで色変更
                lightHue = (lightHue + 60) % 360;
                return;
            }
            
            // 生物クリックでロックオン
            let found = null;
            creatures.forEach(c => {
                if(Math.hypot(e.clientX - c.sx, e.clientY - c.sy) < c.sr) found = c;
            });
            
            if(found) {
                target = (target === found) ? null : found;
                scanLine.style.display = target ? 'block' : 'none';
            } else {
                // 何もない場所ならエサ
                foods.push({
                    x: (e.clientX - w/2)/zoom + (target ? target.x : 0),
                    y: (e.clientY - h/2)/zoom + (target ? target.y : 0),
                    vy: 1.5
                });
            }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('wheel', e => { zoom = Math.max(0.4, Math.min(4, zoom - e.deltaY * 0.001)); }, {passive:true});

        resize();

        class Creature {
            constructor(type, isGiant = false) {
                this.type = type;
                this.isGiant = isGiant;
                this.isBenthic = ['wiwaxia', 'halluci', 'trilo'].includes(type);
                this.spawn();
            }
            spawn() {
                this.z = this.isGiant ? -300 : Math.random() * 800;
                this.x = Math.random() * 4000 - 2000;
                this.y = this.isBenthic ? 350 + Math.random()*50 : Math.random()*600 - 300;
                this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*0.5;
                this.sizeBase = { anomalo:120, opabinia:80, wiwaxia:65, halluci:45, trilo:40, pikaia:55 }[this.type];
                if(this.isGiant) this.sizeBase *= 5;
            }
            update() {
                if(this.isGiant) {
                    this.x += 1.2;
                    if(this.x > 3000) this.x = -3000;
                    return;
                }

                // エサへの自然な集餌AI
                if(foods.length > 0) {
                    let f = foods[0];
                    let dx = f.x - this.x, dy = f.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    // 底生生物は地面付近のエサにしか反応しない
                    if(!this.isBenthic || f.y > 200) {
                        if(dist < 500) {
                            this.vx += dx * 0.003; this.vy += dy * 0.003;
                            if(dist < 15) foods.shift(); // 捕食
                        }
                    }
                }
                
                this.vx *= 0.98; this.vy *= 0.98;
                this.x += this.vx; this.y += this.vy;
                
                // 生息域の維持
                if(this.isBenthic && this.y < 300) this.vy += 0.2;
                if(this.x > 2500) this.x = -2500; if(this.x < -2500) this.x = 2500;
            }
            draw(camX, camY) {
                const perspective = 600 / (600 + this.z);
                this.sx = (this.x - camX) * perspective * zoom + w/2;
                this.sy = (this.y - camY) * perspective * zoom + h/2 + 100*zoom;
                const s = this.sizeBase * perspective * zoom;
                this.sr = s;

                ctx.save();
                ctx.translate(this.sx, this.sy);
                ctx.scale(this.vx > 0 ? 1 : -1, 1);
                
                const distToLight = Math.hypot(this.sx - mx, this.sy - my);
                const lightEff = Math.max(0, 1 - distToLight / (250 * zoom));

                if(this.isGiant) {
                    ctx.globalAlpha = 0.3;
                    ctx.filter = 'blur(12px)';
                } else {
                    ctx.globalAlpha = Math.max(0.15, perspective);
                }

                this.renderHighRes(s, lightEff);
                ctx.restore();
            }
            renderHighRes(s, light) {
                const time = Date.now() * 0.005;
                const hue = isBenthic(this.type) ? 20 : 0;
                
                // 本体描画（ライトが当たると色が鮮やかに）
                ctx.fillStyle = `hsla(${hue}, 60%, ${15 + light * 40}%, 1)`;
                ctx.beginPath(); ctx.ellipse(0, 0, s, s*0.4, 0, 0, 7); ctx.fill();

                if(light > 0.1) {
                    ctx.strokeStyle = `hsla(${lightHue}, 100%, 70%, ${light})`;
                    ctx.lineWidth = 2; ctx.stroke();
                }

                // パーツごとの詳細
                if(this.type === 'anomalo') {
                    for(let i=0; i<9; i++) {
                        ctx.fillStyle = `hsla(15, 80%, 40%, ${0.3 + light})`;
                        let h = s*0.4 + Math.sin(time + i)*s*0.2;
                        ctx.beginPath(); ctx.ellipse(-s*0.8+i*s*0.2, s*0.25, s*0.15, h, 0,0,7); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(-s*0.8+i*s*0.2, -s*0.25, s*0.15, h, 0,0,7); ctx.fill();
                    }
                } else if(this.type === 'wiwaxia') {
                    ctx.strokeStyle = `hsla(30, 40%, 50%, ${0.5 + light})`;
                    for(let i=0; i<10; i++) {
                        let a = -Math.PI + i*0.3;
                        ctx.beginPath(); ctx.moveTo(Math.cos(a)*s*0.6, Math.sin(a)*s*0.3);
                        ctx.lineTo(Math.cos(a)*s*0.9, Math.sin(a)*s*1.1); ctx.stroke();
                    }
                }
            }
        }
        function isBenthic(t){ return ['wiwaxia','halluci','trilo'].includes(t); }

        // 初期化
        const types = ['anomalo','opabinia','wiwaxia','halluci','trilo','pikaia'];
        types.forEach(type => { for(let i=0; i<4; i++) creatures.push(new Creature(type)); });
        const giantAnomalo = new Creature('anomalo', true);

        function loop() {
            ctx.fillStyle = '#00060c'; ctx.fillRect(0,0,w,h);
            
            // ロックオン時のカメラ座標
            const camX = target ? target.x : 0;
            const camY = target ? target.y : 0;

            // サーチライト
            const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 280 * zoom);
            grad.addColorStop(0, `hsla(${lightHue}, 100%, 70%, 0.15)`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

            // エサ
            foods.forEach(f => {
                f.y += f.vy;
                const fx = (f.x - camX)*zoom + w/2;
                const fy = (f.y - camY)*zoom + h/2 + 100*zoom;
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
                ctx.beginPath(); ctx.arc(fx, fy, 4*zoom, 0, 7); ctx.fill();
                ctx.shadowBlur = 0;
            });

            // 生物描画
            creatures.sort((a,b) => b.z - a.z);
            let hover = null;
            creatures.forEach(c => {
                c.update(); c.draw(camX, camY);
                if(Math.hypot(mx-c.sx, my-c.sy) < c.sr) hover = c;
            });
            
            giantAnomalo.update(); giantAnomalo.draw(camX, camY);

            // UI更新
            if(hover) {
                ui.style.display = 'block';
                document.getElementById('name').innerText = BIO[hover.type].name;
                document.getElementById('desc').innerText = BIO[hover.type].desc;
            } else if (!target) {
                ui.style.display = 'none';
            }
            
            if(target) {
                ui.style.display = 'block';
                document.getElementById('name').innerText = "LOCK-ON: " + BIO[target.type].name;
                document.getElementById('desc').innerText = BIO[target.type].desc;
                scanLine.style.top = (Math.sin(Date.now()*0.003)*50 + 50) + "%";
            }

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
