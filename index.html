<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D Deep Sea - Evolution Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Segoe UI', sans-serif; color: #fff; }
        canvas { display: block; }
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 40, 80, 0.6); backdrop-filter: blur(12px);
            border: 2px solid #00f7ff; box-shadow: 0 0 40px rgba(0, 247, 255, 0.4);
            padding: 30px; border-radius: 20px; z-index: 10; display: none; width: 350px; opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #hologram-ui.active { display: block; opacity: 1; transform: translate(-50%, -50%); }
        #holo-title { margin: 0; font-size: 26px; color: #00f7ff; text-shadow: 0 0 15px #00f7ff; }
        #holo-desc { font-size: 15px; line-height: 1.7; color: #d0ffff; margin-top: 15px; }
        #close-btn {
            background: #00f7ff; border: none; color: #002222; padding: 10px; 
            cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 20px;
        }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #00f7ff; font-size: 12px; letter-spacing: 2px; text-shadow: 0 0 10px #000; pointer-events: none; }
    </style>
</head>
<body>
<div id="canvas-container"></div>
<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <div id="holo-en" style="font-style: italic; color: #88dddd;"></div>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">SYSTEM CLOSE</button>
</div>
<div id="hint">DRAG: ROTATE / CLICK WATER: FEED / CLICK CREATURE: ANALYZE</div>

<script src="https://cdnjs.cloudflare.com"></script>
<script>
// --- CORE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000816);
scene.fog = new THREE.FogExp2(0x000816, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- LIGHTING & ENVIRONMENT ---
scene.add(new THREE.AmbientLight(0x112244, 2));
const sunLight = new THREE.DirectionalLight(0x00ffff, 1.5);
sunLight.position.set(0, 100, 0);
scene.add(sunLight);

// 海底の砂紋
const groundGeo = new THREE.PlaneGeometry(300, 300, 50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x051122, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2; ground.position.y = -40;
scene.add(ground);

// --- CREATURE BUILDERS ---
const commonMat = (col) => new THREE.MeshPhysicalMaterial({ color: col, transmission: 0.3, roughness: 0.4 });

function buildHallucigenia() {
    const group = new THREE.Group();
    const segments = [];
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 6, 4, 8), commonMat(0xff88aa));
    body.rotation.x = Math.PI/2;
    group.add(body);
    // トゲと脚
    for(let i=0; i ({mesh: new THREE.Group(), segments: []}) /* 簡易化 */ },
    { id: 'hallucigenia', jp: 'ハルキゲニア', en: 'Hallucigenia', desc: '「夢のような」姿をした生物。どっちが頭か長年謎でした。', count: 10, speed: 0.02, yRange: [-39, -38], build: buildHallucigenia }
];

const entities = [];
entityDefs.forEach(def => {
    for(let i=0; i<def.count; i++) {
        const { mesh, segments } = def.build();
        mesh.position.set((Math.random()-0.5)*100, def.yRange[0], (Math.random()-0.5)*100);
        scene.add(mesh);
        entities.push({ def, mesh, segments, target: new THREE.Vector3() });
    }
});

// --- INTERACTION & ANIMATION ---
function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;
    
    entities.forEach(ent => {
        // 浮遊アニメーション
        ent.mesh.position.y += Math.sin(time + ent.mesh.position.x) * 0.01;
        ent.mesh.translateZ(ent.def.speed);
        
        // 境界チェック
        if(ent.mesh.position.length() > 150) ent.mesh.lookAt(0,0,0);
    });

    renderer.render(scene, camera);
}

function closeHolo() { document.getElementById('hologram-ui').classList.remove('active'); }

// 初期化実行
animate();
</script>
</body>
</html>
