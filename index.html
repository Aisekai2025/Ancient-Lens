<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Lens v6.0: Photorealistic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000810; font-family: 'Courier New', Courier, monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; text-shadow: 1px 1px 8px #000; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(0,15,30,0.85); padding: 15px; border: 1px solid #0f0; z-index: 100; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        #info-panel { position: absolute; right: -320px; top: 50%; transform: translateY(-50%); width: 250px; background: rgba(0,10,20,0.95); border-left: 4px solid #0f0; padding: 20px; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); z-index: 100; }
        #info-panel.active { right: 20px; }
        button { background: #0f0; border: none; color: #000; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); }
        input[type=range] { width: 100%; accent-color: #0f0; cursor: pointer; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
    <h1 style="margin:0; font-size: 1.4em; letter-spacing: 2px;">ANCIENT LENS v6.0</h1>
    <div id="era-label" style="font-weight: bold;">ERA: CAMBRIAN</div>
</div>
<div id="controls">
    <label style="font-size: 10px;">CHRONO-SLIDER [EVOLUTION]</label><br>
    <input type="range" id="time-slider" min="0" max="100" value="0">
    <button id="hallucigenia-btn">FLIP HALLUCIGENIA</button>
</div>
<div id="info-panel"><h2 id="creature-name" style="margin-top:0; color:#fff;">---</h2><p id="creature-desc" style="font-size: 0.9em; line-height: 1.5;"></p><hr style="border:0; border-top:1px solid #0f0; margin:15px 0;"><p id="research-note" style="font-size: 0.75em; color: #8f8; font-style: italic;"></p></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0, eraVal = 0, isModernView = true;

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // 1. 生態データ
    const creatureData = {
        'anomalocaris': { name: "ANOMALOCARIS", desc: "頂点捕食者。13対のひれによる波状推進を再現。", research: "最新の3Dライティングを2Dでシミュレート。腹側の影と背中の反射に注目。" },
        'hallucigenia': { name: "HALLUCIGENIA", desc: "「白昼夢」の名の通り奇妙な姿。7対の鋭い棘を持つ。", research: "先端の『頭部』を精密描写。トゲの質感にハイライトを加え、3D感を強調。" },
        'trilobite': { name: "TRILOBITE", desc: "海底を這う節足動物。方解石の複眼を持つ。", research: "体節の重なりに個別の影を入れ、甲殻の厚みを表現しました。" },
        'dinomischus': { name: "DINOMISCHUS", desc: "茎を持つ固着性の動物。", research: "カップ状の体に内側の影を入れ、奥行きのある3D造形を再現。" }
    };

    // 2. リアルな描画エンジン
    function drawSessile(t) {
        for(let i=0; i<4; i++) {
            const x = (width/2 - 350) + i * 220;
            const y = height/2 + 200;
            const wave = Math.sin(t * 0.4 + i);
            // 茎の陰影
            const sGrad = ctx.createLinearGradient(x, y, x+10, y);
            sGrad.addColorStop(0, '#2d3a14'); sGrad.addColorStop(1, '#4a5d23');
            ctx.strokeStyle = sGrad; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(x, y); ctx.quadraticCurveTo(x + wave * 25, y - 60, x + wave * 15, y - 110); ctx.stroke();
            // 本体のカップ（3D風）
            const cX = x + wave * 15, cY = y - 110;
            const cGrad = ctx.createRadialGradient(cX-5, cY-5, 2, cX, cY, 20);
            cGrad.addColorStop(0, '#8b4513'); cGrad.addColorStop(1, '#3e2723');
            ctx.fillStyle = cGrad; ctx.beginPath(); ctx.ellipse(cX, cY, 18, 12, wave*0.1, 0, Math.PI*2); ctx.fill();
        }
    }

    function drawTrilobite(t) {
        const x = (width/2 - 100) + Math.cos(t * 0.15) * 400;
        const y = height/2 + 240;
        ctx.save(); ctx.translate(x, y); if(Math.sin(t * 0.15) < 0) ctx.scale(-1, 1);
        for(let i=0; i<9; i++) {
            const ox = (i * 7 - 30);
            const bodyGrad = ctx.createLinearGradient(ox, -20, ox, 20);
            bodyGrad.addColorStop(0, '#4e342e'); bodyGrad.addColorStop(0.5, '#6d4c41'); bodyGrad.addColorStop(1, '#2d1b15');
            ctx.fillStyle = bodyGrad; ctx.beginPath(); ctx.ellipse(ox, Math.sin(t*4-i*0.4)*2, 12, 25, 0, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    function drawAnomalocaris(x, y, scale, t) {
        ctx.save(); ctx.translate(x, y + Math.sin(t) * 20);
        const r = eraVal > 0.5 ? 60 : 204, g = eraVal > 0.5 ? 100 : 68, b = eraVal > 0.5 ? 150 : 68;

        // 13対のひれ（レイヤー描画）
        for(let i=0; i<13; i++) {
            const ox = (i * 12 - 75) * scale;
            const fWave = Math.sin(t * 2.5 - i * 0.6) * (18 * scale);
            const fGrad = ctx.createLinearGradient(0, fWave-30*scale, 0, fWave+30*scale);
            fGrad.addColorStop(0, `rgba(${r},${g},${b},0.6)`); fGrad.addColorStop(1, `rgba(${r/3},${g/3},${b/3},0.8)`);
            ctx.fillStyle = fGrad; ctx.beginPath(); ctx.ellipse(ox, fWave, 12*scale, 38*scale, 0, 0, Math.PI*2); ctx.fill();
        }

        // ボディ（カウンターシェーディング）
        const bGrad = ctx.createLinearGradient(0, -35*scale, 0, 35*scale);
        bGrad.addColorStop(0, `rgb(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)})`);
        bGrad.addColorStop(0.4, `rgb(${r},${g},${b})`); bGrad.addColorStop(1, `rgb(${r/4},${g/4},${b/4})`);
        ctx.fillStyle = bGrad; ctx.beginPath(); ctx.ellipse(0, 0, 95*scale, 32*scale, 0, 0, Math.PI*2); ctx.fill();

        // 巨大な複眼（3D球体風）
        const eX = 70*scale, eY = 30*scale;
        [1,-1].forEach(s => {
            const eg = ctx.createRadialGradient(eX-3, (eY*s)-3, 2, eX, eY*s, 10);
            eg.addColorStop(0, '#555'); eg.addColorStop(1, '#000');
            ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(eX, eY*s, 11*scale, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(eX-3, (eY*s)-3, 2*scale, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();
    }

    function drawHallucigenia(x, y, scale, t) {
        ctx.save(); ctx.translate(x + Math.sin(t*0.4)*30, y + 100); if(!isModernView) ctx.scale(1, -1);
        
        // ボディ（プニプニ感）
        const hg = ctx.createLinearGradient(0, -15, 0, 15);
        hg.addColorStop(0, '#d1b3ff'); hg.addColorStop(0.5, '#bb88ff'); hg.addColorStop(1, '#6a1b9a');
        ctx.fillStyle = hg; ctx.beginPath(); ctx.ellipse(0, 0, 70*scale, 15*scale, 0, 0, Math.PI*2); ctx.fill();
        // 頭部
        ctx.beginPath(); ctx.arc(75*scale, 0, 10*scale, 0, Math.PI*2); ctx.fill();

        for (let i = 0; i < 7; i++) {
            const px = (i * 18 - 50) * scale;
            // トゲ（硬質なハイライト）
            const sg = ctx.createLinearGradient(px-2, -45, px+2, -45);
            sg.addColorStop(0, '#999'); sg.addColorStop(0.5, '#fff'); sg.addColorStop(1, '#999');
            ctx.strokeStyle = sg; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(px, -5); ctx.lineTo(px, -50); ctx.stroke();
            // 触手
            ctx.strokeStyle = 'rgba(132, 68, 170, 0.7)'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(px, 5); ctx.lineTo(px + Math.sin(t*3+i)*12, 40); ctx.stroke();
        }
        ctx.restore();
    }

    function animate() {
        time += 0.04;
        ctx.fillStyle = `rgb(0, 8, ${Math.floor(16 + eraVal * 40)})`; ctx.fillRect(0, 0, width, height);

        // 背景：深海の粒子（マリンスノー）
        for(let i=0; i<40; i++) {
            ctx.fillStyle = `rgba(255, 255, 255, ${0.1 + Math.sin(time+i)*0.1})`;
            ctx.beginPath(); ctx.arc((i*137)%width, (i*250+time*30)%height, 1, 0, Math.PI*2); ctx.fill();
        }

        drawSessile(time);
        drawTrilobite(time);
        drawAnomalocaris(width/2 - 130, height/2 - 60, 1 + eraVal * 0.5, time);
        drawHallucigenia(width/2 + 240, height/2, 1, time);

        requestAnimationFrame(animate);
    }

    document.getElementById('hallucigenia-btn').onclick = () => { isModernView = !isModernView; };
    document.getElementById('time-slider').oninput = (e) => { eraVal = e.target.value / 100; };
    
    canvas.addEventListener('mousedown', (e) => {
        const mx = e.clientX, my = e.clientY;
        let type = mx < width/2 ? 'anomalocaris' : 'hallucigenia';
        if(my > height/2 + 180) type = mx < width/2 - 100 ? 'dinomischus' : 'trilobite';
        const data = creatureData[type];
        if(data) {
            document.getElementById('creature-name').innerText = data.name;
            document.getElementById('creature-desc').innerText = data.desc;
            document.getElementById('research-note').innerText = data.research;
            document.getElementById('info-panel').classList.add('active');
            setTimeout(() => document.getElementById('info-panel').classList.remove('active'), 5000);
        }
    });

    animate();
</script>
</body>
</html>
