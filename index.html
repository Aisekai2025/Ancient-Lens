<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D - Error Free Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: sans-serif; user-select: none; color: #fff; }
        canvas { display: block; }
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 20, 40, 0.85); backdrop-filter: blur(10px);
            border: 1px solid #00ffff; padding: 25px; border-radius: 12px; z-index: 10; display: none; width: 320px;
        }
        #hologram-ui.active { display: block; }
        #holo-title { margin: 0; color: #00ffff; font-size: 22px; }
        #holo-desc { font-size: 14px; line-height: 1.6; color: #e0f8f8; }
        #close-btn {
            background: rgba(0, 255, 255, 0.2); border: 1px solid #00ffff; color: #00ffff;
            padding: 10px; cursor: pointer; width: 100%; margin-top: 15px;
        }
        #hint { position: absolute; bottom: 15px; width: 100%; text-align: center; color: #00ffff; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>
<div id="canvas-container"></div>
<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">探査再開</button>
</div>
<div id="hint">ドラッグで移動 / 生物をタップで詳細表示</div>

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x00040a);
scene.fog = new THREE.FogExp2(0x00040a, 0.015);

var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x002244, 1.5));
var light = new THREE.DirectionalLight(0x44ffcc, 1.0);
light.position.set(0, 50, 0);
scene.add(light);

var bottomY = -30;

// 2. マリンスノー
var snowGeo = new THREE.BufferGeometry();
var snowPositions = [];
for(var i=0; i<1000; i++) {
    snowPositions.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
}
snowGeo.setAttribute('position', new THREE.Float32BufferAttribute(snowPositions, 3));
var snow = new THREE.Points(snowGeo, new THREE.PointsMaterial({ color: 0x88ffff, size: 0.15 }));
scene.add(snow);

// 3. 生物構築
var matAnom = new THREE.MeshPhysicalMaterial({ color: 0x1a6655, roughness: 0.4 });
var matHallu = new THREE.MeshPhysicalMaterial({ color: 0xcc66aa, roughness: 0.5 });

function buildAnom() {
    var g = new THREE.Group(); var segs = []; var p = g;
    for(var i=0; i<10; i++){
        var s = 1.0 - (i/12.0);
        var sg = new THREE.Group(); if(i>0) sg.position.z = -1.2;
        var b = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 8), matAnom);
        b.scale.set(1.5*s, 0.6*s, 1.2*s); sg.add(b);
        p.add(sg); segs.push(sg); p = sg;
    }
    return { mesh: g, segments: segs };
}

function buildHallu() {
    var g = new THREE.Group(); var segs = []; var p = g;
    for(var i=0; i<8; i++){
        var sg = new THREE.Group(); if(i>0) sg.position.z = -0.8;
        var b = new THREE.Mesh(new THREE.SphereGeometry(0.4, 6, 6), matHallu); sg.add(b);
        var spike = new THREE.Mesh(new THREE.CylinderGeometry(0, 0.1, 1.2), matHallu);
        spike.position.y = 0.6; sg.add(spike);
        p.add(sg); segs.push(sg); p = sg;
    }
    return { mesh: g, segments: segs };
}

def1.desc = "カンブリア紀最大の捕食者。長い触手で獲物を捕らえます。";
def1.build = buildAnom;
def1.count = 3;
def1.speed = 0.12;
def1.yMin = -10;
def1.yMax = 10;
entityDefs.push(def1);

def2.desc = "背中に鋭い棘を持つ奇妙な生物。長年、上下逆さまに復元されていました。";
def2.build = buildHallu;
def2.count = 6;
def2.speed = 0.02;
def2.yMin = -29;
def2.yMax = -29;
