<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian Abyss - Hyper-Resolution Complete</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000205; font-family: 'Consolas', 'Hiragino Kaku Gothic ProN', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 25px; right: 25px; width: 340px; padding: 25px;
            background: rgba(0, 10, 20, 0.95); border-left: 5px solid #00f0ff; border-radius: 4px;
            color: #fff; display: none; pointer-events: none; z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
        .hud { position: absolute; bottom: 20px; left: 20px; color: #00f0ff; font-size: 11px; opacity: 0.7; letter-spacing: 1.5px; line-height: 1.8; text-shadow: 0 0 5px #00f0ff; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 0.7em; color: #00f0ff; margin-bottom: 8px; letter-spacing: 2px;">GENETIC SCANNER // VER 6.0</div>
        <h2 id="name" style="margin:0;color:#fff;font-size:1.8em;letter-spacing:1px;"></h2>
        <p id="desc" style="margin-top:15px;font-size:0.95em;line-height:1.8;color:#b2dfdb;"></p>
    </div>
    
    <div class="hud">
        [FULL-SPECTRUM OBSERVATION UNIT]<br>
        CLICK: FEED / RIGHT-CLICK: CHANGE HUE<br>
        WHEEL: ZOOM / HOVER: SCAN TARGET
    </div>
    
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        
        let w, h, creatures = [], foods = [], plants = [], zoom = 1.3;
        let mx = 0, my = 0, target = null, lightHue = 180;

        const BIO = {
            anomalo: { name: "ANOMALOCARIS", desc: "カンブリア紀の絶対王者。13対の鰭（ひれ）は、波打つような滑らかな推進力を生み出します。大きな複眼にはサーチライトの反射が美しく映ります。" },
            opabinia: { name: "OPABINIA", desc: "5つの複眼と象のようなノズルを持つ異形の生命。ノズル先端のハサミで獲物を捉えます。体の節々には、筋肉の動きに連動した光沢が見られます。" },
            wiwaxia: { name: "WIWAXIA", desc: "全身を金属光沢のある鱗と鋭いトゲで武装。光の角度で虹色に輝く構造色を再現。外敵を寄せ付けない重装甲の底生生物です。" },
            halluci: { name: "HALLUCIGENIA", desc: "トゲで歩く不思議な姿。7対のトゲには鋭いハイライトが入り、細い脚は波打つように地面を捉えます。前後左右が謎に包まれた古生物です。" },
            trilo: { name: "TRILOBITE", desc: "高度な節足動物。方解石のレンズを持つ複眼は、ライトを当てるとクリスタルのように輝きます。多数の脚が連動して砂を掻く姿は圧巻です。" },
            pikaia: { name: "PIKAIA", desc: "私たちの祖先。半透明の体の中に一本通る「脊索（せきさく）」が、サーチライトで青白く浮かび上がります。魚のように機敏に泳ぎます。" },
            choia: { name: "CHOIA (Ancient Sponge)", desc: "カンブリア紀の海底に生息していた円盤状の海綿。中心から放射状に伸びる長いトゲは、捕食者から身を守り、泥に沈むのを防ぐ役割がありました。" }
        };

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        
        window.addEventListener('mousedown', e => {
            if (e.button === 2) { lightHue = (lightHue + 60) % 360; return; }
            let found = null;
            [...creatures, ...plants].forEach(c => { if(Math.hypot(e.clientX - c.sx, e.clientY - c.sy) < (c.sr || c.size*zoom)) found = c; });
            if(found) { target = (target === found) ? null : found; } 
            else { foods.push({x: (e.clientX - w/2)/zoom + (target ? target.x : 0), y: (e.clientY - h/2)/zoom + (target ? target.y : 0), vy: 1.3}); }
        });
        window.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('wheel', e => { zoom = Math.max(0.3, Math.min(5, zoom - e.deltaY * 0.001)); }, {passive:true});

        class Plant {
            constructor() {
                this.type = 'choia';
                this.z = Math.random() * 900;
                this.x = Math.random() * 4000 - 2000;
                this.y = 400 + Math.random() * 100;
                this.size = 50 + Math.random() * 40;
            }
            draw(camX, camY) {
                const p = 600 / (600 + this.z);
                this.sx = (this.x - camX) * p * zoom + w/2;
                this.sy = (this.y - camY) * p * zoom + h/2 + 150*zoom;
                const s = this.size * p * zoom;
                
                ctx.save();
                ctx.translate(this.sx, this.sy);
                const dist = Math.hypot(this.sx - mx, this.sy - my);
                const light = Math.max(0, 1 - dist / (300 * zoom));

                // チョイアのトゲ（高解像度：グラデーションとハイライト）
                for (let i = 0; i < 24; i++) {
                    let a = (i / 24) * Math.PI * 2;
                    let grad = ctx.createLinearGradient(0,0, Math.cos(a)*s, Math.sin(a)*s*0.5);
                    grad.addColorStop(0, `hsla(30, 20%, ${10+light*40}%, ${p})`);
                    grad.addColorStop(1, `hsla(30, 10%, ${5+light*20}%, 0)`);
                    ctx.strokeStyle = grad; ctx.lineWidth = 2 * p;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * s, Math.sin(a) * s * 0.5); ctx.stroke();
                }
                // 中心部
                let cGrad = ctx.createRadialGradient(0,0,0,0,0,s*0.3);
                cGrad.addColorStop(0, `hsla(40, 30%, ${20+light*40}%, ${p})`);
                cGrad.addColorStop(1, `hsla(20, 40%, 10%, ${p})`);
                ctx.fillStyle = cGrad;
                ctx.beginPath(); ctx.ellipse(0, 0, s*0.3, s*0.15, 0, 0, 7); ctx.fill();
                ctx.restore();
            }
        }

        class Creature {
            constructor(type) {
                this.type = type;
                this.isBenthic = ['wiwaxia', 'halluci', 'trilo'].includes(type);
                this.spawn();
            }
            spawn() {
                this.z = Math.random() * 800;
                this.x = Math.random() * 4000 - 2000;
                this.y = this.isBenthic ? 380 + Math.random()*40 : Math.random()*600 - 300;
                this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*0.4;
                this.sizeBase = { anomalo:140, opabinia:100, wiwaxia:85, halluci:60, trilo:55, pikaia:75 }[this.type];
                this.phase = Math.random() * 10;
            }
            update() {
                if(foods.length > 0) {
                    let f = foods[0];
                    let dx = f.x - this.x, dy = f.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if(!this.isBenthic || f.y > 300) {
                        if(dist < 700) { this.vx += dx * 0.003; this.vy += dy * 0.003; if(dist < 15) foods.shift(); }
                    }
                }
                this.vx *= 0.985; this.vy *= 0.985;
                this.x += this.vx; this.y += this.vy;
                if(this.isBenthic) { if(this.y < 350) this.vy += 0.2; if(this.y > 480) this.vy -= 0.2; }
                if(this.x > 2500) this.x = -2500; if(this.x < -2500) this.x = 2500;
            }
            draw(camX, camY) {
                const p = 600 / (600 + this.z);
                this.sx = (this.x - camX) * p * zoom + w/2;
                this.sy = (this.y - camY) * p * zoom + h/2 + 150*zoom;
                const s = this.sizeBase * p * zoom;
                this.sr = s;
                const dist = Math.hypot(this.sx - mx, this.sy - my);
                const light = Math.max(0, 1 - dist / (320 * zoom));

                ctx.save();
                ctx.translate(this.sx, this.sy);
                ctx.scale(this.vx > 0 ? 1 : -1, 1);
                ctx.globalAlpha = Math.max(0.1, p);
                this.render(s, light, t_val);
                ctx.restore();
            }
            render(s, light, t) {
                const time = t * 5 + this.phase;
                const hCol = `hsla(${lightHue}, 100%, 85%, ${light})`;
                ctx.shadowBlur = 25 * light; ctx.shadowColor = hCol;

                if (this.type === 'anomalo') {
                    // アノマロカリス: 重厚な赤い甲殻
                    let g = ctx.createLinearGradient(-s,0,s,0); g.addColorStop(0,'#4a0000'); g.addColorStop(0.5,'#d32f2f'); g.addColorStop(1,'#ff8a65');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.35,0,0,7); ctx.fill();
                    for(let i=0; i<13; i++) {
                        ctx.fillStyle = `rgba(255, 112, 67, ${0.4 + light*0.5})`;
                        let fh = s*0.4 + Math.sin(time + i*0.7)*s*0.25;
                        ctx.beginPath(); ctx.ellipse(-s*0.8+i*s*0.14, s*0.25, s*0.12, fh, 0.2,0,7); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(-s*0.8+i*s*0.14, -s*0.25, s*0.12, fh, -0.2,0,7); ctx.fill();
                    }
                    ctx.fillStyle = '#050505'; ctx.beginPath(); ctx.arc(s*0.8, -s*0.4, s*0.14, 0, 7); ctx.fill();
                    ctx.beginPath(); ctx.arc(s*0.8, s*0.4, s*0.14, 0, 7); ctx.fill();
                    if(light>0.2){ ctx.fillStyle=hCol; ctx.beginPath(); ctx.arc(s*0.82,-s*0.43,s*0.04,0,7); ctx.fill(); }
                } else if (this.type === 'opabinia') {
                    // オパビニア: 深緑の体と5つの精密な複眼
                    let g = ctx.createLinearGradient(-s,0,s,0); g.addColorStop(0,'#1b5e20'); g.addColorStop(1,'#81c784');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.3,0,0,7); ctx.fill();
                    for(let i=0; i<5; i++){
                        ctx.fillStyle = '#0a0a0a'; ctx.beginPath(); ctx.arc(s*0.6-i*s*0.06, -s*0.25-i*s*0.04, s*0.06, 0, 7); ctx.fill();
                        if(light>0.3){ ctx.fillStyle=hCol; ctx.beginPath(); ctx.arc(s*0.61-i*s*0.06, -s*0.26-i*s*0.04, s*0.02, 0, 7); ctx.fill(); }
                    }
                    ctx.strokeStyle = hCol; ctx.lineWidth = s*0.12; ctx.beginPath(); ctx.moveTo(s*0.8,0); ctx.bezierCurveTo(s*1.5, Math.sin(time)*s*0.5, s*1.7, -s*0.4, s*1.6, s*0.5); ctx.stroke();
                } else if (this.type === 'wiwaxia') {
                    // ウィワクシア: 虹色に輝く構造色の鱗
                    let g = ctx.createRadialGradient(0,0,0,0,0,s); g.addColorStop(0,'#5d4037'); g.addColorStop(1,'#212121');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.7,0,0,7); ctx.fill();
                    for(let i=0; i<24; i++){
                        let a = -Math.PI + i*0.26;
                        ctx.strokeStyle = `hsla(${20+light*40}, 30%, ${30+light*50}%, 1)`; ctx.lineWidth = s*0.08;
                        ctx.beginPath(); ctx.moveTo(Math.cos(a)*s*0.6, Math.sin(a)*s*0.3); ctx.lineTo(Math.cos(a)*s*0.9, Math.sin(a)*s*(i%2?1.3:1)); ctx.stroke();
                    }
                } else if (this.type === 'trilo') {
                    // 三葉虫: 鏡面反射する硬い甲羅
                    for(let i=0; i<4; i++) {
                        let g = ctx.createRadialGradient(s*0.6-i*s*0.4, 0, 0, s*0.6-i*s*0.4, 0, s*0.5);
                        g.addColorStop(0, `rgb(${60+light*40}, ${70+light*40}, ${80+light*40})`); g.addColorStop(1, '#1a1a1a');
                        ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(s*0.6-i*s*0.4, 0, s*0.45, s*(0.8-i*0.1), 0,0,7); ctx.fill();
                    }
                } else if (this.type === 'pikaia') {
                    // ピカイア: 内部構造が見える透明な体
                    let g = ctx.createLinearGradient(-s,0,s,0); g.addColorStop(0,'rgba(0,188,212,0.1)'); g.addColorStop(1,`rgba(178,235,242,${0.3+light*0.6})`);
                    ctx.fillStyle = g; ctx.beginPath(); ctx.moveTo(-s,0);
                    for(let i=-s; i<s; i+=s/10) ctx.lineTo(i, Math.sin(time*0.4 + i*0.12)*s*0.35);
                    ctx.lineTo(s,0); ctx.fill();
                    ctx.strokeStyle = hCol; ctx.lineWidth=1; ctx.stroke();
                } else if (this.type === 'halluci') {
                    ctx.fillStyle = '#4a148c'; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.2,0,0,7); ctx.fill();
                    ctx.strokeStyle = hCol; ctx.lineWidth = s*0.06;
                    for(let i=0; i<7; i++){
                        ctx.beginPath(); ctx.moveTo(-s*0.7+i*s*0.2, -s*0.1); ctx.lineTo(-s*0.8+i*s*0.2, -s); ctx.stroke();
                        let leg = Math.sin(time + i)*s*0.2;
                        ctx.beginPath(); ctx.moveTo(-s*0.7+i*s*0.2, s*0.1); ctx.lineTo(-s*0.7+i*s*0.2+leg, s*0.5); ctx.stroke();
                    }
                }
            }
        }

        // 初期化
        for(let i=0; i<35; i++) plants.push(new Plant());
        ['anomalo','opabinia','wiwaxia','halluci','trilo','pikaia'].forEach(t => { for(let i=0; i<4; i++) creatures.push(new Creature(t)); });
        resize();

        let t_val = 0;
        function loop() {
            ctx.fillStyle = '#00060c'; ctx.fillRect(0,0,w,h);
            t_val = performance.now() * 0.001;
            const camX = target ? target.x : 0;
            const camY = target ? target.y : 0;

            const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 350 * zoom);
            grad.addColorStop(0, `hsla(${lightHue}, 100%, 75%, 0.18)`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

            plants.sort((a,b) => b.z - a.z);
            plants.forEach(p => p.draw(camX, camY));

            foods.forEach(f => {
                f.y += 1.3;
                const fx = (f.x - camX)*zoom + w/2;
                const fy = (f.y - camY)*zoom + h/2 + 150*zoom;
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 20; ctx.shadowColor = '#fff';
                ctx.beginPath(); ctx.arc(fx, fy, 5*zoom, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
            });

            creatures.sort((a,b) => b.z - a.z);
            let hover = null;
            creatures.forEach(c => {
                c.update(); c.draw(camX, camY);
                if(Math.hypot(mx - c.sx, my - c.sy) < c.sr) hover = c;
            });
            
            if(hover || target) {
                ui.style.display = 'block';
                const current = hover || target;
                document.getElementById('name').innerText = BIO[current.type].name;
                document.getElementById('desc').innerText = BIO[current.type].desc;
            } else ui.style.display = 'none';

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
