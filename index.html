        #close-btn { background: #00ffff; border: none; color: #001a1a; padding: 10px; cursor: pointer; width: 100%; border-radius: 5px; font-weight: bold; }

</head>

// --- 基本設定 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000612);
scene.fog = new THREE.FogExp2(0x000612, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 10, 70);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- 照明 ---
scene.add(new THREE.AmbientLight(0x224466, 2.0));
const sun = new THREE.DirectionalLight(0x00ffaa, 1.2);
sun.position.set(0, 100, 0);
scene.add(sun);

// --- マリンスノー ---
const snowPos = [];
for(let i=0; i<1000; i++) {
    snowPos.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
}
const snowGeo = new THREE.BufferGeometry();
snowGeo.setAttribute('position', new THREE.Float32BufferAttribute(snowPos, 3));
const snow = new THREE.Points(snowGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15, transparent: true, opacity: 0.4}));
scene.add(snow);

// --- 生物構築 ---
const matAnom = new THREE.MeshPhysicalMaterial({ color: 0x1a6655, transmission: 0.4, roughness: 0.3 });
const matHallu = new THREE.MeshPhysicalMaterial({ color: 0xffaaaa, roughness: 0.6 });

function buildAnomalocaris() {
    const group = new THREE.Group();
    const segments = [];
    let parent = group;
    for(let i=0; i<10; i++) {
        const s = 1 - Math.pow((i - 2)/8, 2);
        const seg = new THREE.Group();
        if(i > 0) seg.position.z = -1.5 * s;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 12), matAnom);
        body.scale.set(1.6*s, 0.6*s, 1.2*s);
        seg.add(body);
        parent.add(seg);
        segments.push(seg);
        parent = seg;
    }
    return { mesh: group, segments };
}

function buildHallucigenia() {

    body.rotation.x = Math.PI/2;
