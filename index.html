<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ANCIENT LENS 3D: VOLUMETRIC</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00040a; font-family: monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: move; }
    </style>
</head>
<body>
<div id="ui"><h1>ANCIENT LENS 3D</h1><p>VOLUMETRIC ENGINE v5.0</p></div>
<canvas id="view"></canvas>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let width, height, angleX = 0.4, angleY = 0.8, zoom = 1.0, time = 0;
    let isDragging = false, lastX, lastY;

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function project(x, y, z) {
        let nx = x * Math.cos(angleY) + z * Math.sin(angleY);
        let nz = -x * Math.sin(angleY) + z * Math.cos(angleY);
        let ny = y * Math.cos(angleX) - nz * Math.sin(angleX);
        let fz = y * Math.sin(angleX) + nz * Math.cos(angleX);
        const p = Math.max(0.1, (fz + 15) / 15) * zoom;
        return { x: width/2 + nx * 200 * p, y: height/2 + ny * 200 * p, z: fz, scale: p };
    }

    function draw() {
        time += 0.03;
        ctx.fillStyle = '#000815'; ctx.fillRect(0, 0, width, height);
        
        let drawList = [];

        // 1. 胴体セグメントをリストへ
        for(let i=0; i<14; i++) {
            const z = (i * 0.35) - 2.5;
            const r = Math.max(0.1, (Math.sin(i * 0.25 + 0.4) * 0.45 + 0.1) * (i > 11 ? 0.3 : 1));
            const p = project(0, Math.sin(time*0.5 + i*0.1)*0.05, z);
            drawList.push({ type:'body', p:p, r:r, z:p.z, i:i });
        }

        // 2. 13対の鰭（厚みを持たせる）
        for(let i=0; i<13; i++) {
            const z = (i * 0.32) - 2.0;
            const phase = time * 3 - i * 0.5;
            const wave = Math.sin(phase) * 0.4;
            [1, -1].forEach(side => {
                const p1 = project(0.2 * side, 0, z);
                const p2 = project(1.2 * side, wave, z + Math.cos(phase)*0.1);
                drawList.push({ type:'flap', p1:p1, p2:p2, z:(p1.z+p2.z)/2, side:side, i:i });
            });
        }

        // 3. 付属肢（腕：3つの節）
        [1, -1].forEach(side => {
            const root = project(0.2 * side, 0.2, 2.2);
            const mid = project(0.4 * side, 0.6 + Math.sin(time*2)*0.3, 2.8);
            const tip = project(0.3 * side, 1.2 + Math.sin(time*2.2)*0.4, 3.2);
            drawList.push({ type:'arm', p1:root, p2:mid, p3:tip, z:root.z });
        });

        // 4. 複眼
        [1, -1].forEach(side => {
            const p = project(0.6 * side, -0.4, 2.0);
            drawList.push({ type:'eye', p:p, z:p.z });
        });

        // --- Zソート（奥から描画） ---
        drawList.sort((a, b) => a.z - b.z);

        drawList.forEach(obj => {
            if(obj.type === 'body') {
                const radius = Math.max(0.1, obj.r * 120 * obj.p.scale);
                const b = Math.floor(Math.max(40, 120 + obj.z * 15));
                const g = ctx.createRadialGradient(obj.p.x-radius*0.3, obj.p.y-radius*0.3, 1, obj.p.x, obj.p.y, radius);
                g.addColorStop(0, `rgb(${b+50},50,60)`); g.addColorStop(1, `rgb(${b/2},20,30)`);
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(obj.p.x, obj.p.y, radius, 0, Math.PI*2); ctx.fill();
            } else if(obj.type === 'flap') {
                ctx.fillStyle = `rgba(${160+obj.z*10}, 40, 40, 0.6)`;
                ctx.strokeStyle = `rgba(255,100,100,0.5)`; ctx.lineWidth = 2 * obj.p1.scale;
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.lineTo(obj.p2.x, obj.p2.y);
                ctx.lineTo(obj.p2.x, obj.p2.y + 20*obj.p2.scale); ctx.lineTo(obj.p1.x, obj.p1.y + 5*obj.p1.scale);
                ctx.closePath(); ctx.fill(); ctx.stroke();
            } else if(obj.type === 'arm') {
                ctx.strokeStyle = '#822'; ctx.lineWidth = 12 * obj.p1.scale; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.quadraticCurveTo(obj.p2.x, obj.p2.y, obj.p3.x, obj.p3.y); ctx.stroke();
            } else if(obj.type === 'eye') {
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(obj.p.x, obj.p.y, 14*obj.p.scale, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(obj.p.x-4, obj.p.y-4, 4*obj.p.scale, 0, Math.PI*2); ctx.fill();
            }
        });

        requestAnimationFrame(draw);
    }

    window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        angleY += (e.clientX - lastX) * 0.01; angleX += (e.clientY - lastY) * 0.01;
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('wheel', e => { zoom = Math.max(0.2, Math.min(3, zoom - e.deltaY * 0.001)); }, {passive: true});

    draw();
</script>
</body>
</html>
