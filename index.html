<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D Aquarium - Ultra Stable</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000a0a; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; }
        canvas { display: block; }
        #info-ui {
            position: absolute;
            top: 20px; right: 20px; width: 260px; padding: 15px;
            background: rgba(0, 30, 40, 0.9); border: 2px solid #00f0ff;
            border-radius: 12px; color: white; display: none;
            pointer-events: none; z-index: 100;
        }
        #info-ui h2 { margin: 0 0 8px; font-size: 1.2em; color: #00f0ff; border-bottom: 1px solid #00f0ff; }
        #info-ui p { margin: 0; font-size: 0.9em; line-height: 1.5; }
        .hint { position: absolute; bottom: 10px; left: 10px; color: #00f0ff; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="info-ui">
        <h2 id="name">名前</h2>
        <p id="desc">解説</p>
    </div>
    <div class="hint">マウスドラッグで回転 / スクロールでズーム</div>

    <!-- 安定性の高いcdnjsから単一ファイルのライブラリを読み込み -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <!-- OrbitControlsも単一ファイル版を読み込み -->
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        // 1. 基本設定
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001015);
        scene.fog = new THREE.FogExp2(0x001015, 0.08);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ライト
        const sun = new THREE.DirectionalLight(0x00ffff, 1.5);
        sun.position.set(5, 10, 2);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x404040, 1));

        // 海底
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x051a1a })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -4;
        scene.add(floor);

        // 2. 生物の生成関数
        function createAnomalocaris() {
            const group = new THREE.Group();
            group.userData = { name: "アノマロカリス", desc: "カンブリア紀の海の王者！横のヒレを波打たせて泳ぎ、2本の大きな触手で獲物を捕まえていたよ。" };
            const mat = new THREE.MeshStandardMaterial({ color: 0xd35400 });
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 3), mat);
            group.add(body);

            const flaps = [];
            for(let i=0; i<8; i++) {
                const f = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 1.5), mat);
                f.position.z = -1.5 + (i * 0.45);
                group.add(f);
                flaps.push(f);
            }
            group.userData.flaps = flaps;

            const armL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 1.2), mat);
            armL.position.set(0.3, -0.2, 1.8);
            armL.rotation.x = 0.5;
            const armR = armL.clone();
            armR.position.x = -0.3;
            group.add(armL, armR);
            group.userData.arms = [armL, armR];

            scene.add(group);
            return group;
        }

        const anomalocaris = createAnomalocaris();
        const trilobites = [];
        for(let i=0; i<6; i++) {
            const t = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshStandardMaterial({color: 0x445566}));
            t.scale.set(1, 0.4, 1.4);
            t.position.set(Math.random()*16-8, -3.8, Math.random()*16-8);
            t.userData = { name: "三葉虫", desc: "海の底を歩く掃除屋さん。硬い殻を持っていて、敵が来ると丸まって身を守ることもあったよ。" };
            scene.add(t);
            trilobites.push(t);
        }

        // 3. インタラクション
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // 4. アニメーション
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // アノマロカリスの動き
            anomalocaris.position.y = Math.sin(t * 0.8) * 1;
            anomalocaris.position.z = Math.cos(t * 0.4) * 4;
            anomalocaris.rotation.y = Math.sin(t * 0.4) * 0.5;
            anomalocaris.userData.flaps.forEach((f, i) => {
                f.rotation.z = Math.sin(t * 4 + i * 0.5) * 0.4;
            });

            // レイキャスト
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(scene.children, true);
            const ui = document.getElementById('info-ui');
            if(hits.length > 0) {
                let target = hits[0].object;
                while(target.parent && !target.userData.name) target = target.parent;
                if(target.userData.name) {
                    ui.style.display = 'block';
                    document.getElementById('name').innerText = target.userData.name;
                    document.getElementById('desc').innerText = target.userData.desc;
                }
            } else { ui.style.display = 'none'; }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
