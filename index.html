<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ANCIENT LENS 3D: STABLE MASTERPIECE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00040a; font-family: 'Courier New', monospace; color: #0f0; }
        #ui { position: absolute; top: 25px; left: 25px; z-index: 100; pointer-events: none; text-shadow: 0 0 10px #0f0; }
        #overlay { position: absolute; bottom: 25px; left: 25px; font-size: 10px; opacity: 0.5; pointer-events: none; letter-spacing: 1px; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="margin:0; font-size: 1.4em; letter-spacing: 4px;">ANCIENT LENS 3D</h1>
    <div id="status">STABLE ENGINE: ONLINE</div>
</div>
<div id="overlay">DRAG: ROTATE | WHEEL: ZOOM | ANOMALOCARIS SIMULATION</div>

<canvas id="view"></canvas>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let width, height;
    let angleX = 0.4, angleY = 0.8, zoom = 1.0, time = 0;
    let isDragging = false, lastX, lastY;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    function project(x, y, z) {
        let nx = x * Math.cos(angleY) + z * Math.sin(angleY);
        let nz = -x * Math.sin(angleY) + z * Math.cos(angleY);
        let ny = y * Math.cos(angleX) - nz * Math.sin(angleX);
        let fz = y * Math.sin(angleX) + nz * Math.cos(angleX);

        // ズームとパースの計算。負の値にならないよう下限を設定
        const perspective = Math.max(0.1, (fz + 12) / 12) * zoom;
        return {
            x: width/2 + nx * 180 * perspective,
            y: height/2 + ny * 180 * perspective,
            z: fz,
            scale: perspective
        };
    }

    function draw() {
        time += 0.035;
        // 背景
        const bg = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(1, width));
        bg.addColorStop(0, '#000b22'); bg.addColorStop(1, '#000408');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);

        // 1. 鰭（ひれ）の描画：Z軸ソートの代わりに背面から順に描画
        for(let i=0; i<13; i++) {
            const z = (i * 0.35) - 2.2;
            const phase = time * 3 - i * 0.5;
            const flapWave = Math.sin(phase) * 0.4;

            [1, -1].forEach(side => {
                const pBase = project(0.2 * side, 0, z);
                const pEnd = project(1.1 * side, flapWave, z + Math.cos(phase)*0.1);
                
                const depthColor = Math.floor(Math.max(50, 150 + pBase.z * 15));
                ctx.fillStyle = `rgba(${depthColor}, 40, 40, ${Math.max(0, 0.4 + pBase.z/20)})`;
                ctx.beginPath();
                ctx.moveTo(pBase.x, pBase.y);
                ctx.lineTo(pEnd.x, pEnd.y);
                ctx.lineTo(pEnd.x, pEnd.y + 15 * pEnd.scale);
                ctx.lineTo(pBase.x, pBase.y + 5 * pBase.scale);
                ctx.fill();
            });
        }

        // 2. 胴体（セグメント：エラー回避ガード付き）
        for(let i=0; i<14; i++) {
            const z = (i * 0.38) - 2.5;
            const r = Math.max(0.01, (Math.sin(i * 0.25 + 0.5) * 0.4 + 0.1) * (i > 10 ? 0.5 : 1));
            const p = project(0, Math.sin(time*0.5 + i*0.1)*0.08, z);
            
            const radius = Math.max(0.1, r * 110 * p.scale * zoom);
            const brightness = Math.floor(Math.max(40, 100 + p.z * 15));
            
            // エラー箇所修正：r0, r1 は正の数である必要がある
            const grad = ctx.createRadialGradient(
                Math.max(0, p.x-radius*0.3), Math.max(0, p.y-radius*0.3), 0.1, 
                Math.max(0, p.x), Math.max(0, p.y), radius
            );
            grad.addColorStop(0, `rgb(${Math.min(255, brightness+60)}, 60, 70)`);
            grad.addColorStop(1, `rgb(${Math.max(0, brightness/2)}, 20, 30)`);
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, Math.PI*2);
            ctx.fill();
        }

        // 3. 複眼と眼柄
        [1, -1].forEach(side => {
            const pRoot = project(0.2 * side, 0, 1.8);
            const pEye = project((0.5+Math.sin(time)*0.05)*side, -0.4, 2.1);

            ctx.strokeStyle = '#222'; ctx.lineWidth = Math.max(1, 6 * pEye.scale);
            ctx.beginPath(); ctx.moveTo(pRoot.x, pRoot.y); ctx.lineTo(pEye.x, pEye.y); ctx.stroke();

            const eyeRadius = Math.max(0.1, 12 * pEye.scale * zoom);
            const eg = ctx.createRadialGradient(
                Math.max(0, pEye.x-eyeRadius*0.3), Math.max(0, pEye.y-eyeRadius*0.3), 0.1, 
                Math.max(0, pEye.x), Math.max(0, pEye.y), eyeRadius
            );
            eg.addColorStop(0, '#888'); eg.addColorStop(1, '#000');
            ctx.fillStyle = eg;
            ctx.beginPath(); ctx.arc(pEye.x, pEye.y, eyeRadius, 0, Math.PI*2); ctx.fill();
        });

        requestAnimationFrame(draw);
    }

    // 操作
    window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        angleY += (e.clientX - lastX) * 0.007;
        angleX += (e.clientY - lastY) * 0.007;
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('wheel', e => {
        zoom = Math.max(0.2, Math.min(2.5, zoom - e.deltaY * 0.0008));
    }, {passive: true});

    window.addEventListener('resize', resize);
    resize();
    draw();
</script>
</body>
</html>
