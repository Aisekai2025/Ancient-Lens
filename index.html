<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian Deep Sea Aquarium - Complete Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; color: #fff; }
        canvas { display: block; }
        
        /* 未来的なホログラムUI */
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 30, 60, 0.8); backdrop-filter: blur(10px);
            border: 1px solid #00ffff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            padding: 30px; border-radius: 15px; pointer-events: auto; z-index: 100;
            display: none; width: 350px; opacity: 0; transition: all 0.4s ease;
        }
        #hologram-ui.active { display: block; opacity: 1; transform: translate(-50%, -50%); }
        #holo-title { margin: 0; font-size: 24px; color: #00ffff; text-shadow: 0 0 10px #0ff; }
        #holo-en { margin: 0 0 15px 0; font-size: 14px; color: #88dddd; font-style: italic; }
        #holo-desc { font-size: 15px; line-height: 1.7; margin-bottom: 20px; color: #e0f8f8; }
        #close-btn {
            background: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; color: #00ffff;
            padding: 10px; cursor: pointer; border-radius: 5px; width: 100%; transition: 0.3s;
        }
        #close-btn:hover { background: #00ffff; color: #000; }

        /* 操作パネル */
        #hud {
            position: absolute; bottom: 20px; left: 0; width: 100%; text-align: center;
            pointer-events: none; color: rgba(0, 255, 255, 0.6); font-size: 13px; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <h3 id="holo-en"></h3>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">閉じる / Close</button>
</div>

<div id="hud">
    Drag: 視点移動 | Wheel: ズーム | Tap/Click: エサやり & 生物調査
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// ==========================================
// 1. 環境構築 (Scene, Camera, Renderer)
// ==========================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x00060d);
scene.fog = new THREE.FogExp2(0x00060d, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
let camRadius = 60;
let targetCamRadius = 60;
let camAngleX = 0, camAngleY = 0.3;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ライト
const ambient = new THREE.AmbientLight(0x112244, 1.5);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0x44ffcc, 1.2);
sun.position.set(10, 50, 10);
scene.add(sun);

// マリンスノー
const snowGeo = new THREE.BufferGeometry();
const snowPos = [];
for(let i=0; i<1500; i++) snowPos.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
snowGeo.setAttribute('position', new THREE.Float32BufferAttribute(snowPos, 3));
const snowMat = new THREE.PointsMaterial({ color: 0x88ccff, size: 0.12, transparent: true, opacity: 0.5 });
const snow = new THREE.Points(snowGeo, snowMat);
scene.add(snow);

// 海底
const bottomY = -40;
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(300, 300),
    new THREE.MeshStandardMaterial({ color: 0x050a15, roughness: 1 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = bottomY;
scene.add(ground);

// ==========================================
// 2. 静的生物（ウミユリ・カイメン）の生成
// ==========================================
function createSeaFlora() {
    const floraMat = new THREE.MeshPhysicalMaterial({ color: 0x224433, roughness: 0.8, transmission: 0.3 });
    for(let i=0; i<50; i++) {
        const x = (Math.random()-0.5)*150;
        const z = (Math.random()-0.5)*150;
        if(Math.random() > 0.5) {
            // カイメン (Sponge) - 筒状
            const h = 2 + Math.random()*4;
            const sponge = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, h, 8, 1, true), floraMat);
            sponge.position.set(x, bottomY + h/2, z);
            scene.add(sponge);
        } else {
            // ウミユリ (Crinoid) - 茎と触手
            const group = new THREE.Group();
            const h = 3 + Math.random()*6;
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.2, h, 6), floraMat);
            stem.position.y = h/2;
            group.add(stem);
            for(let j=0; j<5; j++) {
                const leaf = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2, 0.5), floraMat);
                leaf.position.y = h;
                leaf.rotation.z = (Math.PI/3);
                leaf.rotation.y = (Math.PI*2/5) * j;
                group.add(leaf);
            }
            group.position.set(x, bottomY, z);
            scene.add(group);
        }
    }
}
createSeaFlora();

// ==========================================
// 3. 動的生物のプロシージャル・モデリング
// ==========================================
const materials = {
    anom: new THREE.MeshPhysicalMaterial({ color: 0x1a6655, transmission: 0.4, roughness: 0.3 }),
    opab: new THREE.MeshPhysicalMaterial({ color: 0x663366, transmission: 0.5, roughness: 0.4 }),
    pika: new THREE.MeshPhysicalMaterial({ color: 0xaaaadd, transmission: 0.7, roughness: 0.1 }),
    trilo: new THREE.MeshPhysicalMaterial({ color: 0x443322, roughness: 0.8 }),
    hallu: new THREE.MeshPhysicalMaterial({ color: 0xcc6644, transmission: 0.4, roughness: 0.5 }),
    marr: new THREE.MeshPhysicalMaterial({ color: 0x335588, transmission: 0.3, roughness: 0.4 })
};

// --- ハルキゲニア ---
function buildHallucigenia() {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 8, 12), materials.hallu);
    body.rotation.z = Math.PI/2;
    group.add(body);
    // 背中のトゲ
    for(let i=0; i<7; i++) {
        const spine = new THREE.Mesh(new THREE.ConeGeometry(0.1, 2, 8), materials.hallu);
        spine.position.set(i - 3, 1, 0);
        group.add(spine);
        // 足
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.5), materials.hallu);
        leg.position.set(i-3, -0.8, 0.3);
        leg.rotation.x = 0.4;
        group.add(leg);
        const leg2 = leg.clone(); leg2.position.z = -0.3; leg2.rotation.x = -0.4;
        group.add(leg2);
    }
    return { mesh: group, segments: [] }; // ハルキゲニアは全体を揺らす
}

// --- マルレラ ---
function buildMarrella() {
    const group = new THREE.Group();
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 12), materials.marr);
    head.scale.set(1, 0.5, 1);
    group.add(head);
    // 4本の巨大な後ろ向きのトゲ
    for(let i=0; i<4; i++) {
        const spine = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 5), materials.marr);
        spine.position.set(i<2?0.5:-0.5, 0, -2);
        spine.rotation.y = (i%2==0? 0.3 : -0.3);
        group.add(spine);
    }
    // 小さな足
    for(let i=0; i<10; i++) {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.1), materials.marr);
        leg.position.z = -i * 0.4;
        group.add(leg);
    }
    return { mesh: group, segments: [] };
}

// --- アノマロカリス (前回の改良版) ---
function buildAnomalocaris() {
    const group = new THREE.Group();
    const segments = [];
    let parent = group;
    for(let i=0; i<10; i++) {
        const s = 1 - Math.pow((i-2)/8, 2);
        const seg = new THREE.Group();
        if(i>0) seg.position.z = -1.2 * s;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 12), materials.anom);
        body.scale.set(1.5*s, 0.5*s, 1.2*s);
        seg.add(body);
        if(i>0 && i<9) {
            const finL = new THREE.Mesh(new THREE.BoxGeometry(3*s, 0.05, 1.5*s), materials.anom);
            finL.position.x = 1.5*s; seg.add(finL);
            const finR = finL.clone(); finR.position.x = -1.5*s; seg.add(finR);
            seg.userData = { finL, finR };
        }
        parent.add(seg); segments.push(seg); parent = seg;
    }
    return { mesh: group, segments };
}

// ==========================================
// 4. 生体データと配置
// ==========================================
const entityDefs = [
    { id:'anom', jp:'アノマロカリス', en:'Anomalocaris', desc:'「奇妙なエビ」を意味する最大級の捕食者。', build: buildAnomalocaris, count:3, speed:0.1, yRange:[0, 20] },
    { id:'hallu', jp:'ハルキゲニア', en:'Hallucigenia', desc:'トゲを持つ不思議な姿の生物。かつては上下逆さまだと思われていました。', build: buildHallucigenia, count:5, speed:0.03, yRange:[bottomY+1, bottomY+2] },
    { id:'marr', jp:'マルレラ', en:'Marrella', desc:'カンブリア紀で最も多く発見されている節足動物。レースの飾りのような姿。', build: buildMarrella, count:6, speed:0.04, yRange:[-20, 5] }
];

const entities = [];
entityDefs.forEach(def => {
    for(let i=0; i<def.count; i++) {
        const { mesh, segments } = def.build();
        mesh.position.set((Math.random()-0.5)*100, def.yRange[0] + Math.random()*5, (Math.random()-0.5)*100);
        scene.add(mesh);
        const entity = { def, mesh, segments, target: null, phase: Math.random()*Math.PI*2 };
        mesh.traverse(c => { if(c.isMesh) c.userData.entity = entity; });
        entities.push(entity);
    }
});

// エサ
const food = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
food.visible = false;
scene.add(food);

// ==========================================
// 5. ズーム & インタラクション
// ==========================================
// ズーム機能 (Wheel)
window.addEventListener('wheel', (e) => {
    targetCamRadius += e.deltaY * 0.05;
    targetCamRadius = Math.max(10, Math.min(150, targetCamRadius));
});

// タップ/クリック
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false, lastX, lastY;

window.addEventListener('pointerdown', (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('pointermove', (e) => {
    if(isDragging) {
        camAngleX -= (e.clientX - lastX) * 0.005;
        camAngleY += (e.clientY - lastY) * 0.005;
        camAngleY = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, camAngleY));
    }
    lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('pointerup', (e) => {
    isDragging = false;
    // クリック判定
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        const ent = hits[0].object.userData.entity;
        if(ent) {
            document.getElementById('holo-title').innerText = ent.def.jp;
            document.getElementById('holo-en').innerText = ent.def.en;
            document.getElementById('holo-desc').innerText = ent.def.desc;
            document.getElementById('hologram-ui').classList.add('active');
            return;
        }
    }
    // 背景ならエサ
    const dropPos = new THREE.Vector3().copy(camera.position).add(raycaster.ray.direction.multiplyScalar(40));
    food.position.copy(dropPos); food.visible = true;
    entities.forEach(ent => ent.target = food.position);
    document.getElementById('hologram-ui').classList.remove('active');
});

function closeHolo() { document.getElementById('hologram-ui').classList.remove('active'); }

// ==========================================
// 6. アニメーション
// ==========================================
const dummy = new THREE.Object3D();

function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.002;

    // ズームの平滑化
    camRadius += (targetCamRadius - camRadius) * 0.1;
    camera.position.x = camRadius * Math.sin(camAngleX) * Math.cos(camAngleY);
    camera.position.y = camRadius * Math.sin(camAngleY);
    camera.position.z = camRadius * Math.cos(camAngleX) * Math.cos(camAngleY);
    camera.lookAt(0, 0, 0);

    // マリンスノー
    snow.position.y -= 0.02;
    if(snow.position.y < -50) snow.position.y = 50;

    // 生物のアニメーション
    entities.forEach(ent => {
        // 移動ロジック
        if(!ent.target || ent.mesh.position.distanceTo(ent.target) < 4) {
            ent.target = new THREE.Vector3((Math.random()-0.5)*100, ent.def.yRange[0]+Math.random()*5, (Math.random()-0.5)*100);
        }
        dummy.position.copy(ent.mesh.position);
        dummy.lookAt(ent.target);
        ent.mesh.quaternion.slerp(dummy.quaternion, 0.02);
        ent.mesh.translateZ(ent.def.speed);

        // 体のうねり
        if(ent.segments.length > 0) {
            ent.segments.forEach((seg, i) => {
                seg.rotation.y = Math.sin(time * 3 - i * 0.5 + ent.phase) * 0.15;
                if(seg.userData.finL) {
                    const flap = Math.sin(time * 5 - i * 0.5 + ent.phase) * 0.4;
                    seg.userData.finL.rotation.z = flap;
                    seg.userData.finR.rotation.z = -flap;
                }
            });
        } else {
            // セグメントがない小型生物は全体を揺らす
            ent.mesh.rotation.z = Math.sin(time * 2 + ent.phase) * 0.1;
        }
    });

    if(food.visible) {
        food.position.y -= 0.02;
        if(food.position.y < bottomY) food.visible = false;
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
