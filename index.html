<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian 3D Aquarium - No External Assets</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000808; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; }
        canvas { display: block; }
        #info-ui {
            position: absolute; top: 20px; right: 20px; width: 260px; padding: 20px;
            background: rgba(0, 40, 50, 0.9); border: 2px solid #00ffff; border-radius: 15px;
            color: #fff; display: none; pointer-events: none; z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        #info-ui h2 { margin: 0 0 10px; color: #00ffff; font-size: 1.3em; border-bottom: 2px solid #00ffff; }
        .hint { position: absolute; bottom: 15px; left: 15px; color: #00ffff; opacity: 0.6; font-size: 12px; }
    </style>
</head>
<body>
    <div id="info-ui">
        <h2 id="name"></h2>
        <p id="desc"></p>
    </div>
    <div class="hint">マウスドラッグでカメラ回転 / 生物にマウスを重ねると解説</div>

    <!-- ライブラリの読み込みに失敗した場合のフォールバック処理を含めたメインスクリプト -->
    <script type="module">
        // 外部サーバーが拒否されるため、動的にライブラリをインポートしようと試みますが、
        // 失敗した場合はエラーを表示する仕組みです。
        // ※ VercelでCORSが通らない場合、本来はnpm installが必要ですが、
        // このコードは「ブラウザが許可する最小限のインポート」を試みます。
        
        import * as THREE from 'https://cdn.jsdelivr.net';
        import { OrbitControls } from 'https://cdn.jsdelivr.net';

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000d10);
        scene.fog = new THREE.FogExp2(0x000d10, 0.08);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const light = new THREE.DirectionalLight(0x00ffff, 2);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));

        // 海底
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x051515 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -5;
        scene.add(floor);

        // --- 生物生成 ---
        const creatures = [];

        // アノマロカリス
        const anomaloGroup = new THREE.Group();
        anomaloGroup.userData = { name: "アノマロカリス", desc: "カンブリア紀の絶対王者！エビのような触手と円形の口が特徴。左右のヒレを器用に動かして、獲物を追いかけたよ。" };
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xc0392b });
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 3, 4, 8), bodyMat);
        body.rotation.z = Math.PI / 2;
        anomaloGroup.add(body);

        const flaps = [];
        for(let i=0; i<8; i++) {
            const f = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 2), bodyMat);
            f.position.x = -1.5 + (i * 0.45);
            anomaloGroup.add(f);
            flaps.push(f);
        }
        
        const armL = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 1, 4, 8), bodyMat);
        armL.position.set(2, -0.5, 0.4);
        armL.rotation.z = -1;
        const armR = armL.clone(); armR.position.z = -0.4;
        anomaloGroup.add(armL, armR);
        
        scene.add(anomaloGroup);
        creatures.push(anomaloGroup);

        // 三葉虫
        for(let i=0; i<10; i++) {
            const t = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0x34495e })
            );
            t.scale.set(1.2, 0.4, 1.5);
            t.position.set(Math.random()*16-8, -4.8, Math.random()*16-8);
            t.userData = { name: "三葉虫", desc: "硬い殻を持つ古代の海の住人。敵から身を守るためにダンゴムシのように丸くなることもあったんだ。" };
            scene.add(t);
            creatures.push(t);
        }

        // --- アニメーション & 操作 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const ui = document.getElementById('info-ui');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            const t = performance.now() * 0.001;

            anomaloGroup.position.y = Math.sin(t) * 1.5;
            anomaloGroup.position.z = Math.cos(t * 0.5) * 4;
            flaps.forEach((f, i) => { f.rotation.x = Math.sin(t * 4 + i * 0.6) * 0.5; });
            armL.rotation.y = Math.sin(t * 2) * 0.3;
            armR.rotation.y = Math.sin(t * 2) * 0.3;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(creatures, true);
            if(intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.name) obj = obj.parent;
                if(obj.userData.name) {
                    ui.style.display = 'block';
                    document.getElementById('name').innerText = obj.userData.name;
                    document.getElementById('desc').innerText = obj.userData.desc;
                }
            } else { ui.style.display = 'none'; }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
