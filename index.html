<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D - Evolution Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Helvetica Neue', Arial, sans-serif; color: #fff; }
        canvas { display: block; }
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 20, 40, 0.8); backdrop-filter: blur(10px);
            border: 1px solid #00ffff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            padding: 25px; border-radius: 12px; z-index: 10; display: none; width: 320px; opacity: 0;
            transition: all 0.4s cubic-bezier(0.1, 1.5, 0.5, 1);
        }
        #hologram-ui.active { display: block; opacity: 1; transform: translate(-50%, -50%); }
        #holo-title { margin: 0; font-size: 22px; color: #00ffff; text-shadow: 0 0 10px #0ff; }
        #holo-desc { font-size: 14px; line-height: 1.6; color: #e0f8f8; margin: 15px 0; }
        #close-btn { background: rgba(0, 255, 255, 0.2); border: 1px solid #00ffff; color: #00ffff; padding: 8px; cursor: pointer; width: 100%; border-radius: 6px; }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(0, 255, 255, 0.5); font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>
<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <div id="holo-en" style="font-style: italic; color: #88dddd; font-size: 14px;"></div>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">CLOSE DATA</button>
</div>
<div id="hint">DRAG: VIEW / CLICK: INTERACT</div>

<script src="https://cdnjs.cloudflare.com"></script>
<script>
// --- シーン基本設定 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000612);
scene.fog = new THREE.FogExp2(0x000612, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 5, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- ライト ---
scene.add(new THREE.AmbientLight(0x002244, 1.5));
const sun = new THREE.DirectionalLight(0x00ffaa, 1.0);
sun.position.set(0, 50, 0);
scene.add(sun);

// --- マテリアル ---
const matAnom = new THREE.MeshPhysicalMaterial({ color: 0x1a6655, transmission: 0.4, roughness: 0.3 });
const matHallu = new THREE.MeshPhysicalMaterial({ color: 0xffaaaa, roughness: 0.5 });

// --- 生物構築関数 ---
function buildAnomalocaris() {
    const group = new THREE.Group();
    const segments = [];
    let parent = group;
    for(let i=0; i<8; i++) {
        const s = 1 - Math.pow((i - 2)/6, 2);
        const seg = new THREE.Group();
        if(i > 0) seg.position.z = -1.2 * s;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), matAnom);
        body.scale.set(1.5*s, 0.5*s, 1.2*s);
        seg.add(body);
        parent.add(seg);
        segments.push(seg);
        parent = seg;
    }
    return { mesh: group, segments };
}

function buildHallucigenia() {
    const group = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 4, 4, 8), matHallu);
    body.rotation.x = Math.PI/2;
    group.add(body);

    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            ent.target.set((Math.random()-0.5)*80, ent.mesh.position.y, (Math.random()-0.5)*80);
        }
        dummy.position.copy(ent.mesh.position);
        dummy.lookAt(ent.target);
        ent.mesh.quaternion.slerp(dummy.quaternion, 0.02);
        ent.mesh.translateZ(ent.def.speed);

        // 体のうねり（アノマロカリスのみ）

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
