<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Lens: Paleozoic Odyssey</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000205; font-family: 'Segoe UI', 'Meiryo', sans-serif; user-select: none; color: #fff; }
        canvas { display: block; }
        
        #era-menu {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0, 15, 30, 0.85); padding: 10px 15px;
            border-radius: 40px; border: 1px solid #00f2ff; z-index: 50; box-shadow: 0 0 15px rgba(0,255,255,0.2);
            backdrop-filter: blur(10px);
        }
        .era-btn {
            background: transparent; border: 1px solid rgba(0,255,255,0.2); color: #88dddd;
            padding: 8px 16px; border-radius: 30px; font-size: 11px; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .era-btn span { display: block; font-size: 14px; font-weight: bold; margin-top: 2px; }
        .era-btn.active { background: #00ffff; color: #000; box-shadow: 0 0 15px #0ff; border-color: #0ff; }
        .era-btn:hover:not(.active) { background: rgba(0,255,255,0.15); }

        /* 撮影＆シェアボタン */
        #camera-btn {
            position: absolute; top: 15px; right: 20px;
            background: rgba(0, 255, 255, 0.15); border: 1px solid #0ff; color: #0ff;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,255,255,0.3); transition: 0.3s; z-index: 100;
        }
        #camera-btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 25px #0ff; transform: scale(1.1); }

        #alert {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 50, 0.25); border: 2px solid #ff0055; color: #ff0055;
            padding: 8px 24px; border-radius: 8px; font-weight: bold; letter-spacing: 2px;
            display: none; z-index: 200; animation: blink 0.8s infinite alternate; text-shadow: 0 0 5px #f05;
        }
        @keyframes blink { 0% { opacity: 1; box-shadow: 0 0 20px #f05; } 100% { opacity: 0.2; box-shadow: 0 0 0px #f05; } }

        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 25, 45, 0.9); backdrop-filter: blur(15px);
            border: 2px solid #00ffff; box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
            padding: 25px; border-radius: 12px; pointer-events: auto; z-index: 100; display: none; width: 360px;
            opacity: 0; transition: all 0.3s ease;
        }
        #hologram-ui.active { display: block; opacity: 1; transform: translate(-50%, -50%); }
        #holo-title { margin: 0; font-size: 24px; color: #00ffff; text-shadow: 0 0 10px #0ff; }
        #holo-latin { font-size: 14px; color: #88dddd; font-style: italic; margin: 5px 0 10px 0; padding-bottom: 10px; border-bottom: 1px solid rgba(0,255,255,0.3); }
        #holo-desc { font-size: 14.5px; line-height: 1.7; color: #e0f8f8; margin-bottom: 20px; }
        #close-btn { background: rgba(0,255,255,0.15); border: 1px solid #0ff; color: #0ff; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; letter-spacing: 1px; transition: 0.2s; }
        #close-btn:hover { background: #00ffff; color: #000; }

        #hud { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; color: rgba(0, 255, 255, 0.6); font-size: 13px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="era-menu">
    <button id="btn-ediacaran" class="era-btn" onclick="switchEra('ediacaran')">EDIACARAN<span>エディアカラ紀</span></button>
    <button id="btn-cambrian" class="era-btn active" onclick="switchEra('cambrian')">CAMBRIAN<span>カンブリア紀</span></button>
    <button id="btn-ordovician" class="era-btn" onclick="switchEra('ordovician')">ORDOVICIAN<span>オルドビス紀</span></button>
    <button id="btn-silurian" class="era-btn" onclick="switchEra('silurian')">SILURIAN<span>シルル紀</span></button>
    <button id="btn-devonian" class="era-btn" onclick="switchEra('devonian')">DEVONIAN<span>デボン紀</span></button>
</div>

<button id="camera-btn" title="撮影＆シェア">📷</button>

<div id="alert">⚠️ RARE CREATURE DETECTED / 希少生物接近 ⚠️</div>

<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <div id="holo-latin"></div>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">CLOSE / 調査終了</button>
</div>
<div id="hud">Drag: 回転 | Scroll: ズーム | Click: エサやり & 図鑑</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// ==========================================
// 1. システム・シーン構築
// ==========================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000205);
scene.fog = new THREE.FogExp2(0x000205, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
// 画像撮影(toDataURL)のために preserveDrawingBuffer を true に設定
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

let camRadius = 100, targetCamRadius = 100, camAngleX = 0, camAngleY = 0.3;
const bottomY = -40;
const aquariumRadius = 150; 

let currentEra = '';
let entities = [];
let rareEntity = null;
const envGroup = new THREE.Group(); scene.add(envGroup);
let sunRays = null;

const foodMesh = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
const foodLight = new THREE.PointLight(0xffff00, 1.5, 30);
foodMesh.add(foodLight);
foodMesh.visible = false;
scene.add(foodMesh);

scene.add(new THREE.AmbientLight(0x1a2a4a, 2.5));
const dirLight = new THREE.DirectionalLight(0x00ffcc, 1.2); dirLight.position.set(0, 50, 20); scene.add(dirLight);

const mat = (col, trans=0, rough=0.5, glow=0) => new THREE.MeshStandardMaterial({ 
    color: col, transparent: trans>0, opacity: 1-trans, roughness: rough, emissive: col, emissiveIntensity: glow 
});
// 目のハイライト（生気）を出すために roughness を 0 にし、反射を強くする
const eyeMat = new THREE.MeshStandardMaterial({color: 0x050505, roughness: 0.0, metalness: 0.8});

// --- パーティクルシステム (気泡/マリンスノー) ---
const particleCount = 800;
const particleGeo = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount * 3);
const velArray = new Float32Array(particleCount);
for(let i=0; i<particleCount*3; i+=3) {
    posArray[i] = (Math.random() - 0.5) * 300;
    posArray[i+1] = bottomY + Math.random() * 120;
    posArray[i+2] = (Math.random() - 0.5) * 300;
    velArray[i/3] = 0.05 + Math.random() * 0.15; 
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
particleGeo.setAttribute('velocity', new THREE.BufferAttribute(velArray, 1));
const particleMat = new THREE.PointsMaterial({
    color: 0x88ddff, size: 0.6, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ==========================================
// 2. 生物造形モデリング
// ==========================================

// --- 環境・底生生物 ---
function buildStromatolite() {
    const g = new THREE.Group();
    const mound = new THREE.Mesh(new THREE.SphereGeometry(2, 16, 12, 0, Math.PI*2, 0, Math.PI/2), mat(0x445544));
    mound.scale.set(1, 0.5, 1); g.add(mound); return { mesh: g, segments: [], type: 'static', offset: 0 };
}
function buildCyclomedusa() {
    const g = new THREE.Group();
    for(let i=0; i<4; i++) {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(0.8 - i*0.2, 0.1, 8, 32), mat(0x7788aa, 0.2));
        ring.rotation.x = Math.PI/2; ring.position.y = 0.05 + i*0.05; g.add(ring);
    }
    const center = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 8), mat(0x8899bb, 0.1));
    center.scale.set(1, 0.5, 1); center.position.y = 0.25; g.add(center);
    return { mesh: g, segments: [], type: 'static', offset: 0 };
}
function buildSponge() {
    const h = 3 + Math.random()*4; const g = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, h, 8), mat(0x889966));
    g.position.y = h/2; return { mesh: g, segments: [], type: 'static', offset: 0 };
}
function buildChoia() {
    const g = new THREE.Group();
    const center = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 8, 0, Math.PI*2, 0, Math.PI/2), mat(0x887755));
    center.scale.set(1, 0.3, 1); g.add(center);
    for(let i=0; i<16; i++) {
        const spine = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 2.0), mat(0xaa9977));
        const angle = (i/16) * Math.PI * 2; spine.rotation.set(Math.PI/2, angle, 0);
        spine.position.set(Math.sin(angle), 0, Math.cos(angle)); g.add(spine);
    }
    return { mesh: g, segments: [], type: 'static', offset: 0 };
}
function buildHornCoral() {
    const g = new THREE.Group(); const h = 2 + Math.random()*2;
    const coral = new THREE.Mesh(new THREE.ConeGeometry(0.4, h, 16), mat(0xaa6655));
    coral.position.y = h/2; coral.rotation.set(0.2+Math.random()*0.3, Math.random()*Math.PI*2, 0);
    g.add(coral); return { mesh: g, segments: [], type: 'static', offset: 0 };
}
function buildHalysites() {
    const g = new THREE.Group();
    for(let i=0; i<12; i++) {
        const h = 1.0 + Math.random();
        const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, h, 8), mat(0xccaa99));
        tube.position.set(Math.sin(i*0.5)*1.5, h/2, Math.cos(i*0.5)*1.5 + Math.sin(i)*0.5);
        g.add(tube);
    }
    return { mesh: g, segments: [], type: 'static', offset: 0 };
}
function buildCrinoid() {
    const g = new THREE.Group(); const h = 4 + Math.random()*4;
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, h), mat(0x556644)); stem.position.y = h/2; g.add(stem);
    for(let i=0; i<8; i++) {
        const arm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3, 0.1), mat(0x99aa66));
        arm.position.y = h; arm.rotation.z = 0.6; arm.rotation.y = (i/8)*Math.PI*2; g.add(arm);
    }
    return { mesh: g, segments: [], type: 'static', offset: 0 };
}
function buildSeaApple() {
    const g = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 2.0), mat(0xddaa55)); stem.position.y = 1.0; g.add(stem);
    const body = new THREE.Mesh(new THREE.IcosahedronGeometry(1.2, 2), mat(0xddaa55)); body.position.y = 2.5; g.add(body);
    g.userData.pulseBody = body; return { mesh: g, segments: [], type: 'static', offset: 0 };
}
function buildGraptolite() {
    const g = new THREE.Group();
    for(let side of [-1, 1]) {
        const stipe = new THREE.Group(); stipe.rotation.z = side * 0.4;
        const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 3), mat(0xaaaacc, 0.2));
        branch.position.y = -1.5; stipe.add(branch);
        for(let i=0; i<15; i++) {
            const theca = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.2), mat(0xccccdd));
            theca.position.set(side * 0.05, -0.2 - i*0.18, 0); theca.rotation.z = side * -0.5; stipe.add(theca);
        }
        g.add(stipe);
    }
    g.scale.set(1.5, 1.5, 1.5); return { mesh: g, segments: [g], type: 'drift', offset: 0 };
}
function buildGoniatite() {
    const g = new THREE.Group();
    const shell = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.3, 16, 32), mat(0xaa8866)); shell.rotation.y = Math.PI/2;
    const shellFill = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.6, 32), mat(0x997755)); shellFill.rotation.z = Math.PI/2;
    g.add(shell, shellFill);
    const head = new THREE.Group(); head.position.z = 0.5; g.add(head);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.1), eyeMat); eyeL.position.set(0.3, 0, 0.2); head.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = -0.3; head.add(eyeR);
    for(let i=0; i<8; i++) {
        const t = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.6, 8), mat(0xaa5555));
        t.rotation.set(Math.PI/2 + (Math.random()-0.5)*0.5, (i/8)*Math.PI*2, 0); t.position.z = 0.3; head.add(t);
    }
    g.scale.set(1.5, 1.5, 1.5); return { mesh: g, segments: [], type: 'drift', offset: 10 };
}
function buildWiwaxia() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 12, 0, Math.PI*2, 0, Math.PI/2), mat(0x554466));
    body.scale.set(1.2, 0.6, 1.5); body.position.y = 0.1; g.add(body);
    for(let i=0; i<8; i++) {
        for(let side of [-1, 1]) {
            const spine = new THREE.Mesh(new THREE.ConeGeometry(0.04, 1.5, 8), mat(0x887799));
            spine.position.set(0.4*side, 0.5, 0.8-i*0.25); spine.rotation.set(-0.3, 0, side*-0.5); g.add(spine);
        }
    }
    return { mesh: g, segments: [], type: 'slide', offset: 0 };
}
function buildMaclurites() {
    const g = new THREE.Group(); const shellGroup = new THREE.Group();
    for(let i=0; i<4; i++) {
        const torus = new THREE.Mesh(new THREE.TorusGeometry(0.8 - i*0.18, 0.35 - i*0.06, 12, 24), mat(0xaabb88));
        torus.rotation.x = Math.PI/2; torus.position.y = -i*0.15; shellGroup.add(torus);
    }
    shellGroup.position.y = 0.3; g.add(shellGroup);
    return { mesh: g, segments: [shellGroup], type: 'floor', offset: 0 }; 
}

// --- エディアカラ紀 ---
function buildDickinsonia() {
    const g = new THREE.Group();
    for(let i=0; i<15; i++) {
        const s = Math.sin((i/14)*Math.PI);
        const rib = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 4*s, 8), mat(0xaa88ff, 0.4, 0.2, 0.2));
        rib.rotation.z = Math.PI/2; rib.position.z = 2.5 - i*0.35; g.add(rib);
    }
    g.scale.set(1.2, 1, 1.2);
    return { mesh: g, segments: [], type: 'slide', offset: 0.1 };
}
function buildCharnia() {
    const g = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.1, 8), mat(0x66ffaa, 0.5, 0.3, 0.3));
    stem.position.y = 4; g.add(stem);
    for(let i=0; i<10; i++) {
        const s = 1 - (i/10);
        const leafL = new THREE.Mesh(new THREE.BoxGeometry(2*s, 0.5, 0.05), mat(0x66ffaa, 0.5, 0.3, 0.3));
        leafL.position.set(1*s, 2 + i*0.6, 0); leafL.rotation.z = 0.5; g.add(leafL);
        const leafR = new THREE.Mesh(new THREE.BoxGeometry(2*s, 0.5, 0.05), mat(0x66ffaa, 0.5, 0.3, 0.3));
        leafR.position.set(-1*s, 2.3 + i*0.6, 0); leafR.rotation.z = -0.5; g.add(leafR);
    }
    return { mesh: g, segments: [g], type: 'static', offset: 0 };
}
function buildKimberella() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), mat(0xddaa88, 0.3, 0.5, 0.1));
    body.scale.set(1, 0.6, 1.5); body.position.y = 0.3; g.add(body);
    const frill = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.1, 24), mat(0xffccaa, 0.4, 0.5, 0.1));
    frill.scale.set(1, 1, 1.8); frill.position.y = 0.05; g.add(frill);
    return { mesh: g, segments: [], type: 'slide', offset: 0.1 };
}
function buildTribrachidium() {
    const g = new THREE.Group();
    const disk = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 0.2, 32), mat(0x55ccff, 0.3, 0.5, 0.2)); g.add(disk);
    for(let i=0; i<3; i++) {
        const arm = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.15, 8, 16, Math.PI), mat(0x88eeff, 0.2, 0.5, 0.4));
        arm.rotation.x = Math.PI/2; arm.position.set(Math.cos(i*Math.PI*2/3)*0.5, 0.15, Math.sin(i*Math.PI*2/3)*0.5);
        arm.rotation.z = i*Math.PI*2/3; g.add(arm);
    }
    return { mesh: g, segments: [g], type: 'spin_static', offset: 0.1 };
}
function buildParvancorina() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), mat(0xcc9977));
    body.scale.set(1.0, 0.3, 1.2); body.position.y = 0.15;
    const ridgeT = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.4), mat(0xddaa88));
    ridgeT.rotation.z = Math.PI/2; ridgeT.position.set(0, 0.4, 0.6); body.add(ridgeT);
    const ridgeM = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.8), mat(0xddaa88));
    ridgeM.rotation.x = Math.PI/2; ridgeM.position.set(0, 0.4, -0.2); body.add(ridgeM);
    g.add(body);
    return { mesh: g, segments: [], type: 'slide', offset: 0.1 };
}
function buildSpriggina() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const head = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.2, 16, 1, false, 0, Math.PI), mat(0xffcc88, 0.2, 0.5, 0.2));
    head.rotation.y = Math.PI/2; head.scale.set(1, 1, 1.5); g.add(head);
    for(let i=0; i<12; i++) {
        const s = 1 - (i/12)*0.8; const seg = new THREE.Group(); seg.position.z = -0.3;
        const b = new THREE.Mesh(new THREE.BoxGeometry(1.5*s, 0.15, 0.3), mat(0xffcc88, 0.2, 0.5, 0.1)); seg.add(b);
        parent.add(seg); segs.push(seg); parent = seg;
    }
    return { mesh: g, segments: segs, type: 'slide', offset: 0.1 };
}

// --- カンブリア紀 ---
function buildAnomalocaris() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const headGroup = new THREE.Group(); g.add(headGroup);
    const head = new THREE.Mesh(new THREE.SphereGeometry(1.4, 24, 16), mat(0x1a6655)); 
    head.scale.set(1.2, 0.5, 1.1); headGroup.add(head);

    const mouthGroup = new THREE.Group();
    mouthGroup.position.set(0, -0.6, 0.5);
    mouthGroup.rotation.x = Math.PI / 2;
    for(let i=0; i<4; i++) { 
        const tooth = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.1), mat(0x113322));
        tooth.position.set(Math.cos(i*Math.PI/2)*0.3, Math.sin(i*Math.PI/2)*0.3, 0);
        tooth.rotation.z = i*Math.PI/2;
        mouthGroup.add(tooth);
    }
    const mouthRing = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.1, 8, 16), mat(0x1a6655));
    mouthGroup.add(mouthRing);
    headGroup.add(mouthGroup);
    g.userData.mouth = mouthGroup;

    const armsBase = [];
    for(let side of [-1, 1]) {
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.0), mat(0x1a6655));
        stalk.position.set(1.2*side, 0.4, 0.6); stalk.rotation.z = side * -1.0; stalk.rotation.x = 0.5; headGroup.add(stalk);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.4), eyeMat); 
        eye.position.set(1.6*side, 0.7, 0.8); headGroup.add(eye);
        
        const armBase = new THREE.Group(); armBase.position.set(0.5*side, -0.2, 1.2); headGroup.add(armBase);
        let curr = armBase;
        const armJoints = [];
        for(let k=0; k<7; k++) {
            const joint = new THREE.Group(); joint.position.z = 0.3;
            joint.rotation.x = 0.5; 
            const part = new THREE.Mesh(new THREE.CylinderGeometry(0.15 - k*0.015, 0.15 - k*0.015, 0.4, 8), mat(0x1a6655)); 
            part.rotation.x = Math.PI/2; part.position.z = 0.2;
            const spine = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.5), mat(0x224433)); 
            spine.position.set(0, -0.2, 0.2); spine.rotation.x = -0.2;
            joint.add(part, spine); curr.add(joint); curr = joint;
            armJoints.push(joint);
        }
        armsBase.push(armJoints);
    }
    g.userData.armsBase = armsBase;

    for(let i=0; i<12; i++) {
        const s = 1 - Math.pow((i-2)/10, 2); 
        const seg = new THREE.Group(); if(i>0) seg.position.z = -1.0 * s;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), mat(0x1a6655)); 
        body.scale.set(1.4*s, 0.5*s, 1.1*s); seg.add(body);
        
        if(i>0 && i<11) {
            const fL = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x22aa88, 0.2, 0.4)); 
            fL.scale.set(1.8*s, 0.05, 0.8*s); fL.position.x = 1.4*s + 0.8*s; seg.add(fL);
            const fR = fL.clone(); fR.position.x = -(1.4*s + 0.8*s); seg.add(fR); 
            seg.userData = { fL, fR };
        }
        if(i===11) {
            for(let j=0; j<3; j++) {
                const tailFin = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), mat(0x22aa88, 0.2, 0.4));

// --- オルドビス紀 ---
// --- 【古生物学×3D造形×SE】 アストラスピス：不器用な無顎類泳ぎ (V3.0) ---

// buildAstraspis 関数は画像生成3の履歴（造形）を完全に維持
function buildAstraspis() {
    const g = new THREE.Group();

    // 1. テッセラ（装甲板）テクスチャの生成（造形維持）
    const createTesseraeTexture = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#887755';
        ctx.fillRect(0, 0, 512, 512);
        ctx.strokeStyle = '#665544';
        ctx.lineWidth = 2;
        for (let i = 0; i < 200; i++) {
            ctx.beginPath();
            ctx.arc(Math.random() * 512, Math.random() * 512, 5 + Math.random() * 10, 0, Math.PI * 2);
            ctx.stroke();
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(4, 2);
        return tex;
    };

    const armorMat = new THREE.MeshStandardMaterial({
        map: createTesseraeTexture(),
        bumpMap: createTesseraeTexture(),
        bumpScale: 0.02,
        roughness: 0.8,
        metalness: 0.1
    });

    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x010101, roughness: 0.1, metalness: 0.9 });
    const fleshMat = new THREE.MeshStandardMaterial({ color: 0x332211, roughness: 0.9 });

    // 2. 胴部シールド（造形維持）
    const bodyGroup = new THREE.Group();
    g.add(bodyGroup);

    const torso = new THREE.Mesh(new THREE.SphereGeometry(1.4, 32, 24), armorMat);
    torso.scale.set(1.1, 0.7, 1.8);
    bodyGroup.add(torso);

    // 目と口（視認性維持）
    for (let side of [-1, 1]) {
        const eyePos = { x: side * 0.85, y: 0.25, z: 1.8 }; 
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
        eye.position.set(eyePos.x, eyePos.y, eyePos.z);
        bodyGroup.add(eye);
        const socket = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.04, 8, 16), armorMat);
        socket.position.set(eyePos.x, eyePos.y, eyePos.z);
        socket.rotation.y = side * 0.4;
        bodyGroup.add(socket);
    }

    const mouthGroup = new THREE.Group();
    mouthGroup.position.set(0, -0.35, 2.3); 
    bodyGroup.add(mouthGroup);
    const mouthRim = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.08, 12, 24), armorMat);
    mouthRim.rotation.x = Math.PI / 2.2;
    mouthGroup.add(mouthRim);
    const mouthInside = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 12), fleshMat);
    mouthInside.scale.set(1, 0.2, 1);
    mouthGroup.add(mouthInside);

    // 3. 尾部と尾びれ（造形維持：三部構成）
    const tailGroup = new THREE.Group();
    tailGroup.position.z = -1.5; 
    g.add(tailGroup);

    const tailStem = new THREE.Mesh(new THREE.SphereGeometry(0.8, 24, 16), armorMat);
    tailStem.scale.set(0.7, 0.5, 2.0);
    tailStem.position.z = -1.0;
    tailGroup.add(tailStem);

    const tailFinGroup = new THREE.Group();
    tailFinGroup.position.z = -2.5; 
    tailGroup.add(tailFinGroup);

    const tailFin = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), armorMat);
    tailFin.scale.set(0.05, 1.4, 1.0);
    tailFin.position.z = -0.5;
    tailFinGroup.add(tailFin);

    g.userData = { 
        body: bodyGroup, 
        tail: tailGroup,
        fin: tailFinGroup,
        type: 'fish_astraspis'
    };

    return { mesh: g, type: 'fish_astraspis' };
}

// --- 【完全差し替え】アニメーション：不器用なふらふら泳ぎ ---

function animateAstraspis(mesh, clock) {
    if (!mesh || !mesh.userData) return;
    const time = (typeof clock === 'object') ? clock.getElapsedTime() : clock;
    const data = mesh.userData;

    // 不器用な遊泳のための設定
    // ゆっくりとした、しかし大きな波
    const baseSpeed = 1.8; 
    const waveY = Math.sin(time * baseSpeed);
    const waveZ = Math.cos(time * baseSpeed); // ロール用の波（位相をずらす）

    // 1. 【全体のふらふら感 (Clumsy Rocking)】 対鰭を持たない不安定さを表現
    
    // 首振り (Yaw): 大きく振って推進力を稼ぐ
    mesh.rotation.y = waveY * 0.08; 
    
    // 【注目】 ロール (Roll): 対鰭による安定化ができないため、尾を振ると体が左右に大きく傾く
    // これがサカバンバスピスのような「ふらふら感」の正体
    mesh.rotation.z = waveZ * 0.15; 
    
    // ピッチ (Pitch): 推進ベクトルがずれることによる鼻先の上下
    mesh.rotation.x = Math.sin(time * baseSpeed * 2.0) * 0.02; // 少し速い周期で

    // 2. 【尾の大きな振り (Hard Tail Push)】 有機的なしなりではなく、硬い尾を大きく振る
    if (data.tail) {
        // 体幹の振り（mesh.rotation.y）に対して、より大きな角度で振る
        data.tail.rotation.y = -waveY * 0.4; // 逆方向に大きく
    }

    // 3. 【尾びれの連動 (Lagging Fin)】 尾全体の振りに遅れて動く（しなりを弱く、無骨に）
    if (data.fin) {
        data.fin.rotation.y = Math.sin(time * baseSpeed - 1.2) * 0.3; // 位相をさらに遅らせる
    }
}

function buildOrthoceras() {
    const g = new THREE.Group();
    const segs = [];
    const shellHeight = 8.0; // エンドセラスなら 18.0
    const shellRadius = 0.8; // エンドセラスなら 1.5

    // 1. 殻：原点(口)から「Zマイナス」方向に先端が伸びるように配置
    const shellGeo = new THREE.ConeGeometry(shellRadius, shellHeight, 32);
    shellGeo.translate(0, shellHeight / 2, 0); 
    shellGeo.rotateX(-Math.PI / 2); 
    const shell = new THREE.Mesh(shellGeo, mat(0xddccaa));
    g.add(shell);

    // 2. 頭部：原点(0,0,0)付近に配置
    const head = new THREE.Mesh(new THREE.SphereGeometry(shellRadius * 0.8, 16, 16), mat(0xaa5555));
    // 殻の口にめり込まないよう、わずかに「Zプラス（反転後に後ろになる方向）」へ
    head.position.z = 0.2; 
    g.add(head);

    // 3. 目：頭の外側（Zプラス方向）に見えるように
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.2), eyeMat);
    eyeL.position.set(0.6, 0.2, 0.2); 
    head.add(eyeL);
    const eyeR = eyeL.clone();
    eyeR.position.x = -0.6;
    head.add(eyeR);

    // 4. 触手：ここが修正ポイント！
    // 頭から「Zプラス（殻とは逆方向）」へ伸ばす
    for(let i = 0; i < 8; i++) {
        const tentacle = new THREE.Group();
        tentacle.position.z = 0.4; // 頭の「先（殻の反対側）」から開始
        tentacle.rotation.z = (i / 8) * Math.PI * 2;
        head.add(tentacle);
        
        let curr = tentacle;
        for(let j = 0; j < 10; j++) {
            // 節が進むごとに、より急激に細くする（r1, r2の計算式を調整）
const r1 = 0.1 * Math.pow(0.85, j); 
const r2 = 0.1 * Math.pow(0.85, j + 1);
            const t = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, 0.5), mat(0xaa5555));
            
            // 重要：シリンダーを「Zプラス方向」に向けて伸ばす
            t.rotation.x = Math.PI / 2; 
            t.position.z = 0.25; 
            
            const w = new THREE.Group();
            w.add(t);
            curr.add(w);
            curr = w;
            segs.push({ mesh: w, index: j, angle: i });
        }
    }

    // 最後に全体を180度回転
    // これで：
    // Zマイナスにあった「殻の先」が Zプラス（前）になり、
    // Zプラスにあった「頭と足」が Zマイナス（後ろ）になります。
    g.rotation.y = Math.PI; 

    return { mesh: g, segments: segs, type: 'jet', jetPhase: 0 };
}

function buildEndoceras() {
    const g = new THREE.Group();
    const segs = [];

    const shellRadius = 1.5;

    // 1. 殻：原点(0,0,0)から「Zマイナス」方向に先端(18.0先)が伸びる
    const shellGeo = new THREE.ConeGeometry(shellRadius, shellHeight, 32);
    // 底面（太い口）を原点に合わせる
    shellGeo.translate(0, shellHeight / 2, 0); 
    // 頂点をZマイナス方向に向ける
    shellGeo.rotateX(-Math.PI / 2); 
    const shell = new THREE.Mesh(shellGeo, mat(0xccbb99));
    g.add(shell);

    // 2. 頭部：原点(0,0,0)から「Zプラス」方向（殻の外）へ配置
    const head = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), mat(0x995555));
    // 殻の口から外側へしっかり出す（Zプラス方向）
    head.position.z = 0.5; 
    g.add(head);

    // 3. 目：頭についているのでZプラス側
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.3), eyeMat);
    eyeL.position.set(1.0, 0.3, 0.3); 
    head.add(eyeL);
    const eyeR = eyeL.clone();
    eyeR.position.x = -1.0;
    head.add(eyeR);

    // 4. 触手：頭の先からさらに「Zプラス（外側）」へ伸ばす
    for(let i=0; i<10; i++) {
        const tentacle = new THREE.Group();
        // 頭の先端（Zプラス方向）に配置
        tentacle.position.z = 1.0; 
        tentacle.rotation.z = (i/10) * Math.PI * 2;
        head.add(tentacle);
        
        let curr = tentacle;
        for(let j=0; j<12; j++) {
            // 節が進むごとに、より急激に細くする（r1, r2の計算式を調整）
const r1 = 0.1 * Math.pow(0.85, j); 
const r2 = 0.1 * Math.pow(0.85, j + 1);
            const t = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, 0.8), mat(0x995555));
            
            // 重要：シリンダー自体を「Zプラス」方向に向けて伸ばす
            t.rotation.x = Math.PI / 2; 
            t.position.z = 0.4; // 自身の長さの半分だけZプラス方向へ
            
            const w = new THREE.Group();
            w.add(t);
            curr.add(w);
            curr = w;
            segs.push({ mesh: w, index: j, angle: i });
        }
    }

    // 5. 全体を反転：Zマイナスの「尖った先」を「前(Z+)」に、Zプラスの「足」を「後ろ(Z-)」に
    g.rotation.y = Math.PI; 

    return { mesh: g, segments: segs, type: 'jet', jetPhase: 0 };
}

    // 鋭く伸びる後方への頬棘 (Genal spine) - 左右完全対称に配置
    const spineL = new THREE.Mesh(new THREE.ConeGeometry(0.08, 1.5, 8), mat(0x445544));
    spineL.rotation.x = -Math.PI/2; spineL.position.set(1.0, 0, -0.5); head.add(spineL);
    const spineR = new THREE.Mesh(new THREE.ConeGeometry(0.08, 1.5, 8), mat(0x445544));
    spineR.rotation.x = -Math.PI/2; spineR.position.set(-1.0, 0, -0.5); head.add(spineR);

    // ドーム状の複眼
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.15), eyeMat); eyeL.position.set(0.4, 0.2, 0.2); head.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = -0.4; head.add(eyeR);
    
    g.add(head); parent = head; segs.push(head);

    for(let i=0; i<10; i++) {
        const s = 1 - (i/10)*0.6; const seg = new THREE.Group(); seg.position.z = i===0 ? -0.5 : -0.3*s;
        const shell = new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 12, 0, Math.PI*2, 0, Math.PI/2), mat(0x445544)); 
        shell.scale.set(1.2*s, 0.3*s, 0.8*s); seg.add(shell);
        const legs = []; 
        for(let j of [-1, 1]) { 
            const leg = new THREE.Mesh(legGeo, mat(0x556655)); 
            leg.position.set(0.5*s*j, -0.1, 0); seg.add(leg); legs.push(leg); 
        }
        seg.userData.legs = legs; parent.add(seg); segs.push(seg); parent = seg;
        
        // 尾剣 (Pygidial spine)
        if (i===9) {
            const tailSpike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 1.2, 8), mat(0x334433));
            tailSpike.rotation.x = -Math.PI/2; tailSpike.position.z = -0.6; seg.add(tailSpike);
        }
    }
    g.scale.set(1.2, 1.2, 1.2);
    return { mesh: g, segments: segs, type: 'crawl', offset: 0.3 };
}

// ========================================================
// --- 【古生物×3D造形】 ブンストデラ（眼と脚の極限再現版） ---
// ========================================================
function buildBunstodera() {
    const g = new THREE.Group();
    const segs = [];
    
    // 【透け防止・マット化】 泥に潜む重厚な甲殻 
    const matShell = new THREE.MeshStandardMaterial({ 
        color: 0x5a4a3a, 
        roughness: 0.9, 
        metalness: 0.0,
        transparent: false,
        depthWrite: true,
        side: THREE.FrontSide
    });

    const matLeg = new THREE.MeshStandardMaterial({ color: 0x332211, roughness: 1.0, metalness: 0.0 });
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x010101, roughness: 0.2, metalness: 0.4 });

    // --- 【アップデート】 有機的な脚のパーツ ---
    // BoxGeometryから先細りのCylinderGeometryへ変更し、より生物的に
    const femurGeo = new THREE.CylinderGeometry(0.025, 0.015, 0.45, 8);
    femurGeo.translate(0, -0.225, 0); // 支点を上部に設定
    const tibiaGeo = new THREE.CylinderGeometry(0.015, 0.008, 0.4, 8);
    tibiaGeo.translate(0, -0.2, 0);

    // 1. 前体 (Prosoma) - 丸みを帯びたドーム
    const head = new THREE.Group();
    const headShell = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2),
        matShell
    );
    headShell.scale.set(1.0, 0.4, 0.9); // ブンストデラ特有の丸み [cite: 665]
    head.add(headShell);

    // 頬棘 (Genal spine) [cite: 668-672]
    for (let side of [-1, 1]) {
        const genalSpine = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.5, 8), matShell);
        genalSpine.rotation.x = -Math.PI / 2;
        genalSpine.rotation.z = side * 0.15; 
        genalSpine.position.set(side * 1.15, 0, -0.2); 
        head.add(genalSpine);
    }

    // --- 【アップデート】 眼瞼隆起と楕円形の複眼 ---
    for (let side of [-1, 1]) {
        // 1. グループを作成（変数の重複を避けるため、1回だけ宣言）
        const eyeGroup = new THREE.Group();
        
        // 2. メインのふくらみ（ridge）を作成
        const ridge = new THREE.Mesh(
            new THREE.CylinderGeometry(0.06, 0.1, 0.2, 8), 
            matShell
        );
        ridge.rotation.z = Math.PI / 2;

        // 3. 両端を丸めるための球（cap）を作成して追加
        const capGeo = new THREE.SphereGeometry(0.06, 8, 8);
        const cap1 = new THREE.Mesh(capGeo, matShell);
        const cap2 = new THREE.Mesh(capGeo, matShell);
        cap1.position.x = 0.1;
        cap2.position.x = -0.1;

        // 4. 複眼（eye）を作成
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeMat);
        eye.scale.set(0.6, 1.0, 1.4); 
        eye.position.set(0, 0.04, 0); 
        eye.rotation.y = side * -0.1;

        // --- 全てを eyeGroup にまとめる ---
        eyeGroup.add(ridge);
        eyeGroup.add(cap1);
        eyeGroup.add(cap2);
        eyeGroup.add(eye);

        // 配置の調整
        eyeGroup.rotation.y = side * 0.2; // 隆起自体の向き
        eyeGroup.position.set(side * 0.6, 0.25, 0.3);
        
        head.add(eyeGroup);
    }

    g.add(head);
    segs.push(head);

    // 2. 後体 (Opisthosoma) [cite: 686-692]
    const body = new THREE.Group();
    body.position.set(0, -0.02, -0.8); 
    
    const bodyShell = new THREE.Mesh(
        new THREE.SphereGeometry(1.0, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2),
        matShell
    );
    bodyShell.scale.set(0.85, 0.35, 1.0); 
    body.add(bodyShell);

    // 側縁棘 [cite: 694-701]
    for (let i = 0; i < 6; i++) {
        for (let side of [-1, 1]) {
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.4, 8), matShell);
            spike.rotation.x = -Math.PI / 2;
            spike.rotation.z = side * (0.2 + i * 0.05); 
            spike.position.set(side * (0.7 - i * 0.05), -0.05, -i * 0.15 + 0.3);
            body.add(spike);
        }
    }
    head.add(body);
    segs.push(body);

    // 3. 尾剣 (Telson) [cite: 707-713]
    const telsonGroup = new THREE.Group();
    telsonGroup.position.z = -1.0; 
    body.add(telsonGroup);
    const telson = new THREE.Mesh(new THREE.ConeGeometry(0.06, 2.0, 8), matShell);
    telson.rotation.x = -Math.PI / 2;
    telson.position.z = -1.0; 
    telsonGroup.add(telson);

    // 4. 【アップデート】 先端の爪（Tarsus）を備えた多関節脚
    const legs = [];
    const numLegs = 7; 
    for (let i = 0; i < numLegs; i++) {
        for (let side of [-1, 1]) {
            const legRoot = new THREE.Group();
            legRoot.position.set(side * (0.3 + i * 0.02), -0.1, 0.5 - i * 0.15);
            
            // 腿関節 (Femur)
            const femur = new THREE.Mesh(femurGeo, matLeg);
            femur.rotation.z = side * -0.2; 
            
            // 脛関節 (Tibia)
            const tibia = new THREE.Mesh(tibiaGeo, matLeg);
            tibia.position.set(0, -0.45, 0); 
            tibia.rotation.z = side * 0.3; 

            // 先節の爪 (Tarsus/Claw) - 海底を引っ掻く
            const claw = new THREE.Mesh(new THREE.ConeGeometry(0.01, 0.08, 4), matLeg);
            claw.position.set(0, -0.4, 0);
            claw.rotation.x = Math.PI; // 下に向ける
            tibia.add(claw);

            femur.add(tibia);
            legRoot.add(femur);
            legRoot.rotation.y = side * (Math.PI / 8); 
            
            head.add(legRoot);
            legs.push({ root: legRoot, femur: femur, tibia: tibia });
        }
    }

    g.userData = { head, body, telson: telsonGroup, legs };
    g.scale.set(0.75, 0.75, 0.75); 
    
    return { mesh: g, segments: segs, type: 'crawl', offset: 0.15 };
}

// ========================================================
// --- アニメーション：ストロークを意識した本物のメタクロナル・ウェーブ ---
// ========================================================
function animateBunstodera(crab, clock) {
    const time = clock.getElapsedTime();
    const { head, body, telson, legs } = crab.userData;

    // 全体のピッチ [cite: 742-744]
    head.position.y = Math.sin(time * 2.5) * 0.015;
    head.rotation.z = Math.sin(time * 1.5) * 0.01; 

    // --- 【アップデート】 歩行の非対称サイクルの導入 ---
    legs.forEach((legData, index) => {
        const phase = index * 0.6; // 前後への波の伝播 [cite: 749]
        const speed = 8.0; 
        
        // -1.0 〜 1.0 の波を作成
        const wave = Math.sin(time * speed - phase);
        
        // 【リカバリーストローク (wave > 0)】: 脚を持ち上げ、大きく曲げて前へ振り出す
        // 【パワーストローク (wave <= 0)】: 地面を捉え、脚を伸ばして後ろへ押し出す
        
        // 前後スイング (歩幅)
        legData.root.rotation.z = wave * 0.25; 
        
        if (wave > 0) {
            // 空中にある時 (持ち上げ & 曲げ)
            legData.root.rotation.x = wave * 0.3; // 腿を高く上げる
            legData.tibia.rotation.x = -wave * 0.6; // 脛を鋭角に曲げて抵抗を減らす
        } else {
            // 地面を蹴る時 (押し下げ & 伸ばし)
            // waveはマイナスなので、反転させて少しだけ地面に押し付ける（サスペンション効果）
            legData.root.rotation.x = wave * 0.05; 
            // 脛はほぼ真っ直ぐ伸ばして力を伝える
            legData.tibia.rotation.x = wave * 0.1; 
        }
    });

    // 後体と尾剣の連動 [cite: 760-766]
    if (body) {
        body.rotation.x = Math.sin(time * 2.5 - 0.5) * 0.03; 
    }
    if (telson) {
        telson.rotation.x = Math.sin(time * 2.5 - 1.0) * 0.08;
        telson.rotation.y = Math.sin(time * 1.2) * 0.05; 
    }
}

function buildBirkenia() {
    const g = new THREE.Group(); 
    const bodyGroup = new THREE.Group();
    g.add(bodyGroup);
     
    // 1. 頭部（円錐よりも、少し丸みのある流線型に）
    const headGeom = new THREE.SphereGeometry(0.3, 16, 16);
    const head = new THREE.Mesh(headGeom, mat(0xaa9988));
    head.scale.set(0.8, 1.2, 1.5); // 左右に薄く、上下に厚く
    head.position.z = 0.8; 
    bodyGroup.add(head);

    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.06), eyeMat);
    eyeL.position.set(0.18, 0.1, 0.2); 
    head.add(eyeL);
    const eyeR = eyeL.clone(); 
    eyeR.position.x = -0.18; 
    head.add(eyeR);
 
    // 2. 胴体 (側扁した紡錘形)
    const torso = new THREE.Mesh(new THREE.SphereGeometry(0.4, 24, 24), mat(0xaa9988));
    // 側扁（左右を0.6に絞り、上下を1.4に強調）させるのがビルケニアらしさのコツです
    torso.scale.set(0.6, 1.4, 2.8); 
    bodyGroup.add(torso);
     
    // 3. 背中のトゲ列（ここもSphereを鋭く伸ばして、有機的な鱗の突起に）
    for(let i=0; i<6; i++) {
        const spineGeom = new THREE.SphereGeometry(0.1, 8, 8);
        const spine = new THREE.Mesh(spineGeom, mat(0xddccbb));
        spine.scale.set(0.2, 1.5, 0.8); // 縦に鋭い
        spine.position.set(0, 0.5, 0.8 - i * 0.45); 
        spine.rotation.x = -0.4;
        bodyGroup.add(spine);
    }
 
    // 4. 尾部 (逆異尾：Hypocercal tail)
    const tailGroup = new THREE.Group(); 
    tailGroup.position.z = -1.4;
    g.add(tailGroup);

    // 尾びれのベース（尾筒）
    const tailStalk = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 12), mat(0xaa9988));
    tailStalk.scale.set(0.4, 0.8, 1.5);
    tailStalk.position.z = -0.4;
    tailGroup.add(tailStalk);
 
    // 【重要】逆異尾の下葉（大きく発達した部分）
    const tailBot = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), mat(0xaa9988));
    tailBot.scale.set(0.1, 1.8, 0.8); // 非常に薄く、下に長く
    tailBot.position.set(0, -0.6, -0.8); 
    tailBot.rotation.x = -0.6; // 斜め下へ
    tailGroup.add(tailBot);

    // 逆異尾の上葉（小さく控えめな部分）
    const tailTop = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), mat(0xaa9988));
    tailTop.scale.set(0.08, 0.8, 0.5); // 下葉よりかなり小さく
    tailTop.position.set(0, 0.2, -0.6); 
    tailTop.rotation.x = 0.4; 
    tailGroup.add(tailTop);
 
    g.userData.body = bodyGroup; 
    g.userData.tail = tailGroup;
    g.scale.set(1.5, 1.5, 1.5);

    return { mesh: g, segments: [], type: 'fish_dunk' }; 
}

function buildPteraspis() {
    const g = new THREE.Group();
    const bodyGroup = new THREE.Group();
    g.add(bodyGroup);

    // 1. 頭部装甲 (装甲らしい重厚感と流線型を両立)
    const headGeom = new THREE.SphereGeometry(0.5, 24, 24); // 分割数を増やして滑らかに
    const head = new THREE.Mesh(headGeom, mat(0xaa9977));
    head.scale.set(1.1, 0.65, 2.0); // 前後にさらに伸ばして流線型に
    head.position.z = 0.6;
    bodyGroup.add(head);

    // 2. 特徴的な「吻 (Rostrum)」
    // ConeよりもSphereを細長く伸ばした方が、生き物の骨格に近い質感になります
    const snoutGeom = new THREE.SphereGeometry(0.25, 16, 16);
    const snout = new THREE.Mesh(snoutGeom, mat(0xaa9977));
    snout.scale.set(0.6, 0.4, 2.5); // 鋭く突き出すように
    snout.position.z = 0.9; 
    head.add(snout);

    // 3. 左右対称パーツ
    for (let side of [-1, 1]) {
        // 目（少し外向きに、かつ埋め込みを調整）
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.07), eyeMat);
        eye.position.set(side * 0.38, 0.05, 0.5);
        head.add(eye);

        // 翼状の突起 (Cornual plate)
        // BoxよりもSphereを平べったくしたほうが「鰭（ひれ）」に見えます
        const wingGeom = new THREE.SphereGeometry(0.3, 12, 12);
        const wing = new THREE.Mesh(wingGeom, mat(0x998866));
        wing.scale.set(1.2, 0.1, 0.8); 
        wing.position.set(side * 0.45, -0.1, -0.3);
        wing.rotation.y = side * 0.5;
        wing.rotation.z = side * 0.2; // 少し角度をつけて、揚力を得そうな形に
        head.add(wing);
    }

    // 4. 胴体（頭部とのつなぎ目を太く、後ろを細く）
    const torsoGeom = new THREE.SphereGeometry(0.5, 24, 24);
    const torso = new THREE.Mesh(torsoGeom, mat(0x998866));
    // 胴体は「涙のしずく」型を意識して、頭と重なるように配置
    torso.scale.set(0.85, 0.6, 2.2);
    torso.position.z = -0.7; 
    bodyGroup.add(torso);

    // 5. 尾部
    const tailGroup = new THREE.Group();
    tailGroup.position.z = -2.1;
    g.add(tailGroup);

    // 尾びれ（Coneの代わりに、上下に引き伸ばしたSphereで有機的な形に）
    const tailFinGeom = new THREE.SphereGeometry(0.5, 16, 16);
    const tailFin = new THREE.Mesh(tailFinGeom, mat(0x998866));
    tailFin.scale.set(0.1, 1.8, 0.6); // 縦に大きく
    tailFin.rotation.x = 0.2; // わずかに傾斜
    tailGroup.add(tailFin);

    // 背びれ（追加するとさらに生き物らしくなります）
    const dorsalFin = new THREE.Mesh(new THREE.SphereGeometry(0.2), mat(0x998866));
    dorsalFin.scale.set(0.1, 0.6, 1.2);
    dorsalFin.position.set(0, 0.4, -0.8);
    bodyGroup.add(dorsalFin);

    g.userData.body = bodyGroup;
    g.userData.tail = tailGroup;
    g.scale.set(1.5, 1.5, 1.5);

    return { mesh: g, segments: [], type: 'fish_dunk' };
}
// --- デボン紀 ---
function buildCheirolepis() {
    const g = new THREE.Group(); 
    const bodyGroup = new THREE.Group();
    g.add(bodyGroup);
    
    // 1. 胴体（条鰭類らしい、やや細身で引き締まった流線型）
    const torsoGeom = new THREE.SphereGeometry(1.0, 24, 16);
    const torso = new THREE.Mesh(torsoGeom, mat(0x556677));
    torso.scale.set(0.6, 1.1, 2.8); // 側扁（左右に薄く）させる
    bodyGroup.add(torso);

    // 2. 頭部（大きく開く顎が特徴）
    const headGroup = new THREE.Group(); 
    headGroup.position.z = 1.8;
    bodyGroup.add(headGroup);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), mat(0x667788));
    head.scale.set(0.8, 0.9, 1.4);
    headGroup.add(head);

    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12), eyeMat); 
    eyeL.position.set(0.35, 0.2, 0.5); 
    headGroup.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = -0.35; headGroup.add(eyeR);

    // 下顎（大きく開く構造を意識）
    const jaw = new THREE.Group(); 
    jaw.position.set(0, -0.2, 0.2);
    headGroup.add(jaw);
    const jawMesh = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 12), mat(0x445566));
    jawMesh.scale.set(0.9, 0.35, 1.6);
    jawMesh.position.z = 0.5;
    jaw.add(jawMesh);
    g.userData.jaw = jaw;

    // 3. 各種のひれ（条鰭類らしく、薄い面として表現）
    for (let side of [-1, 1]) {
        const pec = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 12), mat(0x445566));
        pec.scale.set(0.8, 0.05, 1.0);
        pec.position.set(side * 0.5, -0.4, 0.8);
        pec.rotation.z = side * 1.0;
        pec.rotation.y = side * 0.4;
        bodyGroup.add(pec);
    }

    // 背びれ（後方に位置するのがケイロレピスの特徴）
    const dFin = new THREE.Mesh(new THREE.SphereGeometry(0.5), mat(0x445566));
    dFin.scale.set(0.05, 1.2, 0.8);
    dFin.position.set(0, 0.8, -1.0);
    dFin.rotation.x = -0.4;
    bodyGroup.add(dFin);

    // 4. 尾部 (異尾：Heterocercal tail)
    const tailGroup = new THREE.Group(); 
    tailGroup.position.z = -2.2;
    g.add(tailGroup);

    // 尾筒（尾の付け根）
    const tailStalk = new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 12), mat(0x556677));
    tailStalk.scale.set(0.5, 0.8, 1.8);
    tailStalk.position.z = -0.5;
    tailGroup.add(tailStalk);

    // 【重要】尾びれの上葉（背骨が入り込み、長く伸びる部分）
    const tTop = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), mat(0x445566));
    tTop.scale.set(0.08, 1.8, 0.8); // 薄く、長く
    tTop.position.set(0, 0.7, -1.0); 
    tTop.rotation.x = 0.6; 
    tailGroup.add(tTop);

    // 尾びれの下葉（扇状に広がるひれ）
    const tBot = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), mat(0x445566));
    tBot.scale.set(0.06, 1.0, 0.7); 
    tBot.position.set(0, -0.2, -0.6); 
    tBot.rotation.x = -0.5; 
    tailGroup.add(tBot);

    g.userData.body = bodyGroup;
    g.userData.tail = tailGroup;
    g.scale.set(1.2, 1.2, 1.2);
    return { mesh: g, segments: [], type: 'fish_shark' };
}

function buildEusthenopteron() {
    const g = new THREE.Group();
    const bodyGroup = new THREE.Group();
    g.add(bodyGroup);

    // --- 【修正】共通マテリアル (鱗用) ---
    // flatShadingを取り除き、ツルッとした生々しい流線型の質感を表現
    // 泥や水底を泳ぐため、少しウェットな光沢（metalness/roughness）に調整
    const mat = (color) => new THREE.MeshStandardMaterial({
        color: color, 
        roughness: 0.5, // 0.7から下げて少し濡れた生物感に
        metalness: 0.1
    });

    // 目専用のマテリアル
    const eyeMat = new THREE.MeshStandardMaterial({
        color: 0x111111, // 真っ黒に近い色
        roughness: 0.1,  // ツルツル
        metalness: 0.8   // 濡れたような光沢
    });

    // 1. 胴体（流線形で滑らかなボディ）
    const torso = new THREE.Mesh(new THREE.SphereGeometry(1.0, 32, 24), mat(0x556655));
    torso.scale.set(0.8, 1.0, 3.2); // 少し後ろに長く
    bodyGroup.add(torso);

    // 2. 頭部（両生類へ続く、やや平たい頭骨を意識）
    const headGroup = new THREE.Group();
    headGroup.position.z = 1.9;
    bodyGroup.add(headGroup);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 24, 24), mat(0x556655));
    head.scale.set(1.0, 0.85, 1.4); // 上下を少しだけ潰して平たい顔立ちに
    headGroup.add(head);

    // 左右の目（頭部のやや上側、前方を睨むように）
    for (let side of [-1, 1]) {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
        eye.position.set(side * 0.45, 0.3, 0.4);
        headGroup.add(eye);
    }

    // 3. 下顎
    const jaw = new THREE.Group();
    jaw.position.set(0, -0.2, -0.1);
    headGroup.add(jaw);

    const jawMesh = new THREE.Mesh(new THREE.SphereGeometry(0.7, 24, 16), mat(0x445544));
    jawMesh.scale.set(0.95, 0.35, 1.5);
    jawMesh.position.z = 0.5;
    jaw.add(jawMesh);

    // 4. 肉鰭 (Lobe-fins) - 腕や脚の起源となる筋肉質なヒレ
    const fins = [];
    const createLobeFin = (x, y, z, ry, rz, scaleMult = 1.0) => {
        const f = new THREE.Group();
        f.position.set(x, y, z);
        f.rotation.y = ry;
        f.rotation.z = rz;

        // 関節のベース部分（筋肉のふくらみ）
        const base = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), mat(0x445544));
        base.scale.set(1.0, 2.0, 1.0);
        base.position.y = -0.3;
        f.add(base);

        // ヒレの先端（水掻き部分）
        const fin = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), mat(0x334433));
        fin.position.y = -0.9;
        fin.scale.set(0.6, 2.5, 0.15); // より薄く、しなやかな面に
        f.add(fin);

        f.scale.setScalar(scaleMult);
        f.userData.origRot = f.rotation.clone();
        return f;
    };

    // 胸びれ (Pectoral fins)
    const fL = createLobeFin(0.7, -0.3, 1.0, -0.3, 1.0);
    const fR = createLobeFin(-0.7, -0.3, 1.0, 0.3, -1.0);
    // 腹びれ (Pelvic fins) - 少し小さめ
    const pL = createLobeFin(0.5, -0.3, -1.0, -0.2, 0.8, 0.8);
    const pR = createLobeFin(-0.5, -0.3, -1.0, 0.2, -0.8, 0.8); 

    [fL, fR, pL, pR].forEach(f => { 
        bodyGroup.add(f); 
        fins.push(f); 
    });

    // 5. 【考古学的追加】背びれと尻びれ
    // 第1背びれ（前方）
    const dFin1 = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), mat(0x334433));
    dFin1.scale.set(0.15, 1.5, 1.0);
    dFin1.position.set(0, 0.9, -0.5);
    dFin1.rotation.x = -0.4;
    bodyGroup.add(dFin1);

    // 第2背びれ（後方、尾びれに近い位置）
    const dFin2 = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), mat(0x334433));
    dFin2.scale.set(0.15, 1.8, 1.2);
    dFin2.position.set(0, 0.8, -1.8);
    dFin2.rotation.x = -0.5;
    bodyGroup.add(dFin2);

    // 尻びれ (Anal fin)
    const aFin = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), mat(0x334433));
    aFin.scale.set(0.15, 1.6, 1.0);
    aFin.position.set(0, -0.8, -1.6);
    aFin.rotation.x = 0.5; // 後ろ向きに流れるように
    bodyGroup.add(aFin);

    // 6. 尾部 (原正尾：Diphycercal / 三葉状)
    const tailGroup = new THREE.Group();
    tailGroup.position.z = -3.2; // 胴体を伸ばした分、少し後ろへ
    g.add(tailGroup);

    const createLeaf = (h, pz, py, rx) => {
        const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.4, 24, 16), mat(0x334433));
        leaf.scale.set(0.08, h, 1.8);
        leaf.position.set(0, py, pz);
        leaf.rotation.x = rx;
        return leaf;
    };

    // 三葉状の美しい広がり
    tailGroup.add(createLeaf(0.8, -1.2, 0, 0));        // 中央葉（まっすぐ伸びる）
    tailGroup.add(createLeaf(1.4, -0.8, 0.6, 0.5));    // 上葉
    tailGroup.add(createLeaf(1.4, -0.8, -0.6, -0.5));  // 下葉

    // データ紐付け
    g.userData.body = bodyGroup;
    g.userData.tail = tailGroup;
    g.userData.jaw = jaw;
    g.userData.fins = fins;
    g.scale.set(1.4, 1.4, 1.4);

    return { mesh: g, type: 'fish_lobe' };
}
function buildCoelacanth() {
    const g = new THREE.Group();
    const bodyGroup = new THREE.Group();
    g.add(bodyGroup);

    // 深海や岩礁を思わせるブルーグレー系の滑らかなマテリアル

    jawMesh.scale.set(0.8, 0.4, 1.3);
    jawMesh.position.z = 0.4;
    jaw.add(jawMesh);

    // 4. 肉鰭 (Lobe-fins) - シーラカンスの最大の特徴である「柄（え）」の長いヒレ
    const fins = [];
    const createLobeFin = (x, y, z, ry, rz, scaleMult = 1.0) => {

        base.position.y = -0.4;
        f.add(base);

        // 先端の丸く広いヒレ膜（団扇のように）

        fin.position.y = -1.0;
        fin.scale.set(0.4, 2.0, 1.5); 
        f.add(fin);

        f.scale.setScalar(scaleMult);
        f.userData.origRot = f.rotation.clone();
        return f;
    };

    // 胸びれ
    const fL = createLobeFin(0.6, -0.4, 1.2, -0.2, 0.8);
    const fR = createLobeFin(-0.6, -0.4, 1.2, 0.2, -0.8);
    // 腹びれ
    const pL = createLobeFin(0.5, -0.5, -0.8, -0.1, 0.6, 0.9);

    // 【重要】第2背びれと尻びれも「肉鰭」の構造を持つ
    const dFin2 = createLobeFin(0, 0.8, -1.2, 0, 0, 0.9);
    dFin2.rotation.z = Math.PI; // 上に向ける
    const aFin = createLobeFin(0, -0.8, -1.6, 0, 0, 0.9);

    [fL, fR, pL, pR, dFin2, aFin].forEach(f => { bodyGroup.add(f); fins.push(f); });

    // 【重要】第1背びれ（これだけは肉鰭ではなく、扇状の条鰭）
    const dFin1 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), mat(0x34495e));
    dFin1.scale.set(0.1, 1.8, 1.2);
    dFin1.position.set(0, 1.2, 0.5);
    dFin1.rotation.x = -0.2;
    bodyGroup.add(dFin1);

    // 5. 特徴的な「三葉尾」（上葉・下葉・中央の副尾びれ）
    const tailGroup = new THREE.Group();
    tailGroup.position.z = -3.2;
    g.add(tailGroup);

    const createLeaf = (h, pz, py, rx) => {
        const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 16), mat(0x34495e));
        leaf.scale.set(0.08, h, 1.5);
        leaf.position.set(0, py, pz);
        leaf.rotation.x = rx;
        return leaf;
    };

    tailGroup.add(createLeaf(1.5, -0.8, 0.8, 0.4));    // 上葉
    tailGroup.add(createLeaf(1.5, -0.8, -0.8, -0.4));  // 下葉

    // 中央の副尾びれ（エピカウダル・ローブ：シーラカンスの象徴！）
    const centerLobe = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), mat(0x1f2b38));
    centerLobe.scale.set(0.5, 0.8, 3.0);
    centerLobe.position.set(0, 0, -1.5);

    g.userData.body = bodyGroup;
    g.userData.tail = tailGroup;
    g.userData.jaw = jaw;
    g.userData.fins = fins; 
    g.scale.set(1.4, 1.4, 1.4);

    // ユーステノプテロンと同じアニメーションタイプを流用可能
    return { mesh: g, type: 'fish_lobe' }; 
}

function buildSchinderhannes() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const headGroup = new THREE.Group(); g.add(headGroup);
    
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 12), mat(0x224455));
    head.scale.set(1.0, 0.6, 1.2); headGroup.add(head);

    const mouthGroup = new THREE.Group();
    mouthGroup.position.set(0, -0.4, 0.5); mouthGroup.rotation.x = Math.PI / 2;
    const mouthRing = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.05, 8, 16), mat(0x112233));
    mouthGroup.add(mouthRing); headGroup.add(mouthGroup); g.userData.mouth = mouthGroup;

    for(let side of [-1, 1]) {
        const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.6), mat(0x224455));
        stalk.position.set(0.6*side, 0.2, 0.5); stalk.rotation.z = side * -1.0; headGroup.add(stalk);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.25), eyeMat); 
        eye.position.set(0.9*side, 0.4, 0.5); headGroup.add(eye);
        
        const armBase = new THREE.Group(); armBase.position.set(0.3*side, -0.2, 0.8); headGroup.add(armBase);
        let curr = armBase;
        const armJoints = [];
        for(let k=0; k<4; k++) {
            const joint = new THREE.Group(); joint.position.z = 0.2;
            joint.rotation.x = 0.6; // 丸める
            const part = new THREE.Mesh(new THREE.CylinderGeometry(0.08 - k*0.01, 0.08 - k*0.01, 0.25, 8), mat(0x224455)); 
            part.rotation.x = Math.PI/2; part.position.z = 0.1;
            const spine = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.3), mat(0x112233)); 
            spine.position.set(0, -0.1, 0.1); spine.rotation.x = -0.2;
            joint.add(part, spine); curr.add(joint); curr = joint;
            armJoints.push(joint);
        }
        if(!g.userData.armsBase) g.userData.armsBase = [];
        g.userData.armsBase.push(armJoints);
    }

    for(let i=0; i<10; i++) {
        const s = 1 - (i/10)*0.7; 
        const seg = new THREE.Group(); seg.position.z = -0.6;
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), mat(0x224455)); 
        body.scale.set(1.2*s, 0.6*s, 1.0*s); seg.add(body);
        
        if (i === 0) {
            const fL = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 12), mat(0x336677, 0.2, 0.4)); 
            fL.scale.set(1.5, 0.05, 0.6); fL.position.set(1.5, 0, 0); fL.rotation.y = -0.2; seg.add(fL);
            const fR = fL.clone(); fR.position.x *= -1; fR.rotation.y *= -1; seg.add(fR); 
            seg.userData = { fL, fR };
        } else if (i > 0 && i < 9) {
            const fL = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 12), mat(0x336677, 0.2, 0.4)); 
            fL.scale.set(1.2*s, 0.05, 0.6*s); fL.position.x = 0.8*s + 0.4*s; seg.add(fL);
            const fR = fL.clone(); fR.position.x *= -1; seg.add(fR); 
            seg.userData.btmFin = fL; 
        }
        if (i === 9) {
            const tailSpike = new THREE.Mesh(new THREE.ConeGeometry(0.05, 1.5), mat(0x112233));
            tailSpike.rotation.x = Math.PI/2; tailSpike.position.z = -0.8; seg.add(tailSpike);
        }
        
        parent.add(seg); segs.push(seg); parent = seg;
    }
    g.scale.set(0.8, 0.8, 0.8);
    return { mesh: g, segments: segs, type: 'swim_anomalocaris' };
}

// --- 【古生物×3D造形】 ベリヌス（鋭利な流線形・パドル駆動版） ---
// ========================================================
function buildBelinurus() {
    const g = new THREE.Group();
    const segs = [];
    
    // 【マテリアル】 海底の泥に溶け込む、赤みの強い重装甲
    const matShell = new THREE.MeshStandardMaterial({ 
        color: 0x663a22, // ブンストデラより赤褐色を強調
        roughness: 0.3, // 数値を下げるとツヤが出ます
        metalness: 0.2, // ほんの少しだけ金属光沢を入れると甲羅っぽくなります
        transparent: false,
        depthWrite: true,
        side: THREE.FrontSide
    });

    const matLeg = new THREE.MeshStandardMaterial({ color: 0x3a2211, roughness: 1.0, metalness: 0.0 }); 
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x010101, roughness: 0.2, metalness: 0.4 }); 

    // --- 【有機的な脚パーツ】 先細りのCylinderGeometry ---
    const femurGeo = new THREE.CylinderGeometry(0.025, 0.015, 0.45, 8);
    femurGeo.translate(0, -0.225, 0); 
    const tibiaGeo = new THREE.CylinderGeometry(0.015, 0.008, 0.4, 8);
    tibiaGeo.translate(0, -0.2, 0);
    // パドル脚用：先端が広がる形状
    const paddleGeo = new THREE.CylinderGeometry(0.04, 0.08, 0.6, 8);
    paddleGeo.translate(0, -0.3, 0);

    // 1. 前体 (Prosoma) - 扁平で鋭い流線形 
    const head = new THREE.Group();
    const headShell = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2), 
        matShell
    );
    headShell.scale.set(1.1, 0.35, 1.0); // ブンストデラより横広で平たい 
    head.add(headShell);

    // 【ベリヌスの証明】 長大で鋭い頬棘 (Genal spine) 
    for (let side of [-1, 1]) {
        const genalSpine = new THREE.Mesh(new THREE.ConeGeometry(0.08, 1.4, 8), matShell); 
        genalSpine.rotation.x = -Math.PI / 2; 
        genalSpine.rotation.z = side * 0.15; // 後方へ鋭く伸びる 
        genalSpine.position.set(side * 1.3, 0, -0.4); 
        head.add(genalSpine);
    }

    // --- 【アップデート】 眼瞼隆起と鋭い流線型の複眼 ---
    for (let side of [-1, 1]) {
        const eyeGroup = new THREE.Group();
        
        // 眼瞼隆起：ブンストデラよりも後方に長く引っ張る
        // 円柱で代用。太さ0.06、長さ0.18の形状にします
        const ridge = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.18, 8), matShell);
        ridge.rotation.z = Math.PI / 2;
        ridge.rotation.y = side * 0.3; // より鋭角に

        // 複眼：スピードを感じさせるシャープな楕円
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), eyeMat);
        eye.scale.set(0.5, 1.0, 1.5); 
        eye.position.set(0, 0.05, 0); 
        eye.rotation.y = side * -0.15;

        eyeGroup.add(ridge);
        eyeGroup.add(eye);
        eyeGroup.position.set(side * 0.7, 0.22, 0.2); // 後方に配置 
        head.add(eyeGroup);
    }

    g.add(head); 
    segs.push(head); 

    // 2. 後体 (Opisthosoma) - 完全に融合したシールド
    const body = new THREE.Group();
    body.position.set(0, -0.02, -0.9);  
    
    const bodyShell = new THREE.Mesh(
        new THREE.SphereGeometry(1.1, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2), 
        matShell
    );
    bodyShell.scale.set(0.9, 0.3, 1.1); 
    body.add(bodyShell); 

    // 側縁棘 
    for (let i = 0; i < 5; i++) { 
        for (let side of [-1, 1]) { 
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.6, 8), matShell); 
            spike.rotation.x = -Math.PI / 2; 
            spike.rotation.z = side * (0.2 + i * 0.1);
            spike.position.set(side * (0.8 - i * 0.05), -0.05, -i * 0.2 + 0.2);
            body.add(spike);
        }
    }
    head.add(body); 
    segs.push(body);

    // 3. 尾剣 (Telson) - 長く鋭い槍 
    const telsonGroup = new THREE.Group();
    telsonGroup.position.z = -1.1;
    body.add(telsonGroup); 
    const telson = new THREE.Mesh(new THREE.ConeGeometry(0.06, 2.4, 8), matShell);
    telson.rotation.x = -Math.PI / 2; 
    telson.position.z = -1.2; 
    telsonGroup.add(telson); 

    // 4. 【多関節脚 ＆ パドル脚の有機化】
    const legs = []; 
    const numLegs = 6;
    // --- buildBelinurus 内の脚ループ（決定版） ---
for (let i = 0; i < numLegs; i++) { 
    for (let side of [-1, 1]) { 
        const legRoot = new THREE.Group();
        legRoot.position.set(side * (0.3 + i * 0.02), -0.1, 0.4 - i * 0.18); 
        
        const femur = new THREE.Mesh(femurGeo, matLeg);
        femur.rotation.z = side * -0.4; 
        femur.rotation.x = 0.2; 

        // 【重要】ここでまず tibia を宣言・作成します
        let tibia; 
        if (i === 5) {
            tibia = new THREE.Mesh(paddleGeo, matLeg);
            tibia.scale.set(1.0, 1.0, 0.2);
            tibia.position.set(0, -0.35, 0); 
            tibia.rotation.z = side * 0.6; 
        } else {
            tibia = new THREE.Mesh(tibiaGeo, matLeg);
            tibia.position.set(0, -0.45, 0); 
            tibia.rotation.z = side * 0.5; // ここで角度を設定

            const claw = new THREE.Mesh(new THREE.ConeGeometry(0.01, 0.08, 4), matLeg);
            claw.position.set(0, -0.4, 0);
            claw.rotation.x = Math.PI;
            tibia.add(claw);
        }
        
        // tibia が確実に存在してから add する
        femur.add(tibia); 
        legRoot.add(femur); 
        legRoot.rotation.y = side * (Math.PI / 8); 
        
        head.add(legRoot); 
        legs.push({ root: legRoot, femur: femur, tibia: tibia, isPaddle: (i === 5) }); 
    }
}

    g.userData = { head, body, telson: telsonGroup, legs }; 
    g.scale.set(0.7, 0.7, 0.7); 
    
    return { mesh: g, segments: segs, type: 'crawl', offset: 0.15 };
}

// ========================================================
// --- アニメーション：パドルの流体力学と非対称ストローク ---
// ========================================================
function animateBelinurus(crab, clock) { 
    const time = clock.getElapsedTime(); 
    const { head, body, telson, legs } = crab.userData; 

    // 1. 全体のピッチ（素早く進む前傾姿勢） 
    head.position.y = Math.sin(time * 3.0) * 0.015; 
    head.rotation.z = Math.sin(time * 1.5) * 0.01; 

    // 2. 歩行＆パドル駆動の非対称サイクル 
    legs.forEach((legData, index) => {
        const phase = index * 0.5; 
        const speed = 9.0; // ブンストデラより速いピッチ 
        const wave = Math.sin(time * speed - phase); 
        const waveCos = Math.cos(time * speed - phase); 
        
        if (legData.isPaddle) { 
            // 【パドル脚の流体力学モーション】 
            legData.root.rotation.z = wave * 0.35; // 大きな前後ストローク
            
            if (wave > 0) {
                // リカバリー：水の抵抗を減らすため、刃の向きを進行方向に水平（寝かせる）にする
                legData.tibia.rotation.y = Math.PI / 2;
                legData.root.rotation.x = wave * 0.1; // 少し持ち上げる
                legData.tibia.rotation.x = -wave * 0.4; // 膝を曲げて前へ
            } else {
                // パワーストローク：水を最大限捉えるため、刃を垂直（立てる）にして後ろに掻く
                legData.tibia.rotation.y = 0;
                legData.root.rotation.x = 0; // 下に押し付ける
                legData.tibia.rotation.x = wave * 0.1; // 伸ばす
            }
        } else {
            // 【通常歩行脚の非対称モーション】（ブンストデラで確立したリアルな歩行） [cite= 899]
            legData.root.rotation.z = wave * 0.2; 
            if (wave > 0) {
                // 振り上げ
                legData.root.rotation.x = wave * 0.3;
                legData.tibia.rotation.x = -wave * 0.6;
            } else {
                // 蹴り出し
                legData.root.rotation.x = wave * 0.05;
                legData.tibia.rotation.x = wave * 0.1;
            }
        }
    });

    // 3. 後体と尾剣の連動 
    if (body) { 
        body.rotation.x = Math.sin(time * 3.0 - 0.5) * 0.02; // 癒合した硬い甲羅
    }
    if (telson) { 
        telson.rotation.x = Math.sin(time * 3.0 - 1.0) * 0.05; 
        telson.rotation.y = Math.sin(time * 1.5) * 0.08;
    }
}

function buildDunkleosteus() {

    const matArmor = new THREE.MeshStandardMaterial({
        color: 0x7c7f7d, // 鈍い鉛色
        roughness: 0.7, // ザラつきと鈍い光沢
        metalness: 0.3, // 鈍い反射を強調 [cite: 147]
        transparent: false,
        depthWrite: true
    });

    const matBody = new THREE.MeshStandardMaterial({
        color: 0x3d4742, // 装甲より一段暗い、筋肉質の皮膚 [cite: 152]
        roughness: 0.9,
        metalness: 0.0,
        transparent: false
    });

    const matTooth = new THREE.MeshStandardMaterial({
        color: 0xe0e0d5, // 鈍い骨の色 [cite: 158]
        roughness: 0.5,
        metalness: 0.1, // 骨板にわずかな光沢
    });
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x010101, roughness: 0.1 });

    const fishBodyGroup = new THREE.Group();
    g.add(fishBodyGroup);

    // 1.【生身】胴体とヒレ（より長く、筋肉質に延長）
    const torso = new THREE.Mesh(new THREE.SphereGeometry(1.4, 32, 24), matBody);
    torso.scale.set(0.65, 1.2, 3.5); // 画像のように後方へスッと伸びる形状 [cite: 165]、延長
    torso.position.z = -1.5; // [cite: 166]
    fishBodyGroup.add(torso);

    // 背びれ（画像に見える盛り上がりを追加）
    const dorsalFin = new THREE.Mesh(new THREE.ConeGeometry(0.3, 1.5, 8), matBody);
    dorsalFin.rotation.x = Math.PI / 3; // [cite: 173]
    dorsalFin.position.set(0, 1.6, -1.8); // [cite: 174]
    fishBodyGroup.add(dorsalFin);

    // 胸びれ
    for (let side of [-1, 1]) {
        const pFin = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), matBody);
        pFin.scale.set(1.5, 0.1, 1.8); // [cite: 181]
        pFin.position.set(side * 1.2, 0.5, -0.5); // [cite: 182]
        pFin.rotation.z = side * 0.4; // [cite: 183]
        pFin.rotation.y = side * -0.2; // 水を掻く角度 [cite: 184]
        fishBodyGroup.add(pFin);
    }

    // --- 【アップデート】延長された尾部パーツ ---
    const tailGroup = new THREE.Group();
    tailGroup.position.set(0, 0, -5.0); // 胴体接続部 [cite: 189]
    fishBodyGroup.add(tailGroup);

    // 尾の延長（しなりを生むための節）
    const tailStem = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 12), matBody);
    tailStem.scale.set(0.4, 0.8, 1.5);
    tailStem.position.z = -0.5;
    tailGroup.add(tailStem);

    // 延長された尾びれユニット（支点をさらに後ろに）
    const tailFinGroup = new THREE.Group();
    tailFinGroup.position.set(0, 0, -1.8); // tailStemからさらに離す
    tailStem.add(tailFinGroup);

    // 【アップデート】楕円を用いた洗練された異尾びれ
    // 上葉（サメのように長く、力強い）
    const tailFinUpper = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 16), matBody);
    tailFinUpper.scale.set(0.08, 2.5, 1.5); // 上下に長く、薄い楕円
    tailFinUpper.rotation.x = -Math.PI / 6; // 上向きの角度
    tailFinUpper.position.set(0, 1.0, -0.5);
    tailFinGroup.add(tailFinUpper);

    // 下葉（推進力を安定させる）
    const tailFinLower = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 12), matBody);
    tailFinLower.scale.set(0.08, 1.8, 1.2); // 上葉より小さく、薄い楕円
    tailFinLower.rotation.x = Math.PI / 4; // 下向きの角度
    tailFinLower.position.set(0, -0.8, -0.2);
    tailFinGroup.add(tailFinLower);

    // 2.【生身】下顎ユニット
    const jawGroup = new THREE.Group();
    jawGroup.position.set(0, -0.6, 1.5); // [cite: 205]
    fishBodyGroup.add(jawGroup);

    const jawBase = new THREE.Mesh(new THREE.SphereGeometry(1.2, 24, 16), matArmor); // 下顎も装甲化 [cite: 207]
    jawBase.scale.set(0.8, 0.4, 1.4); // [cite: 208]
    jawBase.position.set(0, -0.2, 0.5); // [cite: 209]
    jawGroup.add(jawBase);

    // 下顎の骨板（牙ではなくハサミの刃）
    const toothGeom = new THREE.ConeGeometry(0.25, 1.8, 16); // [cite: 212]
    for (let side of [-1, 1]) {
        const lTooth = new THREE.Mesh(toothGeom, matTooth);
        lTooth.position.set(side * 0.5, 0.5, 1.8); // [cite: 216]
        lTooth.rotation.x = 0.5; // 前方に傾ける 
        // わずかに内側に傾けて、上顎装甲の内側に入り込むように配置
        lTooth.rotation.z = side * 0.1;
        jawGroup.add(lTooth);
    }

    // 3.【装甲】頭部仮面（滑らかな流線形と牙の自己研磨式の噛み合わせ）
    const maskGroup = new THREE.Group();
    maskGroup.position.set(0, 0.8, 1.5); // [cite: 221]
    g.add(maskGroup);

    const skullPlate = new THREE.Mesh(new THREE.SphereGeometry(2.0, 16, 16), matArmor); // [cite: 223]
    skullPlate.scale.set(0.85, 0.9, 1.1); // [cite: 224]
    skullPlate.position.z = 0.5; // [cite: 225]
    maskGroup.add(skullPlate);

    // 【こだわり】装甲の継ぎ目（胸甲と頭甲の関節部）を表現するパーツを追加
    const nuchalPlate = new THREE.Mesh(new THREE.SphereGeometry(2.1, 16, 12), matArmor);
    nuchalPlate.scale.set(0.9, 0.6, 1.2);
    nuchalPlate.position.set(0, -0.4, -0.2);
    nuchalPlate.rotation.x = Math.PI / 8;
    maskGroup.add(nuchalPlate);

    for (let side of [-1, 1]) {
        // [cite: 228] BoxからSphereへ変更し、積み木感を無くして生物らしい流線型の頬装甲へ
        const cheek = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), matArmor); // [cite: 229]
        cheek.scale.set(0.4, 1.2, 1.4); // [cite: 233]
        cheek.position.set(side * 1.5, -0.5, 0.5); // [cite: 234]
        cheek.rotation.z = side * 0.2; // [cite: 235]
        maskGroup.add(cheek);

        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), eyeMat); // [cite: 237]
        eye.position.set(side * 1.5, 0.3, 1.2); // [cite: 238]
        maskGroup.add(eye);

        // --- 【修正版】上顎の骨板（牙）：先端を下向きにする ---
        const uTooth = new THREE.Mesh(toothGeom, matTooth);
        uTooth.scale.set(0.8, 1.0, 1.0); // わずかに扁平にして「刃」の質感へ

        // 1. 位置の調整（cheek装甲の「内側」から下へ突き出すように）
        // Z位置を少し前に出すと、下あごとの噛み合わせが綺麗になります
        uTooth.position.set(side * 0.8, -0.8, 1.9);

        // 2. 【重要】角度の修正：Math.PI で上下を完全に反転させます
        uTooth.rotation.x = Math.PI; 

        // 3. 噛み合わせの微調整
        // わずかに後方（0.2）へ傾け、下顎とハサミのように交差する角度にします
        uTooth.rotation.x += 0.2; 
        // わずかに内側に傾けて、下あごを外側から包み込むようにします
        uTooth.rotation.z = side * -0.1;

        maskGroup.add(uTooth);
    }

    g.userData = { body: fishBodyGroup, jaw: jawGroup, head: maskGroup, tailStem, tailFin: tailFinGroup };
    g.scale.set(1.5, 1.5, 1.5); // [cite: 244]

    return { mesh: g, type: 'fish_dunk' };
}

// --- アニメーション：ゆったりと、しかし力強い「王者」の泳ぎ ---
// ========================================================
function animateDunkleosteus(fish, clock) {
    const time = clock.getElapsedTime();
    const data = fish.userData;

    // 1. 全体のうねり（重装甲なので頭部はあまりブレさせない）
    const slowWave = Math.sin(time * 2.0); // 少しだけ力強く
    fish.rotation.y = slowWave * 0.03; 
    fish.position.y += Math.cos(time * 1.2) * 0.005; 

    // 2. 尾びれの力強い推進
    if (data.tail) {
        data.tail.rotation.y = Math.sin(time * 2.0 - 1.2) * 0.4;
    }

    // 3. ギロチン・ジョー（元の優れたロジックをそのまま使用）
    const jawCycle = (time * 0.5) % 1.0;
    let jawOpen = 0;
    if (jawCycle < 0.8) { // 0.8秒かけて開く [cite: 120]
        jawOpen = Math.pow(jawCycle / 0.8, 2);
    } else { // 0.2秒で閉じる [cite: 123-125]
        jawOpen = 1.0 - (jawCycle - 0.8) / 0.2;
    }

    const maxJawAngle = 0.6; // 少しだけ開口角を広げて迫力アップ
    if (data.jaw) data.jaw.rotation.x = jawOpen * maxJawAngle; // 顎を下げる
    if (data.head) data.head.rotation.x = -jawOpen * (maxJawAngle * 0.3); // 頭甲を少し上げる（板皮類特有の関節）

    // 4. 胸びれのバランス調整
    data.body.children.forEach(child => {
        if (child.geometry.type === "SphereGeometry" && child.scale.y < 0.2) { 
            child.rotation.x = Math.sin(time * 2.0) * 0.15; // 力強く水をかく
        }
    });
}

function buildCoccosteus() {
    const g = new THREE.Group();

    // マテリアル（アースカラー維持）
    const matArmor = new THREE.MeshStandardMaterial({
        color: 0x5b7056, roughness: 0.6, metalness: 0.4,
    });
    const matBody = new THREE.MeshStandardMaterial({
        color: 0x4a3b32, roughness: 0.9, metalness: 0.0,
    });
    const matTooth = new THREE.MeshStandardMaterial({
        color: 0xd0d0c8, roughness: 0.4, metalness: 0.2,
    });
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.9 });

    const fishBodyGroup = new THREE.Group();
    g.add(fishBodyGroup);

    // 1. 【胴体】
    const torso = new THREE.Mesh(new THREE.SphereGeometry(1.0, 24, 20), matArmor);
    torso.scale.set(0.7, 0.8, 1.8);
    fishBodyGroup.add(torso);

    // 1. 【ここが重要！】ヒレを格納するための空の配列を先に定義する
const fins = []; 

// 2. 胸びれの作成ループ
for (let side of [-1, 1]) {
    const pecFin = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), matBody);
    pecFin.scale.set(0.8, 0.1, 1.5);
    pecFin.position.set(side * 0.7, -0.2, 0.5);
    pecFin.rotation.y = side * -0.3;
    pecFin.rotation.x = -0.2;
    
    fishBodyGroup.add(pecFin);
    
    // 作ったヒレを配列に追加する
    fins.push(pecFin); 
}

    // 2. 【頭甲】
    const headGroup = new THREE.Group();
    headGroup.position.set(0, 0.2, 1.5);
    fishBodyGroup.add(headGroup);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 20, 16), matArmor);
    head.scale.set(0.7, 0.5, 1.2); 
    head.rotation.x = -0.1; 
    headGroup.add(head);

    // 目
    for (let side of [-1, 1]) {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), eyeMat);
        eye.position.set(side * 0.45, 0.15, 0.5);
        headGroup.add(eye);
    }

    // --- 【修正3】 上顎（牙）：左右に分割し、尖りを「下」へ向ける ---
    for (let side of [-1, 1]) {
        const upperTooth = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.35, 4), matTooth);
        // Z軸スケールを潰して「円錐」から「ブレード（刃）」にする
        upperTooth.scale.set(1.0, 1.0, 0.4); 
        upperTooth.rotation.x = Math.PI; // 180度回転させて先端を「真下」に向ける！
        upperTooth.rotation.y = Math.PI / 4; // 刃の向きを少し斜めに
        upperTooth.position.set(side * 0.25, -0.3, 0.7); // 左右に配置、頭甲の下に格納
        headGroup.add(upperTooth);
    }

    // 3. 【下顎】
    const jawGroup = new THREE.Group();
    jawGroup.position.set(0, -0.2, -0.2); 
    headGroup.add(jawGroup);

    const lowerJaw = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 12), matArmor);
    lowerJaw.scale.set(0.6, 0.2, 1.0);
    lowerJaw.position.set(0, -0.1, 0.6);
    jawGroup.add(lowerJaw);

    // --- 【修正3】 下顎（牙）：左右に分割し、尖りを「上」へ向ける ---
    for (let side of [-1, 1]) {
        const lowerTooth = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.35, 4), matTooth);
        lowerTooth.scale.set(1.0, 1.0, 0.4); // こちらもブレード化
        // ConeGeometryはデフォルトで上（+Y）を向くのでrotation.xはそのまま0でOK
        lowerTooth.rotation.y = Math.PI / 4;
        lowerTooth.position.set(side * 0.22, 0.15, 1.25); // 下顎の先端、左右に配置
        jawGroup.add(lowerTooth);
    }

    // 4. 【尾部】
    const tailGroup = new THREE.Group();
    tailGroup.position.z = -1.5;
    fishBodyGroup.add(tailGroup);

    const tailStem = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.1, 2.5, 16), matBody);
    tailStem.rotation.x = Math.PI / 2;
    tailStem.position.z = -1.25;
    tailGroup.add(tailStem);

    // 背びれ
    const dorsalFin = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.8, 8), matBody);
    dorsalFin.position.set(0, 0.8, -0.5);
    dorsalFin.rotation.x = -0.5;
    fishBodyGroup.add(dorsalFin);

    // --- 【修正2】 尾びれ（Tail Fin）：トゲを廃止し、扁平なヒレに ---
    const tailFin = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), matBody);
    tailFin.scale.set(0.1, 1.5, 2.5); // 薄く、高く、長く引き伸ばす
    tailFin.position.set(0, 0.2, -2.3); // 尾の先端・やや上寄りに配置
    tailGroup.add(tailFin);

    g.userData = {
        body: fishBodyGroup,
        head: headGroup,
        jaw: jawGroup,
        tail: tailGroup,
        fins: fins, // 追加：これでアニメーション側から触れるようになる
        type: 'coccosteus' 
    };

    return { mesh: g, type: 'coccosteus' };
}

// --- 【完全版】コッコテウスのアニメーション ---
function animateCoccosteus(mesh, clock) {
    if (!mesh || !mesh.userData) return;
    
    // clockがオブジェクトか数値か両対応する安全設計
    const time = (typeof clock === 'object' && clock.getElapsedTime) 
                 ? clock.getElapsedTime() 
                 : (typeof clock === 'number' ? clock : 0);
                 
    const data = mesh.userData;

    // 1. 全体のうねり（ダンクルより周期が速く、振幅も大きいキビキビとした動き）
    // サイン波 $y = \sin(t \times 4.0)$ で高回転な遊泳を表現
    const fastWave = Math.sin(time * 4.0);
    mesh.rotation.y = fastWave * 0.06;
    mesh.position.y += Math.cos(time * 3.0) * 0.008; // 上下の微細な揺れ

    // 2. 尾びれの連動（しなやかな鞭のような動き）
    if (data.tail) {
        // 全体のうねりから位相をずらすことで、波が後ろに伝わる表現
        data.tail.rotation.y = Math.sin(time * 4.0 - 1.5) * 0.35;
    }

    // 3. 顎の開閉（ハンターらしい、小刻みで鋭いスナップ）
    if (data.jaw) {
        // 周期的な噛みつき: 1.5秒に1回、鋭く開いて閉じる
        const jawCycle = (time * 1.5) % 1.0;
        // jawCycleが0.8以上の時だけ口を開く（素早いパカッという動き）
        let jawOpen = 0;
        if (jawCycle > 0.8) {
            jawOpen = Math.sin((jawCycle - 0.8) * 5 * Math.PI); 
        }
        // 下顎を下げる（マイナス回転）
        data.jaw.rotation.x = -Math.max(0, jawOpen) * 0.4;
        // 水流による細かな揺れ
        data.body.position.y += Math.sin(time * 1.2) * 0.003;
    
        // 4. 【追加】胸びれのパタパタ運動
        if (data.fins) {
            data.fins.forEach((fin, index) => {
                // index 0 が左、1 が右。左右で動きを同期させる
                // Z軸を回転させて、上下に羽ばたくような動きにする
                fin.rotation.z = Math.sin(time * 3.0) * 0.2;
            });
        }
    }    
}
