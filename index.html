<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian Abyss - Serene Marine Snow Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000407; font-family: 'Consolas', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 25px; right: 25px; width: 320px; padding: 25px;
            background: rgba(0, 15, 30, 0.9); border-left: 5px solid #00f0ff; border-radius: 4px;
            color: #fff; display: none; pointer-events: none; z-index: 1000;
        }
        .hud { position: absolute; bottom: 20px; left: 20px; color: #00f0ff; font-size: 11px; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 0.7em; color: #00f0ff; margin-bottom: 8px;">OBSERVATION LOG // CALM MODE</div>
        <h2 id="name" style="margin:0;font-size:1.6em;"></h2>
        <p id="desc" style="margin-top:15px;font-size:0.9em;line-height:1.8;color:#b2dfdb;"></p>
    </div>
    <div class="hud">DEEP SEA AMBIENCE // WHEEL TO ZOOM // CLICK TO FEED</div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        
        let w, h, creatures = [], foods = [], plants = [], particles = [], dusts = [], zoom = 1.2;
        let mx = 0, my = 0, target = null, lightHue = 190;

        const BIO = {
            anomalo: { name: "ANOMALOCARIS", desc: "ゆったりと中層を漂う王者の風格。13対の鰭（ひれ）が連動して描く波紋は、深海の芸術です。" },
            opabinia: { name: "OPABINIA", desc: "5つの目で穏やかに周囲を監視。長いノズルは水流に身を任せるようにユラユラと動きます。" },
            wiwaxia: { name: "WIWAXIA", desc: "海底の宝石。移動すると、その硬い鱗が砂を僅かに巻き上げ、美しい砂ぼこりを作ります。" },
            halluci: { name: "HALLUCIGENIA", desc: "トゲと脚の不思議なリズム。一歩進むごとに海底の粒子がふわりと舞い上がります。" },
            trilo: { name: "TRILOBITE", desc: "砂を掻き分けて進む海底の開拓者。ライトに照らされた砂ぼこりの中を進む姿が印象的です。" },
            pikaia: { name: "PIKAIA", desc: "しなやかな尾を振り、マリンスノーを避けながら泳ぐ、私たちの静かな祖先です。" },
            choia: { name: "CHOIA", desc: "動かないトゲの島。マリンスノーがその長いトゲに降り積もる様子は、深海の雪景色のようです。" }
        };

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        window.addEventListener('mousedown', e => {
            foods.push({x: (e.clientX - w/2)/zoom + (target ? target.x : 0), y: (e.clientY - h/2)/zoom + (target ? target.y : 0), vy: 0.8});
        });
        window.addEventListener('wheel', e => { zoom = Math.max(0.4, Math.min(4, zoom - e.deltaY * 0.0008)); }, {passive:true});
        resize();

        // マリンスノーの初期化
        for(let i=0; i<150; i++) particles.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2, v: 0.2+Math.random()*0.5 });
        
        class Creature {
            constructor(type) {
                this.type = type;
                this.isBenthic = ['wiwaxia', 'halluci', 'trilo'].includes(type);
                this.spawn();
            }
            spawn() {
                this.z = Math.random() * 800;
                this.x = Math.random() * 3000 - 1500;
                this.y = this.isBenthic ? 350 + Math.random()*50 : Math.random()*500 - 250;
                this.vx = (Math.random()-0.5)*1.2; this.vy = (Math.random()-0.5)*0.2;
                this.sizeBase = { anomalo:130, opabinia:90, wiwaxia:75, halluci:55, trilo:50, pikaia:70 }[this.type];
            }
            update(t) {
                // エサへの非常にゆっくりとした集餌
                if(foods.length > 0) {
                    let f = foods[0];
                    let dx = f.x - this.x, dy = f.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if(!this.isBenthic || f.y > 300) {
                        if(dist < 800) {
                            this.vx += dx * 0.001; this.vy += dy * 0.001;
                            if(dist < 20) foods.shift();
                        }
                    }
                }
                this.vx *= 0.99; this.vy *= 0.99; // 強い水圧抵抗
                this.x += this.vx; this.y += this.vy;
                if(this.isBenthic && Math.abs(this.vx) > 0.3 && Math.random() < 0.1) {
                    // 砂ぼこり発生
                    dusts.push({ x: this.x, y: this.y + 30, vx: -this.vx*0.5, vy: -0.2, life: 1 });
                }
                if(this.x > 2000) this.x = -2000; if(this.x < -2000) this.x = 2000;
            }
            draw(camX, camY, t) {
                const p = 600 / (600 + this.z);
                this.sx = (this.x - camX) * p * zoom + w/2;
                this.sy = (this.y - camY) * p * zoom + h/2 + 150*zoom;
                const s = this.sizeBase * p * zoom;
                this.sr = s;
                const light = Math.max(0, 1 - Math.hypot(this.sx - mx, this.sy - my) / (320 * zoom));

                ctx.save(); ctx.translate(this.sx, this.sy); ctx.scale(this.vx > 0 ? 1 : -1, 1);
                ctx.globalAlpha = Math.max(0.1, p);
                this.render(s, light, t); ctx.restore();
            }
            render(s, light, t) {
                const hCol = `hsla(${lightHue}, 100%, 85%, ${light})`;
                ctx.shadowBlur = 20 * light; ctx.shadowColor = hCol;
                if(this.type === 'anomalo') {
                    let g = ctx.createLinearGradient(-s,0,s,0); g.addColorStop(0,'#3e0000'); g.addColorStop(0.5,'#b71c1c'); g.addColorStop(1,'#ff8a65');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.35,0,0,7); ctx.fill();
                    for(let i=0; i<13; i++){
                        ctx.fillStyle = `rgba(255, 112, 67, ${0.3 + light*0.5})`;
                        let fh = s*0.4 + Math.sin(t*4 + i*0.7)*s*0.2;
                        ctx.beginPath(); ctx.ellipse(-s*0.8+i*s*0.13, s*0.25, s*0.1, fh, 0.2,0,7); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(-s*0.8+i*s*0.13, -s*0.25, s*0.1, fh, -0.2,0,7); ctx.fill();
                    }
                } else if(this.type === 'trilo') {
                    ctx.fillStyle = '#263238'; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.6,0,0,7); ctx.fill();
                    ctx.strokeStyle = hCol; ctx.lineWidth = 1;
                    for(let i=0; i<8; i++){ ctx.beginPath(); ctx.moveTo(-s*0.6+i*s*0.15, s*0.3); ctx.lineTo(-s*0.6+i*s*0.15+Math.sin(t*10+i)*5, s*0.5); ctx.stroke(); }
                } else if(this.type === 'wiwaxia') {
                    ctx.fillStyle = '#4e342e'; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.7,0,0,7); ctx.fill();
                    for(let i=0; i<20; i++){
                        let a = -Math.PI + i*0.32; ctx.strokeStyle = `hsla(30, 30%, ${30+light*50}%, 1)`; ctx.lineWidth=2;
                        ctx.beginPath(); ctx.moveTo(Math.cos(a)*s*0.5, Math.sin(a)*s*0.3); ctx.lineTo(Math.cos(a)*s*0.9, Math.sin(a)*s*1.2); ctx.stroke();
                    }
                } else if(this.type === 'pikaia') {
                    ctx.fillStyle = `rgba(178, 235, 242, ${0.2+light*0.6})`; ctx.beginPath(); ctx.moveTo(-s,0);
                    for(let i=-s; i<s; i+=10) ctx.lineTo(i, Math.sin(t*5 + i*0.1)*s*0.2);
                    ctx.lineTo(s,0); ctx.fill();
                } else {
                    ctx.fillStyle = '#1b5e20'; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.3,0,0,7); ctx.fill();
                }
            }
        }

        // 初期化
        ['anomalo','opabinia','wiwaxia','halluci', 'trilo','pikaia'].forEach(t => { for(let i=0; i<4; i++) creatures.push(new Creature(t)); });

        function loop() {
            ctx.fillStyle = '#00060c'; ctx.fillRect(0,0,w,h);
            const t = performance.now() * 0.001;
            const camX = target ? target.x : 0;
            const camY = target ? target.y : 0;

            // マリンスノーの描画
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            particles.forEach(p => {
                p.y += p.v; p.x += Math.sin(t + p.y*0.01)*0.2;
                if(p.y > h) p.y = -10;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });

            // サーチライト
            const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 350 * zoom);
            grad.addColorStop(0, `hsla(${lightHue}, 100%, 75%, 0.1)`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

            // 砂ぼこりの描画
            dusts = dusts.filter(d => d.life > 0);
            dusts.forEach(d => {
                d.x += d.vx; d.y += d.vy; d.life -= 0.005;
                const p = 600 / (600 + 400); // 海底付近の奥行き固定
                const dsx = (d.x - camX) * p * zoom + w/2;
                const dsy = (d.y - camY) * p * zoom + h/2 + 150*zoom;
                const dist = Math.hypot(dsx - mx, dsy - my);
                const l = Math.max(0, 1 - dist/(300*zoom));
                ctx.fillStyle = `rgba(${100 + l*100}, ${100 + l*100}, ${80 + l*50}, ${d.life * 0.2})`;
                ctx.beginPath(); ctx.arc(dsx, dsy, 15*p*zoom* (2-d.life), 0, 7); ctx.fill();
            });

            // エサ
            foods.forEach(f => {
                f.y += 0.8; const fx = (f.x-camX)*zoom+w/2, fy = (f.y-camY)*zoom+h/2+150*zoom;
                ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(fx, fy, 4*zoom, 0, 7); ctx.fill();
            });

            creatures.sort((a,b) => b.z - a.z).forEach(c => {
                c.update(t); c.draw(camX, camY, t);
                if(Math.hypot(mx - c.sx, my - c.sy) < c.sr) {
                    ui.style.display='block'; document.getElementById('name').innerText=BIO[c.type].name; document.getElementById('desc').innerText=BIO[c.type].desc;
                }
            });
            if (!creatures.some(c => Math.hypot(mx - c.sx, my - c.sy) < c.sr)) ui.style.display='none';

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
