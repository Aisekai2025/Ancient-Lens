<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Lens v4.0: Deep Sea</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000b1a; font-family: monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(0,20,40,0.9); padding: 15px; border: 1px solid #0f0; z-index: 100; }
        #info-panel { position: absolute; right: -320px; top: 50%; transform: translateY(-50%); width: 250px; background: rgba(0,20,40,1); border: 1px solid #0f0; padding: 20px; transition: 0.5s; z-index: 100; }
        #info-panel.active { right: 20px; }
        button { background: #0f0; border: none; color: #000; padding: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
    <h1 style="margin:0; font-size: 1.2em;">ANCIENT LENS v4.0</h1>
    <div id="era-label">ERA: CAMBRIAN</div>
    <p style="font-size: 10px; color: #8f8;">Deep Sea Update (Sessile Organisms)</p>
</div>
<div id="controls">
    <label>CHRONO-SLIDER</label><br>
    <input type="range" id="time-slider" min="0" max="100" value="0" style="width:100%;">
    <button id="hallucigenia-btn">FLIP HALLUCIGENIA</button>
</div>
<div id="info-panel"><h2 id="creature-name">---</h2><p id="creature-desc"></p><hr style="border:0; border-top:1px solid #0f0;"><p id="research-note" style="font-size: 0.8em; color: #8f8;"></p></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0, eraVal = 0, isModernView = true;

    const creatureData = {
        'anomalocaris': { name: "アノマロカリス", desc: "13対のひれを持つ最強の捕食者。", research: "ひれを波打たせて優雅に泳いでいたことが判明しています。" },
        'hallucigenia': { name: "ハルキゲニア", desc: "棘を持つ奇妙な生物。", research: "先端に小さな頭があることが最近の研究で確定しました。" },
        'dinomischus': { name: "ディノミスクス", desc: "海底に生える花のような動物。", research: "茎の先のカップの中に口と肛門がある、独立した系統の動物です。" }
    };

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // 1. 海底の動物（ディノミスクス）の描画
    function drawSessile(t) {
        for(let i=0; i<6; i++) {
            const x = (width/2 - 400) + i * 160;
            const y = height/2 + 180;
            const wave = Math.sin(t * 0.5 + i);
            ctx.strokeStyle = '#4a5d23'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.quadraticCurveTo(x + wave * 20, y - 60, x + wave * 10, y - 100);
            ctx.stroke();
            // カップ状の本体
            ctx.fillStyle = '#6b4226'; ctx.beginPath();
            ctx.ellipse(x + wave * 10, y - 100, 15, 10, wave * 0.1, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // 2. アノマロカリス（リアルな13対のひれ）
    function drawAnomalocaris(x, y, scale, t) {
        ctx.save();
        ctx.translate(x, y + Math.sin(t) * 25);
        ctx.rotate(Math.sin(t * 0.3) * 0.05);
        const color = eraVal > 0.5 ? '#446688' : '#cc4444';

        // 側面のひれ（波打つ動き）
        for(let i=0; i<13; i++) {
            const offset = (i * 12 - 70) * scale;
            const flapWave = Math.sin(t * 2.5 - i * 0.6) * (15 * scale);
            ctx.fillStyle = color + 'aa';
            ctx.beginPath();
            ctx.ellipse(offset, flapWave, 10 * scale, 35 * scale, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        // ボディ本体
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.ellipse(0, 0, 85 * scale, 28 * scale, 0, 0, Math.PI * 2); ctx.fill();
        // 複眼
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(65 * scale, -30 * scale, 10 * scale, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(65 * scale, 30 * scale, 10 * scale, 0, Math.PI * 2); ctx.fill();
        // 付属肢
        ctx.strokeStyle = eraVal > 0.5 ? '#335577' : '#aa3333'; ctx.lineWidth = 12 * scale;
        const armWave = Math.sin(t * 3);
        ctx.beginPath(); ctx.moveTo(60 * scale, 10 * scale);
        ctx.quadraticCurveTo(120 * scale, (20 + armWave * 30) * scale, 100 * scale, (60 + armWave * 15) * scale);
        ctx.stroke();
        ctx.restore();
    }

    function drawHallucigenia(x, y, scale, t) {
        ctx.save();
        ctx.translate(x + Math.sin(t * 0.5) * 40, y + 100);
        if (!isModernView) ctx.scale(1, -1);
        ctx.fillStyle = '#bb88ff'; ctx.beginPath(); ctx.ellipse(0, 0, 65 * scale, 12 * scale, 0, 0, Math.PI * 2); ctx.fill();
        for (let i = 0; i < 7; i++) {
            const px = (i * 18 - 50) * scale;
            ctx.strokeStyle = '#eee'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(px, -5 * scale); ctx.lineTo(px, -45 * scale); ctx.stroke();
            ctx.strokeStyle = '#84a'; ctx.beginPath(); ctx.moveTo(px, 5 * scale); ctx.lineTo(px + Math.sin(t * 3 + i) * 10, 35 * scale); ctx.stroke();
        }
        ctx.restore();
    }

    function animate() {
        time += 0.04;
        const bgB = Math.floor(26 + eraVal * 40);
        ctx.fillStyle = `rgb(0, 11, ${bgB})`; ctx.fillRect(0, 0, width, height);

        // 背景：砂紋（しましま）
        ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 40;
        for(let i=0; i<10; i++) {
            ctx.beginPath(); ctx.moveTo(0, height/2 + 100 + i*20); ctx.lineTo(width, height/2 + 120 + i*20); ctx.stroke();
        }

        drawSessile(time);
        drawAnomalocaris(width/2 - 120, height/2, 1 + eraVal * 0.5, time);
        drawHallucigenia(width/2 + 220, height/2, 1, time);

        requestAnimationFrame(animate);
    }

    document.getElementById('hallucigenia-btn').onclick = () => { isModernView = !isModernView; };
    document.getElementById('time-slider').oninput = (e) => {
        eraVal = e.target.value / 100;
        document.getElementById('era-label').innerText = eraVal > 0.5 ? "ERA: ORDOVICIAN" : "ERA: CAMBRIAN";
    };
    canvas.addEventListener('mousedown', (e) => {
        const mx = e.clientX, my = e.clientY;
        let type = mx < width/2 ? 'anomalocaris' : 'hallucigenia';
        if (my > height/2 + 100) type = 'dinomischus';
        const data = creatureData[type];
        document.getElementById('creature-name').innerText = data.name;
        document.getElementById('creature-desc').innerText = data.desc;
        document.getElementById('research-note').innerText = data.research;
        document.getElementById('info-panel').classList.add('active');
        setTimeout(() => document.getElementById('info-panel').classList.remove('active'), 4000);
    });

    animate();
</script>
</body>
</html>
