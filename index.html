<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ANCIENT LENS 3D: PURE BIOLOGICAL</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000208; font-family: 'Georgia', serif; color: #fff; }
        #ui { position: absolute; top: 25px; left: 25px; z-index: 100; pointer-events: none; }
        #overlay { position: absolute; bottom: 25px; left: 25px; font-size: 10px; opacity: 0.4; letter-spacing: 2px; color: #aab; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>
<div id="ui">
    <h1 style="margin:0; font-size: 1.2em; letter-spacing: 4px; color: #eee; font-style: italic;">Biological Reconstruction</h1>
    <p style="font-size: 10px; color: #aab;">Anomalocaris / Burgess Shale Archive</p>
</div>
<div id="overlay">ORIGINAL RENDER ENGINE v10.0 / BIOLOGICAL TEXTURING</div>
<canvas id="view"></canvas>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let width, height, angleX = 0.4, angleY = 0.8, zoom = 1.4, time = 0;
    let isDragging = false, lastX, lastY;

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function project(x, y, z) {
        let nx = x * Math.cos(angleY) + z * Math.sin(angleY);
        let nz = -x * Math.sin(angleY) + z * Math.cos(angleY);
        let ny = y * Math.cos(angleX) - nz * Math.sin(angleX);
        let fz = y * Math.sin(angleX) + nz * Math.cos(angleX);
        const p = Math.max(0.1, (fz + 18) / 18) * zoom;
        return { x: width/2 + nx * 270 * p, y: height/2 + ny * 270 * p, z: fz, scale: p };
    }

    function draw() {
        time += 0.018;
        // 背景：深海（非常に深い紺色）
        const bg = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
        bg.addColorStop(0, '#000b1a'); bg.addColorStop(1, '#000103');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);

        let drawList = [];

        // 1. 胴体：有機的なセグメント（各節を球体グラデーションで表現）
        for(let i=0; i<16; i++) {
            const z = (i * 0.36) - 2.8;
            const r = Math.max(0.1, (Math.sin(i * 0.22 + 0.5) * 0.52 + 0.08) * (i > 13 ? 0.4 : 1));
            const p = project(0, Math.sin(time*0.4 + i*0.12)*0.08, z);
            drawList.push({ type:'body', p:p, r:r, z:p.z, i:i });
        }

        // 2. 鰭（ひれ）：画像のような複雑な重なりと構造色
        for(let i=0; i<13; i++) {
            const z = (i * 0.34) - 2.4;
            const phase = time * 2.2 - i * 0.55;
            const wave = Math.sin(phase) * 0.35;
            [1, -1].forEach(side => {
                const p1 = project(0.25 * side, 0, z);
                const p2 = project(1.4 * side, wave, z + Math.cos(phase)*0.15);
                drawList.push({ type:'flap', p1:p1, p2:p2, z:(p1.z+p2.z)/2, side:side, i:i });
            });
        }

        // 3. 付属肢（腕）：トゲのシルエットを含む
        [1, -1].forEach(side => {
            const r = project(0.2 * side, 0.1, 2.3);
            const m = project(0.55 * side, 0.7 + Math.sin(time*2.2)*0.25, 2.8);
            const t = project(0.45 * side, 1.4 + Math.sin(time*2.4)*0.35, 3.3);
            drawList.push({ type:'arm', p1:r, p2:m, p3:t, z:r.z });
        });

        // 4. 複眼：濡れた質感の巨大な球体
        [1, -1].forEach(side => {
            const p = project(0.8 * side, -0.5, 2.1);
            drawList.push({ type:'eye', p:p, z:p.z });
        });

        // Zソート
        drawList.sort((a, b) => a.z - b.z);

        drawList.forEach(obj => {
            if(obj.type === 'body') {
                const radius = Math.max(0.1, obj.r * 130 * obj.p.scale);
                const b = Math.floor(Math.max(20, 110 + obj.z * 15));
                const g = ctx.createRadialGradient(obj.p.x-radius*0.3, obj.p.y-radius*0.3, 1, obj.p.x, obj.p.y, radius);
                // 画像に近い、渋みのあるオレンジブラウン
                g.addColorStop(0, `rgb(${b+70}, ${b/1.5+30}, ${b/2+20})`);
                g.addColorStop(0.6, `rgb(${b}, ${b/2}, ${b/3})`);
                g.addColorStop(1, '#000');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(obj.p.x, obj.p.y, radius, 0, Math.PI*2); ctx.fill();
            } else if(obj.type === 'flap') {
                const b = 140 + obj.z * 15;
                const fg = ctx.createLinearGradient(obj.p1.x, obj.p1.y, obj.p2.x, obj.p2.y);
                // 構造色（紫〜黄のニュアンス）
                fg.addColorStop(0, `rgba(${b}, ${b/1.5}, ${b/2}, 0.9)`);
                fg.addColorStop(0.8, `rgba(${b/2}, ${b/1.8}, 50, 0.5)`);
                fg.addColorStop(1, `rgba(100, 100, 150, 0.1)`);
                ctx.fillStyle = fg;
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.lineTo(obj.p2.x, obj.p2.y);
                ctx.lineTo(obj.p2.x, obj.p2.y + 40*obj.p2.scale); ctx.lineTo(obj.p1.x, obj.p1.y + 12*obj.p1.scale);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = `rgba(255,255,255,0.1)`; ctx.lineWidth = 1; ctx.stroke();
            } else if(obj.type === 'arm') {
                ctx.strokeStyle = '#521'; ctx.lineWidth = 18 * obj.p1.scale; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.quadraticCurveTo(obj.p2.x, obj.p2.y, obj.p3.x, obj.p3.y); ctx.stroke();
                // 腕のトゲ（ギザギザ）を擬似表現
                ctx.setLineDash([5, 10]); ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                ctx.stroke(); ctx.setLineDash([]);
            } else if(obj.type === 'eye') {
                const r = 22 * obj.p.scale;
                const eg = ctx.createRadialGradient(obj.p.x-r*0.3, obj.p.y-r*0.3, 1, obj.p.x, obj.p.y, r);
                eg.addColorStop(0, '#666'); eg.addColorStop(0.8, '#000');
                ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(obj.p.x, obj.p.y, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(obj.p.x-r*0.45, obj.p.y-r*0.45, r*0.25, 0, Math.PI*2); ctx.fill();
            }
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        angleY += (e.clientX - lastX) * 0.007; angleX += (e.clientY - lastY) * 0.007;
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('wheel', e => { zoom = Math.max(0.4, Math.min(3, zoom - e.deltaY * 0.001)); }, {passive: true});

    draw();
</script>
</body>
</html>
