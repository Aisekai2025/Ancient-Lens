<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ANIMAL ADVENTURE: ANOMALOCARIS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001525; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; color: #fff; }
        #ui { position: absolute; top: 25px; left: 25px; z-index: 100; pointer-events: none; }
        #badge { position: absolute; top: 25px; right: 25px; width: 80px; height: 80px; border-radius: 50%; background: #ff0000; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; transform: rotate(15deg); box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 12px; line-height: 1.2; text-align: center; color: #fff; }
        #overlay { position: absolute; bottom: 25px; left: 25px; font-size: 10px; opacity: 0.6; letter-spacing: 1px; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>
<div id="ui">
    <h1 style="margin:0; font-size: 1.4em; border-bottom: 3px solid #ff0000; display: inline-block;">アノマロカリス</h1>
    <p style="font-size: 10px; margin-top: 5px;">古代の海の王者が「アニア」スタイルで登場！</p>
</div>
<div id="badge">最新学説<br>再現！</div>
<div id="overlay">PRECISION TOY ENGINE v7.0 / TOUCH & ROTATE</div>
<canvas id="view"></canvas>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let width, height, angleX = 0.5, angleY = 0.8, zoom = 1.3, time = 0;
    let isDragging = false, lastX, lastY;

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function project(x, y, z) {
        let nx = x * Math.cos(angleY) + z * Math.sin(angleY);
        let nz = -x * Math.sin(angleY) + z * Math.cos(angleY);
        let ny = y * Math.cos(angleX) - nz * Math.sin(angleX);
        let fz = y * Math.sin(angleX) + nz * Math.cos(angleX);
        const p = Math.max(0.1, (fz + 15) / 15) * zoom;
        return { x: width/2 + nx * 240 * p, y: height/2 + ny * 240 * p, z: fz, scale: p };
    }

    function draw() {
        time += 0.03;
        // 背景（トイパッケージのような鮮やかなブルー）
        const bg = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width*0.9);
        bg.addColorStop(0, '#003366'); bg.addColorStop(1, '#001122');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);
        
        let drawList = [];

        // 1. 胴体（タカラトミーらしい、パーツごとのディテール）
        for(let i=0; i<16; i++) {
            const z = (i * 0.3) - 2.5;
            const r = Math.max(0.1, (Math.sin(i * 0.2 + 0.5) * 0.5 + 0.1) * (i > 13 ? 0.3 : 1));
            const p = project(0, Math.sin(time*0.5 + i*0.1)*0.08, z);
            drawList.push({ type:'body', p:p, r:r, z:p.z, i:i });
        }

        // 2. 鰭（最新学説に基づく13対。アニアらしい肉厚な成型色感）
        for(let i=0; i<13; i++) {
            const z = (i * 0.3) - 2.0;
            const phase = time * 3 - i * 0.4;
            const wave = Math.sin(phase) * 0.3;
            [1, -1].forEach(side => {
                const p1 = project(0.2 * side, 0, z);
                const p2 = project(1.3 * side, wave, z + Math.cos(phase)*0.1);
                drawList.push({ type:'flap', p1:p1, p2:p2, z:(p1.z+p2.z)/2, side:side, i:i });
            });
        }

        // 3. 付属肢（腕：アニア可動ポイントをイメージ）
        [1, -1].forEach(side => {
            const r = project(0.2 * side, 0.1, 2.3);
            const m = project(0.5 * side, 0.7 + Math.sin(time*2)*0.3, 2.8);
            const t = project(0.4 * side, 1.3 + Math.sin(time*2.2)*0.4, 3.2);
            drawList.push({ type:'arm', p1:r, p2:m, p3:t, z:r.z });
        });

        // 4. 複眼（クリアパーツ＋黒目塗装の可愛さとリアルさ）
        [1, -1].forEach(side => {
            const p = project(0.7 * side, -0.5, 2.1);
            drawList.push({ type:'eye', p:p, z:p.z });
        });

        drawList.sort((a, b) => a.z - b.z);

        drawList.forEach(obj => {
            if(obj.type === 'body') {
                const radius = Math.max(0.1, obj.r * 120 * obj.p.scale);
                const b = Math.floor(Math.max(50, 160 + obj.z * 15));
                const g = ctx.createRadialGradient(obj.p.x-radius*0.3, obj.p.y-radius*0.3, 1, obj.p.x, obj.p.y, radius);
                g.addColorStop(0, `rgb(${Math.min(255, b+90)}, 80, 90)`); // 明るい成型色
                g.addColorStop(0.5, `rgb(${b}, 40, 50)`);
                g.addColorStop(1, `rgb(${b/2}, 20, 30)`);
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(obj.p.x, obj.p.y, radius, 0, Math.PI*2); ctx.fill();
                // 成型ライン
                ctx.strokeStyle = `rgba(255,255,255,0.1)`; ctx.lineWidth = 1; ctx.stroke();
            } else if(obj.type === 'flap') {
                const b = 180 + obj.z * 15;
                ctx.fillStyle = `rgba(${b}, 50, 60, 0.75)`;
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.lineTo(obj.p2.x, obj.p2.y);
                ctx.lineTo(obj.p2.x, obj.p2.y + 25*obj.p2.scale); ctx.lineTo(obj.p1.x, obj.p1.y + 10*obj.p1.scale);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = `rgba(255,255,255,0.2)`; ctx.lineWidth = 2; ctx.stroke();
            } else if(obj.type === 'arm') {
                ctx.strokeStyle = '#822'; ctx.lineWidth = 16 * obj.p1.scale; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.quadraticCurveTo(obj.p2.x, obj.p2.y, obj.p3.x, obj.p3.y); ctx.stroke();
                // 塗装ハイライト
                ctx.strokeStyle = '#c55'; ctx.lineWidth = 5 * obj.p1.scale;
                ctx.beginPath(); ctx.moveTo(obj.p1.x-3, obj.p1.y-3); ctx.quadraticCurveTo(obj.p2.x-3, obj.p2.y-3, obj.p3.x-3, obj.p3.y-3); ctx.stroke();
            } else if(obj.type === 'eye') {
                const r = 16 * obj.p.scale;
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(obj.p.x, obj.p.y, r, 0, Math.PI*2); ctx.fill();
                // おもちゃらしいキラキラした瞳
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(obj.p.x-r*0.4, obj.p.y-r*0.4, r*0.3, 0, Math.PI*2); ctx.fill();
            }
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        angleY += (e.clientX - lastX) * 0.01; angleX += (e.clientY - lastY) * 0.01;
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('wheel', e => { zoom = Math.max(0.5, Math.min(3, zoom - e.deltaY * 0.001)); }, {passive: true});

    draw();
</script>
</body>
</html>
