<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D Deep Sea - Stability Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Helvetica Neue', Arial, sans-serif; user-select: none; color: #fff; }
        canvas { display: block; }
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 20, 40, 0.8); backdrop-filter: blur(12px);
            border: 1px solid #00ffff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            padding: 25px; border-radius: 12px; z-index: 10; display: none; width: 340px; opacity: 0;
            transition: all 0.4s cubic-bezier(0.1, 1.5, 0.5, 1);
        }
        #hologram-ui.active { display: block; opacity: 1; transform: translate(-50%, -50%); }
        #holo-title { margin: 0; font-size: 24px; color: #00ffff; text-shadow: 0 0 10px #0ff; }
        #holo-en { margin: 5px 0 15px 0; font-size: 14px; color: #88dddd; font-style: italic; }
        #holo-desc { font-size: 14px; line-height: 1.6; color: #e0f8f8; margin-bottom: 20px; }
        #close-btn {
            background: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; color: #00ffff;
            padding: 10px; cursor: pointer; border-radius: 6px; width: 100%; transition: 0.3s;
        }
        #close-btn:hover { background: #00ffff; color: #000; }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(0, 255, 255, 0.5); font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>
<div id="canvas-container"></div>
<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <h3 id="holo-en"></h3>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">探査を続ける / Continue</button>
</div>
<div id="hint">ドラッグ：視点移動 | 生物タップ：詳細解析</div>

<script src="https://cdnjs.cloudflare.com"></script>
<script>
// 1. 基本セットアップ
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x00040a);
scene.fog = new THREE.FogExp2(0x00040a, 0.015);

var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

// 2. ライティング
scene.add(new THREE.AmbientLight(0x002244, 1.2));
var topLight = new THREE.DirectionalLight(0x44ffcc, 0.8);
topLight.position.set(0, 50, 0);
scene.add(topLight);

// マリンスノー
var snowGeo = new THREE.BufferGeometry();
var snowPosArr = [];
for(var i=0; i<1200; i++) snowPosArr.push((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*150);
snowGeo.setAttribute('position', new THREE.Float32BufferAttribute(snowPosArr, 3));
var snow = new THREE.Points(snowGeo, new THREE.PointsMaterial({ color: 0x88ffff, size: 0.1, transparent: true, opacity: 0.4 }));
scene.add(snow);

// 海底
var bottomY = -30;
var ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0x050a10, roughness: 1 }));
ground.rotation.x = -Math.PI / 2; ground.position.y = bottomY;
scene.add(ground);

// 3. マテリアル
var matAnom = new THREE.MeshPhysicalMaterial({ color: 0x1a6655, transmission: 0.3, roughness: 0.4 });
var matHallu = new THREE.MeshPhysicalMaterial({ color: 0xcc66aa, roughness: 0.5 });
var matMarrella = new THREE.MeshPhysicalMaterial({ color: 0x4477aa, transmission: 0.5, roughness: 0.2 });

// 4. 生物構築
function buildAnomalocaris() {
    var group = new THREE.Group(); var segments = []; var parent = group;
    for(var i=0; i<12; i++) {
        var s = 1 - Math.pow((i-2)/10, 2);
        var seg = new THREE.Group(); if(i>0) seg.position.z = -1.2 * s;
        var b = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12), matAnom);
        b.scale.set(1.8*s, 0.6*s, 1.2*s); seg.add(b);
        if(i>0 && i<10) {
            var fL = new THREE.Mesh(new THREE.BoxGeometry(3.5*s, 0.05, 1.5*s), matAnom); fL.position.set(1.8*s, 0, 0); seg.add(fL);
            var fR = new THREE.Mesh(new THREE.BoxGeometry(3.5*s, 0.05, 1.5*s), matAnom); fR.position.set(-1.8*s, 0, 0); seg.add(fR);
            seg.userData = { fL: fL, fR: fR };
        }
        parent.add(seg); segments.push(seg); parent = seg;
    }
    return { mesh: group, segments: segments };
}

function buildHallucigenia() {
    var group = new THREE.Group(); var segments = []; var parent = group;
    for(var i=0; i<8; i++) {
        var seg = new THREE.Group(); if(i>0) seg.position.z = -0.8;
        var b = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), matHallu); seg.add(b);
        var spike = new THREE.Mesh(new THREE.CylinderGeometry(0, 0.1, 1.5), matHallu);
        spike.position.y = 0.8; spike.rotation.x = 0.2; seg.add(spike);
        var leg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.05, 1), matHallu);
        leg.position.y = -0.5; leg.position.x = 0.3; seg.add(leg);
        parent.add(seg); segments.push(seg); parent = seg;
    }
    return { mesh: group, segments: segments };
}

function buildMarrella() {
    var group = new THREE.Group();
    var body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 2, 4, 8), matMarrella);
    body.rotation.x = Math.PI/2; group.add(body);
    var hornL = new THREE.Mesh(new THREE.TorusGeometry(2, 0.05, 8, 12, Math.PI/2), matMarrella);
    hornL.position.set(0.5, 0.5, 1); hornL.rotation.y = -0.5; group.add(hornL);
    var hornR = hornL.clone(); hornR.position.x = -0.5; hornR.rotation.y = 0.5; group.add(hornR);
    return { mesh: group, segments: [] };
}

// 5. 生態系スポーン
var entityDefs = [
    { id: 'anomalocaris', jp: 'アノマロカリス', en: 'Anomalocaris', desc: 'カンブリア紀最大の捕食者。強靭な前部付属肢で獲物を捕らえます。', build: buildAnomalocaris, count: 3, speed: 0.15, yMin: -10, yMax: 15 },
    { id: 'hallucigenia', jp: 'ハルキゲニア', en: 'Hallucigenia', desc: '「夢のような」を意味する名を持つ。背中に鋭い棘、腹側に細い脚を持つ奇妙な姿。', build: buildHallucigenia, count: 5, speed: 0.03, yMin: bottomY+1, yMax: bottomY+2 },
    { id: 'marrella', jp: 'マルレラ', en: 'Marrella', desc: 'バージェス頁岩で最も多く発見される節足動物。レースのような繊細な鰓が特徴。', build: buildMarrella, count: 8, speed: 0.07, yMin: -5, yMax: 5 }
];

var entities = [];
for (var d = 0; d  0) {
            for (var s = 0; s < ent.segments.length; s++) {
                var seg = ent.segments[s];
                seg.rotation.y = Math.sin(time * 3 - s * 0.6 + n * 10) * 0.15;
                if(seg.userData.fL) {
                    var flap = Math.sin(time * 5 - s * 0.5 + n * 10) * 0.4;
                    seg.userData.fL.rotation.z = flap; seg.userData.fR.rotation.z = -flap;
                }
            }
        }
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
