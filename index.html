<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ANCIENT LENS 3D: ARMORED MONOLITH</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00020a; font-family: 'Courier New', monospace; color: #fff; }
        #ui { position: absolute; top: 25px; left: 25px; z-index: 100; pointer-events: none; text-shadow: 0 0 15px #0f0; }
        #overlay { position: absolute; bottom: 25px; left: 25px; font-size: 10px; opacity: 0.5; letter-spacing: 2px; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
    </style>
</head>
<body>
<div id="ui">
    <h1 style="margin:0; font-size: 1.4em; letter-spacing: 6px;">ANOMALOCARIS</h1>
    <p style="font-size: 10px; color: #0f0;">INTEGRATED ARMORED SHELL / VER 13.0</p>
</div>
<canvas id="view"></canvas>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let width, height, angleX = 0.5, angleY = 0.8, zoom = 1.5, time = 0;
    let isDragging = false, lastX, lastY;

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function project(x, y, z) {
        let nx = x * Math.cos(angleY) + z * Math.sin(angleY);
        let nz = -x * Math.sin(angleY) + z * Math.cos(angleY);
        let ny = y * Math.cos(angleX) - nz * Math.sin(angleX);
        let fz = y * Math.sin(angleX) + nz * Math.cos(angleX);
        const p = Math.max(0.1, (fz + 18) / 18) * zoom;
        return { x: width/2 + nx * 280 * p, y: height/2 + ny * 280 * p, z: fz, scale: p };
    }

    function draw() {
        time += 0.022;
        const bg = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
        bg.addColorStop(0, '#001a44'); bg.addColorStop(1, '#000208');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);

        let drawList = [];

        // 1. 胴体：隙間を埋めるための高密度セグメント（20個に増やし、重なりを強化）
        for(let i=0; i<20; i++) {
            const z = (i * 0.25) - 2.5;
            // 頭部は大きく（シールド）、尾に向かって細く
            const rBase = (Math.sin(i * 0.15 + 0.8) * 0.6 + 0.2);
            const r = Math.max(0.2, rBase * (i > 17 ? 0.3 : (i < 3 ? 1.2 : 1)));
            const p = project(0, Math.sin(time*0.4 + i * 0.08) * 0.06, z);
            drawList.push({ type:'body', p:p, r:r, z:p.z, i:i });
        }

        // 2. 鰭（ひれ）：肉厚な接続
        for(let i=0; i<13; i++) {
            const z = (i * 0.32) - 2.0;
            const phase = time * 2.8 - i * 0.5;
            const wave = Math.sin(phase) * 0.38;
            [1, -1].forEach(side => {
                const p1 = project(0.2 * side, 0, z); 
                const p2 = project(1.4 * side, wave, z + Math.cos(phase)*0.15);
                drawList.push({ type:'flap', p1:p1, p2:p2, z:(p1.z+p2.z)/2, side:side, i:i });
            });
        }

        // 3. 多関節の前肢：胴体内部からの力強い接続
        [1, -1].forEach(side => {
            const root = project(0.18 * side, 0.2, 2.4); // 胴体接続部
            const m1 = project(0.5 * side, 0.7 + Math.sin(time*2.2)*0.25, 2.8);
            const m2 = project(0.4 * side, 1.3 + Math.sin(time*2.4)*0.35, 3.2);
            const t = project(0.3 * side, 1.7 + Math.sin(time*2.6)*0.45, 3.6);
            drawList.push({ type:'arm', p1:root, p2:m1, p3:m2, p4:t, z:root.z });
        });

        // 4. 眼柄（がんぺい）の太い接続
        [1, -1].forEach(side => {
            const root = project(0.4 * side, -0.15, 2.2); // 頭部シールドから直接生やす
            const eye = project(0.9 * side, -0.6, 2.4);
            drawList.push({ type:'eyestalk', p1:root, p2:eye, z:eye.z });
        });

        drawList.sort((a, b) => a.z - b.z);

        drawList.forEach(obj => {
            if(obj.type === 'body') {
                const radius = Math.max(0.1, obj.r * 130 * obj.p.scale);
                const b = Math.floor(Math.max(20, 130 + obj.z * 12));
                // 表面のハイライトを上部に固定（ソフビ塗装＋外骨格）
                const g = ctx.createRadialGradient(obj.p.x-radius*0.3, obj.p.y-radius*0.5, 2, obj.p.x, obj.p.y, radius);
                g.addColorStop(0, `rgb(${Math.min(255, b+110)}, ${Math.min(255, b/1.4+60)}, 80)`);
                g.addColorStop(0.5, `rgb(${b}, 45, 55)`);
                g.addColorStop(1, '#000');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(obj.p.x, obj.p.y, radius + 1, 0, Math.PI*2); ctx.fill();
            } else if(obj.type === 'flap') {
                const b = 150 + obj.z * 15;
                const fg = ctx.createLinearGradient(obj.p1.x, obj.p1.y, obj.p2.x, obj.p2.y);
                fg.addColorStop(0, `rgba(${b}, 55, 70, 1)`);
                fg.addColorStop(1, `rgba(160, 180, 140, 0.4)`);
                ctx.fillStyle = fg;
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.lineTo(obj.p2.x, obj.p2.y);
                ctx.lineTo(obj.p2.x, obj.p2.y + 30*obj.p2.scale); ctx.lineTo(obj.p1.x, obj.p1.y + 12*obj.p1.scale);
                ctx.closePath(); ctx.fill();
            } else if(obj.type === 'arm') {
                ctx.strokeStyle = '#522'; ctx.lineWidth = 26 * obj.p1.scale; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); 
                ctx.lineTo(obj.p2.x, obj.p2.y); ctx.lineTo(obj.p3.x, obj.p3.y); ctx.lineTo(obj.p4.x, obj.p4.y);
                ctx.stroke();
                // 節足らしい硬質なハイライト
                ctx.strokeStyle = '#b66'; ctx.lineWidth = 7 * obj.p1.scale;
                ctx.beginPath(); ctx.moveTo(obj.p1.x-4, obj.p1.y-6); 
                ctx.lineTo(obj.p2.x-4, obj.p2.y-6); ctx.lineTo(obj.p3.x-4, obj.p3.y-6); ctx.lineTo(obj.p4.x-4, obj.p4.y-6);
                ctx.stroke();
            } else if(obj.type === 'eyestalk') {
                ctx.strokeStyle = '#955'; ctx.lineWidth = 18 * obj.p1.scale; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.lineTo(obj.p2.x, obj.p2.y); ctx.stroke();
                const r = 28 * obj.p2.scale;
                const eg = ctx.createRadialGradient(obj.p2.x-r*0.4, obj.p2.y-r*0.4, 2, obj.p2.x, obj.p2.y, r);
                eg.addColorStop(0, '#888'); eg.addColorStop(0.8, '#000');
                ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(obj.p2.x, obj.p2.y, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(obj.p2.x-r*0.45, obj.p2.y-r*0.45, r*0.22, 0, Math.PI*2); ctx.fill();
            }
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        angleY += (e.clientX - lastX) * 0.007; angleX += (e.clientY - lastY) * 0.007;
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('wheel', e => { zoom = Math.max(0.4, Math.min(3, zoom - e.deltaY * 0.001)); }, {passive: true});

    draw();
</script>
</body>
</html>
