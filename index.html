<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D Aquarium</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #001a1a; font-family: 'Helvetica Neue', Arial, sans-serif; }
        canvas { display: block; }

        /* 図鑑風ポップアップUI */
        #info-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            padding: 20px;
            background: rgba(0, 50, 50, 0.85);
            border: 3px solid #00ffff;
            border-radius: 15px;
            color: white;
            display: none;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: opacity 0.3s;
            z-index: 10;
        }
        #info-ui h2 { margin: 0 0 10px 0; color: #00ffff; font-size: 1.5em; border-bottom: 1px solid #00ffff; }
        #info-ui p { margin: 0; line-height: 1.6; font-size: 0.95em; }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info-ui">
        <h2 id="creature-name">名前</h2>
        <p id="creature-desc">説明文</p>
    </div>

    <div class="instructions">マウスを動かして生き物を観察しよう！</div>

    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com",
                "three/addons/": "https://unpkg.com"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // 1. 環境設定 (Scene, Camera, Renderer)
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001a1a);
        scene.fog = new THREE.FogExp2(0x001a1a, 0.08); // 深海の霞を表現

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 照明：水面からの揺らぎ光を模す
        const topLight = new THREE.DirectionalLight(0x00ffff, 2);
        topLight.position.set(0, 10, 0);
        scene.add(topLight);

        const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambientLight);

        // 海底の作成
        const floorGeo = new THREE.PlaneGeometry(100, 100, 32, 32);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a2a2a, roughness: 1 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -5;
        scene.add(floor);

        // ==========================================
        // 2. アノマロカリスの生成 (Procedural Modeling)
        // ==========================================
        function createAnomalocaris() {
            const group = new THREE.Group();
            group.userData = { 
                name: "アノマロカリス", 
                desc: "カンブリア紀の海の王者！大きな触手で獲物を捕まえていたよ。横のヒレを波のように動かして泳ぐんだ。" 
            };

            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc5533 });

            // 胴体
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.8, 4, 4, 8), bodyMat);
            body.rotation.z = Math.PI / 2;
            group.add(body);

            // 目 (飛び出した大きな目)
            const eyeGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(1.5, 0.5, 1);
            const eyeR = eyeL.clone();
            eyeR.position.z = -1;
            group.add(eyeL, eyeR);

            // 前部付属肢 (触手)
            const armGroup = new THREE.Group();
            const armGeo = new THREE.BoxGeometry(1.5, 0.2, 0.2);
            const armL = new THREE.Mesh(armGeo, bodyMat);
            armL.position.set(2.5, -0.2, 0.4);
            armL.rotation.z = -0.5;
            const armR = armL.clone();
            armR.position.z = -0.4;
            armGroup.add(armL, armR);
            group.add(armGroup);
            group.userData.arms = armGroup;

            // 側面のヒレ (フラップ)
            const flaps = [];
            for (let i = 0; i < 7; i++) {
                const flapGeo = new THREE.BoxGeometry(0.8, 0.1, 2);
                const flap = new THREE.Mesh(flapGeo, bodyMat);
                flap.position.set(-2 + i * 0.8, 0, 0);
                group.add(flap);
                flaps.push(flap);
            }
            group.userData.flaps = flaps;

            scene.add(group);
            return group;
        }

        const anomalocaris = createAnomalocaris();

        // ==========================================
        // 3. 三葉虫の生成 (Crowd)
        // ==========================================
        const trilobites = [];
        function createTrilobite() {
            const group = new THREE.Group();
            group.userData = { 
                name: "三葉虫（トリロバイト）", 
                desc: "海の底を歩くよ。硬い殻で身を守っていたんだ。たくさんの種類がいたんだよ。" 
            };

            const shellMat = new THREE.MeshStandardMaterial({ color: 0x556677 });
            const shell = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), shellMat);
            shell.scale.set(1.2, 0.4, 0.8);
            group.add(shell);

            // 小さな節
            for(let i=0; i<3; i++) {
                const segment = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), shellMat);
                segment.position.x = -0.4 - (i * 0.3);
                segment.scale.set(1, 0.5, 0.8 - (i*0.2));
                group.add(segment);
            }

            scene.add(group);
            return group;
        }

        for (let i = 0; i < 8; i++) {
            const t = createTrilobite();
            t.position.set(Math.random() * 20 - 10, -4.8, Math.random() * 20 - 10);
            t.rotation.y = Math.random() * Math.PI * 2;
            trilobites.push(t);
        }

        // ==========================================
        // 4. インタラクション (Raycaster)
        // ==========================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const infoUI = document.getElementById('info-ui');
        const nameLabel = document.getElementById('creature-name');
        const descLabel = document.getElementById('creature-desc');

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // ==========================================
        // 5. アニメーションループ
        // ==========================================
        const controls = new OrbitControls(camera, renderer.domElement);
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // アノマロカリスの動き
            anomalocaris.position.y = Math.sin(t * 0.5) * 1;
            anomalocaris.position.z = Math.sin(t * 0.2) * 5;
            anomalocaris.rotation.z = Math.sin(t * 0.5) * 0.1;

            // ヒレのウェーブ運動
            anomalocaris.userData.flaps.forEach((flap, i) => {
                flap.rotation.x = Math.sin(t * 3 + i * 0.5) * 0.4;
            });

            // 触手の動き
            anomalocaris.userData.arms.rotation.x = Math.sin(t * 2) * 0.2;

            // 三葉虫の徘徊
            trilobites.forEach((tri, i) => {
                tri.position.x += Math.sin(t + i) * 0.01;
                tri.rotation.y += Math.sin(t * 0.5 + i) * 0.005;
            });

            // レイキャスティングによる判定
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let target = intersects[0].object;
                while (target.parent && !target.userData.name) {
                    target = target.parent;
                }

                if (target.userData.name) {
                    infoUI.style.display = 'block';
                    infoUI.style.opacity = '1';
                    nameLabel.innerText = target.userData.name;
                    descLabel.innerText = target.userData.desc;
                }
            } else {
                infoUI.style.opacity = '0';
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        /* 
          【 Tips: 本物の3Dモデルに差し替える場合 】
          1. THREE.GLTFLoader をインポートします。
          2. loader.load('path/to/model.glb', (gltf) => { ... }) で読み込みます。
          3. `createAnomalocaris` 内の `group.add(body)` などの代わりに `scene.add(gltf.scene)` します。
          4. アニメーションは gltf.animations を AnimationMixer で再生するように書き換えます。
        */
    </script>
</body>
</html>
