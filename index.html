<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian 3D Aquarium - All-in-One Build</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000808; font-family: sans-serif; }
        #info-ui {
            position: absolute; top: 20px; right: 20px; width: 260px; padding: 20px;
            background: rgba(0, 40, 50, 0.9); border: 2px solid #00ffff; border-radius: 15px;
            color: #fff; display: none; pointer-events: none; z-index: 1000;
            box-shadow: 0 0 15px #00ffff66;
        }
        #info-ui h2 { margin: 0 0 10px; color: #00ffff; font-size: 1.3em; border-bottom: 1px solid #00ffff; }
        .hint { position: absolute; bottom: 15px; left: 15px; color: #00ffff; opacity: 0.6; font-size: 12px; }
    </style>
</head>
<body>
    <div id="info-ui">
        <h2 id="name"></h2>
        <p id="desc"></p>
    </div>
    <div class="hint">マウスで回転・スクロールでズーム・生き物にホバーで解説</div>

    <!-- 1. Three.js を ESM 形式で直接インポート (Skypackのフォールバック付き) -->
    <script type="module">
        // ネットワークエラーを回避するため、最小限のThree.js機能を標準的なESM形式でインポートします
        import * as THREE from 'https://unpkg.com';
        import { OrbitControls } from 'https://unpkg.com';

        // ==========================================
        // 1. 環境構築 (Scene, Fog, Light)
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001015);
        scene.fog = new THREE.FogExp2(0x001015, 0.08);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0x00ffff, 2);
        sun.position.set(5, 10, 5);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));

        // 海底
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x0a1a1a })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -5;
        scene.add(floor);

        // ==========================================
        // 2. 生物の生成 (Procedural)
        // ==========================================
        const creatures = [];

        function createAnomalocaris() {
            const group = new THREE.Group();
            group.userData = { name: "アノマロカリス", desc: "カンブリア紀最大の捕食者！横にあるたくさんのヒレを波のように動かして、優雅に泳いでいたと考えられているよ。" };
            
            const mat = new THREE.MeshStandardMaterial({ color: 0xe67e22 });
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.6, 3, 4, 8), mat);
            body.rotation.z = Math.PI / 2;
            group.add(body);

            const flaps = [];
            for(let i=0; i<9; i++) {
                const f = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 1.8), mat);
                f.position.x = -1.8 + (i * 0.45);
                group.add(f);
                flaps.push(f);
            }
            group.userData.flaps = flaps;

            const armGeo = new THREE.CapsuleGeometry(0.08, 1, 4, 8);
            const armL = new THREE.Mesh(armGeo, mat);
            armL.position.set(2.2, -0.4, 0.4);
            armL.rotation.z = -Math.PI/3;
            const armR = armL.clone();
            armR.position.z = -0.4;
            group.add(armL, armR);
            group.userData.arms = [armL, armR];

            scene.add(group);
            creatures.push(group);
            return group;
        }

        function createTrilobite() {
            const group = new THREE.Group();
            group.userData = { name: "三葉虫", desc: "恐竜よりもずっと昔から海にいた生き物。硬い殻で身を守り、海の底を這い回って食べ物を探していたよ。" };
            const mat = new THREE.MeshStandardMaterial({ color: 0x5d6d7e });
            const shell = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), mat);
            shell.scale.set(1.2, 0.4, 1.5);
            group.add(shell);
            scene.add(group);
            creatures.push(group);
            return group;
        }

        const anomalo = createAnomalocaris();
        for(let i=0; i<8; i++) {
            const t = createTrilobite();
            t.position.set(Math.random()*14-7, -4.8, Math.random()*14-7);
            t.rotation.y = Math.random()*Math.PI*2;
        }

        // ==========================================
        // 3. インタラクション & アニメーション
        // ==========================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const ui = document.getElementById('info-ui');
        const uiName = document.getElementById('name');
        const uiDesc = document.getElementById('desc');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            const t = performance.now() * 0.001;

            // アノマロカリスの遊泳
            anomalo.position.y = Math.sin(t * 0.7);
            anomalo.position.z = Math.cos(t * 0.3) * 3;
            anomalo.rotation.z = Math.sin(t * 0.7) * 0.1;
            anomalo.userData.flaps.forEach((f, i) => {
                f.rotation.x = Math.sin(t * 4 + i * 0.6) * 0.5;
            });
            anomalo.userData.arms.forEach(a => {
                a.rotation.y = Math.sin(t * 2) * 0.2;
            });

            // レイキャスト判定
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(creatures, true);
            if(intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.name) obj = obj.parent;
                if(obj.userData.name) {
                    ui.style.display = 'block';
                    uiName.textContent = obj.userData.name;
                    uiDesc.textContent = obj.userData.desc;
                }
            } else {
                ui.style.display = 'none';
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
