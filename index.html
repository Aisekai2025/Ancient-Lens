<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Lens v5.0: Trilobite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000b1a; font-family: monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(0,20,40,0.9); padding: 15px; border: 1px solid #0f0; z-index: 100; }
        #info-panel { position: absolute; right: -320px; top: 50%; transform: translateY(-50%); width: 250px; background: rgba(0,20,40,1); border: 1px solid #0f0; padding: 20px; transition: 0.5s; z-index: 100; }
        #info-panel.active { right: 20px; }
        button { background: #0f0; border: none; color: #000; padding: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
    <h1 style="margin:0; font-size: 1.2em;">ANCIENT LENS v5.0</h1>
    <div id="era-label">ERA: CAMBRIAN</div>
</div>
<div id="controls">
    <label>CHRONO-SLIDER</label><br>
    <input type="range" id="time-slider" min="0" max="100" value="0" style="width:100%;">
    <button id="hallucigenia-btn">FLIP HALLUCIGENIA</button>
</div>
<div id="info-panel"><h2 id="creature-name">---</h2><p id="creature-desc"></p><hr style="border:0; border-top:1px solid #0f0;"><p id="research-note" style="font-size: 0.8em; color: #8f8;"></p></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0, eraVal = 0, isModernView = true;

    const creatureData = {
        'anomalocaris': { name: "アノマロカリス", desc: "最新の陰影処理で立体感を再現。", research: "ひれとボディにグラデーションを加え、生物らしい質感を追求しました。" },
        'trilobite': { name: "三葉虫", desc: "海底を這う代表的な節足動物。", research: "エルラシア種をモデルに、体節が動く様子を再現しています。" },
        'hallucigenia': { name: "ハルキゲニア", desc: "棘を持つ奇妙な生物。", research: "かつては上下・前後が逆だと思われていた歴史を持ちます。" }
    };

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // 1. 三葉虫（エルラシア）の描画
    function drawTrilobite(t) {
        const x = (width/2 - 200) + Math.cos(t * 0.2) * 300;
        const y = height/2 + 220;
        const scale = 0.5;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.sin(t * 0.2) > 0 ? 0 : Math.PI); // 往復運動

        // ボディの陰影
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 40);
        grad.addColorStop(0, '#5a4a3a'); grad.addColorStop(1, '#2a1a0a');
        ctx.fillStyle = grad;

        // 体節（何重にも重なる殻）
        for(let i=0; i<8; i++) {
            const ox = (i * 8 - 30) * scale;
            const wave = Math.sin(t * 5 - i * 0.5) * 2;
            ctx.beginPath();
            ctx.ellipse(ox, wave, 20 * scale, 35 * scale, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.stroke();
        }
        ctx.restore();
    }

    // 2. リアル造形アノマロカリス（グラデーション追加）
    function drawAnomalocaris(x, y, scale, t) {
        ctx.save();
        ctx.translate(x, y + Math.sin(t) * 25);
        const baseColor = eraVal > 0.5 ? [68, 102, 136] : [204, 68, 68];
        
        // ひれの立体描画
        for(let i=0; i<13; i++) {
            const offset = (i * 12 - 70) * scale;
            const flapWave = Math.sin(t * 2.5 - i * 0.6) * (15 * scale);
            const grad = ctx.createLinearGradient(0, -40*scale, 0, 40*scale);
            grad.addColorStop(0, `rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},0.9)`);
            grad.addColorStop(1, `rgba(${baseColor[0]/2},${baseColor[1]/2},${baseColor[2]/2},0.9)`);
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.ellipse(offset, flapWave, 12 * scale, 40 * scale, 0, 0, Math.PI * 2); ctx.fill();
        }

        // ボディのハイライトと影
        const bodyGrad = ctx.createLinearGradient(0, -30*scale, 0, 30*scale);
        bodyGrad.addColorStop(0, `rgb(${Math.min(baseColor[0]+50, 255)},${baseColor[1]+50},${baseColor[2]+50})`);
        bodyGrad.addColorStop(0.5, `rgb(${baseColor[0]},${baseColor[1]},${baseColor[2]})`);
        bodyGrad.addColorStop(1, `rgb(${baseColor[0]/3},${baseColor[1]/3},${baseColor[2]/3})`);
        ctx.fillStyle = bodyGrad;
        ctx.beginPath(); ctx.ellipse(0, 0, 90 * scale, 30 * scale, 0, 0, Math.PI * 2); ctx.fill();

        // 複眼（光沢）
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(70 * scale, -32 * scale, 12 * scale, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(74 * scale, -35 * scale, 3 * scale, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function animate() {
        time += 0.04;
        ctx.fillStyle = `rgb(0, 11, ${Math.floor(26 + eraVal * 40)})`; ctx.fillRect(0, 0, width, height);

        // 背景のマリンスノー
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        for(let i=0; i<20; i++){
            ctx.beginPath(); ctx.arc((Math.sin(i+time*0.5)*width/2)+width/2, (i*100+time*50)%height, 1, 0, Math.PI*2); ctx.fill();
        }

        drawTrilobite(time);
        drawAnomalocaris(width/2 - 100, height/2 - 50, 1 + eraVal * 0.5, time);
        
        // ハルキゲニア（簡易リアル化）
        ctx.save();
        ctx.translate(width/2 + 250, height/2 + 100);
        if(!isModernView) ctx.scale(1, -1);
        ctx.fillStyle = '#bb88ff'; ctx.beginPath(); ctx.ellipse(0,0, 70, 15, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        requestAnimationFrame(animate);
    }

    document.getElementById('hallucigenia-btn').onclick = () => { isModernView = !isModernView; };
    document.getElementById('time-slider').oninput = (e) => { eraVal = e.target.value / 100; };
    
    canvas.addEventListener('mousedown', (e) => {
        const mx = e.clientX, my = e.clientY;
        let type = mx < width/2 ? 'anomalocaris' : 'hallucigenia';
        if(my > height/2 + 180) type = 'trilobite';
        const data = creatureData[type];
        if(data) {
            document.getElementById('creature-name').innerText = data.name;
            document.getElementById('creature-desc').innerText = data.desc;
            document.getElementById('research-note').innerText = data.research;
            document.getElementById('info-panel').classList.add('active');
            setTimeout(() => document.getElementById('info-panel').classList.remove('active'), 5000);
        }
    });

    animate();
</script>
</body>
</html>
