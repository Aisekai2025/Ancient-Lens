<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian HD Aquarium - Ultimate Evolution</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; }
        canvas { display: block; background: radial-gradient(circle at 50% 0%, #003d3d 0%, #00050a 100%); }
        #ui {
            position: absolute; top: 20px; right: 20px; width: 280px; padding: 20px;
            background: rgba(0, 20, 30, 0.9); border: 2px solid #00f0ff; border-radius: 15px;
            color: #fff; display: none; pointer-events: none; z-index: 1000;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }
        h2 { margin: 0 0 10px; color: #00f0ff; font-size: 1.4em; text-shadow: 0 0 10px #00f0ff; }
        p { margin: 0; font-size: 0.9em; line-height: 1.6; }
        .controls { position: absolute; bottom: 20px; left: 20px; color: #00f0ff; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="ui"><h2 id="name"></h2><p id="desc"></p></div>
    <div class="controls">ホイールでズーム | マウス移動で観察 | 捕食シーンに注目！</div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        let w, h, creatures = [], seaweeds = [], bubbles = [];
        let zoom = 1.0;

        const DATA = {
            anomalo: { name: "アノマロカリス", desc: "カンブリア紀最大の王者。多層のヒレを波打たせて泳ぎ、三葉虫などを捕食していたよ。" },
            opabinia: { name: "オパビニア", desc: "5つの目を持つ奇妙な姿。長いノズルの先で獲物を器用に捕まえるよ。" },
            halluci: { name: "ハルキゲニア", desc: "トゲが生えた不思議な生き物。海底をゆっくりと歩くよ。" },
            trilo: { name: "三葉虫", desc: "硬い殻で守られた底生生物。アノマロカリスの好物だよ。" },
            pikaia: { name: "ピカイア", desc: "私たちの祖先に近い脊索動物。しなやかな体で素早く泳ぐよ。" }
        };

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('wheel', e => { zoom = Math.max(0.5, Math.min(2.5, zoom - e.deltaY * 0.001)); });
        resize();

        class Seaweed {
            constructor() {
                this.x = Math.random() * w;
                this.y = h;
                this.len = 100 + Math.random() * 200;
                this.phase = Math.random() * 10;
            }
            draw(t) {
                ctx.save();
                ctx.translate((this.x - w/2) * zoom + w/2, (this.y - h/2) * zoom + h/2);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                for(let i=0; i<10; i++) {
                    let offset = Math.sin(t + this.phase + i * 0.3) * (i * 5) * zoom;
                    ctx.lineTo(offset, -i * (this.len/10) * zoom);
                }
                ctx.strokeStyle = '#004d40';
                ctx.lineWidth = 15 * zoom;
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.restore();
            }
        }

        class Creature {
            constructor(type) {
                this.type = type;
                this.spawn();
            }
            spawn() {
                this.dead = false;
                this.x = Math.random() * w;
                this.y = (this.type === 'halluci' || this.type === 'trilo') ? h * 0.9 : Math.random() * h;
                this.z = Math.random() * 500;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 1;
                this.target = null;
            }
            update(t) {
                if(this.dead) return;
                // 捕食AI
                if(this.type === 'anomalo' && !this.target && Math.random() < 0.01) {
                    this.target = creatures.find(c => !c.dead && (c.type==='trilo' || c.type==='pikaia'));
                }
                if(this.target) {
                    let dx = this.target.x - this.x, dy = this.target.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    this.vx = (dx/dist) * 5; this.vy = (dy/dist) * 2;
                    if(dist < 40) {
                        this.target.dead = true; this.target = null;
                        for(let i=0; i<10; i++) bubbles.push({x:this.x, y:this.y, vx:(Math.random()-0.5)*5, vy:-Math.random()*5, life:1});
                    }
                }
                this.x += this.vx; this.y += this.vy;
                if(this.x < -200) this.x = w + 200; if(this.x > w + 200) this.x = -200;
            }
            draw(t) {
                if(this.dead) return;
                let s = (500 / (500 + this.z)) * zoom;
                let dx = (this.x - w/2) * zoom + w/2;
                let dy = (this.y - h/2) * zoom + h/2;
                ctx.save();
                ctx.translate(dx, dy);
                ctx.scale(this.vx > 0 ? s : -s, s);
                this.render(t);
                ctx.restore();
                this.screenPos = {x:dx, y:dy, r:80 * s};
            }
            render(t) {
                let p = t * 5;
                if(this.type === 'anomalo') {
                    // 胴体シャドウとハイライト
                    let g = ctx.createRadialGradient(0,0,10,0,0,100);
                    g.addColorStop(0, '#ff7043'); g.addColorStop(1, '#bf360c');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.ellipse(0, 0, 100, 35, 0, 0, 7); ctx.fill();
                    // 多層ヒレ
                    for(let i=0; i<9; i++) {
                        ctx.fillStyle = `rgba(230, 126, 34, ${0.6 + Math.sin(p+i)*0.4})`;
                        ctx.beginPath(); ctx.ellipse(-80+i*20, 30, 15, 40+Math.sin(p+i)*20, 0, 0, 7); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(-80+i*20, -30, 15, 40+Math.sin(p+i)*20, 0, 0, 7); ctx.fill();
                    }
                    // 目
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(70, -35, 10, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(70, 35, 10, 0, 7); ctx.fill();
                } else if(this.type === 'opabinia') {
                    ctx.fillStyle = '#43a047'; ctx.beginPath(); ctx.ellipse(0, 0, 70, 20, 0, 0, 7); ctx.fill();
                    ctx.strokeStyle = '#43a047'; ctx.lineWidth = 8;
                    ctx.beginPath(); ctx.moveTo(60, 0); ctx.quadraticCurveTo(120, Math.sin(p)*30, 110, 30); ctx.stroke();
                } else if(this.type === 'halluci') {
                    ctx.fillStyle = '#9c27b0'; ctx.beginPath(); ctx.ellipse(0, 0, 40, 12, 0, 0, 7); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                    for(let i=0; i<7; i++) { ctx.beginPath(); ctx.moveTo(-30+i*10, 0); ctx.lineTo(-30+i*10, -30); ctx.stroke(); }
                } else if(this.type === 'trilo') {
                    ctx.fillStyle = '#546e7a'; ctx.beginPath(); ctx.ellipse(0, 0, 40, 25, 0, 0, 7); ctx.fill();
                    ctx.fillStyle = '#263238'; ctx.beginPath(); ctx.arc(25, 0, 15, 0, 7); ctx.fill();
                } else if(this.type === 'pikaia') {
                    ctx.fillStyle = 'rgba(178, 235, 242, 0.8)';
                    ctx.beginPath(); ctx.moveTo(-60, 0);
                    for(let i=-60; i<60; i+=10) ctx.lineTo(i, Math.sin(p + i*0.1)*15);
                    ctx.lineTo(60, 0); ctx.fill();
                }
            }
        }

        function init() {
            for(let i=0; i<15; i++) seaweeds.push(new Seaweed());
            creatures.push(new Creature('anomalo'), new Creature('opabinia'));
            for(let i=0; i<5; i++) creatures.push(new Creature('pikaia'));
            for(let i=0; i<6; i++) creatures.push(new Creature('trilo'));
            for(let i=0; i<6; i++) creatures.push(new Creature('halluci'));
        }

        let mx = 0, my = 0;
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

        function loop() {
            ctx.clearRect(0,0,w,h);
            const t = performance.now() * 0.001;
            
            seaweeds.forEach(s => s.draw(t));
            
            // 泡の更新
            bubbles = bubbles.filter(b => b.life > 0);
            bubbles.forEach(b => {
                b.x += b.vx; b.y += b.vy; b.life -= 0.02;
                ctx.fillStyle = `rgba(255,255,255,${b.life*0.5})`;
                ctx.beginPath(); ctx.arc(b.x, b.y, 3*zoom, 0, 7); ctx.fill();
            });

            let hover = null;
            creatures.sort((a,b) => b.z - a.z);
            creatures.forEach(c => {
                if(c.dead && Math.random() < 0.005) c.spawn();
                c.update(t);
                c.draw(t);
                if(!c.dead && Math.hypot(mx-c.screenPos.x, my-c.screenPos.y) < c.screenPos.r) hover = c;
            });

            if(hover) {
                ui.style.display = 'block';
                document.getElementById('name').innerText = DATA[hover.type].name;
                document.getElementById('desc').innerText = DATA[hover.type].desc;
            } else ui.style.display = 'none';

            requestAnimationFrame(loop);
        }
        init(); loop();
    </script>
</body>
</html>
