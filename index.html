<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ANCIENT LENS 3D: BIOLOGICAL SOFUBI</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00040a; font-family: 'Courier New', monospace; color: #fff; }
        #ui { position: absolute; top: 25px; left: 25px; z-index: 100; pointer-events: none; text-shadow: 0 0 10px #0f0; }
        #overlay { position: absolute; bottom: 25px; left: 25px; font-size: 10px; opacity: 0.5; letter-spacing: 2px; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
    </style>
</head>
<body>
<div id="ui">
    <h1 style="margin:0; font-size: 1.3em; letter-spacing: 5px;">ANOMALOCARIS</h1>
    <p style="font-size: 10px; color: #0f0;">PREDATOR ARCHIVE / VER 12.0</p>
</div>
<canvas id="view"></canvas>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let width, height, angleX = 0.5, angleY = 0.8, zoom = 1.4, time = 0;
    let isDragging = false, lastX, lastY;

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function project(x, y, z) {
        let nx = x * Math.cos(angleY) + z * Math.sin(angleY);
        let nz = -x * Math.sin(angleY) + z * Math.cos(angleY);
        let ny = y * Math.cos(angleX) - nz * Math.sin(angleX);
        let fz = y * Math.sin(angleX) + nz * Math.cos(angleX);
        const p = Math.max(0.1, (fz + 18) / 18) * zoom;
        return { x: width/2 + nx * 270 * p, y: height/2 + ny * 270 * p, z: fz, scale: p };
    }

    function draw() {
        time += 0.02;
        // 背景：深い海の底
        const bg = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
        bg.addColorStop(0, '#001a33'); bg.addColorStop(1, '#000408');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);

        let drawList = [];

        // 1. 胴体：肉厚なセグメント
        for(let i=0; i<16; i++) {
            const z = (i * 0.32) - 2.2;
            const r = Math.max(0.2, (Math.sin(i * 0.25 + 0.6) * 0.58 + 0.15) * (i > 13 ? 0.4 : 1));
            const p = project(0, Math.sin(time*0.5 + i*0.1)*0.08, z);
            drawList.push({ type:'body', p:p, r:r, z:p.z, i:i });
        }

        // 2. 鰭（ひれ）：肉厚な造形
        for(let i=0; i<13; i++) {
            const z = (i * 0.3) - 1.8;
            const phase = time * 2.5 - i * 0.5;
            const wave = Math.sin(phase) * 0.4;
            [1, -1].forEach(side => {
                const p1 = project(0.25 * side, 0, z); 
                const p2 = project(1.45 * side, wave, z + Math.cos(phase)*0.1);
                drawList.push({ type:'flap', p1:p1, p2:p2, z:(p1.z+p2.z)/2, side:side, i:i });
            });
        }

        // 3. 多関節の前肢（付属肢）：節足動物らしい構造
        [1, -1].forEach(side => {
            const r = project(0.22 * side, 0.2, 2.3); // 付け根
            const m1 = project(0.55 * side, 0.7 + Math.sin(time*2)*0.2, 2.7); // 関節1
            const m2 = project(0.45 * side, 1.2 + Math.sin(time*2.2)*0.3, 3.1); // 関節2
            const t = project(0.35 * side, 1.6 + Math.sin(time*2.4)*0.4, 3.5); // 先端
            drawList.push({ type:'arm', p1:r, p2:m1, p3:m2, p4:t, z:r.z });
        });

        // 4. 眼柄（がんぺい）と眼：頭部からの連続性
        [1, -1].forEach(side => {
            const root = project(0.35 * side, -0.2, 2.0); // 頭部との接続部
            const eye = project(0.85 * side, -0.65, 2.3); // 眼の位置
            drawList.push({ type:'eyestalk', p1:root, p2:eye, z:eye.z });
        });

        drawList.sort((a, b) => a.z - b.z);

        drawList.forEach(obj => {
            if(obj.type === 'body') {
                const radius = Math.max(0.1, obj.r * 135 * obj.p.scale);
                const b = Math.floor(Math.max(20, 120 + obj.z * 15));
                const g = ctx.createRadialGradient(obj.p.x-radius*0.4, obj.p.y-radius*0.4, 2, obj.p.x, obj.p.y, radius);
                g.addColorStop(0, `rgb(${Math.min(255, b+100)}, ${Math.min(255, b/1.5+50)}, 70)`);
                g.addColorStop(0.6, `rgb(${b}, 45, 55)`);
                g.addColorStop(1, '#000');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(obj.p.x, obj.p.y, radius, 0, Math.PI*2); ctx.fill();
            } else if(obj.type === 'flap') {
                const b = 150 + obj.z * 15;
                const fg = ctx.createLinearGradient(obj.p1.x, obj.p1.y, obj.p2.x, obj.p2.y);
                fg.addColorStop(0, `rgba(${b}, 50, 65, 0.98)`);
                fg.addColorStop(1, `rgba(180, 160, 120, 0.3)`);
                ctx.fillStyle = fg;
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.lineTo(obj.p2.x, obj.p2.y);
                ctx.lineTo(obj.p2.x, obj.p2.y + 35*obj.p2.scale); ctx.lineTo(obj.p1.x, obj.p1.y + 15*obj.p1.scale);
                ctx.closePath(); ctx.fill();
            } else if(obj.type === 'arm') {
                // 前肢：節足構造
                ctx.strokeStyle = '#522'; ctx.lineWidth = 24 * obj.p1.scale; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); 
                ctx.lineTo(obj.p2.x, obj.p2.y); ctx.lineTo(obj.p3.x, obj.p3.y); ctx.lineTo(obj.p4.x, obj.p4.y);
                ctx.stroke();
                // トゲのハイライト
                ctx.strokeStyle = '#a55'; ctx.lineWidth = 6 * obj.p1.scale;
                ctx.beginPath(); ctx.moveTo(obj.p1.x-5, obj.p1.y-5); 
                ctx.lineTo(obj.p2.x-5, obj.p2.y-5); ctx.lineTo(obj.p3.x-5, obj.p3.y-5); ctx.lineTo(obj.p4.x-5, obj.p4.y-5);
                ctx.stroke();
            } else if(obj.type === 'eyestalk') {
                // 眼柄（繋ぎ目）
                ctx.strokeStyle = '#844'; ctx.lineWidth = 14 * obj.p1.scale; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(obj.p1.x, obj.p1.y); ctx.lineTo(obj.p2.x, obj.p2.y); ctx.stroke();
                // 複眼
                const r = 26 * obj.p2.scale;
                const eg = ctx.createRadialGradient(obj.p2.x-r*0.4, obj.p2.y-r*0.4, 2, obj.p2.x, obj.p2.y, r);
                eg.addColorStop(0, '#777'); eg.addColorStop(0.8, '#000');
                ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(obj.p2.x, obj.p2.y, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(obj.p2.x-r*0.4, obj.p2.y-r*0.4, r*0.25, 0, Math.PI*2); ctx.fill();
            }
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        angleY += (e.clientX - lastX) * 0.007; angleX += (e.clientY - lastY) * 0.007;
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('wheel', e => { zoom = Math.max(0.4, Math.min(3, zoom - e.deltaY * 0.001)); }, {passive: true});

    draw();
</script>
</body>
</html>
