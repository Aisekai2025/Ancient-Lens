        p2.rotation.x = Math.PI/2; p2.position.z = 0.6; elbow.add(p2);
        
        armBase.add(elbow); g.add(armBase); arms.push({base: armBase, elbow: elbow, side: side});
    }
    g.userData.arms = arms;

    const tail = new THREE.Mesh(new THREE.ConeGeometry(0.3, 3, 16), mat(0x665544)); 
    tail.rotation.x = -Math.PI/2; tail.position.z = -1.5; tail.position.y = 0.2; g.add(tail);
    segs.push(tail);

    return { mesh: g, segments: segs, type: 'crawl_bothriolepis', offset: 0.2 };
}

function buildClimatius() {
    const g = new THREE.Group(); 
    const bodyGroup = new THREE.Group();
    g.add(bodyGroup);

    // 1. 胴体（サメに近い、少しがっしりした流線型）
    const bodyGeom = new THREE.SphereGeometry(0.5, 24, 24);
    const body = new THREE.Mesh(bodyGeom, mat(0x88aabb));
    body.scale.set(0.9, 1.1, 2.8); 
    bodyGroup.add(body);

    // 目（少し突き出した感じに）
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08), eyeMat);
    eyeL.position.set(0.35, 0.15, 1.0);
    bodyGroup.add(eyeL);
    const eyeR = eyeL.clone(); 
    eyeR.position.x = -0.35; 
    bodyGroup.add(eyeR);
 
    // 2. 下顎（少し厚みをもたせて、生き物らしく）
    const jaw = new THREE.Group(); 
    jaw.position.set(0, -0.1, 0.5);
    bodyGroup.add(jaw);
    const jawMesh = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 12), mat(0x7799aa));
    jawMesh.scale.set(1.0, 0.4, 1.4);
    jawMesh.position.z = 0.4;
    jaw.add(jawMesh);
    g.userData.jaw = jaw;

    // 3. 特徴的な棘（とげ）
    // 棘の付け根に「ひれ」の膜があるように見せるとリアルです
    const spinePos = [
        {x: 0,   y: 0.55, z: 0.4,  rx: -0.6, rz: 0},    // 第一背鰭
        {x: 0,   y: 0.55, z: -0.4, rx: -0.6, rz: 0},    // 第二背鰭
        {x: 0.4, y: -0.4, z: 0.7,  rx: 0.2,  rz: -0.8}, // 胸鰭(左)
        {x: -0.4,y: -0.4, z: 0.7,  rx: 0.2,  rz: 0.8},  // 胸鰭(右)
        {x: 0.3, y: -0.5, z: -0.1, rx: 0.3,  rz: -0.6}, // 腹鰭(左)
        {x: -0.3,y: -0.5, z: -0.1, rx: 0.3,  rz: 0.6},  // 腹鰭(右)
        {x: 0,   y: -0.5, z: -0.9, rx: 0.4,  rz: 0}     // 尻鰭
    ];
    spinePos.forEach(p => {
        const spineGeom = new THREE.SphereGeometry(0.1, 8, 12);
        const spine = new THREE.Mesh(spineGeom, mat(0xeeeeee));
        spine.scale.set(0.1, 4.0, 0.3); // 鋭い棘として引き伸ばす
        spine.position.set(p.x, p.y, p.z); 
        spine.rotation.set(p.rx, 0, p.rz);
        bodyGroup.add(spine);
    });
 
    // 4. 尾部 (異尾：Heterocercal tail)
    const tailGroup = new THREE.Group(); 
    tailGroup.position.set(0, 0, -1.4);
    g.add(tailGroup);

    // 尾筒（尾の付け根）
    const tailStalk = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 12), mat(0x88aabb));
    tailStalk.scale.set(0.5, 0.8, 1.8);
    tailStalk.position.z = -0.5;
    tailGroup.add(tailStalk);

    // 【重要】異尾の上葉（背骨が通り、大きく上に伸びる部分）
    const tailTop = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), mat(0x88aabb));
    tailTop.scale.set(0.12, 1.8, 0.8); // 縦に長く、薄い
    tailTop.position.set(0, 0.6, -0.8); 
    tailTop.rotation.x = 0.5; // 斜め上へ
    tailGroup.add(tailTop);

    // 異尾の下葉（少し控えめな下のふくらみ）
    const tailBot = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), mat(0x88aabb));
    tailBot.scale.set(0.1, 0.8, 0.6); 
    tailBot.position.set(0, -0.2, -0.5); 
    tailBot.rotation.x = -0.5; 
    tailGroup.add(tailBot);
 
    g.userData.body = bodyGroup; 
    g.userData.tail = tailGroup;
    g.scale.set(1.5, 1.5, 1.5);
    return { mesh: g, segments: [], type: 'fish_climatius' }; 
}

// --- 【古生物学×SE】 ティクターリク：実体化＆解剖学的整合性アップデート ---

function buildTiktaalik() {
    const g = new THREE.Group();
    const mat = (color) => new THREE.MeshStandardMaterial({
        color: color, 
        roughness: 0.7, 
        metalness: 0.2,
        side: THREE.FrontSide // 裏面を表示させない（実体を作る）
    });
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.8 });

    // 1. 【頭部ユニット】
    const headGroup = new THREE.Group();
    headGroup.position.z = 1.2;
    g.add(headGroup);

    const head = new THREE.Mesh(new THREE.SphereGeometry(1.2, 24, 16), mat(0x667744));
    head.scale.set(0.85, 0.35, 1.4); 
    headGroup.add(head);

    // 【現状維持】 目
    for (let side of [-1, 1]) {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12), eyeMat);
        eye.position.set(side * 0.4, 0.3, 0.5);
        headGroup.add(eye);
    }

    // 【修正】 下顎（jaw）：中空の殻ではなく、厚みのある実体へ
    const jaw = new THREE.Group();
    jaw.position.set(0, -0.1, 0.1); 
    headGroup.add(jaw);
    
    // SphereGeometryを極端に潰すことで、中が透けない「身の詰まった」顎にします
    const jawMesh = new THREE.Mesh(new THREE.SphereGeometry(1.1, 16, 12), mat(0x556633));
    jawMesh.scale.set(0.9, 0.15, 1.2); // 扁平な楕円体として実体化
    jawMesh.position.set(0, -0.1, 0.7);
    jaw.add(jawMesh);

    // 2. 【胴部（Torso）】
    const torsoGroup = new THREE.Group();
    torsoGroup.position.z = 0;
    g.add(torsoGroup);

    const torsoMesh = new THREE.Mesh(new THREE.SphereGeometry(1.3, 20, 16), mat(0x667744));
    torsoMesh.scale.set(0.9, 0.7, 1.6);
    torsoGroup.add(torsoMesh);

    // 3. 【尾部（Tail）】
    const tailGroup = new THREE.Group();
    tailGroup.position.z = -1.8;
    torsoGroup.add(tailGroup); 

    const tailMesh = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), mat(0x556633));
    tailMesh.scale.set(0.6, 0.5, 2.0); 
    tailGroup.add(tailMesh);

    // 【修正】 尾鰭：四角（Box）から有機的な楕円（Sphere変形）へ
    const tailFin = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), mat(0x445522));
    tailFin.scale.set(0.05, 1.4, 0.8); // 縦に長く、横に薄い楕円
    tailFin.position.z = -1.6;
    tailGroup.add(tailFin);

    // 4. 【肉鰭（Lobe-fins）】
    const fins = [];
    const finPositions = [
        { x: 1.1, z: 0.2, isFront: true },   { x: -1.1, z: 0.2, isFront: true },
        { x: 0.8, z: -1.0, isFront: false },  { x: -0.8, z: -1.0, isFront: false } // z位置を調整
    ];

    finPositions.forEach(pos => {
        const f = new THREE.Group();
        f.position.set(pos.x, -0.3, pos.z);
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 0.8), mat(0x556633));
        base.position.y = -0.3;
        f.add(base);
        
        const tip = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), mat(0x445522));
        tip.position.y = -0.8;
        tip.scale.set(0.8, 2.0, 0.15);
        f.add(tip);
        
        f.userData.origRot = f.rotation.clone();
        f.userData.isFront = pos.isFront;
        
        // 【修正】 全ての肉鰭を torsoGroup にアタッチ（後肢も胴体末端から生やす）
        torsoGroup.add(f); 
        fins.push(f);
    });

    g.userData = { 
        head: headGroup, 
        jaw: jaw, 
        segments: [torsoGroup, tailGroup], 
        fins: fins 
    };

    return { mesh: g, type: 'swim_tiktaalik' };
}

// --- アニメーション関数（顎の開閉と三部連動） ---

function animateTiktaalik(mesh, clock) {
    if (!mesh || !mesh.userData) return;
    const time = (typeof clock === 'object') ? clock.getElapsedTime() : clock;
    const data = mesh.userData;

    // 1. 【ブラッシュアップ】 顎の開閉（ゆっくりとした呼吸動作）
    if (data.jaw) {
        data.jaw.rotation.x = Math.max(0, Math.sin(time * 1.2) * 0.15);
    }

    // 2. 【首の動き】 独立して周囲を見渡す
    if (data.head) {
        data.head.rotation.y = Math.sin(time * 0.6) * 0.1;
    }

    // 3. 【三部構造のうねり】 イモムシではなく、大きな関節としての動き
    if (data.segments && data.segments.length >= 2) {
        // 胴体のわずかな揺れ
        data.segments[0].rotation.y = Math.sin(time * 2.0) * 0.05;
        // 尾部の大きな振り（胴体から遅れて動く）
        data.segments[1].rotation.y = Math.sin(time * 2.0 - 0.8) * 0.25;
    }

    // 4. 【現状維持】 肉鰭の歩行/遊泳
    if (data.fins) {
        data.fins.forEach((fin) => {
            const phase = (fin.position.x > 0 ? 0 : Math.PI) + (fin.userData.isFront ? 0 : 0.5);
            fin.rotation.x = Math.sin(time * 2.0 + phase) * 0.2;
            fin.rotation.z = (fin.position.x > 0 ? 0.8 : -0.8) + Math.cos(time * 2.0 + phase) * 0.1;
        });
    }
}

function buildStethacanthus() { 
    const g = new THREE.Group(); 
    const bodyGroup = new THREE.Group();
    g.add(bodyGroup);
    
    // 1. 胴体（サメらしい、中央が太い流線型）
    const torsoGeom = new THREE.SphereGeometry(1.2, 24, 20);
    const torso = new THREE.Mesh(torsoGeom, mat(0x445566));
    torso.scale.set(0.8, 1.1, 3.2); 
    bodyGroup.add(torso);
    
    // 2. 頭部（円錐ではなく、少し丸みのあるサメの頭）
    const headGroup = new THREE.Group(); 
    headGroup.position.z = 1.8;
    bodyGroup.add(headGroup);
    const head = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), mat(0x445566));
    head.scale.set(0.9, 0.7, 1.5);
    headGroup.add(head);
    
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12), eyeMat); 
    eyeL.position.set(0.5, 0.2, 0.6); 
    headGroup.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = -0.5; headGroup.add(eyeR);

    // 顎（サメ特有の下側についた口）
    const jaw = new THREE.Group(); 
    jaw.position.set(0, -0.2, 0.5);
    headGroup.add(jaw);
    const jawMesh = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 12), mat(0x334455));
    jawMesh.scale.set(0.9, 0.3, 1.5);
    jawMesh.position.z = 0.4;
    jaw.add(jawMesh);
    g.userData.jaw = jaw;

    // 3. 背びれのブラシ（刷子状突起：この魚の最大の特徴）
    const dorsalBase = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), mat(0x445566)); 
    dorsalBase.scale.set(0.6, 1.8, 1.2);
    dorsalBase.position.set(0, 0.8, 0.5); 
    bodyGroup.add(dorsalBase); 

    const brush = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), mat(0x8899aa)); 
    brush.scale.set(0.8, 0.2, 1.8);
    brush.position.set(0, 1.8, 0.5); // 基部の上に平たく配置
    bodyGroup.add(brush);
    
    // 4. 胸鰭（サメらしいシャープな鰭）
    for (let side of [-1, 1]) {
        const pec = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 12), mat(0x334455));
        pec.scale.set(1.0, 0.1, 1.5);
        pec.position.set(side * 0.8, -0.4, 1.2);
        pec.rotation.z = side * 0.8;
        pec.rotation.y = side * 0.3;
        bodyGroup.add(pec);
    }

    // 5. 尾部 (サメ型の異尾：Heterocercal tail)
    const tailGroup = new THREE.Group(); 
    tailGroup.position.z = -3.2;
    g.add(tailGroup);

    // 尾筒（筋肉質な尾の付け根）
    const tailStalk = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 12), mat(0x445566));
    tailStalk.scale.set(0.4, 0.7, 2.0);
    tailStalk.position.z = -0.8;
    tailGroup.add(tailStalk);

    // 【重要】異尾の上葉（サメらしく大きく斜め上に伸びる）
    const tailTop = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), mat(0x445566));
    tailTop.scale.set(0.1, 2.2, 1.0); 
    tailTop.position.set(0, 0.8, -1.2); 
    tailTop.rotation.x = 0.6; 
    tailGroup.add(tailTop);

    // 異尾の下葉（水流を安定させる下の膨らみ）
    const tailBot = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), mat(0x445566));
    tailBot.scale.set(0.08, 1.0, 0.7); 
    tailBot.position.set(0, -0.3, -0.8); 
    tailBot.rotation.x = -0.5; 
    tailGroup.add(tailBot);

    g.userData.body = bodyGroup;
    g.userData.tail = tailGroup;
    g.scale.set(1.4, 1.4, 1.4);
    return { mesh: g, segments: [], type: 'fish_shark' };
}

// ==========================================
// 4. 生態系管理とAIロジック
// ==========================================
class CreatureObj {
    constructor(def, isRare = false) {
        this.def = def; this.isRare = isRare;
        const b = def.build();
        this.mesh = b.mesh; this.segments = b.segments; this.type = b.type;
        this.offset = b.offset || 0; this.speed = def.speed;
        this.target = null; this.state = 'wander'; this.phase = Math.random() * Math.PI * 2;
        this.jetPhase = 0;

        const spawnX = isRare ? -160 : (Math.random()-0.5)*aquariumRadius*1.5;
        this.mesh.position.set(spawnX, def.yRange[0] + Math.random()*(def.yRange[1]-def.yRange[0]), (Math.random()-0.5)*aquariumRadius*1.5);
        if(['crawl', 'walk', 'floor', 'slide', 'walk_hallu', 'crawl_bothriolepis'].includes(this.type)) this.mesh.position.y = bottomY + this.offset;
        this.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = this; });
    }

    update(time, dummyObj) {
        // 安全のためのガード: meshが正しく生成されていない場合は処理をスキップ
        if (!this.mesh) return;

        if(this.type === 'static' || this.type === 'spin_static') {
            if(this.type === 'spin_static') this.mesh.rotation.y = time * 0.5;
            else this.segments.forEach(s => s.rotation.z = Math.sin(time*0.5 + this.phase)*0.1); 
            return;
        }

        if(this.type === 'drift') {
            this.mesh.position.y += Math.sin(time + this.phase) * 0.02;
            this.mesh.rotation.y += 0.005;
            this.mesh.rotation.z = Math.sin(time * 0.5 + this.phase) * 0.1;
            return;
        }

        if(!this.target || this.mesh.position.distanceTo(this.target) < 5 || (this.state === 'feeding' && !foodMesh.visible)) {
            if(this.state === 'feeding') this.state = 'wander';
            const ty = ['crawl', 'walk', 'floor', 'slide', 'walk_hallu', 'crawl_bothriolepis'].includes(this.type) ? bottomY + this.offset : this.def.yRange[0] + Math.random() * (this.def.yRange[1] - this.def.yRange[0]);
            this.target = new THREE.Vector3((Math.random() - 0.5) * 120, ty, (Math.random() - 0.5) * 120);
        }

        // 水槽外に出ないための移動ロジック（jetタイプも後退で中心に向かうように）
        if(this.mesh.position.length() > aquariumRadius * 0.8) {
            if (this.type === 'jet') {
                this.target.copy(this.mesh.position).multiplyScalar(2.0);
                this.target.y = this.def.yRange[0] + Math.random() * (this.def.yRange[1] - this.def.yRange[0]);
            } else {
                this.target.set(0, this.def.yRange[0] + Math.random() * (this.def.yRange[1] - this.def.yRange[0]), 0);
            }
        }

        let repel = new THREE.Vector3();
        entities.forEach(other => {
            if (other === this || other.type === 'static' || other.type === 'drift') return;
            const dist = this.mesh.position.distanceTo(other.mesh.position);
            if (dist < 6) repel.add(this.mesh.position.clone().sub(other.mesh.position).normalize().multiplyScalar(0.05));
        });

        if(this.type === 'jet') {
            this.jetPhase += 0.01;
            if(this.jetPhase > 1.0 && Math.random() > 0.98) { this.jetPhase = 0; this.speed = -0.7; }
            this.speed += (this.def.speed - this.speed) * 0.05;
        }

        if(foodMesh.visible && this.state !== 'feeding' && !this.isRare) {
            this.state = 'feeding';
            this.target = foodMesh.position.clone();
            if(['crawl', 'walk', 'floor', 'slide', 'walk_hallu', 'crawl_bothriolepis'].includes(this.type)) this.target.y = bottomY + this.offset;
        }
        if (this.state === 'feeding' && foodMesh.visible) {
            this.target = foodMesh.position.clone();
            if(['crawl', 'walk', 'floor', 'slide', 'walk_hallu', 'crawl_bothriolepis'].includes(this.type)) this.target.y = bottomY + this.offset;
        }

        dummyObj.position.copy(this.mesh.position); dummyObj.lookAt(this.target);
        this.mesh.quaternion.slerp(dummyObj.quaternion, 0.02);
        
        const moveVec = new THREE.Vector3(0,0,this.speed).applyQuaternion(this.mesh.quaternion).add(repel);
        this.mesh.position.add(moveVec);
        if(['crawl', 'walk', 'floor', 'slide', 'walk_hallu', 'crawl_bothriolepis'].includes(this.type)) this.mesh.position.y = bottomY + this.offset;

        // --- アニメーション ---
        if(this.type === 'swim' || this.type === 'elegant_swim' || this.type === 'fast_swim' || this.type === 'swim_anomalocaris') {
            this.segments.forEach((seg, i) => {
                seg.rotation.y = Math.sin(time * 3 - i * 0.4 + this.phase) * (this.type==='elegant_swim'?0.05:0.1);
                
                if(seg.userData.fL) { const flap = Math.sin(time*5 - i*0.4 + this.phase)*0.5; seg.userData.fL.rotation.z = flap; seg.userData.fR.rotation.z = -flap; }
                if(seg.userData.topFin) { const wave = Math.sin(time*4 - i*0.5 + this.phase)*0.2; seg.userData.topFin.rotation.x = wave; seg.userData.btmFin.rotation.x = wave; }
                if(seg.userData.btmFin && this.type === 'swim_anomalocaris') {
                    const wave = Math.sin(time*5 - i*0.4 + this.phase)*0.3; 
                    if(seg.userData.btmFin.rotation) seg.userData.btmFin.rotation.z = wave;
                }
            });
            if(this.mesh.userData.tSegs) {
                this.mesh.userData.tSegs.forEach((ps, i) => { 
                    ps.rotation.y = Math.sin(time*3 + i*0.2 + this.phase)*0.2; 
                    ps.rotation.x = Math.sin(time*2 + this.phase)*0.1 - 0.05; 
                }); 
            }
            
            if(this.type === 'swim_anomalocaris') {
                if(this.mesh.userData.mouth) {
                    const mouthScale = 1.0 + Math.sin(time * 5 + this.phase) * 0.15;
                    this.mesh.userData.mouth.scale.set(mouthScale, mouthScale, mouthScale);
                }
                if(this.mesh.userData.armsBase) {
                    const isFeeding = this.state === 'feeding';
                    const targetRotX = isFeeding ? 0.1 : 0.6;
                    this.mesh.userData.armsBase.forEach(armJoints => {
                        armJoints.forEach((joint, i) => {
                            joint.rotation.x += (targetRotX - joint.rotation.x) * 0.1;
                            joint.rotation.x += Math.sin(time * 5 - i * 0.5 + this.phase) * 0.05 * (isFeeding ? 0.5 : 1);
                        });
                    });
                }
            }
            
            if(this.type === 'elegant_swim' && this.mesh.userData.filterNet) {
                this.mesh.userData.filterNet.rotation.x = Math.sin(time * 2 + this.phase) * 0.15;
            }
            
            if (this.mesh.userData.jaw) {
                const jawOpen = Math.max(0, Math.sin(time * 3 + this.phase)) * 0.5;
                this.mesh.userData.jaw.rotation.x = jawOpen;
            }

        } else if(this.type === 'fish_dunk' || this.type === 'fish_shark' || this.type === 'fish_climatius' || this.type === 'fish_lobe') {
            const sway = Math.sin(time * 4 + this.phase);
            if (this.mesh.userData.body) {
                this.mesh.userData.body.rotation.y = sway * 0.08;
                this.mesh.userData.body.rotation.z = sway * 0.02; 
            }
            if (this.mesh.userData.tail) {
                this.mesh.userData.tail.rotation.y = -sway * 0.25; 
            }
            if (this.mesh.userData.jaw) {
                const jawOpen = Math.max(0, Math.sin(time * 1.5 + this.phase) - 0.7) * 1.0; 
                this.mesh.userData.jaw.rotation.x = jawOpen;
            }
            if (this.mesh.userData.fins) {
                this.mesh.userData.fins.forEach((fin, idx) => {
                    if (fin && fin.userData.origRot) {
                        const isLeft = idx % 2 === 0;
                        const phaseOffset = isLeft ? 0 : Math.PI;
                        const frontBackOffset = idx > 1 ? Math.PI / 2 : 0;
                        // ローイング（櫂漕ぎ）動作のシミュレーション：前後にスイングしつつ上下にひねる
                        fin.rotation.z = fin.userData.origRot.z + Math.sin(time * 6 + this.phase + phaseOffset + frontBackOffset) * 0.15;
                        fin.rotation.x = fin.userData.origRot.x + Math.cos(time * 6 + this.phase + phaseOffset + frontBackOffset) * 0.2;
                    }
                });
            }
        } else if(this.type === 'swim_tiktaalik') {
            this.segments.forEach((seg, i) => {
                if(seg.userData.isArm && seg.userData.origRot) {
                    seg.rotation.x = seg.userData.origRot.x + Math.sin(time * 4 + this.phase) * 0.3;
                    seg.rotation.z = seg.userData.origRot.z + Math.cos(time * 4 + this.phase) * 0.1;
                } else if (!seg.userData.isArm) {
                    seg.rotation.y = Math.sin(time * 2 - i * 0.5 + this.phase) * 0.15;
                }
            });
            if (this.mesh.userData.jaw) {
                this.mesh.userData.jaw.rotation.x = Math.max(0, Math.sin(time * 2 + this.phase)) * 0.6;
            }
        } else if(this.type === 'eurypterid') {
            this.segments.forEach((seg, i) => {
                if(seg.userData.isArm) {
                    seg.rotation.y = Math.sin(time * 3 + this.phase) * 0.2;
                    if(seg.userData.j2) seg.userData.j2.rotation.x = 0.8 + Math.sin(time * 6 + this.phase) * 0.2;
                    if(seg.userData.j3) seg.userData.j3.rotation.x = 0.5 + Math.sin(time * 6 + this.phase + 1) * 0.3;
                }
                else if(seg.userData.padL) { const flap = Math.sin(time * 6 + this.phase) * 0.5; seg.userData.padL.rotation.z = flap; seg.userData.padR.rotation.z = -flap; }
                else seg.rotation.x = Math.sin(time * 4 - i*0.4 + this.phase) * 0.1;
            });
        } else if(this.type === 'clumsy_swim') {
            this.mesh.rotation.z = Math.sin(time * 5 + this.phase) * 0.2; this.mesh.rotation.y += Math.sin(time * 3 + this.phase) * 0.02;
            if(this.segments[0]) this.segments[0].rotation.y = Math.sin(time * 15 + this.phase) * 0.3;
        } else if(this.type === 'jet') {
            this.segments.forEach(s => { s.mesh.rotation.x = Math.sin(time*4 + s.angle + s.index*0.5) * 0.15; });
        } else if(this.type === 'walk' || this.type === 'walk_hallu') {
            this.segments.forEach((seg, i) => {
                const walkPhase = time * 8 - i * 1.2 + this.phase;
                if(seg.userData.legs) {
                    seg.userData.legs[0].rotation.z = 0.2 + Math.sin(walkPhase) * 0.4; 
                    seg.userData.legs[1].rotation.z = -0.2 + Math.sin(walkPhase + Math.PI) * 0.4;
                    seg.userData.legs[0].rotation.x = Math.max(0, -Math.cos(walkPhase)) * 0.5; 
                    seg.userData.legs[1].rotation.x = Math.max(0, -Math.cos(walkPhase + Math.PI)) * 0.5;
                    
                    if(this.type === 'walk_hallu') {
                        seg.userData.legs.forEach(leg => {
                            leg.children.forEach((mesh, index) => {
                                if(mesh.geometry && mesh.geometry.type === 'SphereGeometry') {
                                    mesh.position.x = Math.sin(walkPhase * 2 + index) * 0.05;
                                }
                            });
                        });
                    }
                }
                seg.rotation.x = Math.sin(walkPhase) * 0.05;
            });
            if(this.type === 'walk_hallu' && this.mesh.userData.headGroup) {
                const isFeeding = (this.state === 'feeding' && this.mesh.position.distanceTo(this.target) < 15);
                const targetRotX = isFeeding ? -0.8 : 0;
                this.mesh.userData.headGroup.rotation.x += (targetRotX - this.mesh.userData.headGroup.rotation.x) * 0.1;
            }
        } else if (this.type === 'crawl_bothriolepis') {
            const scuttle = time * 8 + this.phase;
            if (this.mesh.userData.arms) {
                this.mesh.userData.arms.forEach((arm, i) => {
                    const phaseOffset = i === 0 ? 0 : Math.PI;
                    // ボトリオレピスの這い回る腕のアニメーション（ローイング動作）
                    arm.base.rotation.y = arm.side * 1.5 + Math.sin(scuttle + phaseOffset) * 0.5;
                    arm.base.rotation.x = Math.cos(scuttle + phaseOffset) * 0.2;
                    arm.elbow.rotation.y = arm.side * 0.5 + Math.sin(scuttle + phaseOffset - 1.0) * 0.3;
                });
            }
            this.segments.forEach(seg => seg.rotation.y = Math.sin(scuttle)*0.1);
            this.mesh.position.y = bottomY + this.offset + Math.abs(Math.sin(scuttle*2))*0.1;
        } else if (this.type === 'crawl') {
            this.segments.forEach((seg, i) => {
                const scuttle = time * 15 + i;
                if(seg.userData.legs) { seg.userData.legs[0].rotation.x = Math.sin(scuttle)*0.5; seg.userData.legs[1].rotation.x = Math.sin(scuttle+Math.PI)*0.5; }
                seg.rotation.y = Math.sin(time * 3 - i * 0.5 + this.phase) * 0.05;
            });
        } else if (this.type === 'floor') {
            this.segments.forEach(seg => { seg.rotation.z = Math.sin(time * 2 + this.phase) * 0.05; });
        } else if(this.type === 'snake') {
            this.segments.forEach((seg, i) => { seg.rotation.y = Math.sin(time*6 - i*0.3 + this.phase) * (i/this.segments.length)*0.4; });
        } else if(this.type === 'slide') {
            this.mesh.position.y = bottomY + this.offset + Math.sin(time * 2 + this.phase) * 0.05;
        }
    }
}

function switchEra(era) {
    currentEra = era;
    document.querySelectorAll('.era-btn').forEach(btn => btn.classList.remove('active'));
    const targetBtn = document.getElementById('btn-' + era);
    if(targetBtn) targetBtn.classList.add('active');
    
    closeHolo(); document.getElementById('alert').style.display = 'none';
    scene.background.setHex(DB[era].bg); scene.fog.color.setHex(DB[era].bg);
    
    entities.forEach(e => scene.remove(e.mesh)); entities = []; rareEntity = null;
    while(envGroup.children.length > 0) envGroup.remove(envGroup.children[0]);

    // 砂紋のある海底地形の生成
    const planeGeo = new THREE.PlaneGeometry(600, 600, 80, 80);
    const pos = planeGeo.attributes.position;
    for(let i=0; i<pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const zBump = Math.sin(x*0.1)*1.5 + Math.cos(y*0.1)*1.5 + Math.sin(x*0.05 + y*0.05)*2;
        pos.setZ(i, zBump);
    }
    planeGeo.computeVertexNormals();
    const ground = new THREE.Mesh(planeGeo, new THREE.MeshStandardMaterial({ 
        color: DB[era].bg, roughness: 0.9, flatShading: true 
    }));
    ground.rotation.x = -Math.PI/2; ground.position.y = bottomY; envGroup.add(ground);
    
    const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(200, 200, 300, 32, 1, true), new THREE.MeshBasicMaterial({ color: DB[era].bg, side: THREE.BackSide, transparent: true, opacity: 0.8 }));
    cylinder.position.y = 50; envGroup.add(cylinder);

    // 水中の太陽光（God Rays）演出
    sunRays = new THREE.Group();
    const rayGeo = new THREE.CylinderGeometry(10, 60, 200, 16, 1, true);
    const rayColor = era === 'cambrian' ? 0xcceeff : era === 'ordovician' ? 0x88ccff : 0xaaffcc;
    const rayMat = new THREE.MeshBasicMaterial({ 
        color: rayColor, transparent: true, opacity: 0.04, 
        blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide 
    });
    for(let i=0; i<6; i++) {
        const ray = new THREE.Mesh(rayGeo, rayMat);
        ray.position.set((Math.random()-0.5)*150, 50, (Math.random()-0.5)*150);
        ray.rotation.x = (Math.random()-0.5)*0.3;
        ray.rotation.z = (Math.random()-0.5)*0.3;
        sunRays.add(ray);
    }
    envGroup.add(sunRays);

    if(era === 'ediacaran') {
        for(let i=0; i<15; i++) {
            const st = buildStromatolite(); st.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            st.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'ストロマトライト', en:'Stromatolite', latin:'Cyanobacteria', desc:'光合成を行うシアノバクテリアのコロニー。' } }; }); envGroup.add(st.mesh);
            const cm = buildCyclomedusa(); cm.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            cm.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'サイクロメデューサ', en:'Cyclomedusa', latin:'Cyclomedusa radiata', desc:'同心円状の隆起を持つエディアカラ紀の円盤状生物。' } }; }); envGroup.add(cm.mesh);
        }
    } else if(era === 'cambrian') {
        for(let i=0; i<20; i++) {
            const sp = buildSponge(); sp.mesh.position.set((Math.random()-0.5)*250, bottomY + sp.mesh.position.y, (Math.random()-0.5)*250);
            sp.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'カイメン', en:'Sponge', latin:'Porifera', desc:'海水を濾過して生きる原始的な動物。' } }; }); envGroup.add(sp.mesh);
            const cr = buildCrinoid(); cr.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            cr.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'ウミユリ', en:'Crinoid', latin:'Crinoidea', desc:'植物のような姿の棘皮動物。' } }; }); envGroup.add(cr.mesh);
            const ch = buildChoia(); ch.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            ch.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'チョイア', en:'Choia', latin:'Choia carteri', desc:'放射状の長い棘を持つカンブリア紀の海綿動物。' } }; }); envGroup.add(ch.mesh);
        }
    } else if(era === 'ordovician') {
        for(let i=0; i<15; i++) {
            const sa = buildSeaApple(); sa.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            sa.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'海林檎', en:'Sea Apple', latin:'Cystoidea', desc:'海底に固定された絶滅棘皮動物。' } }; }); envGroup.add(sa.mesh);
            const hc = buildHornCoral(); hc.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            hc.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'四放サンゴ', en:'Horn Coral', latin:'Rugosa', desc:'角のような形をした単体サンゴ。' } }; }); envGroup.add(hc.mesh);
        }
    } else if(era === 'silurian') {
        for(let i=0; i<15; i++) {
            const sa = buildSeaApple(); sa.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            sa.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'海林檎', en:'Sea Apple', latin:'Cystoidea', desc:'海底に固定された絶滅棘皮動物。' } }; }); envGroup.add(sa.mesh);
            const hy = buildHalysites(); hy.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            hy.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'クサリサンゴ', en:'Halysites', latin:'Halysitidae', desc:'小さなチューブ状の個体が鎖のように連なる床板サンゴ。' } }; }); envGroup.add(hy.mesh);
        }
    } else if(era === 'devonian') {
         for(let i=0; i<10; i++) {
            const cr = buildCrinoid(); cr.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            cr.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'ウミユリ', en:'Crinoid', latin:'Crinoidea', desc:'植物のような姿の棘皮動物。' } }; }); envGroup.add(cr.mesh);
            const sp = buildSponge(); sp.mesh.position.set((Math.random()-0.5)*250, bottomY + sp.mesh.position.y, (Math.random()-0.5)*250);
            sp.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'カイメン', en:'Sponge', latin:'Porifera', desc:'海水を濾過して生きる原始的な動物。' } }; }); envGroup.add(sp.mesh);
            const hc = buildHornCoral(); hc.mesh.position.set((Math.random()-0.5)*250, bottomY, (Math.random()-0.5)*250);
            hc.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'四放サンゴ', en:'Horn Coral', latin:'Rugosa', desc:'角のような形をした単体サンゴ。' } }; }); envGroup.add(hc.mesh);
        }
    }

    DB[era].creatures.forEach(def => {
        for(let i=0; i<def.count; i++) { const c = new CreatureObj(def); scene.add(c.mesh); entities.push(c); }
    });
}

function checkRareSpawn() {
    if(!rareEntity && Math.random() < 0.001) {
        const def = DB[currentEra].rare;
        rareEntity = new CreatureObj(def, true);
        scene.add(rareEntity.mesh); entities.push(rareEntity);
        const alertBox = document.getElementById('alert');
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
    }
}

// ==========================================
// 5. インタラクション & カメラ & シェア機能
// ==========================================
const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
let isDragging = false, pointerDownTime = 0, previousMouse = { x: 0, y: 0 };

window.addEventListener('wheel', (e) => { targetCamRadius = Math.max(10, Math.min(180, targetCamRadius + e.deltaY * 0.05)); });
window.addEventListener('pointerdown', (e) => { 
    if(e.target.closest('button') || e.target.closest('#hologram-ui')) return; 
    isDragging = true; pointerDownTime = Date.now(); previousMouse = { x: e.clientX, y: e.clientY }; 
});
window.addEventListener('pointermove', (e) => {
    if(isDragging) { camAngleX -= (e.clientX - previousMouse.x) * 0.005; camAngleY -= (e.clientY - previousMouse.y) * 0.005; camAngleY = Math.max(-0.2, Math.min(Math.PI/2.1, camAngleY)); }
    previousMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('pointerup', (e) => {
    if(!isDragging) return; isDragging = false;
    if(Date.now() - pointerDownTime < 250) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera); const hits = raycaster.intersectObjects(scene.children, true);
        
        let hit = null; for(let i=0; i<hits.length; i++) { if(hits[i].object.userData.entityData) { hit = hits[i].object.userData.entityData; break; } }
        
        if (hit && !hit.isStatic) {
            document.getElementById('holo-title').innerText = `${hit.def.jp} / ${hit.def.en}`;
            document.getElementById('holo-latin').innerText = `学名: ${hit.def.latin || 'Unknown'}`;
            document.getElementById('holo-desc').innerText = hit.def.desc;
            document.getElementById('hologram-ui').classList.add('active');
        } else {
            closeHolo();
            const dropPos = new THREE.Vector3().copy(camera.position).add(raycaster.ray.direction.multiplyScalar(60));
            dropPos.y = Math.min(40, Math.max(bottomY + 1, dropPos.y));
            foodMesh.position.copy(dropPos); 
            foodMesh.visible = true;
            
            if(window.foodTimeout) clearTimeout(window.foodTimeout);
            window.foodTimeout = setTimeout(() => { foodMesh.visible = false; }, 8000);
        }
    }
});

// ▼▼▼ ここから追加：スマホのピンチズームと画面スクロール防止 ▼▼▼ let initialPinchDist = 0; window.addEventListener('touchstart', (e) => { // 2本指でタッチした時だけ、指の距離を記録 if (e.touches.length === 2) { initialPinchDist = Math.hypot( e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY ); } }, { passive: false }); window.addEventListener('touchmove', (e) => { // 【重要】スマホの画面自体がスクロールしてしまうのを防ぐ if (e.cancelable) { e.preventDefault(); } // 2本指でのズーム（ピンチ）処理 if (e.touches.length === 2) { const currentDist = Math.hypot( e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY ); const diff = initialPinchDist - currentDist; // ズーム範囲を10〜180に制限（wheelイベントと同じ基準） targetCamRadius = Math.max(10, Math.min(180, targetCamRadius + diff * 0.1)); initialPinchDist = currentDist; } }, { passive: false }); // ▲▲▲ 追加ここまで ▲▲▲

function closeHolo() { document.getElementById('hologram-ui').classList.remove('active'); }
window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

// 撮影＆シェアボタンのロジック
document.getElementById('camera-btn').addEventListener('click', async () => {
    renderer.render(scene, camera);
    const dataURL = renderer.domElement.toDataURL('image/png');
    
    const shareText = '古代の海を探索中！ #AncientLens #古生物 #Web3D';
    const shareUrl = window.location.href; // 現在のページのURLを自動取得
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    // 【修正】パスを正確に指定し、URLを連結
    const xBase = 'https://twitter.com/intent/tweet';
    const xUrl = xBase + '?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(shareUrl);

    if (isMobile && navigator.canShare) {
        try {
            const res = await fetch(dataURL);
            const blob = await res.blob();
            const file = new File([blob], 'ancient-lens.png', { type: 'image/png' });
            await navigator.share({ files: [file], text: shareText });
        } catch (e) { console.error(e); }
    } else {
                // PC向け：確実にXの投稿画面を開く（最優先）
        const xWindow = window.open(xUrl, '_blank');

        if (!xWindow) {
            alert("ポップアップがブロックされました。ブラウザの設定で許可してください。");
        }

        // 画像を強制的にダウンロードさせる
        const a = document.createElement('a');
        a.href = dataURL;
        a.download = 'ancient-lens-snapshot.png';
        a.click();

        // 裏でクリップボードコピーも試みる（成功すればCtrl+Vで貼れる）
        try {
            const res = await fetch(dataURL);
            const blob = await res.blob();
            await navigator.clipboard.write([
                new ClipboardItem({ "image/png": blob })
            ]);
            alert("画像を保存し、クリップボードにもコピーしました！\nXの画面で貼り付け（Ctrl+V）るか、ダウンロードした画像を使ってください。");
        } catch (err) {
            console.warn("Clipboard copy failed.");
            // すでにダウンロードは済んでいるので、案内のみ
            alert("画像をダウンロードフォルダーに保存しました！Xの画面でアップロードしてシェアしてください。");
        }
    }
});

// ==========================================
// 6. メインループ
// ==========================================
const dummyObj = new THREE.Object3D();
switchEra('cambrian');

function animate() {
    requestAnimationFrame(animate); const time = Date.now() * 0.002;
    checkRareSpawn();

    if(foodMesh.visible) {
        foodMesh.position.y -= 0.04;
        foodMesh.position.x += Math.sin(time * 5) * 0.02;
        foodMesh.position.z += Math.cos(time * 4) * 0.02;
        if(foodMesh.position.y < bottomY + 0.5) foodMesh.position.y = bottomY + 0.5;
    }

    // パーティクルのアニメーション
    const positions = particles.geometry.attributes.position.array;
    const velocities = particles.geometry.attributes.velocity.array;
    for(let i=0; i<particleCount; i++) {
        positions[i*3 + 1] += velocities[i];
        positions[i*3] += Math.sin(time * 2 + i) * 0.02; 
        positions[i*3 + 2] += Math.cos(time * 1.5 + i) * 0.02; 
        if(positions[i*3 + 1] > 60) {
            positions[i*3 + 1] = bottomY;
            positions[i*3] = (Math.random() - 0.5) * 300;
            positions[i*3 + 2] = (Math.random() - 0.5) * 300;
        }
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // 太陽光（God Rays）のアニメーション
    if (sunRays) {
        sunRays.rotation.y += 0.001;
        sunRays.children.forEach((ray, i) => {
            ray.rotation.x = Math.sin(time * 0.5 + i) * 0.05;
            ray.rotation.z = Math.cos(time * 0.3 + i) * 0.05;
        });
    }

    camRadius += (targetCamRadius - camRadius) * 0.1;
    const zoomRatio = Math.max(0, Math.min(1, (camRadius - 20) / 80)); 
    const focusY = (bottomY + 8) + zoomRatio * Math.abs(bottomY + 8);
    camera.position.x = camRadius * Math.sin(camAngleX) * Math.cos(camAngleY);
    camera.position.y = focusY + Math.max(2, camRadius * Math.sin(camAngleY)); 
    camera.position.z = camRadius * Math.cos(camAngleX) * Math.cos(camAngleY);
    camera.lookAt(0, focusY, 0);

    // --- クリーチャーごとの更新処理 ---
entities.forEach(ent => {
    // 1. 位置や向きの更新
    try {
        ent.update(time, dummyObj);
    } catch (e) { }

    // --- 【修正ポイント】clockオブジェクトをシミュレートして渡す ---
    const clockSim = { getElapsedTime: () => time };

    if (ent.type === 'coccosteus') {
        // time ではなく clockSim を渡す
        animateCoccosteus(ent.mesh, clockSim);
    }

    if (ent.type === 'fish_astraspis') {
        // アストラスピスも念のため統一（内部で型チェックしていればそのままでもOK）
        animateAstraspis(ent.mesh, clockSim);
    }
    // --------------------------------------------------

    // ティクターリク専用
    if (ent.type === 'swim_tiktaalik') {
        animateTiktaalik(ent.mesh, time);
    }
        // --------------------------

        // 2. 個別の脚アニメーションの呼び出し
        if (ent.mesh && ent.mesh.userData && ent.mesh.userData.legs) {
            
            // 型チェックをして、適切なアニメーション関数を呼ぶ
            // ent.type や ent.creatureType の値に合わせて条件を調整してください
            if (ent.type === 'belinurus' || ent.creatureType === 'belinurus') {
                
                animateBelinurus(ent.mesh, { getElapsedTime: () => time });
                
            } else if (ent.type === 'crawl' || ent.creatureType === 'bunstodera') {
                
                // ブンストデラの判定。buildBunstoderaで type: 'crawl' としていた場合はこちら
                animateBunstodera(ent.mesh, { getElapsedTime: () => time });
                
            }
        }
    });

    renderer.render(scene, camera);
}
animate();
