<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D - Visualization Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000b1a; font-family: sans-serif; user-select: none; color: #fff; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 40, 80, 0.9); backdrop-filter: blur(10px);
            border: 2px solid #00ffff; padding: 20px; border-radius: 12px; z-index: 100; display: none; width: 280px;
        }
        #hologram-ui.active { display: block; }
        #holo-title { margin: 0 0 10px 0; color: #00ffff; font-size: 20px; text-align: center; }
        #holo-desc { font-size: 14px; line-height: 1.5; color: #e0f8f8; }
        #close-btn {
            background: #00ffff; border: none; color: #000; font-weight: bold;
            padding: 10px; cursor: pointer; width: 100%; margin-top: 15px; border-radius: 4px;
        }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #00ffff; font-size: 12px; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
<div id="hologram-ui">
    <h2 id="holo-title">探査報告</h2>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">OK</button>
</div>
<div id="hint">ドラッグ：視点回転 / 生物タップ：詳細</div>

<script src="https://cdnjs.cloudflare.com"></script>
<script>
// --- 1. シーン・カメラ・レンダラー ---
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x00060d);
scene.fog = new THREE.Fog(0x00060d, 10, 150);

var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 20, 80);
camera.lookAt(0, 0, 0);

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// --- 2. ライティング（真っ暗対策で大幅強化） ---
var ambLight = new THREE.AmbientLight(0xffffff, 0.6); // 全体を底上げ
scene.add(ambLight);

var pointLight = new THREE.PointLight(0x00ffff, 2, 200);
pointLight.position.set(0, 50, 0);
scene.add(pointLight);

// --- 3. 環境（海底とマリンスノー） ---
var ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshPhongMaterial({ color: 0x0a1a2a })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -30;
scene.add(ground);

var snowGeo = new THREE.BufferGeometry();
var snowCoords = [];
for(var i=0; i 80) e.mesh.rotateY(Math.PI); // 境界で反転
        
        // 体のくねくね
        for(var s=0; s<e.segments.length; s++){
            e.segments[s].rotation.y = Math.sin(Date.now()*0.005 + s*0.5) * 0.1;
        }
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
