        #era-menu {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0, 10, 20, 0.85); padding: 8px 12px;
            border-radius: 40px; border: 1px solid #0ff; z-index: 50; box-shadow: 0 0 15px rgba(0,255,255,0.2);
        }
        .era-btn {
            background: transparent; border: 1px solid rgba(0,255,255,0.2); color: #88dddd;
            padding: 8px 16px; border-radius: 30px; font-size: 11px; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .era-btn span { display: block; font-size: 14px; font-weight: bold; margin-top: 2px; }

        .era-btn:hover:not(.active) { background: rgba(0,255,255,0.1); }

        /* レア生物アラート */
        #alert {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);

        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 25, 45, 0.9); backdrop-filter: blur(15px);
            border: 2px solid #00ffff; box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

let rareEntity = null;

// マテリアルヘルパー
const mat = (color, transmission=0, roughness=0.6) => {
    if(transmission > 0) return new THREE.MeshPhysicalMaterial({ color, transmission, roughness, transparent: true });
    return new THREE.MeshStandardMaterial({ color, roughness });
};

// --- エディアカラ紀 ---
function buildDickinsonia() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.6, 0.2, 24), mat(0xccaabb, 0.2, 0.8));
    body.scale.set(1.5, 1, 1); g.add(body);
    return { mesh: g, segments: [body], type: 'slide' };
}
function buildKimberella() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 3, 16), mat(0xaa7755, 0.1));
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), mat(0xaa7755, 0.1)); head.position.y = 1.5; body.add(head);
    const tail = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), mat(0xaa7755, 0.1)); tail.position.y = -1.5; body.add(tail);
    body.rotation.z = Math.PI/2; g.add(body);
    const frill = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 2.2), mat(0xcc9977, 0.4)); g.add(frill);
    return { mesh: g, segments: [body, frill], type: 'slide' };
}

// --- カンブリア紀 ---
function buildAnomalocaris() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const head = new THREE.Mesh(new THREE.SphereGeometry(1.4, 16, 12), mat(0x1a6655, 0.3)); head.scale.set(1.2, 0.6, 1); g.add(head);
    for(let side of [-1, 1]) {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshBasicMaterial({color:0})); eye.position.set(1.4*side, 0.6, 0.5); head.add(eye);
        // 前肢（多関節）
        const armBase = new THREE.Group(); armBase.position.set(0.6*side, -0.3, 1.2); head.add(armBase);
        let curr = armBase;
        for(let k=0; k<6; k++) {
            const joint = new THREE.Group(); joint.position.z = 0.4;
            const part = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.5), mat(0x1a6655)); part.position.z = 0.25;
            const spine = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.4), mat(0x1a6655)); spine.position.set(0, -0.2, 0.25);
            joint.add(part, spine); curr.add(joint); curr = joint;
            if(!g.userData.arms) g.userData.arms = []; g.userData.arms.push(joint);
        }
    }
    for(let i=0; i<11; i++) {
        const s = 1 - Math.pow((i-2)/9, 2); const seg = new THREE.Group(); if(i>0) seg.position.z = -1.2 * s;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1.1, 12, 12), mat(0x1a6655, 0.3)); body.scale.set(1.5*s, 0.5*s, 1.2*s); seg.add(body);
        if(i>0 && i<10) {
            const fL = new THREE.Mesh(new THREE.BoxGeometry(3.5*s, 0.05, 1.5*s), mat(0x22aa88, 0.5)); fL.position.set(1.6*s, 0, 0); seg.add(fL);
            const fR = fL.clone(); fR.position.x = -1.6*s; seg.add(fR); seg.userData = { fL, fR };
        }
        parent.add(seg); segs.push(seg); parent = seg;
    }
    return { mesh: g, segments: segs, type: 'swim' };
}
function buildTrilobite() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const legGeo = new THREE.BoxGeometry(0.05, 0.3, 0.05); legGeo.translate(0, -0.15, 0);
    for(let i=0; i<9; i++) {
        const s = 1-(i/9)*0.5; const seg = new THREE.Group(); if(i>0) seg.position.z = -0.4*s;
        const shell = new THREE.Mesh(new THREE.SphereGeometry(0.8, 12, 8, 0, Math.PI*2, 0, Math.PI/2), mat(0x443322)); shell.scale.set(1.5*s, 0.4*s, 1.2*s); seg.add(shell);
        const legs = []; for(let j of [-1, 1]) { const leg = new THREE.Mesh(legGeo, mat(0x443322)); leg.position.set(0.4*s*j, -0.1, 0); seg.add(leg); legs.push(leg); }
        seg.userData.legs = legs; parent.add(seg); segs.push(seg); parent = seg;
    }
    return { mesh: g, segments: segs, type: 'crawl', offset: 0.3 };
}
function buildWiwaxia() { // カンブリア レア
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16, 0, Math.PI*2, 0, Math.PI/2), mat(0x445566)); g.add(body);
    for(let i=0; i<12; i++) {
        const spine = new THREE.Mesh(new THREE.ConeGeometry(0.05, 3, 4), mat(0x8899aa));
        spine.position.y = 0.5; spine.rotation.x = (Math.random()-0.5); spine.rotation.z = (Math.random()-0.5); g.add(spine);
    }
    return { mesh: g, segments: [body], type: 'crawl', offset: 0.2 };
}

// --- オルドビス紀 ---
function buildSacabambaspis() {
    const g = new THREE.Group(); const segs = [];
    const body = new THREE.Group(); g.add(body); // 全パーツをbodyに統合
    const shell = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), mat(0xaaaa99)); shell.scale.set(0.8, 0.6, 1.5); body.add(shell);
    const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.15), eyeMat); eyeL.position.set(0.6, 0.1, 1.2); body.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.set(-0.6, 0.1, 1.2); body.add(eyeR);
    const mouth = new THREE.Mesh(new THREE.SphereGeometry(0.12), eyeMat); mouth.position.set(0, -0.3, 1.35); mouth.scale.set(2, 0.8, 1); body.add(mouth);
    const tail = new THREE.Group(); tail.position.z = -1.5; body.add(tail);
    const fin = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.2, 0.8), mat(0xaaaa99)); fin.position.z = -0.4; tail.add(fin);
    segs.push(tail);
    return { mesh: g, segments: segs, type: 'clumsy_swim' };
}
function buildOrthoceras() {
    const g = new THREE.Group(); const segs = [];
    const shellGeo = new THREE.ConeGeometry(0.8, 6.0, 16); shellGeo.translate(0, -3.0, 0); shellGeo.rotateX(-Math.PI/2);
    const shell = new THREE.Mesh(shellGeo, mat(0xddccaa)); g.add(shell);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), mat(0xaa5555)); head.position.z = 0.5; g.add(head);
    for(let i=0; i<8; i++) {
        const tentacle = new THREE.Group(); tentacle.position.z = 1.0; tentacle.rotation.z = (i/8)*Math.PI*2; head.add(tentacle);
        let curr = tentacle;
        for(let j=0; j<5; j++) {
            const t = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.05, 0.5), mat(0xaa5555)); t.rotation.x = Math.PI/2; t.position.z = 0.25;
            const w = new THREE.Group(); w.add(t); curr.add(w); curr = w; segs.push({ mesh: w, index: j, angle: i });
        }
    }
    return { mesh: g, segments: segs, type: 'jet', jetPhase: 0 };
}
function buildMaclurites() {
    const g = new THREE.Group(); const segs = [];
    const shellGroup = new THREE.Group();
    for(let i=0; i<4; i++) {
        const torus = new THREE.Mesh(new THREE.TorusGeometry(0.8 - i*0.18, 0.35 - i*0.06, 12, 24), mat(0xaabb88));
        torus.rotation.x = Math.PI/2; torus.position.y = -i*0.15; shellGroup.add(torus);
    }
    shellGroup.position.y = 0.3; g.add(shellGroup);
    return { mesh: g, segments: [shellGroup], type: 'floor', offset: 0.1 }; // 完全に接地
}

// --- デボン紀 ---
function buildDunkleosteus() {
    const g = new THREE.Group(); const segs = []; let parent = g;
    const head = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 3), mat(0x555555, 0, 0.3)); g.add(head); // 装甲
    for(let i=0; i<8; i++) {
        const s = 1 - (i/8)*0.7; const seg = new THREE.Group(); if(i>0) seg.position.z = -1.5;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1.5, 12, 12), mat(0x666666)); body.scale.set(0.8*s, 1*s, 1.2); seg.add(body);
        if(i===7) { const tail = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2, 1), mat(0x555555)); tail.position.z = -1; seg.add(tail); }
        parent.add(seg); segs.push(seg); parent = seg;
    }
    g.scale.set(1.5, 1.5, 1.5);
    return { mesh: g, segments: segs, type: 'swim' };
}
function buildEurypterid() { 
    // 古いr134でエラーになるCapsuleGeometryを避け、SphereとCylinderで滑らかに構築
    const g = new THREE.Group(); const segs = []; let parent = g;
    
    // 頭部（丸みを帯びさせる）
    const head = new THREE.Group();
    const headCyl = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.6, 16), mat(0x663322)); headCyl.rotation.x = Math.PI/2; head.add(headCyl);
    const headSph = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), mat(0x663322)); headSph.position.z = 0.3; headSph.scale.set(1, 1, 0.5); head.add(headSph);
    g.add(head);

    // 滑らかなハサミ
    for(let side of [-1, 1]) {
        const arm = new THREE.Group(); arm.position.set(0.8*side, 0, 0.6); g.add(arm);
        const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 1.2), mat(0x663322)); p1.rotation.x = Math.PI/2; p1.position.z = 0.6; p1.rotation.y = side * -0.3; arm.add(p1);
        const claw = new THREE.Mesh(new THREE.ConeGeometry(0.15, 1.0, 8), mat(0x663322)); claw.position.set(side*0.2, 0, 1.5); claw.rotation.x = Math.PI/2; claw.rotation.z = side * -0.2; arm.add(claw);
        arm.userData.isArm = true; segs.push(arm);
    }

    // 胴体
    for(let i=0; i<8; i++) {
        const s = 1 - (i/8)*0.5; const seg = new THREE.Group(); seg.position.z = i===0 ? -0.6 : -0.6;
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.0*s, 0.3, 0.6), mat(0x663322)); seg.add(body);
        if(i===1) {
            const padL = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.05, 0.6), mat(0x663322)); padL.position.set(1.5, 0, 0); seg.add(padL);
            const padR = padL.clone(); padR.position.x = -1.5; seg.add(padR); seg.userData = { padL, padR };
        }
        parent.add(seg); segs.push(seg); parent = seg;
    }
    g.scale.set(1.2, 1.2, 1.2);
    return { mesh: g, segments: segs, type: 'eurypterid', offset: 0.2 };
}

// ==========================================
// 4. 生態系管理と切り替え
// ==========================================
class CreatureObj {
    constructor(def, isRare = false) {
        this.def = def; this.isRare = isRare;
        const b = def.build();
        this.mesh = b.mesh; this.segments = b.segments; this.type = b.type;
        this.offset = b.offset || 0; this.speed = def.speed;
        this.target = null; this.state = 'wander'; this.phase = Math.random() * Math.PI * 2;
        this.jetPhase = 0;

        this.mesh.position.set((Math.random()-0.5)*150, def.yRange[0] + Math.random()*(def.yRange[1]-def.yRange[0]), (Math.random()-0.5)*150);
        if(['crawl', 'walk', 'floor', 'slide'].includes(this.type)) this.mesh.position.y = bottomY + this.offset;
        this.mesh.traverse(c => { if(c.isMesh) c.userData.entityData = this; });
    }

    update(time, dummyObj) {
        // 重なり回避（簡易版）
        entities.forEach(other => {
            if (other !== this) {
                const dist = this.mesh.position.distanceTo(other.mesh.position);
                if (dist > 0 && dist < 4) {
                    const dir = new THREE.Vector3().subVectors(this.mesh.position, other.mesh.position).normalize();
                    this.mesh.position.addScaledVector(dir, 0.05); // 少し押し出す
                }
            }
        });

        // チョッカクガイ ジェット噴射
        if(this.type === 'jet') {
            this.jetPhase += 0.01;
            if(this.jetPhase > 1.0 && Math.random() > 0.98) { this.jetPhase = 0; this.speed = -0.6; } 
            this.speed += (this.def.speed - this.speed) * 0.05;
        }

        // 行動限界（遠くに行き過ぎたら中央を向く）
        if(this.mesh.position.length() > 140) {
            this.target = new THREE.Vector3(0, this.mesh.position.y, 0);
        } else if(!this.target || this.mesh.position.distanceTo(this.target) < 5) {
            const ty = ['crawl', 'walk', 'floor', 'slide'].includes(this.type) ? bottomY + this.offset : this.def.yRange[0] + Math.random() * (this.def.yRange[1] - this.def.yRange[0]);
            this.target = new THREE.Vector3((Math.random() - 0.5) * 120, ty, (Math.random() - 0.5) * 120);
        }
        
        dummyObj.position.copy(this.mesh.position); dummyObj.lookAt(this.target);
        this.mesh.quaternion.slerp(dummyObj.quaternion, 0.02);
        this.mesh.translateZ(this.speed);
        if(['crawl', 'walk', 'floor', 'slide'].includes(this.type)) this.mesh.position.y = bottomY + this.offset;

        // アニメーション計算
        if(this.type === 'swim') {
            this.segments.forEach((seg, i) => {
                seg.rotation.x = Math.sin(time * 3 - i * 0.4 + this.phase) * 0.12;
                seg.rotation.y = Math.sin(time * 1.5 - i * 0.2 + this.phase) * 0.08;
                if(seg.userData.fL) { const flap = Math.sin(time*4 - i*0.4 + this.phase)*0.4; seg.userData.fL.rotation.z = flap; seg.userData.fR.rotation.z = -flap; }
            });
            // アノマロカリスの触手関節アニメーション
            if(this.mesh.userData.arms) {
                this.mesh.userData.arms.forEach((a, i) => { a.rotation.x = Math.sin(time*5 - i*0.5 + this.phase) * 0.2; });
            }
        } else if(this.type === 'eurypterid') {
            this.segments.forEach((seg, i) => {
                if(seg.userData.isArm) { seg.rotation.y = Math.sin(time * 3 + this.phase) * 0.2; }
                else {
                    seg.rotation.x = Math.sin(time * 4 - i * 0.5 + this.phase) * 0.1;
                    if(seg.userData.padL) { const flap = Math.sin(time * 6 + this.phase) * 0.5; seg.userData.padL.rotation.z = flap; seg.userData.padR.rotation.z = -flap; }
                }
            });
        } else if(this.type === 'clumsy_swim') {
            this.mesh.rotation.z = Math.sin(time * 5 + this.phase) * 0.2; this.mesh.rotation.y += Math.sin(time * 3 + this.phase) * 0.02;
            this.segments[0].rotation.y = Math.sin(time * 15 + this.phase) * 0.3;
        } else if(this.type === 'jet') {
            this.segments.forEach(s => { s.mesh.rotation.x = Math.sin(time*3 + s.angle + s.index*0.5) * 0.1; });
        } else if(this.type === 'crawl') {
            this.segments.forEach((seg, i) => {
                const scuttle = time * 15 + i;
                if(seg.userData.legs) { seg.userData.legs[0].rotation.x = Math.sin(scuttle)*0.5; seg.userData.legs[1].rotation.x = Math.sin(scuttle+Math.PI)*0.5; }
                seg.rotation.y = Math.sin(time * 3 - i * 0.5 + this.phase) * 0.05;
            });
        } else if(this.type === 'slide') {
            this.segments.forEach(seg => { seg.position.y = Math.sin(time * 2 + this.phase) * 0.2; });
        } else if(this.type === 'floor') {
            this.segments.forEach(seg => { seg.rotation.z = Math.sin(time * 2 + this.phase) * 0.05; });
        }
    }
}

function switchEra(era) {
    currentEra = era;
    
    // UIの切り替え (querySelectorでエラーを回避)
    document.querySelectorAll('.era-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.era-btn[onclick="switchEra('${era}')"]`).classList.add('active');
    
    closeHolo();
    document.getElementById('alert').style.display = 'none';

    // 背景とフォグの色変更
    scene.background.setHex(DB[era].bg); 
    scene.fog.color.setHex(DB[era].bg);
    
    // シーンのリセット
    entities.forEach(e => scene.remove(e.mesh)); entities = []; rareEntity = null;
    while(envGroup.children.length > 0) envGroup.remove(envGroup.children[0]);

    // 海底
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: DB[era].bg, roughness: 1.0 }));
    ground.rotation.x = -Math.PI/2; ground.position.y = bottomY; envGroup.add(ground);
    
    // 円柱水槽
    const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(200, 200, 300, 32, 1, true), new THREE.MeshBasicMaterial({ color: DB[era].bg, side: THREE.BackSide, transparent: true, opacity: 0.8 }));
    cylinder.position.y = 50; envGroup.add(cylinder);

    // カンブリア紀のカイメン
    if(era === 'cambrian') {
        for(let i=0; i<30; i++) {
            const h = 2 + Math.random()*5;
            const sponge = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, h, 8), mat(0x778855));
            sponge.position.set((Math.random()-0.5)*200, bottomY + h/2, (Math.random()-0.5)*200);
            sponge.traverse(c => { if(c.isMesh) c.userData.entityData = { def: { jp:'カイメン', en:'Sponge', latin:'Porifera', desc:'海水を濾過して生きる原始的な動物。海底に生息しています。' } }; });
            envGroup.add(sponge);
        }
    }

    // 生物のスポーン
    DB[era].creatures.forEach(def => {
        for(let i=0; i<def.count; i++) {
            const c = new CreatureObj(def); scene.add(c.mesh); entities.push(c);
        }
    });
}

// 希少生物のランダム出現
function checkRareSpawn() {
    if(!rareEntity && Math.random() < 0.0005) { // 約0.05%の確率
        const def = DB[currentEra].rare;
        rareEntity = new CreatureObj(def, true);
        rareEntity.mesh.position.set(-140, def.yRange[0], (Math.random()-0.5)*50);
        scene.add(rareEntity.mesh); entities.push(rareEntity);
        
        const alertBox = document.getElementById('alert');
        alertBox.style.display = 'block';
        setTimeout(() => { alertBox.style.display = 'none'; }, 6000);
    }
}

// ==========================================
// 5. 操作とUI
// ==========================================
const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
let isDragging = false, pointerDownTime = 0, previousMouse = { x: 0, y: 0 };

window.addEventListener('wheel', (e) => { targetCamRadius = Math.max(15, Math.min(180, targetCamRadius + e.deltaY * 0.05)); });
window.addEventListener('pointerdown', (e) => { 
    if(e.target.closest('button') || e.target.closest('#hologram-ui')) return; 
    isDragging = true; pointerDownTime = Date.now(); previousMouse = { x: e.clientX, y: e.clientY }; 
});
window.addEventListener('pointermove', (e) => {
    if(isDragging) { camAngleX -= (e.clientX - previousMouse.x) * 0.005; camAngleY -= (e.clientY - previousMouse.y) * 0.005; camAngleY = Math.max(-0.2, Math.min(Math.PI/2.1, camAngleY)); }
    previousMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('pointerup', (e) => {
    if(!isDragging) return; isDragging = false;
    if(Date.now() - pointerDownTime < 250) {
        // ← 修正：clientY ではなく e.clientY
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera); const hits = raycaster.intersectObjects(scene.children, true);
        let hit = null; for(let i=0; i<hits.length; i++) { if(hits[i].object.userData.entityData) { hit = hits[i].object.userData.entityData; break; } }
        
        if (hit) {
            document.getElementById('holo-title').innerText = `${hit.def.jp} / ${hit.def.en}`;
            document.getElementById('holo-latin').innerText = `学名: ${hit.def.latin || 'Unknown'}`;
            document.getElementById('holo-desc').innerText = hit.def.desc;
            document.getElementById('hologram-ui').classList.add('active');
        } else {
            closeHolo();
        }
    }
});
function closeHolo() { document.getElementById('hologram-ui').classList.remove('active'); }
window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

// ==========================================
// 6. メインループ
// ==========================================
const dummyObj = new THREE.Object3D();
switchEra('cambrian');

function animate() {
    requestAnimationFrame(animate); const time = Date.now() * 0.002;
    checkRareSpawn();

    camRadius += (targetCamRadius - camRadius) * 0.1; const zoomRatio = Math.max(0, Math.min(1, (camRadius - 20) / 80)); const focusY = (bottomY + 8) + zoomRatio * Math.abs(bottomY + 8);
    camera.position.x = camRadius * Math.sin(camAngleX) * Math.cos(camAngleY); camera.position.y = focusY + camRadius * Math.sin(camAngleY); camera.position.z = camRadius * Math.cos(camAngleX) * Math.cos(camAngleY);
    camera.lookAt(0, focusY, 0);

    entities.forEach(ent => ent.update(time, dummyObj));
    renderer.render(scene, camera);
}
animate();
</script>
