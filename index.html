<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【教材用】カンブリア紀・深海探査シミュレーター</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; }
        canvas { display: block; }
        /* 探査UI */
        #ui {
            position: absolute; top: 20px; left: 20px; width: 300px; padding: 20px;
            background: rgba(0, 20, 40, 0.85); border-left: 5px solid #00f0ff;
            color: #fff; border-radius: 4px; pointer-events: none;
            backdrop-filter: blur(5px); display: none;
        }
        #ui h2 { margin: 0; color: #00f0ff; font-size: 1.4em; }
        #desc { font-size: 0.9em; line-height: 1.6; color: #e0f7fa; }
        .controls {
            position: absolute; bottom: 20px; left: 20px; color: rgba(0, 240, 255, 0.6);
            font-size: 12px; line-height: 1.8;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2 id="name">生物名</h2>
    <div id="id-tag" style="font-size: 0.8em; opacity: 0.7; margin: 5px 0;"></div>
    <p id="desc">解説文がここに表示されます。</p>
</div>

<div class="controls">
    マウス移動：ライトを動かす<br>
    クリック：エサをあげる / 生物をロックオン<br>
    ホイール：ズームイン・アウト
</div>

<canvas id="abyssCanvas"></canvas>

<script>
/**
 * 古生物データ（図鑑データ）
 * 子供たちがここを書き換えて、自分だけの図鑑を作れるようにしています。
 */
const BIO_DATA = {
    anomalo: { name: "アノマロカリス", desc: "カンブリア紀の王者。13対のヒレをリズミカルに動かして泳ぎます。鋭い目で獲物を探します。" },
    opabinia: { name: "オパビニア", desc: "5つの目と、ゾウの鼻のような長い「吻（ふん）」が特徴。砂の中の獲物を探して食べます。" },
    trilo: { name: "三葉虫（トリロバイト）", desc: "海の底をたくさんの足で歩きます。危険を感じると丸まる仲間もいたと言われています。" },
    pikaia: { name: "ピカイア", desc: "私たちの遠い先祖に近いとされる生物。体をS字に曲げて、魚のように一生懸命泳ぎます。" },
    legend: { name: "古代の巨大生物", desc: "【超レア】めったに姿を見せない巨大な生物。大きなヒレの一振りで水の流れを変えてしまいます。" }
};

const canvas = document.getElementById('abyssCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');

let w, h, creatures = [], foods = [], particles = [];
let mx = 0, my = 0, target = null, zoom = 1.2;

// 画面サイズ設定
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/**
 * 生物クラス
 */
/**
 * 高精細・生物描画エンジン v2.0
 * 物理ベースのアニメーションと動的シェーディングを実装
 */
class Creature {
    constructor(type, isLegend = false) {
        this.type = type;
        this.isLegend = isLegend;
        this.id = Math.random().toString(16).slice(2, 6).toUpperCase();
        this.x = (Math.random() - 0.5) * 5000;
        this.y = (Math.random() - 0.5) * 800;
        this.z = isLegend ? 1200 : Math.random() * 800;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 1;
        this.phase = Math.random() * Math.PI * 2; // 個体ごとのリズムのズレ
        this.size = isLegend ? 500 : 80;
    }

    // --- 描画メインルーチン ---
    draw(camX, camY, time) {
        const perspective = 800 / (800 + this.z);
        const sx = (this.x - camX) * perspective * zoom + w/2;
        const sy = (this.y - camY) * perspective * zoom + h/2;
        const s = this.size * perspective * zoom;
        const distToMouse = Math.hypot(sx - mx, sy - my);
        const light = Math.max(0.1, 1 - distToMouse / (400 * zoom));

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.vx * 0.1); // 進行方向への傾き
        ctx.scale(this.vx > 0 ? 1 : -1, 1);

        // 生物ごとの高度なレンダリングロジック
        switch(this.type) {
            case 'anomalo': this.renderAnomalo(s, light, time); break;
            case 'opabinia': this.renderOpabinia(s, light, time); break;
            case 'pikaia': this.renderPikaia(s, light, time); break;
            case 'halluci': this.renderHalluci(s, light, time); break;
            case 'trilo': this.renderTrilobite(s, light, time); break;
            case 'legend': this.renderAncientGiant(s, light, time); break;
        }

        ctx.restore();
        this.screenX = sx; this.screenY = sy; this.screenR = s;
    }

    /**
     * アノマロカリス: 13対の側葉によるメタクロナル波（連動泳ぎ）
     */
    renderAnomalo(s, light, t) {
        const bodyGrad = ctx.createLinearGradient(-s, 0, s, 0);
        bodyGrad.addColorStop(0, '#4a148c'); bodyGrad.addColorStop(1, '#ad1457');
        
        // 側葉（ヒレ）の描画：前から後ろへ波打つ
        for(let i=0; i<13; i++) {
            const wave = Math.sin(t * 5 - i * 0.5 + this.phase) * s * 0.3;
            ctx.fillStyle = `hsla(${280 + i*5}, 70%, ${40 + light*30}%, ${0.6 + light*0.4})`;
            this.drawEllipse(-s*0.8 + i*s*0.13, s*0.2, s*0.12, s*0.4 + wave);
            this.drawEllipse(-s*0.8 + i*s*0.13, -s*0.2, s*0.12, s*0.4 + wave);
        }
        // 体幹
        ctx.fillStyle = bodyGrad;
        this.drawEllipse(0, 0, s, s*0.3);
        // 巨大な目（柄付き）
        ctx.strokeStyle = '#222'; ctx.lineWidth = s*0.05;
        ctx.beginPath(); ctx.moveTo(s*0.6, s*0.2); ctx.lineTo(s*0.9, s*0.5); ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(s*0.9, s*0.5, s*0.15, 0, 7); ctx.fill();
    }

    /**
     * オパビニア: 5つの目と多関節の吻（ふん）
     */
    renderOpabinia(s, light, t) {
        ctx.fillStyle = `rgb(46, 125, 50)`;
        this.drawEllipse(0, 0, s, s*0.25);
        // 5つの目
        for(let i=0; i<5; i++) {
            const ex = s*0.6 - Math.abs(2-i)*s*0.1, ey = -s*0.2 - (2-i)*s*0.1;
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(ex, ey, s*0.06, 0, 7); ctx.fill();
        }
        // 吻の物理シミュレーション風描画
        ctx.strokeStyle = `rgb(102, 187, 106)`; ctx.lineWidth = s*0.08;
        ctx.beginPath(); ctx.moveTo(s*0.8, 0);
        const bx = s*1.6, by = Math.sin(t*2 + this.phase)*s*0.5;
        ctx.quadraticCurveTo(s*1.2, by*0.5, bx, by); ctx.stroke();
    }

    /**
     * ハルキゲニア: 棘の揺らぎと細い脚の歩行
     */
    renderHalluci(s, light, t) {
        // 本体
        ctx.fillStyle = '#f06292';
        this.drawEllipse(0, 0, s, s*0.15);
        // 背中の鋭い棘
        ctx.strokeStyle = '#eee'; ctx.lineWidth = 2;
        for(let i=0; i<7; i++) {
            const tx = -s*0.7 + i*s*0.2;
            const swing = Math.sin(t*3 + i)*0.2;
            ctx.beginPath(); ctx.moveTo(tx, -s*0.1); 
            ctx.lineTo(tx + swing*s, -s*0.6); ctx.stroke();
        }
        // お腹の柔らかい脚
        ctx.strokeStyle = '#f8bbd0';
        for(let i=0; i<7; i++) {
            const step = Math.sin(t*4 + i)*s*0.15;
            ctx.beginPath(); ctx.moveTo(-s*0.7 + i*s*0.2, s*0.1);
            ctx.lineTo(-s*0.7 + i*s*0.2 + step, s*0.4); ctx.stroke();
        }
    }

    /**
     * 三葉虫: 重厚な甲羅のグラデーションと多脚歩行
     */
    renderTrilobite(s, light, t) {
        for(let i=0; i<4; i++) {
            const g = ctx.createRadialGradient(-s*0.5+i*s*0.3, 0, 0, -s*0.5+i*s*0.3, 0, s);
            g.addColorStop(0, `hsl(200, 20%, ${30+light*20}%)`);
            g.addColorStop(1, '#101820');
            ctx.fillStyle = g;
            this.drawEllipse(s*0.5 - i*s*0.4, 0, s*0.45, s*(0.7 - i*0.1));
        }
        // 無数の足
        ctx.strokeStyle = `rgba(100,100,100,${0.5+light*0.5})`;
        for(let i=0; i<10; i++) {
            const walk = Math.sin(t*10 + i)*s*0.1;
            ctx.beginPath(); ctx.moveTo(-s*0.6 + i*s*0.12, s*0.3);
            ctx.lineTo(-s*0.6 + i*s*0.12, s*0.5 + walk); ctx.stroke();
        }
    }

    /**
     * ピカイア: 筋肉（マイオメア）の透ける表現とS字遊泳
     */
    renderPikaia(s, light, t) {
        ctx.beginPath();
        const g = ctx.createLinearGradient(-s, 0, s, 0);
        g.addColorStop(0, `rgba(178,235,242,0.2)`);
        g.addColorStop(1, `rgba(0,188,212,${0.4+light*0.5})`);
        ctx.fillStyle = g;
        // S字の頂点計算
        ctx.moveTo(-s, 0);
        for(let x = -s; x < s; x += 5) {
            const wave = Math.sin(t*8 + x*0.05) * s * 0.3;
            ctx.lineTo(x, wave);
        }
        ctx.lineTo(s, 0); ctx.fill();
        // 原始的な背索（一本の線）
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
        ctx.stroke();
    }
    /**
     * 古代の巨大生物: 深海の激しい水流と共に現れる幻の個体
     */
    renderAncientGiant(s, light, t) {
        // 本体（巨大な発光体のような表現）
        let g = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
        g.addColorStop(0, `rgba(0, 255, 255, ${0.3 + light * 0.4})`);
        g.addColorStop(1, 'rgba(0, 10, 30, 0)');
        ctx.fillStyle = g;
        this.drawEllipse(0, 0, s, s * 0.6);

        // 巨大な触手または鰭の残像
        ctx.strokeStyle = `rgba(0, 240, 255, ${0.2 + light * 0.3})`;
        ctx.lineWidth = 4;
        for (let i = 0; i < 8; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            let tx = Math.sin(t + i) * s * 0.8;
            let ty = s * 0.5 + i * s * 0.1;
            ctx.quadraticCurveTo(tx, ty, -s * 0.5 + i * s * 0.1, s * 1.5);
            ctx.stroke();
        }
    }

    // 古いコードと互換性を持たせるための空のupdate（必要に応じて）
    update() {
        // エサへの反応
        if (foods.length > 0 && !this.isLegend) {
            let dx = foods[0].x - this.x;
            let dy = foods[0].y - this.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 800) {
                this.vx += dx * 0.002;
                this.vy += dy * 0.002;
                if (dist < 20) foods.shift();
            }
        }

        // 物理計算
        this.vx *= 0.98; this.vy *= 0.98;
        this.x += this.vx; this.y += this.vy;

        // 画面端のワープ（教材として分かりやすく）
        if (this.x > 3500) this.x = -3500;
        if (this.x < -3500) this.x = 3500;
    }

    // 補助関数: 楕円描画
    drawEllipse(x, y, rx, ry) {
        ctx.beginPath();
        ctx.ellipse(x, y, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI*2);
        ctx.fill();
    }
}


// 初期化：生物を増やす
const types = ['anomalo', 'opabinia', 'trilo', 'pikaia'];
for (let i = 0; i < 15; i++) {
    creatures.push(new Creature(types[i % types.length]));
}
// レアキャラ
let legend = new Creature('legend', true);

// マリンスノー（背景のチリ）
for (let i = 0; i < 100; i++) {
    particles.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*2 });
}

// インタラクション
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('mousedown', e => {
    let clicked = creatures.find(c => Math.hypot(e.clientX - c.screenX, e.clientY - c.screenY) < c.screenR);
    if (clicked) {
        target = (target === clicked) ? null : clicked;
    } else {
        // エサを投下
        foods.push({ x: (e.clientX - w/2)/zoom + (target?target.x:0), y: (e.clientY - h/2)/zoom + (target?target.y:0) });
    }
});
window.addEventListener('wheel', e => { zoom = Math.max(0.5, Math.min(3, zoom - e.deltaY * 0.001)); });

/**
 * メインループ
 */
function loop() {
    ctx.fillStyle = '#000810';
    ctx.fillRect(0, 0, w, h);

    const camX = target ? target.x : 0;
    const camY = target ? target.y : 0;

    // マリンスノー
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    particles.forEach(p => {
        p.y += 0.5; if (p.y > h) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
    });

    // エサ
    ctx.fillStyle = '#fff';
    foods.forEach(f => {
        const fx = (f.x - camX) * zoom + w/2;
        const fy = (f.y - camY) * zoom + h/2;
        ctx.beginPath(); ctx.arc(fx, fy, 4, 0, 7); ctx.fill();
    });

    // 生物
    legend.update(); legend.draw(camX, camY);
    let hover = null;
    creatures.forEach(c => {
        c.update();
        c.draw(camX, camY);
        if (Math.hypot(mx - c.screenX, my - c.screenY) < c.screenR) hover = c;
    });

    // UI更新
    const displayTarget = hover || target;
    if (displayTarget) {
        ui.style.display = 'block';
        document.getElementById('name').innerText = BIO_DATA[displayTarget.type].name;
        document.getElementById('desc').innerText = BIO_DATA[displayTarget.type].desc;
        document.getElementById('id-tag').innerText = `個体識別ID: ${displayTarget.id} / 追跡状態: ${target === displayTarget ? 'ロックオン中' : 'スキャン中'}`;
    } else {
        ui.style.display = 'none';
    }

    // 懐中電灯のエフェクト
    const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 300);
    grad.addColorStop(0, 'rgba(0, 255, 255, 0.07)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
