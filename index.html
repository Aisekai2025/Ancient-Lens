<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian 2.5D Aquarium - No External Assets</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001219; font-family: sans-serif; color: #fff; }
        canvas { display: block; background: radial-gradient(circle at top, #003a4d 0%, #001219 80%); }
        #ui {
            position: absolute; top: 20px; right: 20px; width: 260px; padding: 15px;
            background: rgba(0, 50, 70, 0.9); border: 2px solid #00f0ff; border-radius: 12px;
            display: none; pointer-events: none; box-shadow: 0 0 15px #00ffff66;
        }
        h2 { margin: 0 0 10px; color: #00ffff; font-size: 1.2em; border-bottom: 1px solid #00ffff; }
        p { margin: 0; font-size: 0.9em; line-height: 1.5; }
        .hint { position: absolute; bottom: 10px; left: 10px; color: #00f0ff; opacity: 0.6; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="name"></h2>
        <p id="desc"></p>
    </div>
    <div class="hint">マウスを動かして古代生物をさがそう！</div>
    <canvas id="aquarium"></canvas>

    <script>
        const canvas = document.getElementById('aquarium');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const nameEl = document.getElementById('name');
        const descEl = document.getElementById('desc');

        let width, height;
        const creatures = [];

        // 1. 生物データの定義
        const data = {
            anomalo: { name: "アノマロカリス", desc: "カンブリア紀の絶対王者！横のヒレを波打たせて優雅に泳ぎ、2本の触手で獲物を捕まえたよ。" },
            trilo: { name: "三葉虫", desc: "硬い殻を持つ古代の住人。海の底を歩いて食べ物を探していたよ。" }
        };

        // 2. リサイズ設定
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 3. 生物クラス（擬似3D）
        class Creature {
            constructor(type, x, y, z) {
                this.type = type;
                this.x = x; this.y = y; this.z = z;
                this.baseSize = type === 'anomalo' ? 100 : 40;
                this.angle = Math.random() * Math.PI * 2;
                this.data = data[type];
                this.hover = false;
            }

            update(t) {
                if(this.type === 'anomalo') {
                    this.x = Math.cos(t * 0.3) * (width * 0.3) + width / 2;
                    this.y = Math.sin(t * 0.5) * 50 + height / 2;
                    this.z = Math.sin(t * 0.3) * 100 + 200;
                } else {
                    this.x += Math.sin(t + this.angle) * 0.5;
                    this.y = height * 0.85 + Math.cos(t * 2 + this.angle) * 2;
                }
            }

            draw(t) {
                const scale = 400 / (400 + this.z);
                const drawX = this.x;
                const drawY = this.y;
                const size = this.baseSize * scale;

                ctx.save();
                ctx.translate(drawX, drawY);

                if (this.type === 'anomalo') {
                    // アノマロカリスの描画
                    ctx.fillStyle = '#e67e22';
                    // 胴体
                    ctx.beginPath();
                    ctx.ellipse(0, 0, size, size * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // ヒレ（アニメーション）
                    for(let i=0; i<6; i++) {
                        const wave = Math.sin(t * 5 + i) * (size * 0.3);
                        ctx.fillStyle = '#d35400';
                        ctx.fillRect(-size + i*(size*0.3), size*0.3, size*0.2, wave);
                        ctx.fillRect(-size + i*(size*0.3), -size*0.3 - wave, size*0.2, wave);
                    }
                    // 触手
                    ctx.strokeStyle = '#e67e22';
                    ctx.lineWidth = size * 0.1;
                    ctx.beginPath();
                    ctx.moveTo(size * 0.8, 0);
                    ctx.quadraticCurveTo(size * 1.5, Math.sin(t*3)*20, size * 1.2, 20);
                    ctx.stroke();
                } else {
                    // 三葉虫の描画
                    ctx.fillStyle = '#445566';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, size, size * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();

                // マウス判定用
                this.screenX = drawX;
                this.screenY = drawY;
                this.screenSize = size;
            }
        }

        // 初期配置
        creatures.push(new Creature('anomalo', 0, 0, 0));
        for(let i=0; i<6; i++) {
            creatures.push(new Creature('trilo', Math.random()*width, height*0.8, Math.random()*100));
        }

        // 4. マウスインタラクション
        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            let found = false;
            creatures.forEach(c => {
                const dx = mouseX - c.screenX;
                const dy = mouseY - c.screenY;
                if(Math.sqrt(dx*dx + dy*dy) < c.screenSize) {
                    ui.style.display = 'block';
                    nameEl.innerText = c.data.name;
                    descEl.innerText = c.data.desc;
                    found = true;
                }
            });
            if(!found) ui.style.display = 'none';
        });

        // 5. ループ
        function loop() {
            ctx.clearRect(0, 0, width, height);
            const t = performance.now() * 0.001;

            // 泡の演出（簡易）
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            for(let i=0; i<10; i++) {
                ctx.beginPath();
                ctx.arc((t*50 + i*100)%width, (height - (t*80 + i*200)%height), 2, 0, 7);
                ctx.fill();
            }

            creatures.sort((a,b) => b.z - a.z); // 奥から描画
            creatures.forEach(c => {
                c.update(t);
                c.draw(t);
            });

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
