<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian Ultimate Aquarium - Ecosystem Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000408; font-family: 'Meiryo', sans-serif; color: #fff; }
        canvas { display: block; }
        
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 30, 60, 0.9); backdrop-filter: blur(15px);
            border: 2px solid #00ffff; box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
            padding: 25px; border-radius: 15px; display: none; width: 350px; z-index: 1000;
        }
        #hologram-ui.active { display: block; }
        #holo-title { margin: 0; font-size: 24px; color: #00ffff; border-bottom: 1px solid #0ff; }
        #holo-desc { font-size: 15px; line-height: 1.7; margin: 15px 0; color: #e0f8f8; }
        #close-btn { background: #00ffff; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; color: #000; }

        #hud { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; color: #00ffff; font-size: 12px; opacity: 0.8; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <h3 id="holo-en" style="color:#88dddd; font-size:14px; margin:0;"></h3>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">解析終了</button>
</div>

<div id="hud">CLICK: DROP FOOD | DRAG: ROTATE | WHEEL: ZOOM (CLOSE TO GROUND)</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// ==========================================
// 1. 環境構築 & パーティクル
// ==========================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x00050a);
scene.fog = new THREE.FogExp2(0x00050a, 0.015);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
let camRadius = 90, targetCamRadius = 90, camAngleX = 0, camAngleY = 0.4;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0x1a2a4a, 2.5); scene.add(ambient);
const pointLight = new THREE.PointLight(0x00ffff, 2.5, 300); pointLight.position.set(0, 100, 0); scene.add(pointLight);

// 海底
const bottomY = -50;
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(800, 800, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0x0a1218, roughness: 1 })
);
ground.rotation.x = -Math.PI/2; ground.position.y = bottomY; scene.add(ground);

// パーティクル: マリンスノー、泡、砂埃
function createParticles(count, size, color, opacity) {
    const geo = new THREE.BufferGeometry();
    const pos = [];
    for(let i=0; i<count; i++) pos.push((Math.random()-0.5)*400, (Math.random()-0.5)*200, (Math.random()-0.5)*400);
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    return new THREE.Points(geo, new THREE.PointsMaterial({ color, size, transparent: true, opacity }));
}
const snow = createParticles(2000, 0.12, 0xffffff, 0.4); scene.add(snow);
const bubbles = createParticles(200, 0.2, 0x00ffff, 0.6); scene.add(bubbles);
const dust = createParticles(1500, 0.1, 0x443322, 0.5); scene.add(dust);

// ==========================================
// 2. マテリアル & 生物モデリング
// ==========================================
const mats = {
    anomalocaris: new THREE.MeshPhysicalMaterial({ color: 0x1a6655, transmission: 0.2, roughness: 0.3 }),
    opabinia: new THREE.MeshPhysicalMaterial({ color: 0x884488, transmission: 0.3, roughness: 0.4 }),
    pikaia: new THREE.MeshPhysicalMaterial({ color: 0xaaaaff, transmission: 0.7, transparent: true, opacity: 0.8 }),
    trilo: new THREE.MeshStandardMaterial({ color: 0x443322, roughness: 0.8 }),
    hallu: new THREE.MeshPhysicalMaterial({ color: 0xcc5533, transmission: 0.2 }),
    marr: new THREE.MeshPhysicalMaterial({ color: 0x3366aa, transmission: 0.3 }),
    flora: new THREE.MeshStandardMaterial({ color: 0x113322 }),
    sponge: new THREE.MeshStandardMaterial({ color: 0xaa8844, roughness: 1 }),
    food: new THREE.MeshBasicMaterial({ color: 0x00ffff })
};

// ピカイア (蛇行安定版)
function buildPikaia() {
    const group = new THREE.Group(); const segments = []; let parent = group;
    for(let i=0; i<40; i++) {
        const s = Math.sin((i/40)*Math.PI);
        const seg = new THREE.Group(); seg.position.z = -0.3;
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.8*s+0.1, 0.4), mats.pikaia);
        seg.add(body); parent.add(seg); segments.push(seg); parent = seg;
    }
    return { mesh: group, segments, type: 'pikaia' };
}

// ハルキゲニア (歩行改善版)
function buildHallucigenia() {
    const group = new THREE.Group(); const segments = []; let parent = group;
    for(let i=0; i<10; i++) {
        const seg = new THREE.Group(); seg.position.z = -0.8;
        const b = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.8), mats.hallu);
        b.rotation.x = Math.PI/2; seg.add(b);
        const spine = new THREE.Mesh(new THREE.ConeGeometry(0.1, 2.8), mats.hallu); spine.position.y = 1.2; seg.add(spine);
        const legs = [];
        for(let j of [-1, 1]) {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2.8), mats.hallu);
            leg.position.set(0.3*j, -1.4, 0); leg.rotation.z = j*0.2; seg.add(leg);
            legs.push(leg);
        }
        seg.userData.legs = legs;
        parent.add(seg); segments.push(seg); parent = seg;
    }
    return { mesh: group, segments, type: 'walk', offset: 2.8 };
}

// 三葉虫
function buildTrilobite() {
    const group = new THREE.Group(); const segments = []; let parent = group;
    for(let i=0; i<12; i++) {
        const s = (i<3) ? 0.6+i*0.2 : 1.2-(i*0.1);
        const seg = new THREE.Group(); seg.position.z = -0.5;
        const shell = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 12, 0, Math.PI*2, 0, Math.PI/2), mats.trilo);
        shell.scale.set(1.8*s, 0.6, 0.8); seg.add(shell);
        parent.add(seg); segments.push(seg); parent = seg;
    }
    return { mesh: group, segments, type: 'crawl', offset: 0.3 };
}

// その他(アノマロカリス等)
function buildAnomalocaris() {
    const group = new THREE.Group(); const segments = [];
    const head = new THREE.Mesh(new THREE.SphereGeometry(1.6, 16, 16), mats.anomalocaris); head.scale.set(1.2, 0.7, 1); group.add(head);
    for(let side of [-1, 1]) {
        const armBase = new THREE.Group(); armBase.position.set(0.8*side, -0.3, 1); head.add(armBase);
        let curr = armBase; for(let k=0; k<8; k++) { const p = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.5), mats.anomalocaris); p.position.z = 0.25; const w = new THREE.Group(); w.add(p); curr.add(w); curr = w; }
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color:0})); eye.position.set(1.5*side, 0.8, 0.5); head.add(eye);
    }
    let parent = head; for(let i=0; i<12; i++) {
        const s = 1 - (i/12); const seg = new THREE.Group(); seg.position.z = -1.1;
        const b = new THREE.Mesh(new THREE.SphereGeometry(1.3, 16, 12), mats.anomalocaris); b.scale.set(1.5*s+0.4, 0.4*s+0.2, 0.8); seg.add(b);
        const fL = new THREE.Mesh(new THREE.BoxGeometry(3*s+1.2, 0.05, 1.3), mats.anomalocaris); fL.position.x = 1.6*s+0.6; seg.add(fL);
        const fR = fL.clone(); fR.position.x = -(1.6*s+0.6); seg.add(fR);
        seg.userData = { fL, fR }; parent.add(seg); segments.push(seg); parent = seg;
    }
    return { mesh: group, segments, type: 'swim' };
}

function buildOpabinia() {
    const group = new THREE.Group(); const segments = []; const head = new THREE.Mesh(new THREE.SphereGeometry(1.1, 16, 16), mats.opabinia); head.scale.set(1, 0.6, 1.4); group.add(head);
    for(let i=0; i<5; i++) { const eye = new THREE.Mesh(new THREE.SphereGeometry(0.22), new THREE.MeshBasicMaterial({color:0})); eye.position.set((i-2)*0.45, 0.6, 0.6 + Math.abs(i-2)*0.2); head.add(eye); }
    const trunk = new THREE.Group(); trunk.position.z = 1.3; head.add(trunk); let curr = trunk; const tSegs = []; for(let i=0; i<15; i++) { const p = new THREE.Group(); const m = new THREE.Mesh(new THREE.SphereGeometry(0.15), mats.opabinia); p.add(m); p.position.z = 0.3; curr.add(p); curr = p; tSegs.push(p); }
    let parent = head; for(let i=0; i<11; i++) { const s = 1-(i/11); const seg = new THREE.Group(); seg.position.z = -0.9; const b = new THREE.Mesh(new THREE.SphereGeometry(0.9, 12, 12), mats.opabinia); b.scale.set(1.3*s+0.2, 0.5, 1); seg.add(b); const fL = new THREE.Mesh(new THREE.BoxGeometry(1.6*s+0.5, 0.05, 0.9), mats.opabinia); fL.position.x = 0.9*s+0.4; seg.add(fL); const fR = fL.clone(); fR.position.x = -(0.9*s+0.4); seg.add(fR); seg.userData = { fL, fR }; parent.add(seg); segments.push(seg); parent = seg; }
    return { mesh: group, segments, tSegs, type: 'swim' };
}

// ==========================================
// 3. 生態系定義 & 環境生物
// ==========================================
const defs = [
    { id:'anom', jp:'アノマロカリス', en:'Anomalocaris', desc:'カンブリア紀最大の捕食者。エサを見つけると高速で近づきます。', build:buildAnomalocaris, count:3, speed:0.18, yRange:[-10, 20] },
    { id:'opab', jp:'オパビニア', en:'Opabinia', desc:'5つの目を持つ奇妙な姿。長い吻を使って砂の中のエサを探します。', build:buildOpabinia, count:4, speed:0.1, yRange:[-20, 5] },
    { id:'pika', jp:'ピカイア', en:'Pikaia', desc:'我々の遠い祖先。しなやかな蛇行運動（進行波）で泳ぎます。', build:buildPikaia, count:8, speed:0.09, yRange:[-30, -5] },
    { id:'trilo', jp:'三葉虫', en:'Trilobite', desc:'【海底這行】多脚を動かして海底を這い、デトリタスを食べます。', build:buildTrilobite, count:10, speed:0.06, yRange:[bottomY, bottomY] },
    { id:'hallu', jp:'ハルキゲニア', en:'Hallucigenia', desc:'【不器用な歩行】7〜8対の細い脚を、後ろから前へ波打たせるように動かして、ぎこちなく歩行します。', build:buildHallucigenia, count:8, speed:0.04, yRange:[bottomY, bottomY] }
];

const entities = [];
defs.forEach(def => {
    for(let i=0; i<def.count; i++) {
        const ent = def.build(); ent.def = def; ent.phase = Math.random()*Math.PI*2;
        ent.mesh.position.set((Math.random()-0.5)*180, def.yRange[0]+(def.yRange[1]-def.yRange[0])*Math.random(), (Math.random()-0.5)*180);
        if(ent.type === 'crawl' || ent.type === 'walk') ent.mesh.position.y = bottomY + ent.offset;
        scene.add(ent.mesh); ent.mesh.traverse(c => { if(c.isMesh) c.userData.master = ent; });
        entities.push(ent);
    }
});

// 環境生物: ウミユリとカイメン
const envDefs = {
    crinoid: { jp:'ウミユリ', en:'Crinoid', desc:'棘皮動物の仲間。「百合」のような姿ですが動物です。触手を広げてプランクトンを濾し取って食べます。' },
    sponge: { jp:'カイメン', en:'Sponge', desc:'最古の多細胞動物の一つ。体にある無数の穴から海水を取り込み、栄養を摂取します。' }
};

for(let i=0; i<120; i++) {
    const x = (Math.random()-0.5)*280, z = (Math.random()-0.5)*280;
    const isCrinoid = Math.random() > 0.4;
    const g = new THREE.Group();
    if(isCrinoid) {
        const h = 3+Math.random()*7;
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.2, h), mats.flora); stem.position.y = h/2; g.add(stem);
        for(let j=0; j<10; j++){ const p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3, 0.3), mats.flora); p.position.y=h; p.rotation.z=0.8; p.rotation.y=j*Math.PI/5; g.add(p); }
        g.userData.info = envDefs.crinoid;
    } else {
        const h = 2+Math.random()*3;
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, h, 8), mats.sponge); body.position.y = h/2; g.add(body);
        g.userData.info = envDefs.sponge;
    }
    g.position.set(x, bottomY, z);
    g.traverse(c => { if(c.isMesh) c.userData.master = { def: g.userData.info, isStatic: true }; });
    scene.add(g);
}

// エサシステム
const foods = [];
function dropFood(pos) {
    const f = new THREE.Mesh(new THREE.SphereGeometry(0.6), mats.food);
    f.position.copy(pos); scene.add(f); foods.push(f);
}

// ==========================================
// 4. アニメーション & 制御
// ==========================================
let isDragging = false, lastX, lastY;
window.addEventListener('wheel', e => { targetCamRadius = Math.max(8, Math.min(300, targetCamRadius + e.deltaY*0.15)); });
window.addEventListener('pointerdown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('pointermove', e => {
    if(isDragging) { camAngleX -= (e.clientX - lastX) * 0.005; camAngleY += (e.clientY - lastY) * 0.005; camAngleY = Math.max(-0.1, Math.min(Math.PI/2.1, camAngleY)); }
    lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('pointerup', e => {
    isDragging = false;
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const ray = new THREE.Raycaster(); ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(scene.children, true);
    if(hits.length > 0) {
        const m = hits[0].object.userData.master;
        if(m) {
            document.getElementById('holo-title').innerText = m.def.jp;
            document.getElementById('holo-en').innerText = m.def.en;
            document.getElementById('holo-desc').innerText = m.def.desc;
            document.getElementById('hologram-ui').classList.add('active');
            return;
        }
    }
    const foodPos = new THREE.Vector3().copy(camera.position).add(ray.ray.direction.multiplyScalar(60));
    dropFood(foodPos);
});

function closeHolo() { document.getElementById('hologram-ui').classList.remove('active'); }

const dummy = new THREE.Object3D();
function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.002;
    camRadius += (targetCamRadius - camRadius) * 0.1;
    camera.position.set(camRadius*Math.sin(camAngleX)*Math.cos(camAngleY), camRadius*Math.sin(camAngleY), camRadius*Math.cos(camAngleX)*Math.cos(camAngleY));
    camera.lookAt(0, bottomY + 10, 0);

    // パーティクルアニメ
    snow.position.y -= 0.05; if(snow.position.y < -50) snow.position.y = 50;
    bubbles.position.y += 0.1; if(bubbles.position.y > 50) bubbles.position.y = -50;
    dust.rotation.y += 0.001;

    foods.forEach(f => { f.position.y -= 0.08; if(f.position.y < bottomY) f.position.y = bottomY; });

    entities.forEach(e => {
        let target = e.target; let minDist = 60;
        foods.forEach(f => { const d = e.mesh.position.distanceTo(f.position); if(d < minDist) { target = f.position; minDist = d; } });
        if(target && e.mesh.position.distanceTo(target) < 2) {
            const fIdx = foods.findIndex(f => f.position.equals(target));
            if(fIdx > -1) { scene.remove(foods[fIdx]); foods.splice(fIdx, 1); }
            e.target = null;
        }
        if(!e.target || e.mesh.position.distanceTo(e.target) < 5) {
            const tx = (Math.random()-0.5)*200, tz = (Math.random()-0.5)*200;
            let ty = e.def.yRange[0] + (e.def.yRange[1]-e.def.yRange[0])*Math.random();
            if(e.type !== 'swim' && e.type !== 'pikaia') ty = bottomY + e.offset;
            e.target = new THREE.Vector3(tx, ty, tz);
        }
        
        dummy.position.copy(e.mesh.position); dummy.lookAt(target || e.target);
        e.mesh.quaternion.slerp(dummy.quaternion, 0.03);
        e.mesh.translateZ(e.def.speed);
        if(e.type !== 'swim' && e.type !== 'pikaia') e.mesh.position.y = bottomY + e.offset;

        e.segments.forEach((seg, i) => {
            if(e.type === 'pikaia') {
                const amp = (i / e.segments.length) * 0.6;
                seg.rotation.y = Math.sin(time * 6 - i * 0.25 + e.phase) * amp;
            } else if(e.type === 'walk') {
                // ハルキゲニア：メタクロナル・ウェーブ（後ろから前へ波及する歩行）
                const legWave = Math.sin(time * 5 - i * 0.8 + e.phase);
                if(seg.userData.legs) {
                    seg.userData.legs[0].rotation.x = legWave * 0.5;
                    seg.userData.legs[1].rotation.x = legWave * 0.5;
                    seg.rotation.z = legWave * 0.05; // 体の上下の揺れ
                }
            } else if(e.type === 'swim') {
                const wave = Math.sin(time * 3 - i * 0.4 + e.phase);
                seg.rotation.x = wave * 0.12;
                if(seg.userData.fL) {
                    const flap = Math.sin(time * 6 - i * 0.4 + e.phase) * 0.6;
                    seg.userData.fL.rotation.z = flap; seg.userData.fR.rotation.z = -flap;
                }
            } else {
                // 三葉虫：脚の細かい動き（簡略）
                seg.rotation.y = Math.sin(time * 10 - i * 0.5) * 0.05;
            }
        });
    });

    renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>
