<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Paleozoic XR Aquarium</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000205; font-family: 'Segoe UI', 'Meiryo', sans-serif; user-select: none; color: #fff; }
        canvas { display: block; }
        
        /* ホログラムUI */
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 30, 60, 0.85); backdrop-filter: blur(15px);
            border: 2px solid #00ffff; box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
            padding: 25px; border-radius: 15px; pointer-events: auto; z-index: 100; display: none; width: 380px;
            opacity: 0; transition: all 0.4s cubic-bezier(0.1, 1.5, 0.5, 1);
        }
        #hologram-ui.active { display: block; opacity: 1; transform: translate(-50%, -50%); }
        #holo-title { margin: 0; font-size: 22px; color: #00ffff; border-bottom: 1px solid #0ff; }
        #holo-latin { font-size: 14px; color: #88dddd; font-style: italic; margin-bottom: 10px; }
        #holo-desc { font-size: 14px; line-height: 1.6; color: #e0f8f8; }
        
        /* 時代切り替えメニュー */
        #era-menu {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0, 10, 20, 0.8); padding: 10px; border-radius: 50px; border: 1px solid #0ff; z-index: 50;
        }
        .era-btn {
            background: transparent; border: 1px solid rgba(0,255,255,0.3); color: #88dddd;
            padding: 8px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .era-btn span { display: block; font-size: 14px; font-weight: bold; }
        .era-btn.active { background: #00ffff; color: #000; box-shadow: 0 0 15px #0ff; }

        /* アラート */
        #alert {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.2); border: 2px solid #ff0055; color: #ff0055;
            padding: 10px 30px; border-radius: 5px; font-weight: bold; letter-spacing: 2px;
            display: none; z-index: 200; animation: blink 0.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="era-menu">
    <button class="era-btn" onclick="switchEra('ediacara')">EDIACARAN<span>エディアカラ紀</span></button>
    <button class="era-btn active" onclick="switchEra('cambrian')">CAMBRIAN<span>カンブリア紀</span></button>
    <button class="era-btn" onclick="switchEra('ordovician')">ORDOVICIAN<span>オルドビス紀</span></button>
    <button class="era-btn" onclick="switchEra('devonian')">DEVONIAN<span>デボン紀</span></button>
</div>

<div id="alert">⚠️ RARE CREATURE DETECTED / 希少生物接近 ⚠️</div>

<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <div id="holo-latin"></div>
    <p id="holo-desc"></p>
    <button onclick="closeHolo()" style="width:100%; padding:10px; background:#0ff; border:none; cursor:pointer; font-weight:bold;">CLOSE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// --- 基本設定 ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const bottomY = -40;
let currentEra = 'cambrian';
let entities = [];
let rareEntity = null;

// --- マテリアルライブラリ ---
const mats = {
    water: new THREE.MeshPhysicalMaterial({ color: 0x00ffff, transmission: 0.5, transparent: true, opacity: 0.3 }),
    flesh: (col) => new THREE.MeshStandardMaterial({ color: col, roughness: 0.6 }),
    shell: (col) => new THREE.MeshPhongMaterial({ color: col, shininess: 30 }),
    glow: (col) => new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.8 })
};

// --- 生物造形関数群 ---

// 1. エディアカラ紀
function buildDickinsonia() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CylinderGeometry(2, 2.2, 0.2, 32), mats.flesh(0xffaa88));
    body.scale.set(1.5, 1, 1);
    g.add(body);
    return { mesh: g, type: 'slide', speed: 0.02 };
}

// 2. カンブリア紀 (アノマロカリス前肢強化版)
function buildAnomalocaris() {
    const g = new THREE.Group();
    const head = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), mats.flesh(0x336655)); g.add(head);
    // 前肢の関節構造
    for(let side of [-1, 1]) {
        let prev = head;
        for(let i=0; i<6; i++) {
            const joint = new THREE.Group();
            joint.position.set(0.6*side, -0.2, 1);
            if(i>0) joint.position.set(0, 0, 0.5);
            const segment = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.6), mats.flesh(0x448877));
            segment.position.z = 0.3;
            joint.add(segment);
            prev.add(joint);
            prev = joint;
            if(!g.userData.arms) g.userData.arms = [];
            g.userData.arms.push(joint);
        }
    }
    // 体節
    let parent = head;
    for(let i=0; i<10; i++) {
        const seg = new THREE.Mesh(new THREE.BoxGeometry(2 - i*0.15, 0.5, 1), mats.flesh(0x336655));
        seg.position.z = -1;
        parent.add(seg); parent = seg;
    }
    return { mesh: g, type: 'swim', speed: 0.15 };
}

// 3. オルドビス紀 (サカバンバスピス修正版)
function buildSacabambaspis() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 16), mats.flesh(0xaaaa99));
    body.scale.set(0.8, 0.6, 1.4);
    g.add(body);
    // 目と口を体に密着
    const eyeMat = new THREE.MeshBasicMaterial({color:0});
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.18), eyeMat);
    eyeL.position.set(0.4, 0.1, 1.25); body.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.set(-0.4, 0.1, 1.25); body.add(eyeR);
    const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), eyeMat);
    mouth.position.set(0, -0.3, 1.35); body.add(mouth);
    // 尾
    const tail = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.5, 4), mats.flesh(0x888877));
    tail.rotation.x = -Math.PI/2; tail.position.z = -1.5; g.add(tail);
    return { mesh: g, type: 'wobble', speed: 0.08 };
}

// 4. デボン紀 (ダンクルオステウス)
function buildDunkleosteus() {
    const g = new THREE.Group();
    const head = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 3), mats.shell(0x444444));
    g.add(head);
    const jaw = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.8, 2.5), mats.shell(0x555555));
    jaw.position.y = -1.2; jaw.position.z = 0.5; head.add(jaw);
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2, 6), mats.flesh(0x666666));
    body.position.z = -4; g.add(body);
    return { mesh: g, type: 'swim', speed: 0.2 };
}

// ウミサソリ (滑らか修正版)
function buildEurypterid() {
    const g = new THREE.Group();
    const head = new THREE.Mesh(new THREE.CapsuleGeometry(1, 1, 4, 8), mats.shell(0x663322));
    head.rotation.x = Math.PI/2; g.add(head);
    // ハサミ
    for(let side of [-1, 1]) {
        const arm = new THREE.Group(); arm.position.set(side*0.8, 0, 0.8);
        const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1), mats.shell(0x663322));
        p1.position.z = 0.5; arm.add(p1); g.add(arm);
    }
    return { mesh: g, type: 'crawl', speed: 0.1 };
}

// マクルリテス (海底接地版)
function buildMaclurites() {
    const g = new THREE.Group();
    const shell = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.3, 12, 24), mats.shell(0x887766));
    shell.rotation.x = Math.PI/2; g.add(shell);
    return { mesh: g, type: 'floor', speed: 0.01 };
}

// --- データベース ---
const DB = {
    ediacara: {
        bg: 0x000a1a,
        creatures: [{ name: "ディッキンソニア", latin: "Dickinsonia", build: buildDickinsonia, count: 5, desc: "地球最古の動物の一つ。平らな体で海底を滑るように移動しました。" }],
        rare: { name: "キンベレラ", latin: "Kimberella", build: buildDickinsonia, desc: "初期の軟体動物の可能性がある、活発に移動する希少種。" }
    },
    cambrian: {
        bg: 0x001520,
        creatures: [
            { name: "アノマロカリス", latin: "Anomalocaris", build: buildAnomalocaris, count: 3, desc: "前肢の節を器用に動かし、獲物を捕らえる当時の絶対王者。" },
            { name: "ピカイア", latin: "Pikaia", build: buildDickinsonia, count: 8, desc: "脊索を持つ、我々人類の最も古い祖先の一角です。" }
        ],
        rare: { name: "オパビニア", latin: "Opabinia", build: buildDickinsonia, desc: "5つの目と長いノズルを持つ、カンブリア紀の奇跡の造形。" }
    },
    ordovician: {
        bg: 0x001122,
        creatures: [
            { name: "サカバンバスピス", latin: "Sacabambaspis", build: buildSacabambaspis, count: 6, desc: "正面に寄った目と口が特徴的な無顎類。泳ぎはあまり得意ではありません。" },
            { name: "チョッカクガイ", latin: "Orthoceras", build: buildMaclurites, count: 3, desc: "直線的な殻を持つオウムガイの仲間。ジェット噴射で移動します。" },
            { name: "マクルリテス", latin: "Maclurites", build: buildMaclurites, count: 4, desc: "海底をゆっくり這う平らな巻貝。" }
        ],
        rare: { name: "アサフス・コワレフスキー", latin: "Asaphus kowalewskii", build: buildMaclurites, desc: "潜望鏡のような目を持つ、極めて珍しい三葉虫。" }
    },
    devonian: {
        bg: 0x051a10,
        creatures: [
            { name: "ダンクルオステウス", latin: "Dunkleosteus", build: buildDunkleosteus, count: 2, desc: "強力な顎のプレートを持つ巨大魚。デボン紀の海の支配者です。" },
            { name: "ウミサソリ", latin: "Pterygotus", build: buildEurypterid, count: 3, desc: "巨大なハサミを持つ節足動物。デボン紀には2メートルを超える種もいました。" }
        ],
        rare: { name: "ハイネリア", latin: "Hyneria", build: buildDunkleosteus, desc: "デボン紀後期の巨大な肉鰭類。淡水・汽水域の強力な捕食者。" }
    }
};

// --- ロジック ---

function switchEra(eraId) {
    currentEra = eraId;
    document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    // シーンのリセット
    entities.forEach(e => scene.remove(e.mesh));
    entities = [];
    rareEntity = null;
    
    const era = DB[eraId];
    scene.background = new THREE.Color(era.bg);
    
    // 通常生物配置
    era.creatures.forEach(c => {
        for(let i=0; i<c.count; i++) {
            const data = c.build();
            data.info = c;
            spawn(data);
        }
    });

    // カンブリア紀ならカイメン追加
    if(eraId === 'cambrian') {
        for(let i=0; i<20; i++) {
            const sponge = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 3), mats.flesh(0x99aa88));
            sponge.position.set((Math.random()-0.5)*100, bottomY+1.5, (Math.random()-0.5)*100);
            scene.add(sponge);
        }
    }
}

function spawn(data) {
    data.mesh.position.set((Math.random()-0.5)*100, Math.random()*40 - 20, (Math.random()-0.5)*100);
    if(data.type === 'floor' || data.type === 'crawl') data.mesh.position.y = bottomY + 1;
    scene.add(data.mesh);
    entities.push(data);
}

// 希少生物出現ロジック
function checkRareSpawn() {
    if(Math.random() < 0.001 && !rareEntity) {
        const era = DB[currentEra];
        const data = era.rare.build();
        data.info = era.rare;
        data.isRare = true;
        data.mesh.position.set(-100, 0, (Math.random()-0.5)*50);
        spawn(data);
        rareEntity = data;
        document.getElementById('alert').style.display = 'block';
        setTimeout(() => document.getElementById('alert').style.display = 'none', 5000);
    }
}

function closeHolo() { document.getElementById('hologram-ui').classList.remove('active'); }

// --- メインループ ---
function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;

    checkRareSpawn();

    entities.forEach(ent => {
        // 基本移動（重なり回避を考慮したシンプルな前進）
        ent.mesh.translateZ(ent.speed || 0.1);
        
        // 境界チェック（戻ってくるように）
        if(ent.mesh.position.length() > 150) {
            ent.mesh.lookAt(0, ent.mesh.position.y, 0);
        }

        // アニメーション
        if(ent.type === 'swim') {
            ent.mesh.rotation.y += Math.sin(time*2)*0.01;
            if(ent.mesh.userData.arms) {
                ent.mesh.userData.arms.forEach((a, i) => {
                    a.rotation.x = Math.sin(time*4 + i)*0.3;
                });
            }
        }
        if(ent.type === 'wobble') {
            ent.mesh.rotation.z = Math.sin(time*5)*0.2;
        }
    });

    renderer.render(scene, camera);
}

// 初期化
camera.position.z = 60;
switchEra('cambrian');
animate();

// クリックイベント（図鑑表示）
window.addEventListener('click', (e) => {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);
    if(intersects.length > 0) {
        let target = intersects[0].object;
        while(target.parent && !target.userData.info) target = target.parent;
        const info = entities.find(ent => ent.mesh === target)?.info;
        if(info) {
            document.getElementById('holo-title').innerText = info.name;
            document.getElementById('holo-latin').innerText = info.latin;
            document.getElementById('holo-desc').innerText = info.desc;
            document.getElementById('hologram-ui').classList.add('active');
        }
    }
});
</script>
</body>
</html>
