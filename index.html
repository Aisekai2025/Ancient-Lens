<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ANCIENT LENS 3D: Procedural Archive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #instructions { position: absolute; bottom: 20px; left: 20px; font-size: 10px; opacity: 0.7; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="margin:0; font-size: 1.5em; letter-spacing: 2px;">ANCIENT LENS 3D</h1>
    <p>PROCEDURAL MODELING MODE</p>
</div>
<div id="instructions">DRAG TO ROTATE | WHEEL TO ZOOM</div>

<!-- Three.js をCDNから直接読み込み（一番安定する方法） -->
<script src="https://cdnjs.cloudflare.com"></script>

<script>
window.onload = () => {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000510);
    scene.fog = new THREE.Fog(0x000510, 5, 15);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ライティング（3Dの立体感を出す要）
    const ambientLight = new THREE.AmbientLight(0x404040, 2);
    scene.add(ambientLight);
    const topLight = new THREE.DirectionalLight(0xffffff, 3);
    topLight.position.set(5, 10, 5);
    scene.add(topLight);

    // --- コードでアノマロカリスを「造形」する ---
    const anomalocaris = new THREE.Group();

    // 1. ボディ（楕円体）
    const bodyGeo = new THREE.CapsuleGeometry(0.5, 2, 4, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc4444, roughness: 0.7 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.x = Math.PI / 2;
    anomalocaris.add(body);

    // 2. 13対の鰭（ひれ）をループで生成
    const flapGeo = new THREE.BoxGeometry(0.8, 0.1, 0.4);
    const flapMat = new THREE.MeshStandardMaterial({ color: 0xaa3333, transparent: true, opacity: 0.8 });
    const flaps = [];

    for (let i = 0; i < 13; i++) {
        const leftFlap = new THREE.Mesh(flapGeo, flapMat);
        const rightFlap = leftFlap.clone();
        
        const zPos = (i * 0.2) - 1.2;
        leftFlap.position.set(-0.5, 0, zPos);
        rightFlap.position.set(0.5, 0, zPos);
        
        anomalocaris.add(leftFlap);
        anomalocaris.add(rightFlap);
        flaps.push({ left: leftFlap, right: rightFlap, offset: i * 0.3 });
    }

    // 3. 特徴的な2本の付属肢（腕）
    const armGeo = new THREE.CylinderGeometry(0.05, 0.02, 1, 8);
    const leftArm = new THREE.Mesh(armGeo, bodyMat);
    leftArm.position.set(-0.2, -0.2, 1.3);
    leftArm.rotation.x = -Math.PI / 3;
    anomalocaris.add(leftArm);
    
    const rightArm = leftArm.clone();
    rightArm.position.set(0.2, -0.2, 1.3);
    anomalocaris.add(rightArm);

    scene.add(anomalocaris);

    // 海底の砂（3D平面）
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshStandardMaterial({ color: 0x1a1510 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -2;
    scene.add(floor);

    // --- インタラクション：マウスで回転 ---
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };

    window.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            const deltaMove = {
                x: e.offsetX - previousMousePosition.x,
                y: e.offsetY - previousMousePosition.y
            };
            anomalocaris.rotation.y += deltaMove.x * 0.01;
            anomalocaris.rotation.x += deltaMove.y * 0.01;
        }
        previousMousePosition = { x: e.offsetX, y: e.offsetY };
    });

    // --- アニメーション ---
    function animate() {
        requestAnimationFrame(animate);
        const t = Date.now() * 0.002;

        // 13対のひれが波打つ（メタクローナル波の再現）
        flaps.forEach(f => {
            const wave = Math.sin(t + f.offset) * 0.3;
            f.left.rotation.z = wave;
            f.right.rotation.z = -wave;
        });

        // 浮遊感
        anomalocaris.position.y = Math.sin(t * 0.5) * 0.2;

        renderer.render(scene, camera);
    }
    animate();

    // レスポンシブ対応
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
};
</script>
</body>
</html>
