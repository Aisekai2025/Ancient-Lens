<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANCIENT LENS 3D: DEFINITIVE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000510; font-family: monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        #overlay { position: absolute; bottom: 20px; left: 20px; font-size: 10px; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="margin:0; font-size: 1.2em; letter-spacing: 2px;">ANCIENT LENS 3D</h1>
    <div id="status">INITIALIZING...</div>
</div>
<div id="overlay">DRAG: ROTATE | WHEEL: ZOOM</div>

<!-- ライブラリ読み込み完了時に initApp を実行 -->
<script src="https://cdnjs.cloudflare.com" onload="initApp()"></script>

<script>
function initApp() {
    const THREE = window.THREE;
    document.getElementById('status').innerText = "SYSTEM: ONLINE";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000510);
    scene.fog = new THREE.FogExp2(0x000510, 0.15);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 3D感を強調するライティング
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0x00ffff, 2);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // --- 3Dアノマロカリスの構築（プロシージャル） ---
    const anomalocaris = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc4444, roughness: 0.6, metalness: 0.2 });
    
    // ボディ（体節を感じさせる多段カプセル）
    for(let i=0; i<10; i++) {
        const segGeo = new THREE.SphereGeometry(0.5 - (i*0.03), 16, 16);
        const segment = new THREE.Mesh(segGeo, bodyMat);
        segment.scale.set(1, 0.6, 1.2);
        segment.position.z = (i * 0.4) - 2;
        anomalocaris.add(segment);
    }

    // 13対の鰭（最新学説の重なりを再現）
    const flapGeo = new THREE.BoxGeometry(1.2, 0.05, 0.4);
    const flapMat = new THREE.MeshStandardMaterial({ color: 0xaa3333, transparent: true, opacity: 0.8 });
    const flaps = [];
    for(let i=0; i<13; i++) {
        const left = new THREE.Mesh(flapGeo, flapMat);
        const right = left.clone();
        const z = (i * 0.3) - 1.8;
        left.position.set(-0.6, 0, z);
        right.position.set(0.6, 0, z);
        anomalocaris.add(left); anomalocaris.add(right);
        flaps.push({ l: left, r: right, offset: i * 0.4 });
    }

    // 巨大な複眼
    const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0, metalness: 1 });
    [1, -1].forEach(side => {
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.position.set(0.4 * side, 0.3, 1.4);
        anomalocaris.add(eye);
    });

    scene.add(anomalocaris);

    // 海底
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({ color: 0x111520 }));
    floor.rotation.x = -Math.PI / 2; floor.position.y = -2;
    scene.add(floor);

    // --- 操作ロジック ---
    let isDown = false, px = 0, py = 0;
    window.addEventListener('mousedown', (e) => { isDown = true; px = e.clientX; py = e.clientY; });
    window.addEventListener('mouseup', () => isDown = false);
    window.addEventListener('mousemove', (e) => {
        if(!isDown) return;
        anomalocaris.rotation.y += (e.clientX - px) * 0.01;
        anomalocaris.rotation.x += (e.clientY - py) * 0.01;
        px = e.clientX; py = e.clientY;
    });
    window.addEventListener('wheel', (e) => { camera.position.z = Math.max(2, camera.position.z + e.deltaY * 0.005); });

    function animate() {
        requestAnimationFrame(animate);
        const t = Date.now() * 0.002;
        // 鰭の波状運動（メタクローナル波）
        flaps.forEach(f => {
            const w = Math.sin(t + f.offset) * 0.4;
            f.l.rotation.z = w; f.r.rotation.z = -w;
        });
        anomalocaris.position.y = Math.sin(t*0.5) * 0.2;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}
</script>
</body>
</html>
