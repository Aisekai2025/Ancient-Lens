<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ANCIENT LENS 3D: MASTERPIECE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00040a; font-family: 'Courier New', monospace; color: #0f0; }
        #ui { position: absolute; top: 25px; left: 25px; z-index: 100; pointer-events: none; text-shadow: 0 0 15px #0f0; }
        #overlay { position: absolute; bottom: 25px; left: 25px; font-size: 10px; opacity: 0.5; pointer-events: none; letter-spacing: 1px; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="margin:0; font-size: 1.5em; letter-spacing: 5px;">ANCIENT LENS 3D</h1>
    <div id="status">BIOLOGICAL ENGINE: MASTERPIECE v4.0</div>
</div>
<div id="overlay">DRAG: ROTATE | WHEEL: ZOOM | ANALYZING ANOMALOCARIS CANADENSIS...</div>

<canvas id="view"></canvas>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let width, height;
    let angleX = 0.4, angleY = 0.8, zoom = 1.0, time = 0;
    let isDragging = false, lastX, lastY;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    // 3D座標の回転・投影関数（マスター版：Zソート対応の準備）
    function project(x, y, z) {
        let nx = x * Math.cos(angleY) + z * Math.sin(angleY);
        let nz = -x * Math.sin(angleY) + z * Math.cos(angleY);
        let ny = y * Math.cos(angleX) - nz * Math.sin(angleX);
        let fz = y * Math.sin(angleX) + nz * Math.cos(angleX);

        const perspective = (fz + 12) / 12 * zoom;
        return {
            x: width/2 + nx * 180 * perspective,
            y: height/2 + ny * 180 * perspective,
            z: fz,
            scale: perspective
        };
    }

    function draw() {
        time += 0.035;
        // 背景グラデーション（深海の奥行き）
        const bg = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
        bg.addColorStop(0, '#000b1a'); bg.addColorStop(1, '#000408');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);

        // ゴッドレイ（光の筋をNative描画）
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.03)'; ctx.lineWidth = 2;
        for(let i=0; i<5; i++){
            const gx = (width/5)*i + Math.sin(time*0.2+i)*100;
            ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx-200, height); ctx.stroke();
        }

        // --- 生物描画シーケンス ---

        // 1. 鰭（ひれ）の波状推進アニメーション
        for(let i=0; i<13; i++) {
            const z = (i * 0.35) - 2.2;
            const size = (1 - Math.abs(i-6)/10) * 1.2; // 中央が大きく末端が小さい
            const phase = time * 3 - i * 0.6;
            const flapWave = Math.sin(phase) * 0.4;
            const twist = Math.cos(phase) * 0.2;

            [1, -1].forEach(side => {
                const pBase = project(0.2 * side, 0, z);
                const pMid = project(0.7 * side, flapWave, z + twist);
                const pEnd = project(1.1 * side, flapWave * 1.5, z + twist * 2);

                const depthColor = Math.floor(150 + pBase.z * 10);
                ctx.fillStyle = `rgba(${depthColor}, 40, 40, ${0.5 + pBase.z/20})`;
                ctx.beginPath();
                ctx.moveTo(pBase.x, pBase.y);
                ctx.quadraticCurveTo(pMid.x, pMid.y, pEnd.x, pEnd.y);
                ctx.lineTo(pEnd.x, pEnd.y + 10 * pEnd.scale);
                ctx.lineTo(pBase.x, pBase.y + 5 * pBase.scale);
                ctx.fill();
            });
        }

        // 2. 胴体（セグメント構造）
        for(let i=0; i<14; i++) {
            const z = (i * 0.38) - 2.5;
            const r = (Math.sin(i * 0.25 + 0.5) * 0.5 + 0.1) * (i > 10 ? 0.5 : 1);
            const p = project(0, Math.sin(time*0.5 + i*0.1)*0.05, z);
            
            const brightness = Math.floor(100 + p.z * 10);
            const grad = ctx.createRadialGradient(p.x-5, p.y-5, 0, p.x, p.y, r * 100 * p.scale);
            grad.addColorStop(0, `rgb(${brightness+50}, 50, 60)`);
            grad.addColorStop(1, `rgb(${brightness/2}, 20, 30)`);
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0, r * 110 * p.scale * zoom), 0, Math.PI*2);
            ctx.fill();
        }

        // 3. 最新学説：眼柄（がんぺい）と複眼
        [1, -1].forEach(side => {
            const tHead = time * 0.5;
            const eyeX = (0.5 * side) + Math.sin(time)*0.05;
            const eyeY = -0.4 + Math.cos(time*0.7)*0.05;
            const eyeZ = 2.0;

            const pRoot = project(0.2 * side, 0, 1.8);
            const pEye = project(eyeX, eyeY, eyeZ);

            ctx.strokeStyle = '#222'; ctx.lineWidth = 6 * pEye.scale * zoom;
            ctx.beginPath(); ctx.moveTo(pRoot.x, pRoot.y); ctx.lineTo(pEye.x, pEye.y); ctx.stroke();

            // 複眼のハイライト
            const eg = ctx.createRadialGradient(pEye.x-3, pEye.y-3, 2, pEye.x, pEye.y, 10 * pEye.scale);
            eg.addColorStop(0, '#888'); eg.addColorStop(1, '#000');
            ctx.fillStyle = eg;
            ctx.beginPath(); ctx.arc(pEye.x, pEye.y, 12 * pEye.scale * zoom, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(pEye.x-4, pEye.y-4, 3 * pEye.scale, 0, Math.PI*2); ctx.fill();
        });

        // 4. 付属肢（腕）のうねり
        for(let side of [1, -1]) {
            const armStart = project(0.15 * side, 0.1, 2.2);
            const armMid = project(0.3 * side, 0.4 + Math.sin(time*2)*0.2, 2.8);
            const armEnd = project(0.2 * side, 0.8 + Math.sin(time*2.1)*0.3, 3.2);
            ctx.strokeStyle = '#822'; ctx.lineWidth = 10 * armStart.scale * zoom;
            ctx.beginPath(); ctx.moveTo(armStart.x, armStart.y); 
            ctx.quadraticCurveTo(armMid.x, armMid.y, armEnd.x, armEnd.y); ctx.stroke();
        }

        requestAnimationFrame(draw);
    }

    // 操作
    window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        angleY += (e.clientX - lastX) * 0.007;
        angleX += (e.clientY - lastY) * 0.007;
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('wheel', e => {
        zoom = Math.max(0.3, Math.min(2.5, zoom - e.deltaY * 0.0008));
    }, {passive: true});

    window.addEventListener('resize', resize);
    resize();
    draw();
</script>
</body>
</html>
