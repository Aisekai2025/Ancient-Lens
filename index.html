<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Lens 3D: Native Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000810; font-family: monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; text-shadow: 0 0 10px #0f0; }
        #overlay { position: absolute; bottom: 20px; left: 20px; font-size: 10px; opacity: 0.6; pointer-events: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: move; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="margin:0; font-size: 1.2em; letter-spacing: 2px;">ANCIENT LENS 3D</h1>
    <div id="status">NATIVE ENGINE: ONLINE</div>
</div>
<div id="overlay">DRAG: ROTATE | WHEEL: ZOOM</div>

<canvas id="view"></canvas>

<script>
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    let width, height;
    let angleX = 0.3, angleY = 0.5, zoom = 1.0, time = 0;
    let isDragging = false, lastX, lastY;

    // 最新学説に基づくアノマロカリスの3Dパーツ定義
    const segments = 12;
    const bodyPoints = [];
    const flapPoints = [];

    function initModel() {
        // ボディの骨格
        for(let i=0; i<segments; i++) {
            const z = (i * 0.4) - 2.2;
            const r = 0.5 - (i * 0.03);
            bodyPoints.push({x: 0, y: 0, z: z, r: r});
        }
        // 13対の鰭（ひれ）の付け根
        for(let i=0; i<13; i++) {
            const z = (i * 0.35) - 2.0;
            flapPoints.push({z: z, id: i});
        }
    }

    function project(x, y, z) {
        // 3Dから2Dへの投影（簡易変換）
        const s = Math.cos(angleX), c = Math.sin(angleX);
        const sy = Math.cos(angleY), cy = Math.sin(angleY);

        // Y軸回転
        let nx = x * cy + z * sy;
        let nz = -x * sy + z * cy;
        // X軸回転
        let ny = y * s - nz * c;
        let fz = y * c + nz * s;

        const p = (fz + 10) / 10 * zoom;
        return {
            x: width/2 + nx * 150 * p,
            y: height/2 + ny * 150 * p,
            scale: p
        };
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    function draw() {
        time += 0.03;
        ctx.fillStyle = '#000810';
        ctx.fillRect(0, 0, width, height);

        // 海底のグリッド（奥行き演出）
        ctx.strokeStyle = 'rgba(0, 255, 0, 0.1)';
        for(let i=-5; i<=5; i++) {
            const p1 = project(i, 1.5, -5), p2 = project(i, 1.5, 5);
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            const p3 = project(-5, 1.5, i), p4 = project(5, 1.5, i);
            ctx.beginPath(); ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.stroke();
        }

        // 鰭（ひれ）の描画：最新学説の重なり
        flapPoints.forEach(f => {
            const flapWave = Math.sin(time * 2 - f.id * 0.5) * 0.5;
            [1, -1].forEach(side => {
                const p1 = project(0.2 * side, 0, f.z);
                const p2 = project(0.8 * side, flapWave, f.z);
                const p3 = project(0.8 * side, flapWave, f.z + 0.3);
                
                ctx.fillStyle = `rgba(200, 50, 50, ${0.4 + f.id/30})`;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 100, 100, 0.5)';
                ctx.stroke();
            });
        });

        // ボディの描画
        bodyPoints.forEach((p, i) => {
            const pt = project(p.x, p.y + Math.sin(time*0.5)*0.1, p.z);
            ctx.fillStyle = `rgb(${150-i*5}, 50, 50)`;
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, p.r * 80 * pt.scale * zoom, 0, Math.PI*2);
            ctx.fill();
        });

        // 複眼
        [1, -1].forEach(side => {
            const eye = project(0.4 * side, -0.3, 1.3);
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(eye.x, eye.y, 8 * eye.scale * zoom, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(eye.x, eye.y, 5 * eye.scale * zoom, 0, Math.PI*2);
            ctx.fill();
        });

        requestAnimationFrame(draw);
    }

    // 操作
    window.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        angleY += (e.clientX - lastX) * 0.01;
        angleX += (e.clientY - lastY) * 0.01;
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('wheel', e => {
        zoom = Math.max(0.2, Math.min(3, zoom - e.deltaY * 0.001));
    });

    window.addEventListener('resize', resize);
    resize();
    initModel();
    draw();
</script>
</body>
</html>
