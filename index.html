<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian Abyss - Ultra-HD Marine Snow</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000205; font-family: 'Consolas', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 25px; right: 25px; width: 340px; padding: 25px;
            background: rgba(0, 10, 20, 0.95); border-left: 5px solid #00f0ff; border-radius: 4px;
            color: #fff; display: none; pointer-events: none; z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
        .hud { position: absolute; bottom: 20px; left: 20px; color: #00f0ff; font-size: 11px; opacity: 0.6; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 0.7em; color: #00f0ff; margin-bottom: 8px; letter-spacing: 2px;">ULTRA-HD SCANNER // ACTIVE</div>
        <h2 id="name" style="margin:0;font-size:1.8em;letter-spacing:1px;color:#fff;"></h2>
        <p id="desc" style="margin-top:15px;font-size:0.95em;line-height:1.8;color:#b2dfdb;"></p>
    </div>
    <div class="hud">DEEP SEA AMBIENCE V6.0 // WHEEL TO ZOOM // CLICK TO FEED</div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        
        let w, h, creatures = [], foods = [], plants = [], particles = [], dusts = [], zoom = 1.3;
        let mx = 0, my = 0, target = null, lightHue = 190;

        const BIO = {
            anomalo: { name: "ANOMALOCARIS", desc: "カンブリア紀の絶対王者。13対の鰭（ひれ）は、波打つような滑らかな推進力を生み出します。鏡面反射する大きな複眼が特徴です。" },
            opabinia: { name: "OPABINIA", desc: "5つの複眼と象のようなノズルを持つ異形の生命。ライトを当てると、節（ふし）ごとの筋肉の質感が浮かび上がります。" },
            wiwaxia: { name: "WIWAXIA", desc: "全身を金属光沢のある鱗と鋭いトゲで武装。移動時に海底の砂を巻き上げ、幻想的な砂ぼこりを作ります。" },
            halluci: { name: "HALLUCIGENIA", desc: "トゲで歩く不思議な姿。7対のトゲには鋭いハイライトが入り、細い脚が海底の粒子を優しく舞い上げます。" },
            trilo: { name: "TRILOBITE", desc: "高度な節足動物。方解石のレンズを持つ複眼は、ライトを当てるとクリスタルのように輝きます。" },
            pikaia: { name: "PIKAIA", desc: "私たちの祖先。半透明の体の中に一本通る「脊索（せきさく）」が、サーチライトで青白く浮かび上がります。" },
            choia: { name: "CHOIA", desc: "円盤状の海綿。中心から放射状に伸びる長いトゲにマリンスノーが降り積もる、深海の静かな造形物です。" }
        };

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        window.addEventListener('mousedown', e => {
            foods.push({x: (e.clientX - w/2)/zoom + (target ? target.x : 0), y: (e.clientY - h/2)/zoom + (target ? target.y : 0), vy: 1.0});
        });
        window.addEventListener('wheel', e => { zoom = Math.max(0.4, Math.min(5, zoom - e.deltaY * 0.001)); }, {passive:true});
        resize();

        // エフェクト初期化
        for(let i=0; i<150; i++) particles.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*1.5, v: 0.1+Math.random()*0.4, p: Math.random()*10 });
        for(let i=0; i<35; i++) plants.push({ x: Math.random()*4000-2000, y: 420+Math.random()*60, z: Math.random()*900, size: 45+Math.random()*40 });

        class Creature {
            constructor(type) {
                this.type = type;
                this.isBenthic = ['wiwaxia', 'halluci', 'trilo'].includes(type);
                this.spawn();
            }
            spawn() {
                this.z = Math.random() * 800;
                this.x = Math.random() * 3000 - 1500;
                this.y = this.isBenthic ? 380 + Math.random()*40 : Math.random()*500 - 250;
                this.vx = (Math.random()-0.5)*1.0; this.vy = (Math.random()-0.5)*0.2;
                this.sizeBase = { anomalo:140, opabinia:100, wiwaxia:85, halluci:60, trilo:55, pikaia:75 }[this.type];
                this.phase = Math.random() * 10;
            }
            update(t) {
                if(foods.length > 0) {
                    let f = foods[0];
                    let dx = f.x - this.x, dy = f.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if(!this.isBenthic || f.y > 300) {
                        if(dist < 700) { this.vx += dx * 0.0015; this.vy += dy * 0.0015; if(dist < 20) foods.shift(); }
                    }
                }
                this.vx *= 0.99; this.vy *= 0.99;
                this.x += this.vx; this.y += this.vy;
                if(this.isBenthic && Math.abs(this.vx) > 0.15 && Math.random() < 0.08) {
                    dusts.push({ x: this.x, y: this.y + 30, z: this.z, vx: -this.vx*0.3, vy: -0.1, life: 1, s: 10+Math.random()*15 });
                }
                if(this.x > 2200) this.x = -2200; if(this.x < -2200) this.x = 2200;
            }
            draw(camX, camY, t) {
                const p = 600 / (600 + this.z);
                this.sx = (this.x - camX) * p * zoom + w/2;
                this.sy = (this.y - camY) * p * zoom + h/2 + 150*zoom;
                const s = this.sizeBase * p * zoom;
                this.sr = s;
                const light = Math.max(0, 1 - Math.hypot(this.sx - mx, this.sy - my) / (320 * zoom));

                ctx.save(); ctx.translate(this.sx, this.sy); ctx.scale(this.vx > 0 ? 1 : -1, 1);
                ctx.globalAlpha = Math.max(0.15, p);
                this.render(s, light, t); ctx.restore();
            }
            render(s, light, t) {
                const time = t * 5 + this.phase;
                const hCol = `hsla(${lightHue}, 100%, 85%, ${light})`;
                ctx.shadowBlur = 25 * light; ctx.shadowColor = hCol;

                if (this.type === 'anomalo') {
                    let g = ctx.createLinearGradient(-s, -s/2, s, s/2);
                    g.addColorStop(0, '#4a0e05'); g.addColorStop(0.5, '#c62828'); g.addColorStop(1, '#ffab91');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(0, 0, s, s*0.35, 0, 0, 7); ctx.fill();
                    for(let i=0; i<13; i++) {
                        ctx.fillStyle = `rgba(255, 138, 101, ${0.4 + light*0.5})`;
                        let fh = s*0.45 + Math.sin(time + i*0.7)*s*0.25;
                        ctx.beginPath(); ctx.ellipse(-s*0.85+i*s*0.14, s*0.25, s*0.12, fh, 0.15, 0, 7); ctx.fill();
                        ctx.beginPath(); ctx.ellipse(-s*0.85+i*s*0.14, -s*0.25, s*0.12, fh, -0.15, 0, 7); ctx.fill();
                    }
                    ctx.fillStyle = '#050505'; ctx.beginPath(); ctx.arc(s*0.8, -s*0.4, s*0.13, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(s*0.8, s*0.4, s*0.13, 0, 7); ctx.fill();
                    if(light>0.2) { ctx.fillStyle=hCol; ctx.beginPath(); ctx.arc(s*0.82,-s*0.43,s*0.04,0,7); ctx.fill(); }
                } else if (this.type === 'wiwaxia') {
                    ctx.fillStyle = '#3e2723'; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.75,0,0,7); ctx.fill();
                    for(let i=0; i<24; i++){
                        let a = -Math.PI + i*0.26;
                        ctx.strokeStyle = `hsla(20, 30%, ${30+light*50}%, 1)`; ctx.lineWidth = s*0.08;
                        ctx.beginPath(); ctx.moveTo(Math.cos(a)*s*0.5, Math.sin(a)*s*0.3); ctx.lineTo(Math.cos(a)*s*0.9, Math.sin(a)*s*(i%2?1.4:1.0)); ctx.stroke();
                    }
                } else if (this.type === 'pikaia') {
                    let pg = ctx.createLinearGradient(-s,0,s,0); pg.addColorStop(0,'rgba(129,212,250,0.1)'); pg.addColorStop(1,`rgba(178,235,242,${0.3+light*0.6})`);
                    ctx.fillStyle = pg; ctx.beginPath(); ctx.moveTo(-s,0);
                    for(let i=-s; i<s; i+=s/10) ctx.lineTo(i, Math.sin(time*0.5 + i*0.12)*s*0.35);
                    ctx.lineTo(s,0); ctx.fill();
                    ctx.strokeStyle = hCol; ctx.lineWidth = 1; ctx.stroke();
                } else if (this.type === 'trilo') {
                    for(let i=0; i<4; i++) {
                        let tg = ctx.createRadialGradient(s*0.6-i*s*0.4, 0, 0, s*0.6-i*s*0.4, 0, s*0.5);
                        tg.addColorStop(0, `rgb(${60+light*40}, ${70+light*40}, ${80+light*40})`); tg.addColorStop(1, '#1a1a1a');
                        ctx.fillStyle = tg; ctx.beginPath(); ctx.ellipse(s*0.6-i*s*0.4, 0, s*0.45, s*(0.75-i*0.1), 0,0,7); ctx.fill();
                    }
                } else if (this.type === 'opabinia') {
                    ctx.fillStyle = '#1b5e20'; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.3,0,0,7); ctx.fill();
                    for(let i=0; i<5; i++){
                        ctx.fillStyle = '#0a0a0a'; ctx.beginPath(); ctx.arc(s*0.55-i*s*0.06, -s*0.25-i*s*0.04, s*0.06, 0, 7); ctx.fill();
                        if(light>0.3){ ctx.fillStyle=hCol; ctx.beginPath(); ctx.arc(s*0.56-i*s*0.06, -s*0.26-i*s*0.04, s*0.02, 0, 7); ctx.fill(); }
                    }
                    ctx.strokeStyle = hCol; ctx.lineWidth = s*0.12; ctx.beginPath(); ctx.moveTo(s*0.8,0); ctx.bezierCurveTo(s*1.5, Math.sin(time*0.8)*s*0.4, s*1.7, -s*0.3, s*1.6, s*0.5); ctx.stroke();
                } else {
                    ctx.fillStyle = '#4a148c'; ctx.beginPath(); ctx.ellipse(0,0,s,s*0.2,0,0,7); ctx.fill();
                    ctx.strokeStyle = hCol; ctx.lineWidth = 2;
                    for(let i=0; i<7; i++){
                        ctx.beginPath(); ctx.moveTo(-s*0.7+i*s*0.2, -s*0.1); ctx.lineTo(-s*0.8+i*s*0.2, -s); ctx.stroke();
                        let leg = Math.sin(time + i)*s*0.2;
                        ctx.beginPath(); ctx.moveTo(-s*0.7+i*s*0.2, s*0.1); ctx.lineTo(-s*0.7+i*s*0.2+leg, s*0.5); ctx.stroke();
                    }
                }
            }
        }

        // 初期化
        ['anomalo','opabinia','wiwaxia','halluci', 'trilo','pikaia'].forEach(t => { for(let i=0; i<4; i++) creatures.push(new Creature(t)); });

        function loop() {
            ctx.fillStyle = '#00060c'; ctx.fillRect(0,0,w,h);
            const t = performance.now() * 0.001;
            const camX = target ? target.x : 0;
            const camY = target ? target.y : 0;

            // マリンスノー
            ctx.fillStyle = "rgba(255,255,255,0.18)";
            particles.forEach(p => {
                p.y += p.v; p.x += Math.sin(t + p.p)*0.3;
                if(p.y > h) p.y = -10;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            });

            // 海底のチョイア海綿（高解像度パララックス）
            plants.sort((a,b) => b.z - a.z).forEach(p => {
                const pr = 600 / (600 + p.z);
                const sx = (p.x - camX) * pr * zoom + w/2;
                const sy = (p.y - camY) * pr * zoom + h/2 + 150*zoom;
                const s = p.size * pr * zoom;
                const dist = Math.hypot(sx - mx, sy - my);
                const l = Math.max(0, 1 - dist / (280 * zoom));
                ctx.save(); ctx.translate(sx, sy);
                for (let i = 0; i < 18; i++) {
                    let a = (i / 18) * Math.PI * 2;
                    ctx.strokeStyle = `hsla(30, 20%, ${15+l*40}%, ${pr})`; ctx.lineWidth = 1.5*pr;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s*0.5); ctx.stroke();
                }
                ctx.restore();
            });

            // サーチライト
            const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 350 * zoom);
            grad.addColorStop(0, `hsla(${lightHue}, 100%, 75%, 0.12)`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

            // 砂ぼこり（海底パララックス）
            dusts = dusts.filter(d => d.life > 0);
            dusts.forEach(d => {
                d.x += d.vx; d.y += d.vy; d.life -= 0.006;
                const pr = 600 / (600 + d.z);
                const dsx = (d.x - camX) * pr * zoom + w/2;
                const dsy = (d.y - camY) * pr * zoom + h/2 + 150*zoom;
                const l = Math.max(0, 1 - Math.hypot(dsx - mx, dsy - my)/(300*zoom));
                ctx.fillStyle = `rgba(${120+l*100}, ${120+l*100}, ${100+l*50}, ${d.life*0.15})`;
                ctx.beginPath(); ctx.arc(dsx, dsy, d.s*pr*zoom*(2-d.life), 0, 7); ctx.fill();
            });

            // エサ
            foods.forEach(f => {
                f.y += 1.0; const fx = (f.x-camX)*zoom+w/2, fy = (f.y-camY)*zoom+h/2+150*zoom;
                ctx.fillStyle='#fff'; ctx.shadowBlur=15; ctx.shadowColor='#fff';
                ctx.beginPath(); ctx.arc(fx, fy, 5*zoom, 0, 7); ctx.fill(); ctx.shadowBlur=0;
            });

            // 生物描画（奥から手前へ）
            creatures.sort((a,b) => b.z - a.z).forEach(c => {
                c.update(t); c.draw(camX, camY, t);
                if(Math.hypot(mx - c.sx, my - c.sy) < c.sr) {
                    ui.style.display='block'; document.getElementById('name').innerText=BIO[c.type].name; document.getElementById('desc').innerText=BIO[c.type].desc;
                }
            });
            if (!creatures.some(c => Math.hypot(mx - c.sx, my - c.sy) < c.sr)) ui.style.display='none';

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
