<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D Aquarium - Stable Build</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #001a1a; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
        canvas { display: block; }

        /* 図鑑風ポップアップUI */
        #info-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            padding: 20px;
            background: rgba(0, 40, 60, 0.9);
            border: 3px solid #4db8ff;
            border-radius: 15px;
            color: white;
            display: none;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            z-index: 100;
        }
        #info-ui h2 { margin: 0 0 10px 0; color: #00ffff; font-size: 1.4em; border-bottom: 2px solid #00ffff; padding-bottom: 5px; }
        #info-ui p { margin: 0; line-height: 1.6; font-size: 0.9em; }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(0, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="info-ui">
        <h2 id="creature-name">名前</h2>
        <p id="creature-desc">説明文</p>
    </div>

    <div class="instructions">マウスを動かして古代生物をさがそう！</div>

    <!-- Three.js & OrbitControls via Skypack (More stable for CORS) -->
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev';
        import { OrbitControls } from 'https://cdn.skypack.dev/examples/jsm/controls/OrbitControls.js';

        // ==========================================
        // 1. Scene Setup
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001a1e);
        scene.fog = new THREE.FogExp2(0x001a1e, 0.07);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0x00ffff, 2);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));

        // 海底
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x1a2a22 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -5;
        scene.add(floor);

        // ==========================================
        // 2. Creature Creation (Procedural)
        // ==========================================
        
        // アノマロカリス
        function createAnomalocaris() {
            const group = new THREE.Group();
            group.userData = { 
                name: "アノマロカリス", 
                desc: "カンブリア紀最大の王者！エビのような見た目だけど、実は不思議な生き物。横のヒレをパタパタさせて、時速20kmで泳げたという説もあるよ。" 
            };

            const mat = new THREE.MeshStandardMaterial({ color: 0xe67e22 });
            
            // 胴体
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.7, 3, 4, 8), mat);
            body.rotation.z = Math.PI / 2;
            group.add(body);

            // ヒレ(Flaps)
            const flaps = [];
            for(let i=0; i<8; i++) {
                const f = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 2), mat);
                f.position.x = -1.5 + (i * 0.5);
                group.add(f);
                flaps.push(f);
            }
            group.userData.flaps = flaps;

            // 触手
            const tentacleGeo = new THREE.BoxGeometry(1.2, 0.15, 0.15);
            const tentacleL = new THREE.Mesh(tentacleGeo, mat);
            tentacleL.position.set(2.2, -0.3, 0.4);
            tentacleL.rotation.z = -0.4;
            const tentacleR = tentacleL.clone();
            tentacleR.position.z = -0.4;
            group.add(tentacleL, tentacleR);
            group.userData.tentacles = [tentacleL, tentacleR];

            scene.add(group);
            return group;
        }

        // 三葉虫
        function createTrilobite() {
            const group = new THREE.Group();
            group.userData = { 
                name: "三葉虫", 
                desc: "海の底の掃除屋さん。体の節（ふし）を丸めて身を守ることもできたんだ。恐竜があらわれるずっと前から地球にいたよ。" 
            };
            const mat = new THREE.MeshStandardMaterial({ color: 0x5d6d7e });
            const shell = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8, 4, 8), mat);
            shell.scale.y = 0.5;
            group.add(shell);
            scene.add(group);
            return group;
        }

        const anomalocaris = createAnomalocaris();
        const trilobites = [];
        for(let i=0; i<10; i++) {
            const t = createTrilobite();
            t.position.set(Math.random()*20-10, -4.8, Math.random()*20-10);
            t.rotation.y = Math.random()*Math.PI*2;
            trilobites.push(t);
        }

        // ==========================================
        // 3. Interactions
        // ==========================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const infoUI = document.getElementById('info-ui');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // ==========================================
        // 4. Animation
        // ==========================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // アノマロカリスの遊泳
            anomalocaris.position.y = Math.sin(time * 0.5) * 1.5;
            anomalocaris.position.x = Math.cos(time * 0.3) * 5;
            anomalocaris.rotation.y = -time * 0.3 + Math.PI/2;

            anomalocaris.userData.flaps.forEach((f, i) => {
                f.rotation.x = Math.sin(time * 3 + i * 0.6) * 0.5;
            });
            anomalocaris.userData.tentacles.forEach(t => {
                t.rotation.y = Math.sin(time * 2) * 0.2;
            });

            // 三葉虫の動き
            trilobites.forEach((t, i) => {
                t.position.x += Math.sin(time * 0.5 + i) * 0.01;
            });

            // Raycasting
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.name) obj = obj.parent;
                if(obj.userData.name) {
                    infoUI.style.display = 'block';
                    document.getElementById('creature-name').innerText = obj.userData.name;
                    document.getElementById('creature-desc').innerText = obj.userData.desc;
                }
            } else {
                infoUI.style.display = 'none';
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
