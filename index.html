<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian Predator Aquarium - Evolution Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000b14; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; }
        canvas { display: block; background: radial-gradient(circle at 50% 10%, #004d40 0%, #000b14 90%); }
        #ui {
            position: absolute; top: 20px; right: 20px; width: 280px; padding: 18px;
            background: rgba(0, 30, 45, 0.9); border: 2px solid #00f0ff; border-radius: 15px;
            color: #fff; display: none; pointer-events: none; z-index: 100;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        h2 { margin: 0 0 8px; color: #00f0ff; font-size: 1.3em; border-bottom: 1px solid #00f0ff; }
        p { margin: 0; font-size: 0.9em; line-height: 1.5; color: #b2dfdb; }
        .log { position: absolute; bottom: 20px; right: 20px; color: #ff5252; font-weight: bold; font-size: 14px; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
    <div id="ui"><h2 id="name"></h2><p id="desc"></p></div>
    <div id="log" class="log"></div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const log = document.getElementById('log');
        let w, h, creatures = [];

        const BIO = {
            anomalo: { name: "アノマロカリス", desc: "カンブリア紀の頂点捕食者。時々お腹が空くと、三葉虫やピカイアを追いかけて捕食するよ！" },
            opabinia: { name: "オパビニア", desc: "5つの目と、掃除機のホースのような長い鼻（ノズル）を持つ。ノズルの先で獲物を器用に捕まえたんだ。" },
            hallucigenia: { name: "ハルキゲニア", desc: "トゲが生えた不思議な姿。最初は上下逆さまに復元されていたほど、奇妙な形をしているよ。" },
            trilo: { name: "三葉虫", desc: "海の底の住人。アノマロカリスに狙われないよう、硬い殻で守っているけど…？" },
            pikaia: { name: "ピカイア", desc: "素早く泳いで逃げるのが得意。私たちの背骨のルーツを持つと言われているよ。" }
        };

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Creature {
            constructor(type, x, y) {
                this.type = type;
                this.x = x || Math.random() * w;
                this.y = y || Math.random() * h;
                this.z = Math.random() * 400;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = { anomalo:100, opabinia:70, hallucigenia:40, trilo:40, pikaia:50 }[type];
                this.angle = 0;
                this.dead = false;
                this.target = null;
            }

            update(t) {
                if (this.dead) return;
                
                // --- 捕食ロジック (アノマロカリスのみ) ---
                if (this.type === 'anomalo') {
                    if (!this.target) {
                        const prey = creatures.find(c => !c.dead && (c.type==='trilo' || c.type==='pikaia') && Math.abs(c.z - this.z) < 100);
                        if (prey && Math.random() < 0.01) this.target = prey;
                    }
                    if (this.target) {
                        const dx = this.target.x - this.x;
                        const dy = this.target.y - this.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        this.vx = (dx / dist) * 4;
                        this.vy = (dy / dist) * 2;
                        if (dist < 30) {
                            this.target.dead = true;
                            this.target = null;
                            showLog("アノマロカリスが獲物を捕らえた！");
                        }
                    } else {
                        this.vx = Math.cos(t*0.5) * 2;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
                if (this.x < -150) this.x = w + 150;
                if (this.x > w + 150) this.x = -150;
                this.angle = Math.atan2(this.vy, this.vx);
                this.scale = 500 / (500 + this.z);
            }

            draw(t) {
                if (this.dead) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale * (this.vx > 0 ? 1 : -1), this.scale);
                const s = this.size;
                const p = t * 5;

                switch(this.type) {
                    case 'anomalo': this.drawAnomalo(s, p); break;
                    case 'opabinia': this.drawOpabinia(s, p); break;
                    case 'hallucigenia': this.drawHalluci(s, p); break;
                    case 'trilo': this.drawTrilo(s, p); break;
                    case 'pikaia': this.drawPikaia(s, p); break;
                }
                ctx.restore();
            }

            drawAnomalo(s, p) {
                ctx.fillStyle = '#d35400';
                ctx.beginPath(); ctx.ellipse(0, 0, s, s*0.3, 0, 0, 7); ctx.fill();
                for(let i=0; i<8; i++) {
                    ctx.fillStyle = '#e67e22';
                    ctx.fillRect(-s+i*s*0.2, s*0.2, s*0.1, Math.sin(p+i)*s*0.3);
                    ctx.fillRect(-s+i*s*0.2, -s*0.2, s*0.1, -Math.sin(p+i)*s*0.3);
                }
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(s*0.7, -s*0.3, 8, 0, 7); ctx.fill();
                ctx.beginPath(); ctx.arc(s*0.7, s*0.3, 8, 0, 7); ctx.fill();
            }

            drawOpabinia(s, p) {
                ctx.fillStyle = '#27ae60';
                ctx.beginPath(); ctx.ellipse(0, 0, s, s*0.25, 0, 0, 7); ctx.fill();
                // 5本の目
                ctx.fillStyle = '#000';
                for(let i=0; i<5; i++) { ctx.beginPath(); ctx.arc(s*0.6-i*4, -s*0.2-i*2, 3, 0, 7); ctx.fill(); }
                // 長いノズル
                ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(s*0.8, 0); ctx.quadraticCurveTo(s*1.5, Math.sin(p)*20, s*1.3, 20); ctx.stroke();
            }

            drawHalluci(s, p) {
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                for(let i=0; i<7; i++) { // 背中のトゲ
                    ctx.beginPath(); ctx.moveTo(-s*0.5+i*10, 0); ctx.lineTo(-s*0.5+i*10, -20); ctx.stroke();
                }
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath(); ctx.ellipse(0, 0, s, 10, 0, 0, 7); ctx.fill();
            }

            drawTrilo(s, p) {
                ctx.fillStyle = '#7f8c8d';
                ctx.beginPath(); ctx.ellipse(0, 0, s, s*0.6, 0, 0, 7); ctx.fill();
            }

            drawPikaia(s, p) {
                ctx.fillStyle = 'rgba(173, 216, 230, 0.6)';
                ctx.beginPath(); ctx.moveTo(-s, 0);
                for(let i=-s; i<s; i+=5) ctx.lineTo(i, Math.sin(p+i*0.1)*10);
                ctx.lineTo(s, 0); ctx.fill();
            }
        }

        function init() {
            creatures = [new Creature('anomalo'), new Creature('opabinia')];
            for(let i=0; i<5; i++) creatures.push(new Creature('hallucigenia', null, h*0.85));
            for(let i=0; i<6; i++) creatures.push(new Creature('trilo', null, h*0.9));
            for(let i=0; i<5; i++) creatures.push(new Creature('pikaia'));
        }

        function showLog(msg) {
            log.innerText = msg;
            setTimeout(() => log.innerText = "", 3000);
        }

        function loop() {
            ctx.clearRect(0,0,w,h);
            const t = performance.now() * 0.001;
            creatures.sort((a,b) => b.z - a.z);
            let hover = null;
            creatures.forEach(c => {
                c.update(t);
                c.draw(t);
                if (!c.dead && Math.hypot(mx-c.x, my-c.y) < c.size*c.scale) hover = c;
            });
            if(hover) { ui.style.display='block'; document.getElementById('name').innerText=BIO[hover.type].name; document.getElementById('desc').innerText=BIO[hover.type].desc; }
            else ui.style.display='none';
            requestAnimationFrame(loop);
        }

        let mx, my;
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        init();
        loop();
    </script>
</body>
</html>
