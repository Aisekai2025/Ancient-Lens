<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian 3D - Final Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000b1a; font-family: sans-serif; color: #fff; }
        canvas { display: block; }
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 40, 80, 0.9); border: 2px solid #00ffff; padding: 20px;
            border-radius: 12px; display: none; width: 260px; z-index: 100;
        }
        #hologram-ui.active { display: block; }
        #close-btn { background: #00ffff; border: none; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">閉じる</button>
</div>

<script src="https://cdnjs.cloudflare.com"></script>
<script>
// 1. シーン設定
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x00060d);
var camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 100);
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 2. ライト（真っ暗防止）
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
var pLight = new THREE.PointLight(0x00ffff, 2, 200);
pLight.position.set(0, 50, 0);
scene.add(pLight);

// 3. 地面
var ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshPhongMaterial({color: 0x0a1a2a}));
ground.rotation.x = -Math.PI/2; ground.position.y = -30;
scene.add(ground);

// 4. 生体データ定義（※ここがエラーの温床でした。最も安全な書き方に変更）
var entities = [];
var defs = [
    { name: "アノマロカリス", desc: "カンブリア紀の王。", color: 0x228866, count: 3, y: 0, speed: 0.1 },
    { name: "ハルキゲニア", desc: "トゲを持つ奇妙な姿。", color: 0xcc66aa, count: 6, y: -28, speed: 0.03 }
];

for(var i=0; i<defs.length; i++) {
    var d = defs[i];
    for(var j=0; j<d.count; j++) {
        var geo = (d.name === "アノマロカリス") ? new THREE.BoxGeometry(5, 1, 2) : new THREE.CapsuleGeometry(0.5, 3, 4, 8);
        var mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color: d.color}));
        mesh.position.set((Math.random()-0.5)*100, d.y, (Math.random()-0.5)*100);
        scene.add(mesh);
        
        var info = new Object();
        info.name = d.name;
        info.desc = d.desc;
        mesh.userData.info = info;
        entities.push({ mesh: mesh, speed: d.speed });
    }
}

// 5. 操作とアニメーション
var angle = 0;
function animate() {
    requestAnimationFrame(animate);
    angle += 0.002;
    camera.position.x = 100 * Math.sin(angle);
    camera.position.z = 100 * Math.cos(angle);
    camera.lookAt(0, 0, 0);

    for(var k=0; k<entities.length; k++) {
        entities[k].mesh.translateZ(entities[k].speed);
        if(entities[k].mesh.position.length() > 80) entities[k].mesh.rotateY(Math.PI);
    }
    renderer.render(scene, camera);
}
animate();

// クリック判定
window.addEventListener('click', function(e) {
    var mouse = new THREE.Vector2( (e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1 );
    var ray = new THREE.Raycaster();
    ray.setFromCamera(mouse, camera);
    var hits = ray.intersectObjects(scene.children);
    if(hits.length > 0 && hits[0].object.userData.info) {
        var data = hits[0].object.userData.info;
        document.getElementById('holo-title').innerText = data.name;
        document.getElementById('holo-desc').innerText = data.desc;
        document.getElementById('hologram-ui').classList.add('active');
    }
});
function closeHolo() { document.getElementById('hologram-ui').classList.remove('active'); }
</script>
</body>
</html>
