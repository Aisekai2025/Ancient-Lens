<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambrian 3D Deep Sea - Ultimate Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Helvetica Neue', Arial, sans-serif; color: #fff; user-select: none; }
        canvas { display: block; }
        /* 未来的なホログラムUI */
        #hologram-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(0, 25, 50, 0.75); backdrop-filter: blur(10px);
            border: 1px solid #00f7ff; padding: 25px; border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 247, 255, 0.3);
            z-index: 10; display: none; width: 320px; opacity: 0;
            transition: all 0.4s cubic-bezier(0.1, 1.5, 0.5, 1);
        }
        #hologram-ui.active { display: block; opacity: 1; transform: translate(-50%, -50%); }
        #holo-title { margin: 0; font-size: 24px; color: #00f7ff; text-shadow: 0 0 10px #00f7ff; letter-spacing: 2px; }
        #holo-en { font-size: 14px; color: #88dddd; font-style: italic; margin-bottom: 10px; }
        #holo-desc { font-size: 14px; line-height: 1.6; color: #e0f8f8; margin-bottom: 20px; }
        #close-btn { 
            background: rgba(0, 247, 255, 0.1); border: 1px solid #00f7ff; color: #00f7ff;
            padding: 10px; cursor: pointer; border-radius: 5px; width: 100%; transition: 0.3s;
        }
        #close-btn:hover { background: #00f7ff; color: #000; }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(0, 255, 255, 0.5); font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="hologram-ui">
    <h2 id="holo-title"></h2>
    <div id="holo-en"></div>
    <p id="holo-desc"></p>
    <button id="close-btn" onclick="closeHolo()">CLOSE DATA</button>
</div>

<div id="hint">CLICK: ANALYZE CREATURE / DRAG: MOVE VIEW</div>

<script src="https://cdnjs.cloudflare.com"></script>

// ==========================================
// 1. シーン・カメラ・レンダラー
// ==========================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000612);
scene.fog = new THREE.FogExp2(0x000612, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 20, 80);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// ==========================================
// 2. 照明と環境
// ==========================================
scene.add(new THREE.AmbientLight(0x113355, 2.0));
const sun = new THREE.DirectionalLight(0x00ffaa, 1.5);
sun.position.set(0, 100, 0);
scene.add(sun);

// 海底の砂場
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshStandardMaterial({ color: 0x051122, roughness: 1.0 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -40;
scene.add(ground);

// マリンスノー（浮遊物）
const snowGeo = new THREE.BufferGeometry();
const snowPos = [];
for(let i=0; i<1000; i++) {
    snowPos.push((Math.random()-0.5)*250, (Math.random()-0.5)*250, (Math.random()-0.5)*250);
}
snowGeo.setAttribute('position', new THREE.Float32BufferAttribute(snowPos, 3));
const snow = new THREE.Points(snowGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.5 }));
scene.add(snow);

// ==========================================
// 3. 生物構築ロジック
// ==========================================
const matAnom = new THREE.MeshPhysicalMaterial({ color: 0x1a6655, transmission: 0.4, roughness: 0.3 });
const matHallu = new THREE.MeshPhysicalMaterial({ color: 0xffaaaa, roughness: 0.6 });
const matTrilo = new THREE.MeshPhysicalMaterial({ color: 0x554433, roughness: 0.8 });

function buildAnomalocaris() {
    const group = new THREE.Group();
    const segments = [];
    let parent = group;
    for(let i=0; i<10; i++) {
        const s = 1 - Math.pow((i - 2)/8, 2);
        const seg = new THREE.Group();
        if(i > 0) seg.position.z = -1.5 * s;
        const body = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 12), matAnom);
        body.scale.set(1.6*s, 0.6*s, 1.2*s);
        seg.add(body);
        parent.add(seg);
        segments.push(seg);
        parent = seg;
    }
    return { mesh: group, segments };
}

    body.rotation.x = Math.PI/2;

// ==========================================
// 5. 入力とインタラクション
// ==========================================

const mouse = new THREE.Vector2();

window.addEventListener('pointerdown', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);

            ent.target.set(
                (Math.random()-0.5)*150, 
                ent.mesh.position.y, 
                (Math.random()-0.5)*150
            );
        }
        
        // ターゲットに向きを変えて進む
        dummy.position.copy(ent.mesh.position);
        dummy.lookAt(ent.target);
        ent.mesh.quaternion.slerp(dummy.quaternion, 0.02);
        ent.mesh.translateZ(ent.def.speed);

        // 体のうねり（アノマロカリス用）

            ent.segments.forEach((seg, i) => {

            });
        }
    });

    renderer.render(scene, camera);
}

// 画面リサイズ対応
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
