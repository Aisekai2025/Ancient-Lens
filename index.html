<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Lens: Paleozoic Odyssey - Fixed Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000205; font-family: 'Segoe UI', sans-serif; user-select: none; color: #fff; }
        canvas { display: block; }
        #era-nav {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0, 20, 40, 0.85); padding: 10px 20px;
            border-radius: 50px; border: 1px solid #00f2ff; z-index: 100; backdrop-filter: blur(10px);
        }
        .era-btn {
            background: rgba(0,255,255,0.1); border: 1px solid rgba(0,255,255,0.3); color: #88eeff;
            padding: 10px 20px; border-radius: 25px; cursor: pointer; transition: 0.3s; font-size: 12px; font-weight: bold;
        }
        .era-btn.active { background: #00f2ff; color: #000; box-shadow: 0 0 20px #0ff; border-color: #0ff; }
        #rare-alert {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
            color: #ff0055; font-weight: bold; font-size: 16px; display: none; text-shadow: 0 0 10px #ff0055; z-index: 100;
        }
        #hud { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(0,255,255,0.5); font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div id="era-nav">
    <button id="btn-ediacaran" class="era-btn" onclick="switchEra('ediacaran')">EDIACARAN</button>
    <button id="btn-cambrian" class="era-btn" onclick="switchEra('cambrian')">CAMBRIAN</button>
    <button id="btn-ordovician" class="era-btn" onclick="switchEra('ordovician')">ORDOVICIAN</button>
    <button id="btn-devonian" class="era-btn" onclick="switchEra('devonian')">DEVONIAN</button>
</div>

<div id="rare-alert">⚠️ RARE CREATURE DETECTED ⚠️</div>
<div id="hud">CLICK: FEEDING | DRAG: ROTATE | WHEEL: ZOOM<br>Ancient Lens Project v2.1 (Bug Fixed)</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
/**
 * Ancient Lens: Paleozoic Odyssey
 * 修正版: エラー回避 & 互換性向上
 */

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const bottomY = -40;
const aquariumRadius = 160;
let currentEra = '';
let entities = [];
let foodParticles = [];
let camAngle = { x: 0, y: 0.3, dist: 110 };
let targetCamDist = 110;

// 光源
scene.add(new THREE.AmbientLight(0x224466, 2.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); 
dirLight.position.set(0, 100, 50); 
scene.add(dirLight);

const paleoMat = (color, glow=0, trans=0) => new THREE.MeshStandardMaterial({
    color: color,
    transparent: trans > 0,
    opacity: 1 - trans,
    emissive: color,
    emissiveIntensity: glow,
    roughness: 0.5
});

// --- ジオメトリ生成ヘルパー (互換性重視) ---
const Models = {
    // ディッキンソニア (スライド移動)
    dickinsonia: () => {
        const g = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(1, 24, 24), paleoMat(0xaa88ff, 0.2, 0.2));
        body.scale.set(3, 0.1, 4);
        g.add(body);
        return { mesh: g, segments: [], type: 'crawler' };
    },
    // チャルニア (固定)
    charnia: () => {
        const g = new THREE.Group();
        const leaf = new THREE.Mesh(new THREE.BoxGeometry(1.2, 8, 0.1), paleoMat(0x66ffaa, 0.4, 0.3));
        leaf.position.y = 4; g.add(leaf);
        return { mesh: g, segments: [leaf], type: 'static' };
    },
    // アノマロカリス
    anomalocaris: () => {
        const g = new THREE.Group(); const segs = [];
        const head = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 2.5), paleoMat(0x33aa88)); g.add(head);
        const tail = new THREE.Group(); tail.position.z = -1.2; g.add(tail);
        for(let i=0; i<8; i++) {
            const s = new THREE.Mesh(new THREE.BoxGeometry(3 - i*0.2, 0.3, 1), paleoMat(0x33aa88));
            s.position.z = -i * 1.0; tail.add(s); segs.push(s);
        }
        return { mesh: g, segments: segs, type: 'swimmer' };
    },
    // ハルキゲニア (歩行)
    hallucigenia: () => {
        const g = new THREE.Group(); const legs = [];
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 6, 8), paleoMat(0xff77aa));
        body.rotation.x = Math.PI/2; g.add(body);
        for(let i=0; i<7; i++) {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.5), paleoMat(0xff77aa));
            leg.position.set(0, -0.6, -2.5 + i*0.8); g.add(leg); legs.push(leg);
            const spike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 1.8, 8), paleoMat(0xffffff));
            spike.position.set(0, 0.8, -2.5 + i*0.8); g.add(spike);
        }
        return { mesh: g, segments: legs, type: 'crawler' };
    },
    // サカバンバスピス
    sacabambaspis: () => {
        const g = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(1.2, 24, 24), paleoMat(0xbbbbaa));
        body.scale.set(0.8, 0.7, 2.2); g.add(body);
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 12), paleoMat(0x000000));
        eye.position.set(0.4, 0.15, 2.0); body.add(eye);
        const eye2 = eye.clone(); eye2.position.x = -0.4; body.add(eye2);
        return { mesh: g, segments: [body], type: 'swimmer' };
    },
    // エギロカシス (カプセルジオメトリを球体スケールで代用)
    aegirocassis: () => {
        const g = new THREE.Group(); const segs = [];
        const body = new THREE.Mesh(new THREE.SphereGeometry(3, 32, 32), paleoMat(0x4466aa, 0.1, 0.1));
        body.scale.set(1, 0.6, 2.5); // カプセル風に引き伸ばし
        body.rotation.x = Math.PI/2; g.add(body);
        for(let i=0; i<12; i++) {
            const fin = new THREE.Mesh(new THREE.BoxGeometry(8, 0.05, 2.5), paleoMat(0x4466aa, 0.2, 0.2));
            fin.position.z = -6 + i*1.2; g.add(fin); segs.push(fin);
        }
        g.scale.set(2, 2, 2);
        return { mesh: g, segments: segs, type: 'swimmer' };
    },
    // ダンクルオステウス
    dunkleosteus: () => {
        const g = new THREE.Group(); const segs = [];
        const head = new THREE.Mesh(new THREE.BoxGeometry(4.5, 4.5, 5.5), paleoMat(0x444444)); g.add(head);
        let parent = g;
        for(let i=0; i<8; i++) {
            const s = new THREE.Group(); s.position.z = -2.8;
            const b = new THREE.Mesh(new THREE.SphereGeometry(2.2 - i*0.2, 16, 16), paleoMat(0x555555));
            s.add(b); parent.add(s); segs.push(s); parent = s;
        }
        return { mesh: g, segments: segs, type: 'swimmer' };
    }
};

const DB = {
    ediacaran: { bg: 0x00050a, fog: 0.015, list: [
        { name: 'Dickinsonia', build: Models.dickinsonia, count: 12 },
        { name: 'Charnia', build: Models.charnia, count: 8 },
        { name: 'Spriggina', build: Models.sacabambaspis, count: 1, rare: true }
    ]},
    cambrian: { bg: 0x000a18, fog: 0.012, list: [
        { name: 'Anomalocaris', build: Models.anomalocaris, count: 6 },
        { name: 'Hallucigenia', build: Models.hallucigenia, count: 14 },
        { name: 'Trilobite', build: Models.dickinsonia, count: 15 },
        { name: 'Nectocaris', build: Models.sacabambaspis, count: 1, rare: true }
    ]},
    ordovician: { bg: 0x001025, fog: 0.01, list: [
        { name: 'Sacabambaspis', build: Models.sacabambaspis, count: 12 },
        { name: 'Aegirocassis', build: Models.aegirocassis, count: 2 },
        { name: 'Orthoceras', build: Models.anomalocaris, count: 6 }
    ]},
    devonian: { bg: 0x051a30, fog: 0.008, list: [
        { name: 'Dunkleosteus', build: Models.dunkleosteus, count: 4 },
        { name: 'Bothriolepis', build: Models.dickinsonia, count: 12 },
        { name: 'Stethacanthus', build: Models.sacabambaspis, count: 2, rare: true }
    ]}
};

class Entity {
    constructor(def) {
        this.def = def; const b = def.build();
        this.mesh = b.mesh; this.segments = b.segments; this.type = b.type;
        this.velocity = new THREE.Vector3(); this.target = null;
        this.speed = (Math.random() * 0.04 + 0.04) * (this.def.rare ? 3 : 1);
        const ang = Math.random() * Math.PI * 2; const d = Math.random() * aquariumRadius * 0.7;
        this.mesh.position.set(Math.cos(ang)*d, this.type==='crawler'?bottomY+0.6 : bottomY+10+Math.random()*50, Math.sin(ang)*d);
        scene.add(this.mesh);
    }
    update(time) {
        if (foodParticles.length > 0) {
            this.target = foodParticles[0].position;
        } else if (!this.target || this.mesh.position.distanceTo(this.target) < 6) {
            const ang = Math.random() * Math.PI * 2;
            this.target = new THREE.Vector3(Math.cos(ang)*110, this.type==='crawler'?bottomY+0.6 : bottomY+15+Math.random()*45, Math.sin(ang)*110);
        }
        const desired = new THREE.Vector3().subVectors(this.target, this.mesh.position).normalize();
        if (this.type === 'crawler') desired.y = 0;
        this.velocity.lerp(desired.multiplyScalar(this.speed), 0.03);

        // 衝突回避
        entities.forEach(other => {
            if (other === this) return;
            const dist = this.mesh.position.distanceTo(other.mesh.position);
            if (dist < 10) {
                const repel = new THREE.Vector3().subVectors(this.mesh.position, other.mesh.position).normalize().multiplyScalar(0.015);
                this.velocity.add(repel);
            }
        });

        this.mesh.position.add(this.velocity);
        if (this.velocity.length() > 0.01) {
            const lookTarget = this.mesh.position.clone().add(this.velocity);
            this.mesh.lookAt(lookTarget);
        }

        this.segments.forEach((seg, i) => {
            if (this.type === 'swimmer') seg.rotation.y = Math.sin(time*3.5 - i*0.4)*0.25;
            else if (this.type === 'crawler') seg.rotation.z = Math.sin(time*6 - i*0.7)*0.35;
            else if (this.type === 'static') seg.rotation.z = Math.sin(time)*0.08;
        });
    }
}

function switchEra(eraKey) {
    currentEra = eraKey;
    const data = DB[eraKey];
    
    // UIボタンの更新 (修正済み)
    document.querySelectorAll('.era-btn').forEach(btn => btn.classList.remove('active'));
    const targetBtn = document.getElementById('btn-' + eraKey);
    if(targetBtn) targetBtn.classList.add('active');
    
    scene.background = new THREE.Color(data.bg);
    scene.fog = new THREE.FogExp2(data.bg, data.fog);
    
    entities.forEach(e => scene.remove(e.mesh));
    entities = [];
    data.list.forEach(def => { for(let i=0; i<def.count; i++) entities.push(new Entity(def)); });

    const hasRare = data.list.some(d => d.rare);
    const alert = document.getElementById('rare-alert');
    alert.style.display = hasRare ? 'block' : 'none';
    if(hasRare) setTimeout(() => alert.style.display = 'none', 3500);
}

// エサ撒き
window.addEventListener('mousedown', (e) => {
    if (e.target.closest('#era-nav')) return;
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -bottomY);
    const point = new THREE.Vector3();
    if(raycaster.ray.intersectPlane(plane, point)) {
        const food = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshBasicMaterial({color: 0xffff00}));
        food.position.copy(point); scene.add(food); foodParticles.push(food);
        setTimeout(() => { scene.remove(food); foodParticles.shift(); }, 4000);
    }
});

// カメラ
window.addEventListener('wheel', (e) => targetCamDist = Math.max(40, Math.min(280, targetCamDist + e.deltaY * 0.1)));
let dragging = false;
window.addEventListener('pointerdown', () => dragging = true);
window.addEventListener('pointerup', () => dragging = false);
window.addEventListener('pointermove', (e) => {
    if(dragging) {
        camAngle.x -= e.movementX * 0.005;
        camAngle.y = Math.max(0.05, Math.min(Math.PI/2 - 0.1, camAngle.y + e.movementY * 0.005));
    }
});

function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.001;
    camAngle.dist += (targetCamDist - camAngle.dist) * 0.1;
    camera.position.set(
        Math.cos(camAngle.x) * camAngle.dist,
        bottomY + 18 + Math.sin(camAngle.y) * camAngle.dist,
        Math.sin(camAngle.x) * camAngle.dist
    );
    const lookAtY = THREE.MathUtils.lerp(bottomY + 5, 0, camAngle.dist/250);
    camera.lookAt(0, lookAtY, 0);

    entities.forEach(e => e.update(time));
    renderer.render(scene, camera);
}

// 起動
switchEra('cambrian');
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
