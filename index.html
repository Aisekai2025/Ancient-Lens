<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cambrian Abyss - Cinematic Observation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000408; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 25px; right: 25px; width: 280px; padding: 20px;
            background: rgba(0, 15, 25, 0.9); border: 1px solid #00f0ff; border-radius: 15px;
            color: #fff; display: none; pointer-events: none; z-index: 1000;
        }
        .hud { position: absolute; bottom: 20px; left: 20px; color: #00f0ff; font-size: 10px; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="ui"><h2 id="name" style="margin:0;color:#00f0ff;font-size:1.4em;"></h2><p id="desc" style="margin-top:10px;font-size:0.9em;line-height:1.6;"></p></div>
    <div class="hud">DEEP SEA SCANNER V2.5 // CLICK TO FEED // MOUSE TO LIGHT</div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        let w, h, creatures = [], foods = [], giants = [], zoom = 1.2;
        let mx = 0, my = 0, t = 0;

        const BIO = {
            anomalo: { name: "アノマロカリス", desc: "カンブリア紀の覇者。エサを見つけると、大きなヒレをうねらせて優雅に、かつ迅速に近づきます。" },
            opabinia: { name: "オパビニア", desc: "5つの目でエサの落下を察知し、長いノズルを伸ばしてキャッチします。" },
            wiwaxia: { name: "ウィワクシア", desc: "海底のトゲトゲ生物。エサが地面に届くのをじっと待ってから食べに行きます。" },
            halluci: { name: "ハルキゲニア", desc: "トゲと細い脚を持つ奇妙な姿。ライトを当てるとその複雑な形がよく見えます。" },
            trilo: { name: "三葉虫", desc: "海底を這う掃除屋。エサの匂いを嗅ぎつけると、脚の動きが活発になります。" },
            pikaia: { name: "ピカイア", desc: "素早い泳ぎ手。エサの争奪戦では一番乗りすることが多いようです。" }
        };

        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        window.addEventListener('mousedown', e => { foods.push({x: (e.clientX - w/2)/zoom, y: (e.clientY - h/2)/zoom, vx:0, vy:1.5}); });
        resize();

        class Creature {
            constructor(type, isGiant = false) {
                this.type = type;
                this.isGiant = isGiant;
                this.isBenthic = ['wiwaxia', 'halluci', 'trilo'].includes(type);
                this.spawn();
            }
            spawn() {
                this.z = this.isGiant ? -200 : Math.random() * 800; // Giantはカメラの超手前
                this.x = Math.random() * 4000 - 2000;
                this.y = this.isBenthic ? 350 + Math.random()*50 : Math.random()*600 - 300;
                this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*0.5;
                this.sizeBase = { anomalo:110, opabinia:80, wiwaxia:65, halluci:45, trilo:40, pikaia:55 }[this.type];
                if(this.isGiant) this.sizeBase *= 4;
            }
            update() {
                // エサへ集まる自然なAI
                if(foods.length > 0 && !this.isGiant) {
                    let f = foods[0];
                    let dx = f.x - this.x, dy = f.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if(dist < 500) {
                        this.vx += dx * 0.002; this.vy += dy * 0.002;
                        if(dist < 20) { foods.shift(); } // 食べる
                    }
                }
                this.vx *= 0.98; this.vy *= 0.98; // 水の抵抗
                this.x += this.vx; this.y += this.vy;
                if(this.x > 2500) this.x = -2500; if(this.x < -2500) this.x = 2500;
            }
            draw() {
                const perspective = 600 / (600 + this.z);
                this.sx = this.x * perspective * zoom + w/2;
                this.sy = this.y * perspective * zoom + h/2 + 100*zoom;
                const s = this.sizeBase * perspective * zoom;

                ctx.save();
                ctx.translate(this.sx, this.sy);
                ctx.scale(this.vx > 0 ? 1 : -1, 1);
                
                // ライトアップ判定（マウスとの距離）
                const distToMouse = Math.hypot(this.sx - mx, this.sy - my);
                const lightEffect = Math.max(0, 1 - distToMouse / 200);
                
                // 描画
                ctx.globalAlpha = this.isGiant ? 0.4 : Math.max(0.2, perspective);
                if(this.isGiant) ctx.filter = 'blur(8px)';
                
                this.renderBody(s, lightEffect);
                ctx.restore();
                this.sr = s;
            }
            renderBody(s, light) {
                const p = Date.now() * 0.005;
                let baseCol = this.isGiant ? '#001a1a' : (isBenthic(this.type) ? '#4a332d' : '#8d2d1e');
                ctx.fillStyle = baseCol;
                
                // 生物ごとの簡易シェイプ（高解像度版ロジック）
                ctx.beginPath(); ctx.ellipse(0, 0, s, s*0.4, 0, 0, 7); ctx.fill();
                
                // ライトアップ箇所を光らせる
                if(light > 0) {
                    ctx.strokeStyle = `rgba(0, 255, 255, ${light})`;
                    ctx.lineWidth = 2; ctx.stroke();
                }
                
                // アノマロのヒレなど
                if(this.type==='anomalo') {
                    for(let i=0; i<8; i++){
                        ctx.fillStyle = `rgba(200, 100, 50, ${0.3 + light})`;
                        ctx.beginPath(); ctx.ellipse(-s+i*s*0.2, s*0.3, s*0.2, Math.sin(p+i)*s*0.3, 0,0,7); ctx.fill();
                    }
                }
            }
        }
        function isBenthic(t){ return ['wiwaxia','halluci','trilo'].includes(t); }

        // 初期化
        const types = ['anomalo','opabinia','wiwaxia','halluci','trilo','pikaia'];
        types.forEach(type => { for(let i=0; i<4; i++) creatures.push(new Creature(type)); });
        const giant = new Creature('anomalo', true); // 巨大アノマロ

        function loop() {
            ctx.fillStyle = '#00080f'; ctx.fillRect(0,0,w,h);
            t += 0.01;

            // サーチライトの背景描画
            const grad = ctx.createRadialGradient(mx, my, 50, mx, my, 300);
            grad.addColorStop(0, 'rgba(0, 255, 255, 0.15)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

            // エサ
            foods.forEach(f => {
                f.y += f.vy; ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(f.x*zoom+w/2, f.y*zoom+h/2+100*zoom, 4*zoom, 0, 7); ctx.fill();
            });

            creatures.sort((a,b) => b.z - a.z);
            let hover = null;
            creatures.forEach(c => { c.update(); c.draw(); if(Math.hypot(mx-c.sx, my-c.sy) < c.sr) hover = c; });
            
            // 巨大アノマロの横切り
            giant.x += 1.5; if(giant.x > 3000) giant.x = -3000;
            giant.draw();

            if(hover) { ui.style.display='block'; document.getElementById('name').innerText=BIO[hover.type].name; document.getElementById('desc').innerText=BIO[hover.type].desc; }
            else ui.style.display='none';

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
